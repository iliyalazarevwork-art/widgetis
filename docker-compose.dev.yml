services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    ports:
      - "9001:8000"
      - "9002:9000"
    command: ["sh", "-c", "php artisan serve --host=0.0.0.0 --port=8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
    networks:
      - widgetis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: widgetis
      POSTGRES_USER: widgetis
      POSTGRES_PASSWORD: widgetis_secret
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widgetis"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - widgetis

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    networks:
      - widgetis

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    command: ["sh", "-c", "php artisan queue:work --queue=emails,default --sleep=3 --tries=3 --backoff=10"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
    networks:
      - widgetis

  widget-builder:
    build:
      context: ./widget-builder
      dockerfile: Dockerfile
    ports:
      - "3200:3200"
    volumes:
      - ./widget-builder/modules:/app/modules:ro
      - ./widget-builder/packages:/app/packages:ro
      - ./widget-builder/index.ts:/app/index.ts:ro
      - ./widget-builder/demo-config.json:/app/demo-config.json:ro
      - ./widget-builder/build-demo.ts:/app/build-demo.ts:ro
    networks:
      - widgetis

  site-proxy:
    build:
      context: ./services/site-proxy
      dockerfile: Dockerfile
    volumes:
      - ./services/site-proxy/server.mjs:/app/server.mjs
      - ./services/site-proxy/public:/app/public:ro
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: development
      PORT: "3100"
      DEMO_BUNDLE_PATH: /app/public/demo-bundle.js
    command: ["node", "--watch", "server.mjs"]
    networks:
      - widgetis

  visual-check:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /work/backend/tools/visual-check
    volumes:
      - ./backend:/work/backend
    command: >
      bash -lc "npm install --no-fund --no-audit && node mobile-visual-check.mjs --help"
    profiles:
      - tools
    networks:
      - widgetis

volumes:
  pgdata:

networks:
  widgetis:
    driver: bridge

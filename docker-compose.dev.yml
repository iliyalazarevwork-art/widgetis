services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html
    ports:
      - "9001:8000"
      - "9002:9000"
    command: ["sh", "-c", "php artisan serve --host=0.0.0.0 --port=8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ENV: local
    networks:
      - widgetis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: widgetis
      POSTGRES_USER: widgetis
      POSTGRES_PASSWORD: widgetis_secret
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widgetis"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - widgetis

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    networks:
      - widgetis

  widget-builder:
    build:
      context: ./widget-builder
      dockerfile: Dockerfile
    ports:
      - "3200:3200"
    networks:
      - widgetis

  visual-check:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /work/backend/tools/visual-check
    volumes:
      - ./backend:/work/backend
    command: >
      bash -lc "npm install --no-fund --no-audit && node mobile-visual-check.mjs --help"
    profiles:
      - tools
    networks:
      - widgetis

volumes:
  pgdata:

networks:
  widgetis:
    driver: bridge

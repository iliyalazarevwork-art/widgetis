<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e0e0e" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />

    <meta name="author" content="Widgetis" />
    <meta name="googlebot" content="index, follow" />
    <!-- canonical + hreflang are injected per-route by react-helmet (SeoHead component) -->
    <link rel="alternate" hreflang="uk" href="https://widgetis.com/" />
    <link rel="alternate" hreflang="x-default" href="https://widgetis.com/" />

    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-800.woff2" as="font" type="font/woff2" crossorigin />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Widgetis",
        "alternateName": ["widgetis", "Віджетіс", "Виджетис"],
        "url": "https://widgetis.com/",
        "logo": "https://widgetis.com/logo.svg",
        "description": "Готові маркетингові віджети для інтернет-магазинів на платформі Хорошоп (Horoshop): збільшують конверсію та середній чек, встановлення 3 хвилини без програміста.",
        "email": "hello@widgetis.com",
        "sameAs": [
          "https://t.me/widgetis"
        ],
        "contactPoint": [{
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "hello@widgetis.com",
          "availableLanguage": ["Ukrainian", "English"]
        }]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Widgetis",
        "url": "https://widgetis.com/",
        "inLanguage": "uk-UA",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://widgetis.com/widgets?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Widgetis",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "Маркетплейс готових маркетингових віджетів для інтернет-магазинів на платформі Хорошоп (Horoshop). Збільшують конверсію та середній чек.",
        "offers": {
          "@type": "AggregateOffer",
          "priceCurrency": "UAH",
          "lowPrice": "0",
          "highPrice": "2899",
          "offerCount": "4"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

services:
  # ── Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - widget-builder
    restart: always
    networks:
      - widgetis

  # ── Frontend (React SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: always
    networks:
      - widgetis

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=8000"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - widgetis

  # ── Queue Worker ───────────────────────────────────────────
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "php artisan queue:work redis --sleep=3 --tries=3 --backoff=10 --max-time=3600"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - widgetis

  # ── Scheduler (cron) ──────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - widgetis

  # ── Widget Builder ─────────────────────────────────────────
  widget-builder:
    build:
      context: ./widget-builder
      dockerfile: Dockerfile
    restart: always
    networks:
      - widgetis

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: widgetis
      POSTGRES_USER: widgetis
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widgetis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - widgetis

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    volumes:
      - redisdata:/data
    restart: always
    networks:
      - widgetis

  # ── Certbot (SSL) ──────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl

volumes:
  pgdata:
  redisdata:

networks:
  widgetis:
    driver: bridge

services:
  # ── Reverse Proxy + SSL (auto Let's Encrypt) ──────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # public/ comes from a named volume populated by the backend
      # container on startup (see backend.command). Caddy serves
      # Laravel static assets from here and proxies PHP via FastCGI.
      # Path must match backend container WORKDIR + /public.
      - backend_public:/var/www/html/public:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      widget-builder:
        condition: service_healthy
      site-proxy:
        condition: service_healthy
    restart: always
    networks:
      - widgetis

  # ── Frontend (React SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # No build args — frontend/dist/ is pre-built locally via
      # `npm run build:prerender` and committed. See docs/deployment.md.
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - widgetis

  # ── Backend API (php-fpm, fronted by Caddy via FastCGI) ──
  # Image is also reused by `queue-worker` and `scheduler` — same code,
  # different command. Building it once here saves ~2/3 of the backend
  # build time on every deploy.
  backend:
    image: widgetis-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Refresh public/ from the image-baked template on every start, then
    # warm up Laravel caches and exec php-fpm. The cp keeps backend_public
    # in sync with the latest image (named volumes don't auto-update).
    command: ["sh", "-c", "cp -a /opt/public-template/. /var/www/html/public/ && php artisan config:cache && php artisan route:cache && php artisan view:cache && exec php-fpm -F"]
    expose:
      - "9000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_public:/var/www/html/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    stop_grace_period: 30s
    healthcheck:
      # Confirms php-fpm is accepting TCP connections on :9000.
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - widgetis

  # ── Queue Worker ───────────────────────────────────────────
  # Reuses the `backend` image (same code, different entrypoint).
  queue-worker:
    image: widgetis-backend:latest
    command: ["sh", "-c", "php artisan queue:work redis --queue=emails,default --sleep=3 --tries=3 --backoff=10 --max-time=3600"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    stop_grace_period: 90s
    networks:
      - widgetis

  # ── Scheduler (cron) ──────────────────────────────────────
  # Reuses the `backend` image (same code, different entrypoint).
  scheduler:
    image: widgetis-backend:latest
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - widgetis

  # ── Widget Builder ─────────────────────────────────────────
  widget-builder:
    build:
      context: ./widget-builder
      dockerfile: Dockerfile
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://127.0.0.1:3200/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - widgetis

  # ── FlareSolverr (Cloudflare bypass for live-demo proxy) ──
  # Handles JS-challenge and Bot-Management protected sites.
  # Uses a headless Chromium to solve the challenge, then returns
  # the rendered HTML + cf_clearance cookie to site-proxy.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: info
      TZ: Europe/Kiev
    restart: always
    networks:
      - widgetis

  # ── Site Proxy (live-demo iframe preview) ─────────────────
  site-proxy:
    build:
      context: ./services/site-proxy
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3100"
      # Where site-proxy fetches per-session demo configs from. The default
      # ("http://backend:8000") was correct when prod ran `artisan serve`, but
      # since the FPM switchover (commit 6194f67) port 8000 is gone — the
      # backend container only listens on 9000 (FastCGI). We go through Caddy
      # over the public hostname so SNI/TLS termination is handled correctly.
      BACKEND_API_URL: https://api.widgetis.com/api/v1
      FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      - flaresolverr
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('net').createConnection(3100, '127.0.0.1').on('connect', function(){this.end(); process.exit(0);}).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - widgetis

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: widgetis
      POSTGRES_USER: widgetis
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widgetis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - widgetis

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    volumes:
      - redisdata:/data
    restart: always
    networks:
      - widgetis

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  backend_public:

networks:
  widgetis:
    driver: bridge

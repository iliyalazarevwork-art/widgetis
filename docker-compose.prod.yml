services:
  # ── Reverse Proxy + SSL (auto Let's Encrypt) ──────────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Backend code mounted read-only so Caddy can serve Laravel
      # static assets (public/) and route PHP requests to php-fpm
      # via FastCGI. Path must match backend container WORKDIR.
      - ./backend:/var/www/html:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      widget-builder:
        condition: service_healthy
      site-proxy:
        condition: service_healthy
    restart: always
    networks:
      - widgetis

  # ── Frontend (React SPA) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - widgetis

  # ── Backend API (php-fpm, fronted by Caddy via FastCGI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "php artisan config:cache && php artisan route:cache && php artisan view:cache && exec php-fpm -F"]
    expose:
      - "9000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    stop_grace_period: 30s
    healthcheck:
      # Confirms php-fpm is accepting TCP connections on :9000.
      test: ["CMD-SHELL", "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - widgetis

  # ── Queue Worker ───────────────────────────────────────────
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "php artisan queue:work redis --queue=emails,default --sleep=3 --tries=3 --backoff=10 --max-time=3600"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    stop_grace_period: 90s
    networks:
      - widgetis

  # ── Scheduler (cron) ──────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - widgetis

  # ── Widget Builder ─────────────────────────────────────────
  widget-builder:
    build:
      context: ./widget-builder
      dockerfile: Dockerfile
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://127.0.0.1:3200/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - widgetis

  # ── Site Proxy (live-demo iframe preview) ─────────────────
  site-proxy:
    build:
      context: ./services/site-proxy
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3100"
    restart: always
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('net').createConnection(3100, '127.0.0.1').on('connect', function(){this.end(); process.exit(0);}).on('error', () => process.exit(1))\""
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - widgetis

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: widgetis
      POSTGRES_USER: widgetis
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widgetis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - widgetis

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    volumes:
      - redisdata:/data
    restart: always
    networks:
      - widgetis

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:

networks:
  widgetis:
    driver: bridge

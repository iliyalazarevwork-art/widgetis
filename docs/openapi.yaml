openapi: "3.1.0"
info:
  title: Widgetis API
  version: "1.0.0"
  description: |
    Backend API for Widgetis — widget marketplace for e-commerce stores on Horoshop.

    ## Authentication
    JWT Bearer token via OTP login. Send OTP → Verify → get token.

    ## Localization
    Set `Accept-Language: uk` or `Accept-Language: en` header. Default: `uk`.

    ## Error format
    All errors follow: `{ "error": { "code": "...", "message": "...", "details": {} } }`

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Health
    description: Health check
  - name: Auth
    description: Authentication (OTP, JWT)
  - name: Public > Plans
    description: Subscription plans
  - name: Public > Products
    description: Widget catalog
  - name: Public > Tags
    description: Widget tags/categories
  - name: Public > Settings
    description: Global site settings
  - name: Public > Cases
    description: Customer success stories
  - name: Public > FAQ
    description: Frequently asked questions
  - name: Public > Leads
    description: Consultations and manager requests
  - name: Profile
    description: User profile and account
  - name: Profile > Dashboard
    description: User dashboard
  - name: Profile > Subscription
    description: Subscription management
  - name: Profile > Sites
    description: Site and widget management
  - name: Profile > Notifications
    description: In-app notifications
  - name: Admin
    description: Admin panel API (role:admin required)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: The given data was invalid.
            details:
              type: object

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 12
        total:
          type: integer
          example: 6

    Plan:
      type: object
      properties:
        id:
          type: integer
          example: 1
        slug:
          type: string
          example: pro
        name:
          type: string
          example: Pro
        description:
          type: string
          nullable: true
          example: Optimal for growth
        price_monthly:
          type: number
          example: 1599.00
        price_yearly:
          type: number
          example: 15990.00
        max_sites:
          type: integer
          example: 3
        max_widgets:
          type: integer
          example: 12
        features:
          type: array
          items:
            type: object
        is_recommended:
          type: boolean
          example: true

    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        slug:
          type: string
          example: promo-line
        name:
          type: string
          example: PromoLine
        description:
          type: string
          example: Scrolling announcement bar at the top of the site
        icon:
          type: string
          example: megaphone
        tag:
          $ref: "#/components/schemas/WidgetTag"
        platform:
          type: string
          example: horoshop
        is_popular:
          type: boolean
        is_new:
          type: boolean

    ProductDetail:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            long_description:
              type: string
              nullable: true
            features:
              type: array
              nullable: true
              items:
                type: object
            preview_before:
              type: string
              nullable: true
            preview_after:
              type: string
              nullable: true
            config_schema:
              type: object
              nullable: true

    WidgetTag:
      type: object
      properties:
        slug:
          type: string
          example: social-proof
        name:
          type: string
          example: Social Proof
        color:
          type: string
          example: "#3B82F6"

    Subscription:
      type: object
      properties:
        id:
          type: integer
        plan:
          $ref: "#/components/schemas/Plan"
        billing_period:
          type: string
          enum: [monthly, yearly]
        status:
          type: string
          enum: [active, trial, past_due, cancelled, expired]
        is_trial:
          type: boolean
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        days_remaining:
          type: integer

    Site:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        domain:
          type: string
          example: myshop.horoshop.ua
        url:
          type: string
        platform:
          type: string
          enum: [horoshop, shopify, woocommerce, opencart, wordpress, other]
        status:
          type: string
          enum: [pending, active, deactivated]
        script_installed:
          type: boolean
        widgets_count:
          type: integer
        connected_at:
          type: string
          format: date-time
          nullable: true

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [trial_warning, widget_activated, update_available, payment_success, payment_failed, plan_changed, subscription_cancelled]
        title:
          type: string
        body:
          type: string
        data:
          type: object
          nullable: true
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        telegram:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        locale:
          type: string
          enum: [uk, en]
        two_factor_enabled:
          type: boolean
        notification_enabled:
          type: boolean
        onboarding_completed:
          type: boolean
        created_at:
          type: string
          format: date-time

    Settings:
      type: object
      properties:
        phone:
          type: string
          example: "+380 96 149 47 47"
        email:
          type: string
          example: hello@widgetis.com
        business_hours:
          type: string
          example: "Mon-Fri 9:00-20:00"
        socials:
          type: object
          properties:
            instagram:
              type: string
            telegram:
              type: string
            facebook:
              type: string
        messengers:
          type: object
          properties:
            telegram:
              type: string
            viber:
              type: string
            whatsapp:
              type: string
        stats:
          type: object
          properties:
            stores_count:
              type: integer
            widgets_deployed:
              type: integer

    TokenResponse:
      type: object
      properties:
        token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 604800
        user:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
              nullable: true
            email:
              type: string
            locale:
              type: string

    Proration:
      type: object
      properties:
        current_plan:
          type: string
        target_plan:
          type: string
        price_difference_monthly:
          type: number
        days_remaining:
          type: integer
        days_total:
          type: integer
        prorate_percentage:
          type: number
        amount_due_now:
          type: number
        next_billing_amount:
          type: number
        next_billing_date:
          type: string
          format: date-time

paths:
  # ==================== HEALTH ====================
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "12.56.0"
                  timestamp:
                    type: string
                    format: date-time

  # ==================== AUTH ====================
  /auth/otp:
    post:
      tags: [Auth]
      summary: Send OTP code to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OTP sent
                  expires_in:
                    type: integer
                    example: 600
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Cooldown active or rate limited

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP code and get JWT token
      description: Creates user if not exists. Auto-assigns customer role to new users.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  type: string
                  format: email
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "123456"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error:
                  code: INVALID_OTP
                  message: Invalid or expired code.

  /auth/otp/resend:
    post:
      tags: [Auth]
      summary: Resend OTP code
      description: Rate limited to 3 per minute. Subject to 30-second cooldown.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: OTP resent
                  expires_in:
                    type: integer
                    example: 600
        "429":
          description: Cooldown active

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: New token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Token expired or invalid

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate JWT token
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out successfully

  /auth/user:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  # ==================== PUBLIC > PLANS ====================
  /plans:
    get:
      tags: [Public > Plans]
      summary: List all active plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plan"

  /plans/features:
    get:
      tags: [Public > Plans]
      summary: Plans feature comparison matrix
      responses:
        "200":
          description: Feature matrix
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        name:
                          type: string
                        category:
                          type: string
                        plans:
                          type: object

  # ==================== PUBLIC > PRODUCTS ====================
  /products:
    get:
      tags: [Public > Products]
      summary: List products with filtering and pagination
      parameters:
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag slug (e.g. social-proof)
        - name: platform
          in: query
          schema:
            type: string
          description: Filter by platform (e.g. horoshop)
        - name: search
          in: query
          schema:
            type: string
          description: Search by name/description (locale-aware)
        - name: sort
          in: query
          schema:
            type: string
            enum: [default, popular, new]
          description: Sort order
        - name: per_page
          in: query
          schema:
            type: integer
            default: 12
            maximum: 50
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /products/{slug}:
    get:
      tags: [Public > Products]
      summary: Get product detail by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          example: promo-line
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ProductDetail"
        "404":
          description: Product not found

  # ==================== PUBLIC > TAGS ====================
  /tags:
    get:
      tags: [Public > Tags]
      summary: List all widget tags
      responses:
        "200":
          description: Tags list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WidgetTag"

  # ==================== PUBLIC > SETTINGS ====================
  /settings:
    get:
      tags: [Public > Settings]
      summary: Get global site settings
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Settings"

  # ==================== PUBLIC > CASES ====================
  /cases:
    get:
      tags: [Public > Cases]
      summary: List published customer cases
      responses:
        "200":
          description: Customer cases
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        store:
                          type: string
                        store_url:
                          type: string
                        store_logo_url:
                          type: string
                          nullable: true
                        platform:
                          type: string
                          nullable: true
                        description:
                          type: string
                          nullable: true
                        review_rating:
                          type: integer
                          nullable: true
                        widgets:
                          type: array
                          nullable: true

  # ==================== PUBLIC > FAQ ====================
  /faq:
    get:
      tags: [Public > FAQ]
      summary: List published FAQ items
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: FAQ items
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        category:
                          type: string
                        question:
                          type: string
                        answer:
                          type: string

  # ==================== PUBLIC > LEADS ====================
  /consultations:
    post:
      tags: [Public > Leads]
      summary: Submit consultation request
      description: Rate limited to 3 per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 255
                phone:
                  type: string
                  maxLength: 20
                email:
                  type: string
                  format: email
                preferred_at:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      status:
                        type: string
                        example: new

  /manager-requests:
    post:
      tags: [Public > Leads]
      summary: Submit manager/demo request
      description: Rate limited to 3 per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messenger]
              properties:
                messenger:
                  type: string
                  enum: [telegram, viber, whatsapp]
                email:
                  type: string
                  format: email
                phone:
                  type: string
                widgets:
                  type: array
                  items:
                    type: string
                message:
                  type: string
                  maxLength: 2000
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      status:
                        type: string
                        example: new

  # ==================== PROFILE ====================
  /profile:
    get:
      tags: [Profile]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
    put:
      tags: [Profile]
      summary: Update profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                phone:
                  type: string
                  maxLength: 20
                telegram:
                  type: string
                  maxLength: 100
                company:
                  type: string
                  maxLength: 255
                locale:
                  type: string
                  enum: [uk, en]
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
    delete:
      tags: [Profile]
      summary: Delete account (soft delete)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Account deleted

  /profile/dashboard:
    get:
      tags: [Profile > Dashboard]
      summary: User dashboard with stats and activity
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          name:
                            type: string
                          email:
                            type: string
                      plan:
                        $ref: "#/components/schemas/Plan"
                      subscription_status:
                        type: string
                        nullable: true
                      stats:
                        type: object
                        properties:
                          sites_count:
                            type: integer
                          widgets_count:
                            type: integer
                      recent_activity:
                        type: array
                        items:
                          type: object

  /profile/onboarding/complete:
    post:
      tags: [Profile]
      summary: Mark onboarding as completed
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Onboarding completed

  /profile/settings:
    put:
      tags: [Profile]
      summary: Update notification/locale settings
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notification_enabled:
                  type: boolean
                locale:
                  type: string
                  enum: [uk, en]
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      notification_enabled:
                        type: boolean
                      locale:
                        type: string

  /profile/widgets:
    get:
      tags: [Profile]
      summary: List available and locked widgets for current plan
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Widgets categorized by availability
          content:
            application/json:
              schema:
                type: object
                properties:
                  available:
                    type: array
                    items:
                      type: object
                      properties:
                        product_id:
                          type: integer
                        slug:
                          type: string
                        name:
                          type: string
                        icon:
                          type: string
                        is_enabled:
                          type: boolean
                  locked:
                    type: array
                    items:
                      type: object
                  limits:
                    type: object
                    properties:
                      used:
                        type: integer
                      max:
                        type: integer

  /profile/payments:
    get:
      tags: [Profile]
      summary: Payment history (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Payment history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        type:
                          type: string
                        amount:
                          type: number
                        currency:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"

  /profile/support-requests:
    post:
      tags: [Profile]
      summary: Create support request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [install_help, general]
                site_id:
                  type: integer
                messenger:
                  type: string
                  enum: [telegram, viber, whatsapp]
                message:
                  type: string
                  maxLength: 2000
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      status:
                        type: string

  # ==================== PROFILE > NOTIFICATIONS ====================
  /profile/notifications:
    get:
      tags: [Profile > Notifications]
      summary: List notifications (paginated)
      security:
        - bearerAuth: []
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        "200":
          description: Notifications with unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
                  unread_count:
                    type: integer

  /profile/notifications/{id}/read:
    post:
      tags: [Profile > Notifications]
      summary: Mark notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Marked as read
        "404":
          description: Notification not found

  /profile/notifications/mark-all-read:
    post:
      tags: [Profile > Notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "204":
          description: All marked as read

  # ==================== PROFILE > SUBSCRIPTION ====================
  /profile/subscription:
    get:
      tags: [Profile > Subscription]
      summary: Get current subscription
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Subscription data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Subscription"
        "404":
          description: No active subscription

  /profile/subscription/prorate:
    get:
      tags: [Profile > Subscription]
      summary: Calculate proration for plan change
      security:
        - bearerAuth: []
      parameters:
        - name: target_plan_slug
          in: query
          required: true
          schema:
            type: string
          example: max
      responses:
        "200":
          description: Proration calculation
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Proration"

  /profile/subscription/change:
    post:
      tags: [Profile > Subscription]
      summary: Change subscription plan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_slug]
              properties:
                plan_slug:
                  type: string
                  example: max
      responses:
        "200":
          description: Plan changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Subscription"

  /profile/subscription/cancel:
    post:
      tags: [Profile > Subscription]
      summary: Cancel subscription
      description: Access continues until current period end.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Subscription"
                  message:
                    type: string

  # ==================== PROFILE > SITES ====================
  /profile/sites:
    get:
      tags: [Profile > Sites]
      summary: List user's sites with limits
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sites list with plan limits
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Site"
                  limits:
                    type: object
                    properties:
                      used:
                        type: integer
                      max:
                        type: integer
                      plan:
                        type: string
    post:
      tags: [Profile > Sites]
      summary: Create a new site
      description: Auto-generates script token. Enforces plan site limit.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, platform]
              properties:
                url:
                  type: string
                  format: uri
                  example: https://myshop.horoshop.ua
                platform:
                  type: string
                  enum: [horoshop, shopify, woocommerce, opencart, wordpress, other]
                name:
                  type: string
                  maxLength: 255
      responses:
        "201":
          description: Site created with script and install instructions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      domain:
                        type: string
                      status:
                        type: string
                      script:
                        type: object
                        properties:
                          token:
                            type: string
                          script_tag:
                            type: string
                          script_url:
                            type: string
                      install_instructions:
                        type: array
                        items:
                          type: object
                          properties:
                            step:
                              type: integer
                            title:
                              type: string
                            description:
                              type: string
        "403":
          description: Site limit reached

  /profile/sites/{id}:
    get:
      tags: [Profile > Sites]
      summary: Get site detail with script and widgets
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Site detail
        "404":
          description: Site not found
    delete:
      tags: [Profile > Sites]
      summary: Delete a site
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Site deleted
        "404":
          description: Site not found

  /profile/sites/{id}/script:
    get:
      tags: [Profile > Sites]
      summary: Get site embed script and install instructions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Script data with install instructions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      script_tag:
                        type: string
                      script_url:
                        type: string
                      install_instructions:
                        type: array
                        items:
                          type: object

  /profile/sites/{id}/verify:
    post:
      tags: [Profile > Sites]
      summary: Verify script installation on site
      description: Marks site as active if script is found.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  message:
                    type: string

  /profile/sites/{siteId}/widgets/{productId}:
    put:
      tags: [Profile > Sites]
      summary: Enable/disable/configure a widget on a site
      description: Enforces plan widget limit when enabling.
      security:
        - bearerAuth: []
      parameters:
        - name: siteId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_enabled:
                  type: boolean
                config:
                  type: object
                  description: Widget-specific configuration
                  example:
                    color: "#3B82F6"
                    position: top
      responses:
        "200":
          description: Widget updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      product_id:
                        type: integer
                      is_enabled:
                        type: boolean
                      config:
                        type: object
        "403":
          description: Widget limit reached

  # ==================== ADMIN ====================
  /admin/dashboard:
    get:
      tags: [Admin]
      summary: Admin dashboard with KPIs
      security:
        - bearerAuth: []

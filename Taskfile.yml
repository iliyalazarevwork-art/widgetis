version: '3'

vars:
  DC: docker compose -f docker-compose.dev.yml
  EXEC: '{{.DC}} exec backend'
  FRONT: cd frontend &&
  DCP: docker compose -f docker-compose.prod.yml --env-file .env.prod
  EXECP: '{{.DCP}} exec backend'

tasks:
  # ── OTP ────────────────────────────────────────────────
  otp:login:
    desc: "Отправить OTP и получить код  ·  task otp:login -- admin@widgetis.com"
    cmds:
      - '{{.EXEC}} php artisan otp:login {{.CLI_ARGS}}'

  otp:get:
    desc: "Получить уже отправленный OTP  ·  task otp:get -- admin@widgetis.com"
    cmds:
      - '{{.EXEC}} php artisan otp:get {{.CLI_ARGS}}'

  # ── Artisan ────────────────────────────────────────────
  artisan:
    desc: "Любая artisan-команда  ·  task artisan -- migrate:status"
    cmds:
      - '{{.EXEC}} php artisan {{.CLI_ARGS}}'

  tinker:
    desc: "Laravel Tinker  ·  task tinker"
    interactive: true
    cmds:
      - '{{.EXEC}} php artisan tinker'

  # ── Composer ───────────────────────────────────────────
  composer:
    desc: "Любая composer-команда  ·  task composer -- require spatie/laravel-data"
    cmds:
      - '{{.EXEC}} composer {{.CLI_ARGS}}'

  install:
    desc: "composer install  ·  task install"
    cmds:
      - '{{.EXEC}} composer install'

  # ── Качество кода ─────────────────────────────────────
  fix:
    desc: "Авто-исправление стиля кода: pint (PHP) + eslint --fix (TS/TSX)  ·  task fix"
    cmds:
      - task: pint
      - task: fix:front

  fix:front:
    desc: "ESLint --fix для фронта  ·  task fix:front"
    dir: frontend
    cmds:
      - npx eslint --fix 'src/**/*.{ts,tsx}'

  pint:
    desc: "Автоформатирование (Pint)  ·  task pint"
    cmds:
      - '{{.EXEC}} ./vendor/bin/pint'

  stan:
    desc: "Статический анализ (PHPStan)  ·  task stan"
    cmds:
      - '{{.EXEC}} ./vendor/bin/phpstan analyse --memory-limit=512M'

  test:
    desc: "Backend phpunit  ·  task test -- --filter=UserTest"
    cmds:
      - '{{.EXEC}} php artisan test {{.CLI_ARGS}}'

  test:front:
    desc: "Frontend vitest"
    dir: frontend
    cmds:
      - npm test

  test:e2e:
    desc: "Frontend Playwright e2e (локально)"
    dir: frontend
    cmds:
      - npm run e2e

  test:smoke:prod:
    desc: "Прод-смоук Playwright против https://widgetis.com (после деплоя)"
    dir: frontend
    cmds:
      - E2E_BASE_URL=https://widgetis.com npm run e2e

  test:all:
    desc: "Полный прогон: pint + stan + backend phpunit + frontend vitest + локальный e2e"
    cmds:
      - task: pint
      - task: stan
      - task: test
      - task: test:front
      - task: test:e2e

  check:
    desc: "Полная проверка — pint + stan + tests  ·  task check"
    cmds:
      - task: pint
      - task: stan
      - task: test

  # ── База данных ────────────────────────────────────────
  migrate:
    desc: "Запуск миграций  ·  task migrate"
    cmds:
      - '{{.EXEC}} php artisan migrate'

  migrate:fresh:
    desc: "Пересоздать БД + seed  ·  task migrate:fresh"
    cmds:
      - '{{.EXEC}} php artisan migrate:fresh --seed'

  seed:
    desc: "Запуск сидеров  ·  task seed"
    cmds:
      - '{{.EXEC}} php artisan db:seed'

  seed:content:
    desc: "Прод-наполнение: тарифы, продукты, отзывы, кейсы (без сайтов/подписок/заказов)  ·  task seed:content"
    cmds:
      - '{{.EXEC}} php artisan migrate:fresh --seeder=Database\\Seeders\\FullContentSeeder'

  # ── Docker ─────────────────────────────────────────────
  up:
    desc: "Поднять контейнеры + фронт  ·  task up"
    cmds:
      - '{{.DC}} up -d'
      - mkdir -p frontend/.logs
      - |
        if lsof -ti tcp:5173 >/dev/null 2>&1; then
          echo "Vite уже запущен на :5173"
        else
          (cd frontend && nohup npx vite --host 127.0.0.1 --port 5173 </dev/null > .logs/vite.log 2>&1 &) || true
          echo "Vite запущен в фоне  ·  логи: frontend/.logs/vite.log  ·  http://localhost:5173"
        fi

  down:
    desc: "Остановить контейнеры + фронт  ·  task down"
    cmds:
      - '{{.DC}} down'
      - |
        if lsof -ti tcp:5173 >/dev/null 2>&1; then
          lsof -ti tcp:5173 | xargs kill 2>/dev/null || true
          echo "Vite остановлен"
        fi

  restart:
    desc: "Перезапустить контейнеры  ·  task restart"
    cmds:
      - '{{.DC}} restart'

  logs:
    desc: "Логи backend  ·  task logs"
    cmds:
      - '{{.DC}} logs -f backend'

  sh:
    desc: "Shell в контейнере  ·  task sh"
    interactive: true
    cmds:
      - '{{.EXEC}} sh'

  # ── Demo Bundle ────────────────────────────────────────
  build:demo:
    desc: "Собрать обфусцированный demo-bundle.js из widget-builder/demo-config.json  ·  task build:demo"
    cmds:
      - mkdir -p services/site-proxy/public
      # `run --rm` — каждый билд в свежем эфемерном контейнере с актуальной
      # compose-конфигурацией (volume-mounts из docker-compose.dev.yml).
      # Не зависит от состояния работающего widget-builder.
      - '{{.DC}} run --rm --no-deps -T widget-builder jiti build-demo.ts > services/site-proxy/public/demo-bundle.js'
      - |
        if [ ! -s services/site-proxy/public/demo-bundle.js ]; then
          echo "❌ demo-bundle.js is empty — build failed"
          rm -f services/site-proxy/public/demo-bundle.js
          exit 1
        fi
      - echo "✅ demo-bundle.js written ($(wc -c < services/site-proxy/public/demo-bundle.js) bytes)"

  # ── Frontend ───────────────────────────────────────────
  front:dev:
    desc: "Запустить Vite dev server  ·  task front:dev"
    dir: frontend
    cmds:
      - npx vite --host 127.0.0.1 --port 5173

  front:build:
    desc: "Собрать фронт для продакшена  ·  task front:build"
    dir: frontend
    cmds:
      - npm run build

  front:install:
    desc: "npm install для фронта  ·  task front:install"
    dir: frontend
    cmds:
      - npm install

  front:check:
    desc: "TypeScript проверка фронта  ·  task front:check"
    dir: frontend
    cmds:
      - npx tsc --noEmit

  # ── Кэш ────────────────────────────────────────────────
  cache:clear:
    desc: "Очистить весь кэш Laravel  ·  task cache:clear"
    cmds:
      - '{{.EXEC}} php artisan optimize:clear'

  # ── Deploy ─────────────────────────────────────────────
  deploy:
    desc: "Задеплоить на прод (смоук после)  ·  task deploy"
    cmds:
      - bash deploy.sh
      - task: test:smoke:prod

  d:
    desc: "Алиас: task d -> task deploy"
    cmds:
      - task: deploy

  deploy:fast:
    desc: "Быстрый деплой без пересборки образов (смоук после)  ·  task deploy:fast"
    cmds:
      - bash deploy.sh --skip-build
      - task: test:smoke:prod

  deploy:seed-base:
    desc: "Деплой + безопасные прод-сидеры (смоук после)  ·  task deploy:seed-base"
    cmds:
      - bash deploy.sh --seed-base
      - task: test:smoke:prod

  deploy:nocheck:
    desc: "Аварийный деплой без тестов (использовать только для срочных хотфиксов)  ·  task deploy:nocheck"
    cmds:
      - bash deploy.sh

  # ── Продакшен ──────────────────────────────────────────
  prod:up:
    desc: "Поднять прод-контейнеры  ·  task prod:up"
    cmds:
      - '{{.DCP}} up -d'

  prod:down:
    desc: "Остановить прод-контейнеры  ·  task prod:down"
    cmds:
      - '{{.DCP}} down'

  prod:build:
    desc: "Пересобрать прод-образы  ·  task prod:build"
    cmds:
      - '{{.DCP}} build --no-cache'

  prod:logs:
    desc: "Логи прод-бэкенда  ·  task prod:logs"
    cmds:
      - '{{.DCP}} logs -f backend'

  prod:migrate:
    desc: "Миграции на проде  ·  task prod:migrate"
    cmds:
      - '{{.EXECP}} php artisan migrate --force'

  prod:seed-base:
    desc: "Безопасные прод-сидеры (роли/планы/продукты)  ·  task prod:seed-base"
    cmds:
      - '{{.EXECP}} php artisan db:seed --class=ProductionBootstrapSeeder --force'

  prod:cache:
    desc: "Прогреть кэш на проде  ·  task prod:cache"
    cmds:
      - '{{.EXECP}} php artisan config:cache'
      - '{{.EXECP}} php artisan route:cache'
      - '{{.EXECP}} php artisan view:cache'
      - '{{.EXECP}} php artisan event:cache'

  prod:keys:
    desc: "Сгенерировать APP_KEY и JWT_SECRET  ·  task prod:keys"
    cmds:
      - '{{.EXECP}} php artisan key:generate --show'
      - '{{.EXECP}} php artisan jwt:secret --show'

  prod:artisan:
    desc: "Artisan на проде  ·  task prod:artisan -- migrate:status"
    cmds:
      - '{{.EXECP}} php artisan {{.CLI_ARGS}}'

  prod:sh:
    desc: "Shell в прод-контейнере  ·  task prod:sh"
    interactive: true
    cmds:
      - '{{.EXECP}} sh'

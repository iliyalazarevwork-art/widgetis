version: '3'

vars:
  DC: docker compose -f docker-compose.dev.yml
  EXEC: '{{.DC}} exec backend'
  FRONT: cd frontend &&
  DCP: docker compose -f docker-compose.prod.yml --env-file .env.prod
  EXECP: '{{.DCP}} exec backend'
  SERVER: root@204.168.206.10
  REMOTE_DIR: /opt/widgetis

tasks:
  # ── Secrets (SOPS + age) ───────────────────────────────
  secrets:enc:
    desc: "Зашифровать .env.production → .env.production.enc  ·  task secrets:enc"
    cmds:
      - SOPS_AGE_KEY_FILE=.age-key.txt sops --input-type dotenv --output-type dotenv --encrypt backend/.env.production > backend/.env.production.enc
      - echo "✓ backend/.env.production.enc updated"

  secrets:dec:
    desc: "Расшифровать .env.production.enc → .env.production  ·  task secrets:dec"
    cmds:
      - SOPS_AGE_KEY_FILE=.age-key.txt sops --input-type dotenv --output-type dotenv --decrypt backend/.env.production.enc > backend/.env.production
      - echo "✓ backend/.env.production decrypted"

  secrets:edit:
    desc: "Редактировать зашифрованный файл напрямую в $EDITOR  ·  task secrets:edit"
    cmds:
      - SOPS_AGE_KEY_FILE=.age-key.txt sops backend/.env.production.enc

  # ── OTP ────────────────────────────────────────────────
  otp:login:
    desc: "Отправить OTP и получить код  ·  task otp:login -- admin@widgetis.com"
    cmds:
      - '{{.EXEC}} php artisan otp:login {{.CLI_ARGS}}'

  otp:get:
    desc: "Получить уже отправленный OTP  ·  task otp:get -- admin@widgetis.com"
    cmds:
      - '{{.EXEC}} php artisan otp:get {{.CLI_ARGS}}'

  # ── Artisan ────────────────────────────────────────────
  artisan:
    desc: "Любая artisan-команда  ·  task artisan -- migrate:status"
    cmds:
      - '{{.EXEC}} php artisan {{.CLI_ARGS}}'

  tinker:
    desc: "Laravel Tinker  ·  task tinker"
    interactive: true
    cmds:
      - '{{.EXEC}} php artisan tinker'

  # ── Composer ───────────────────────────────────────────
  composer:
    desc: "Любая composer-команда  ·  task composer -- require spatie/laravel-data"
    cmds:
      - '{{.EXEC}} composer {{.CLI_ARGS}}'

  install:
    desc: "composer install  ·  task install"
    cmds:
      - '{{.EXEC}} composer install'

  # ── Качество кода ─────────────────────────────────────
  fix:
    desc: "Авто-исправление стиля кода: pint (PHP) + eslint --fix (TS/TSX)  ·  task fix"
    cmds:
      - task: pint
      - task: fix:front

  fix:front:
    desc: "ESLint --fix для фронта  ·  task fix:front"
    dir: frontend
    cmds:
      - npx eslint --fix 'src/**/*.{ts,tsx}'

  pint:
    desc: "Автоформатирование (Pint)  ·  task pint"
    cmds:
      - '{{.EXEC}} ./vendor/bin/pint'

  stan:
    desc: "Статический анализ (PHPStan)  ·  task stan"
    cmds:
      - '{{.EXEC}} ./vendor/bin/phpstan analyse --memory-limit=512M'

  test:
    desc: "Backend phpunit  ·  task test -- --filter=UserTest"
    cmds:
      - '{{.EXEC}} php artisan test {{.CLI_ARGS}}'

  test:front:
    desc: "Frontend vitest"
    dir: frontend
    cmds:
      - npm test

  test:e2e:
    desc: "Frontend Playwright e2e (локально)"
    dir: frontend
    cmds:
      - npm run e2e

  test:widgets:e2e:
    desc: "Прогнати e2e-тести модулів проти site-proxy  ·  task test:widgets:e2e"
    cmds:
      - cd widget-builder && pnpm exec playwright install chromium --with-deps 2>&1 | tail -3
      - cd widget-builder && pnpm exec playwright test --config tests/e2e/playwright.config.ts

  test:smoke:prod:
    desc: "Прод-смоук Playwright против https://widgetis.com (после деплоя)"
    dir: frontend
    cmds:
      - E2E_BASE_URL=https://widgetis.com npm run e2e

  test:all:
    desc: "Полный прогон: pint + stan + backend phpunit + frontend vitest + локальный e2e"
    cmds:
      - task: pint
      - task: stan
      - task: test
      - task: test:front
      - task: test:e2e

  check:
    desc: "Полная проверка — pint + stan + tests  ·  task check"
    cmds:
      - task: pint
      - task: stan
      - task: test

  # ── База данных ────────────────────────────────────────
  migrate:
    desc: "Запуск миграций  ·  task migrate"
    cmds:
      - '{{.EXEC}} php artisan migrate'

  migrate:fresh:
    desc: "Пересоздать БД + seed  ·  task migrate:fresh"
    cmds:
      - '{{.EXEC}} php artisan migrate:fresh --seed'

  seed:
    desc: "Запуск сидеров  ·  task seed"
    cmds:
      - '{{.EXEC}} php artisan db:seed'

  seed:content:
    desc: "Прод-наполнение: тарифы, продукты, отзывы, кейсы (без сайтов/подписок/заказов)  ·  task seed:content"
    cmds:
      - '{{.EXEC}} php artisan migrate:fresh --seeder=Database\\Seeders\\FullContentSeeder'

  # ── Docker ─────────────────────────────────────────────
  up:
    desc: "Поднять контейнеры + фронт  ·  task up"
    cmds:
      - '{{.DC}} up -d'
      - mkdir -p frontend/.logs
      - |
        VITE_HOST="${VITE_HOST:-127.0.0.1}"
        VITE_PORT="${VITE_PORT:-5173}"
        VITE_LOG="frontend/.logs/vite.log"
        VITE_PID_FILE="frontend/.logs/vite.pid"

        if lsof -ti "tcp:${VITE_PORT}" >/dev/null 2>&1; then
          echo "Порт :${VITE_PORT} уже занят, Vite не перезапускаем"
        else
          : > "${VITE_LOG}"
          rm -f "${VITE_PID_FILE}"
          (
            cd frontend
            nohup npx vite --host "${VITE_HOST}" --port "${VITE_PORT}" </dev/null > .logs/vite.log 2>&1 &
            echo $! > "${VITE_PID_FILE##frontend/}"
          )

          started=0
          for _ in $(seq 1 40); do
            if lsof -ti "tcp:${VITE_PORT}" >/dev/null 2>&1; then
              started=1
              break
            fi
            sleep 0.25
          done

          if [ "${started}" -eq 1 ]; then
            echo "Vite запущен в фоне  ·  логи: ${VITE_LOG}  ·  http://localhost:${VITE_PORT}"
          else
            echo "❌ Vite не поднялся на :${VITE_PORT}. Последние строки лога:"
            tail -n 60 "${VITE_LOG}" || true
            exit 1
          fi
        fi

  down:
    desc: "Остановить контейнеры + фронт  ·  task down"
    cmds:
      - '{{.DC}} down'
      - |
        VITE_PORT="${VITE_PORT:-5173}"
        VITE_PID_FILE="frontend/.logs/vite.pid"

        if [ -f "${VITE_PID_FILE}" ]; then
          VITE_PID="$(cat "${VITE_PID_FILE}" 2>/dev/null || true)"
          if [ -n "${VITE_PID}" ] && kill -0 "${VITE_PID}" >/dev/null 2>&1; then
            kill "${VITE_PID}" 2>/dev/null || true
          fi
          rm -f "${VITE_PID_FILE}"
        fi

        if lsof -ti "tcp:${VITE_PORT}" >/dev/null 2>&1; then
          lsof -ti "tcp:${VITE_PORT}" | xargs kill 2>/dev/null || true
          echo "Vite остановлен"
        fi

  restart:
    desc: "Перезапустить контейнеры  ·  task restart"
    cmds:
      - '{{.DC}} restart'

  logs:
    desc: "Логи backend  ·  task logs"
    cmds:
      - '{{.DC}} logs -f backend'

  sh:
    desc: "Shell в контейнере  ·  task sh"
    interactive: true
    cmds:
      - '{{.EXEC}} sh'

  # ── Catalog Crawler ────────────────────────────────────
  catalog:fetch-ids:
    desc: "Витягти Horoshop horoshop_id зі сторінок і записати в БД  ·  task catalog:fetch-ids -- --domain benihome.com.ua --xlsx /data/full.xlsx --limit 0"
    cmds:
      - '{{.DC}} run --rm --no-deps catalog-crawler python fetch_platform_ids.py {{.CLI_ARGS}}'

  catalog:fetch-ids:dry:
    desc: "Dry-run (без запису в БД, перші 5 товарів)  ·  task catalog:fetch-ids:dry"
    cmds:
      - '{{.DC}} run --rm --no-deps catalog-crawler python fetch_platform_ids.py --domain benihome.com.ua --xlsx /data/full.xlsx --limit 5 --dry-run'

  # ── Demo Bundle ────────────────────────────────────────
  demo:theme:
    desc: |
      Применить цветовую тему к demo-config.json, затем пересобрать: task build:demo

      Использование:
        task demo:theme              — применить активную тему из demo-themes.json
        task demo:theme THEME=mist  — нейтральный серо-синий (подходит любому магазину)
        task demo:theme THEME=rosé  — пыльная роза (косметика, мода, украшения)
        task demo:theme THEME=sage  — шалфей (эко, еда, натуральные товары)

      Редактировать палитры: widget-builder/demo-themes.json
    cmds:
      - |
        cd widget-builder && node_modules/.bin/jiti apply-theme.ts {{if .THEME}}--theme {{.THEME}}{{end}}

  build:demo:
    desc: "Собрать обфусцированный demo-bundle.js из widget-builder/demo-config.json  ·  task build:demo"
    cmds:
      - mkdir -p services/site-proxy/public
      # `run --rm` — каждый билд в свежем эфемерном контейнере с актуальной
      # compose-конфигурацией (volume-mounts из docker-compose.dev.yml).
      # Не зависит от состояния работающего widget-builder.
      - '{{.DC}} run --rm --no-deps -T widget-builder jiti build-demo.ts > services/site-proxy/public/demo-bundle.js'
      - |
        if [ ! -s services/site-proxy/public/demo-bundle.js ]; then
          echo "❌ demo-bundle.js is empty — build failed"
          rm -f services/site-proxy/public/demo-bundle.js
          exit 1
        fi
      - echo "✅ demo-bundle.js written ($(wc -c < services/site-proxy/public/demo-bundle.js) bytes)"

  # ── Frontend ───────────────────────────────────────────
  front:dev:
    desc: "Запустить Vite dev server  ·  task front:dev"
    dir: frontend
    cmds:
      - npx vite --host 127.0.0.1 --port 5173

  front:build:
    desc: "Собрать фронт для продакшена  ·  task front:build"
    dir: frontend
    cmds:
      - npm run build

  front:install:
    desc: "npm install для фронта  ·  task front:install"
    dir: frontend
    cmds:
      - npm install

  front:check:
    desc: "TypeScript проверка фронта  ·  task front:check"
    dir: frontend
    cmds:
      - npx tsc --noEmit

  # ── Кэш ────────────────────────────────────────────────
  cache:clear:
    desc: "Очистить весь кэш Laravel  ·  task cache:clear"
    cmds:
      - '{{.EXEC}} php artisan optimize:clear'

  # ── Deploy ─────────────────────────────────────────────
  # ── Internal: одна проверка = одна задача (для параллелизации в deps) ──────
  _deploy:pre:pint:
    internal: true
    cmds:
      - echo "[pint]    start" && time {{.EXEC}} ./vendor/bin/pint && echo "[pint]    done"
  _deploy:pre:eslint:
    internal: true
    cmds:
      - echo "[eslint]  start" && (cd frontend && time npx eslint --fix 'src/**/*.{ts,tsx}') || true; echo "[eslint]  done"
  _deploy:pre:phpstan:
    internal: true
    cmds:
      - echo "[phpstan] start" && time {{.EXEC}} ./vendor/bin/phpstan analyse --memory-limit=512M && echo "[phpstan] done"
  _deploy:pre:tsc:
    internal: true
    cmds:
      - echo "[tsc]     start" && (cd frontend && time npx tsc --noEmit) && echo "[tsc]     done"
  _deploy:pre:phpunit:
    internal: true
    cmds:
      - echo "[phpunit] start" && time {{.EXEC}} php artisan test && echo "[phpunit] done"
  _deploy:pre:vitest:
    internal: true
    cmds:
      - echo "[vitest]  start" && (cd frontend && time npm test) && echo "[vitest]  done"

  # Phase A — auto-fixes (мутируют файлы; должны завершиться ДО проверок,
  # которые читают те же файлы). Pint → PHP, ESLint → TS — не пересекаются,
  # поэтому сами между собой идут параллельно.
  _deploy:pre:fix:
    internal: true
    deps:
      - _deploy:pre:pint
      - _deploy:pre:eslint

  # Phase B — независимые проверки + тесты, всё параллельно.
  _deploy:pre:check:
    internal: true
    deps:
      - _deploy:pre:phpstan
      - _deploy:pre:tsc
      - _deploy:pre:phpunit
      - _deploy:pre:vitest

  deploy:pre:
    desc: "Предеплойные проверки (параллельно): pint+eslint → phpstan+tsc+phpunit+vitest"
    cmds:
      - echo "▶ Phase A — auto-fixes (pint + eslint, parallel)"
      - task: _deploy:pre:fix
      - echo "▶ Phase B — checks + tests (phpstan + tsc + phpunit + vitest, parallel)"
      - task: _deploy:pre:check

  deploy:
    desc: "Полный деплой: проверки → бэкап → деплой → смоук  ·  task deploy"
    cmds:
      - |
        T0=$(date +%s)
        section() { echo ""; echo "═══ $1 ═══"; SEC_T0=$(date +%s); }
        section_end() { echo "═══ $1: $(($(date +%s) - SEC_T0))s ═══"; }
        section "1/4 deploy:pre"
        task deploy:pre
        section_end "1/4 deploy:pre"
        section "2/4 prod:db:dump"
        task prod:db:dump
        section_end "2/4 prod:db:dump"
        section "3/4 deploy.sh"
        bash deploy.sh
        section_end "3/4 deploy.sh"
        section "4/4 test:smoke:prod"
        task test:smoke:prod
        section_end "4/4 test:smoke:prod"
        echo ""
        echo "✅ TOTAL deploy time: $(($(date +%s) - T0))s"

  d:
    desc: "Алиас: task d -> task deploy"
    cmds:
      - task: deploy

  deploy:fast:
    desc: "Быстрый деплой без пересборки образов  ·  task deploy:fast"
    cmds:
      - task: deploy:pre
      - task: prod:db:dump
      - bash deploy.sh --skip-build
      - task: test:smoke:prod

  deploy:seed-base:
    desc: "Деплой + безопасные прод-сидеры  ·  task deploy:seed-base"
    cmds:
      - task: deploy:pre
      - task: prod:db:dump
      - bash deploy.sh --seed-base
      - task: test:smoke:prod

  deploy:nocheck:
    desc: "Аварийный деплой без проверок и тестов (только бэкап → deploy)  ·  task deploy:nocheck"
    cmds:
      - task: prod:db:dump
      - bash deploy.sh

  # ── Продакшен ──────────────────────────────────────────
  prod:up:
    desc: "Поднять прод-контейнеры  ·  task prod:up"
    cmds:
      - '{{.DCP}} up -d'

  prod:down:
    desc: "Остановить прод-контейнеры  ·  task prod:down"
    cmds:
      - '{{.DCP}} down'

  prod:build:
    desc: "Пересобрать прод-образы  ·  task prod:build"
    cmds:
      - '{{.DCP}} build --no-cache'

  prod:logs:
    desc: "Логи прод-бэкенда  ·  task prod:logs"
    cmds:
      - '{{.DCP}} logs -f backend'

  prod:migrate:
    desc: "Миграции на проде  ·  task prod:migrate"
    cmds:
      - '{{.EXECP}} php artisan migrate --force'

  prod:seed-base:
    desc: "Безопасные прод-сидеры (роли/планы/продукты)  ·  task prod:seed-base"
    cmds:
      - '{{.EXECP}} php artisan db:seed --class=ProductionBootstrapSeeder --force'

  prod:cache:
    desc: "Прогреть кэш на проде  ·  task prod:cache"
    cmds:
      - '{{.EXECP}} php artisan config:cache'
      - '{{.EXECP}} php artisan route:cache'
      - '{{.EXECP}} php artisan view:cache'
      - '{{.EXECP}} php artisan event:cache'

  prod:keys:
    desc: "Сгенерировать APP_KEY и JWT_SECRET  ·  task prod:keys"
    cmds:
      - '{{.EXECP}} php artisan key:generate --show'
      - '{{.EXECP}} php artisan jwt:secret --show'

  prod:artisan:
    desc: "Artisan на проде  ·  task prod:artisan -- migrate:status"
    cmds:
      - '{{.EXECP}} php artisan {{.CLI_ARGS}}'

  prod:db:dump:
    desc: "Сделать дамп прод-БД на сервере (/opt/widgetis/backups/)  ·  task prod:db:dump"
    cmds:
      - |
        ssh {{.SERVER}} 'set -e
          cd {{.REMOTE_DIR}}
          mkdir -p backups
          TS=$(date -u +%Y%m%d-%H%M%S)
          OUT="backups/widgetis-$TS.sql.gz"
          docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T postgres \
            pg_dump -U widgetis -d widgetis --clean --if-exists | gzip > "$OUT"
          ls -1t backups/widgetis-*.sql.gz 2>/dev/null | tail -n +21 | xargs -r rm -f
          echo "✓ $OUT ($(du -h "$OUT" | cut -f1))"
        '

  prod:db:list:
    desc: "Список прод-дампов на сервере  ·  task prod:db:list"
    cmds:
      - ssh {{.SERVER}} 'ls -lht {{.REMOTE_DIR}}/backups/widgetis-*.sql.gz 2>/dev/null || echo "дампов нет"'

  prod:db:restore:
    desc: "Восстановить прод-БД из дампа на сервере  ·  task prod:db:restore -- widgetis-YYYYMMDD-HHMMSS.sql.gz"
    cmds:
      - |
        FILE="{{.CLI_ARGS}}"
        if [ -z "$FILE" ]; then
          echo "❌ укажи файл: task prod:db:restore -- widgetis-...sql.gz (см. task prod:db:list)"
          exit 1
        fi
        ssh {{.SERVER}} "set -e
          cd {{.REMOTE_DIR}}
          if [ ! -f backups/$FILE ]; then
            echo '❌ backups/$FILE не найден'
            exit 1
          fi
          echo '▶ восстанавливаю backups/$FILE в widgetis (prod)...'
          gunzip -c backups/$FILE | docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T postgres psql -U widgetis -d widgetis
          echo '✓ restored'
        "

  prod:db:fetch:
    desc: "Скачать дамп с сервера локально  ·  task prod:db:fetch -- widgetis-YYYYMMDD-HHMMSS.sql.gz"
    cmds:
      - mkdir -p backups
      - |
        FILE="{{.CLI_ARGS}}"
        if [ -z "$FILE" ]; then
          echo "❌ укажи файл: task prod:db:fetch -- widgetis-...sql.gz"
          exit 1
        fi
        scp {{.SERVER}}:{{.REMOTE_DIR}}/backups/$FILE backups/$FILE
        echo "✓ backups/$FILE"

  prod:sh:
    desc: "Shell в прод-контейнере  ·  task prod:sh"
    interactive: true
    cmds:
      - '{{.EXECP}} sh'

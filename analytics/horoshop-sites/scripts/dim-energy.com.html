        <style>

.contact-button{
position:fixed;
bottom:25px;
right:0;
background:#6BE675;
color:#fff;
padding:14px 22px;
border-radius:30px 0 0 30px;
font-size:16px;
font-weight:bold;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
z-index:9999;
transition:0.4s;
}

/* кнопка трохи ховається */
.contact-button.hide{
right:-140px;
}

/* при наведенні висувається */
.contact-button:hover{
right:0;
}

.contact-menu{
position:fixed;
bottom:80px;
right:25px;
display:none;
flex-direction:column;
gap:10px;
z-index:9999;
}

.contact-menu a{
background:white;
padding:10px 15px;
border-radius:20px;
text-decoration:none;
color:#333;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
font-size:14px;
}

</style>

<div class="contact-menu" id="contactMenu">

<a href="tel:+380667865262">
Подзвонити
</a>

</div>

<a class="contact-button" id="contactButton" onclick="toggleMenu()">
⚡ Отримати консультацію
</a>

<script>

function toggleMenu(){
var menu=document.getElementById("contactMenu");

if(menu.style.display==="flex"){
menu.style.display="none";
}else{
menu.style.display="flex";
}
}

/* ховання кнопки при прокрутці */
let lastScroll = 0;

window.addEventListener("scroll", function(){

let currentScroll = window.pageYOffset;
let button = document.getElementById("contactButton");

if(currentScroll > lastScroll){
button.classList.add("hide");
}else{
button.classList.remove("hide");
}

lastScroll = currentScroll;

});

</script>

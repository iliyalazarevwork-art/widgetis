        <style>
.cookie-banner {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #283618;
  color: #fff;
  padding: 16px;
  text-align: center;
  font-size: 15px;
  z-index: 9999;
  display: none;
  flex-direction: column;
  gap: 10px;
}
.cookie-banner-buttons {
  display: flex;
  justify-content: center;
  gap: 12px;
}
.cookie-btn {
  padding: 8px 20px;
  border: none;
  cursor: pointer;
  border-radius: 4px;
  font-weight: 500;
}
.cookie-accept {
  background: #dda15e;
  color: #fff;
}
.cookie-reject {
  background: #606c38;
  color: #fff;
}
</style>

<div id="cookie-banner" class="cookie-banner">
  <p>Ми використовуємо файли cookie для покращення вашого досвіду користування сайтом. 
  Ви можете <strong>прийняти</strong> або <strong>відхилити</strong> використання cookie.</p>
  <div class="cookie-banner-buttons">
    <button id="cookie-accept" class="cookie-btn cookie-accept">Прийняти</button>
    <button id="cookie-reject" class="cookie-btn cookie-reject">Відхилити</button>
  </div>
</div>

<script>
(function() {
  const banner = document.getElementById('cookie-banner');
  const acceptBtn = document.getElementById('cookie-accept');
  const rejectBtn = document.getElementById('cookie-reject');

  // Перевірка чи є згода в localStorage
  const consent = localStorage.getItem('cookie_consent');

  if (!consent) {
    banner.style.display = 'flex';
  }

  // Прийнято
  acceptBtn.addEventListener('click', function() {
    localStorage.setItem('cookie_consent', 'accepted');
    banner.style.display = 'none';
    console.log('Користувач прийняв cookies');

    // ✅ Приклад — тут можна викликати аналітику або включити сторонні скрипти:
    // window.dataLayer.push({ event: 'cookies_accept' });
  });

  // Відхилено
  rejectBtn.addEventListener('click', function() {
    localStorage.setItem('cookie_consent', 'rejected');
    banner.style.display = 'none';
    console.log('Користувач відхилив cookies');

    // ✅ Приклад — тут можна виключити аналітику:
    // window.dataLayer.push({ event: 'cookies_reject' });
  });
})();
</script>

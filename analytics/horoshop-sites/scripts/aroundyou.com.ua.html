        <style>
/* --- Chat widget AroundYou --- */
.au-chat-widget {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 9999;
  font-family: "Montserrat", sans-serif;
}

.au-chat-button {
  width: 64px;
  height: 64px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, #e7a19d 0%, #d98b86 100%);
  box-shadow: 0 10px 24px rgba(59, 67, 68, 0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform .25s ease, box-shadow .25s ease;
  animation: pulse 2.5s infinite;
}

.au-chat-button:hover {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 14px 30px rgba(59, 67, 68, 0.22);
}

.au-chat-button svg {
  width: 28px;
  height: 28px;
  fill: #fff;
}

.au-chat-popup {
  position: absolute;
  right: 0;
  bottom: 82px;
  width: 300px;
  padding: 18px;
  border-radius: 20px;
  background: #f5f3f1;
  border: 1px solid rgba(217, 139, 134, 0.22);
  box-shadow: 0 18px 45px rgba(59, 67, 68, 0.16);
  display: none;
  overflow: hidden;
  animation: auFadeIn .25s ease;
}

.au-chat-popup.active {
  display: block;
}

.au-chat-popup::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 4px;
  background: linear-gradient(90deg, #d98b86 0%, #e7a19d 100%);
}

.au-chat-title {
  margin: 6px 0 8px;
  font-size: 20px;
  font-weight: 700;
  color: #3b4344;
}

.au-chat-text {
  margin: 0 0 16px;
  font-size: 14px;
  color: #6a7172;
}

.au-chat-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.au-chat-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  text-decoration: none;
  background: #ffffff;
  border: 1px solid rgba(59, 67, 68, 0.08);
  color: #3b4344;
  font-size: 15px;
  font-weight: 600;
  transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
}

.au-chat-link:hover {
  transform: translateX(2px);
  border-color: rgba(217, 139, 134, 0.45);
  box-shadow: 0 8px 18px rgba(59, 67, 68, 0.08);
}

.au-chat-icon {
  width: 22px;
  height: 22px;
}

.au-chat-note {
  margin-top: 14px;
  font-size: 12px;
  color: #8b8f90;
}

.au-online {
  display: inline-block;
  margin-left: 6px;
  width: 8px;
  height: 8px;
  background: #4cd964;
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(76,217,100,0.8);
}

/* анімації */
@keyframes auFadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes pulse {
  0% {box-shadow: 0 0 0 0 rgba(217,139,134,0.4);}
  70% {box-shadow: 0 0 0 12px rgba(217,139,134,0);}
  100% {box-shadow: 0 0 0 0 rgba(217,139,134,0);}
}

/* мобілка */
@media (max-width: 767px) {
  .au-chat-widget { right: 16px; bottom: 16px; }
  .au-chat-button { width: 58px; height: 58px; }
  .au-chat-popup {
    width: calc(100vw - 32px);
    bottom: 72px;
  }
}
</style>

<script>
(function () {
  const button = document.getElementById('auChatButton');
  const popup = document.getElementById('auChatPopup');

  button.addEventListener('click', function (e) {
    e.stopPropagation();
    popup.classList.toggle('active');
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('.au-chat-widget')) {
      popup.classList.remove('active');
    }
  });
})();
</script>

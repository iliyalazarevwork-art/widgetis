        <script>
// Створення елемента для віджета
window.onload = function() {
    var widgetContainer = document.createElement("a");
    widgetContainer.href = "https://t.me/Anna_kkuzmina";
    widgetContainer.target = "_blank";
    widgetContainer.style.position = "fixed";
    widgetContainer.style.bottom = "20px";
    widgetContainer.style.right = "20px";
    widgetContainer.style.backgroundColor = "white"; // Заливка білим кольором
    widgetContainer.style.color = "#0088cc"; // Текст синього кольору
    widgetContainer.style.padding = "10px 20px";
    widgetContainer.style.borderRadius = "5px";
    widgetContainer.style.textAlign = "center";
    widgetContainer.style.boxShadow = "0 4px 8px rgba(0, 0, 0, 0.2)";
    widgetContainer.style.cursor = "pointer";
    widgetContainer.style.zIndex = "1000";
    widgetContainer.style.display = "flex";
    widgetContainer.style.alignItems = "center";
    widgetContainer.style.border = "2px solid #0088cc"; // Синя обводка
    widgetContainer.style.transition = "all 0.3s ease"; // Плавний перехід
    widgetContainer.style.textDecoration = "none"; // Відсутність підкреслення

    // Створення іконки
    var telegramIcon = document.createElement("img");
    telegramIcon.src = "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg"; // URL до іконки
    telegramIcon.style.width = "20px";
    telegramIcon.style.height = "20px";
    telegramIcon.style.marginRight = "10px";

    // Створення тексту
    var widgetText = document.createElement("span");
    widgetText.innerHTML = "Напишіть нам в телеграм!";

    // Додавання іконки та тексту до контейнера
    widgetContainer.appendChild(telegramIcon);
    widgetContainer.appendChild(widgetText);

    // Подія для відправлення події в GA4
    widgetContainer.onclick = function(event) {
        console.log('Подія кліку спрацювала'); // Лог для перевірки кліку

        // Відправка події в Google Analytics 4
        if (typeof gtag === 'function') {
            var referrer = document.referrer; // Джерело трафіку
            console.log('Відправка події в GA4'); // Лог для перевірки відправки події

            gtag('event', 'telegram_widget_click', {
                'event_category': 'engagement',
                'event_label': 'Telegram Widget',
                'traffic_source': referrer
            });
        } else {
            console.error("Функція gtag не визначена. Перевірте завантаження Google Analytics.");
        }

        // Відправка події в dataLayer для GTM
        if (typeof window.dataLayer !== 'undefined') {
            window.dataLayer.push({
                event: "telegram_widget_click",
                eventModel: {
                    widget_name: "Telegram Widget",
                    click_destination: "https://t.me/extrctysales"
                },
                gtm: {
                    uniqueEventId: Date.now()
                }
            });
            console.log('Подія telegram_widget_click додана до dataLayer');
        } else {
            console.error("dataLayer не визначено. Перевірте наявність dataLayer.");
        }
    };

    // Стилі при наведенні на елемент
    widgetContainer.onmouseover = function() {
        widgetContainer.style.backgroundColor = "#0088cc"; // Заливка синього кольору
        widgetContainer.style.color = "white"; // Текст білий
    };

    // Відновлення початкових стилів, коли миша залишає елемент
    widgetContainer.onmouseout = function() {
        widgetContainer.style.backgroundColor = "white"; // Повернення білої заливки
        widgetContainer.style.color = "#0088cc"; // Повернення синього тексту
    };

    // Додавання віджета на сторінку
    document.body.appendChild(widgetContainer);
};
</script>

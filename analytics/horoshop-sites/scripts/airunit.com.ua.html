(function (app) {
    app.utils = {
        formatPrice: function (value) {
            return new Intl.NumberFormat("de-DE", {
                style: "currency",
                currency: "EUR"
            }).format(Number(value) || 0);
        },

        slugToLabel: function (value) {
            var map = {
                indoor: "Для приміщень",
                outdoor: "Для вулиці",
                stationary: "Стаціонарні",
                mobile: "Мобільні",
                remote: "Віддалені",
                standalone: "Автономні"
            };

            if (map[String(value || "")]) {
                return map[String(value || "")];
            }

            return String(value || "")
                .split("-")
                .map(function (part) {
                    return part.charAt(0).toUpperCase() + part.slice(1);
                })
                .join(" ");
        },

        escapeHtml: function (value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        },

        calculateSelectionTotal: function (items) {
            return items.reduce(function (total, item) {
                return total + (Number(item.price) || 0);
            }, 0);
        },

        roundPrice: function (value) {
            return Math.round((Number(value) || 0) * 100) / 100;
        },

        formatPercent: function (value) {
            return (Number(value) || 0) + "%";
        },

        formatFrequencyMHz: function (value) {
            var number = Number(value) || 0;

    function parseFrequencyBound(value, fallbackUnit) {
        var normalized = String(value || "").replace(",", ".").trim();
        var match = normalized.match(/([0-9.]+)\s*(kHz|MHz|GHz)?/i);
        var number;
        var unit;

        if (!match) {
            return null;
        }

        number = Number(match[1]);
        unit = (match[2] || fallbackUnit || "").toLowerCase();

        if (!Number.isFinite(number)) {
            return null;
        }

        if (unit === "khz") {
            return number / 1000;
        }

        if (unit === "ghz") {
            return number * 1000;
        }

        if (unit === "mhz") {
            return number;
        }

        return null;
    }

    function buildCommandCenterAntennaSections(sections) {
        return (sections || []).map(function (section) {
            return Object.assign({}, section, {
                items: (section.items || []).map(function (item) {
                    var rangeText = String(item.freqRange || item.subtitle || "");
                    var parts = rangeText.split("-");
                    var startText = (parts[0] || "").trim();
                    var endText = (parts[1] || "").trim();
                    var startMatch = startText.match(/(kHz|MHz|GHz)/i);
                    var endMatch = endText.match(/(kHz|MHz|GHz)/i);
                    var startUnit = startMatch ? startMatch[1] : "";
                    var endUnit = endMatch ? endMatch[1] : "";
                    var rawEndNumber = Number(endText.replace(",", "."));
                    var inferredEndUnit = endUnit || (startUnit.toLowerCase() === "mhz" && Number.isFinite(rawEndNumber) && rawEndNumber <= 70 ? "GHz" : startUnit);

                    return Object.assign({}, item, {
                        minMHz: parseFrequencyBound(startText, startUnit || "MHz"),
                        maxMHz: parseFrequencyBound(endText, inferredEndUnit || "MHz")
                    });
                })
            });
        });
    }

    function renderDeviceCard(device) {

            ? '<img src="' + app.utils.escapeHtml(device.image) + '" alt="' + app.utils.escapeHtml(device.name) + '">'
            : '<div class="device-card-fallback">' + app.utils.escapeHtml(device.name) + "</div>";

        var tagsMarkup = device.tags.map(function (tag) {
            return '<span class="device-tag">' + app.utils.escapeHtml(app.utils.slugToLabel(tag)) + "</span>";
        }).join("");

        return [
            '<article class="device-card" data-device-id="' + app.utils.escapeHtml(device.id) + '">',
            '  <div class="device-card-visual">' + imageMarkup + "</div>",
            '  <div class="device-card-title">',
            '      <h3>' + app.utils.escapeHtml(device.name) + "</h3>",
            '      <span class="device-card-slots">' + app.utils.escapeHtml(device.slotsLabel) + "</span>",
            "  </div>",
            '  <p>' + app.utils.escapeHtml(device.description) + "</p>",
            '  <div class="device-tags">' + tagsMarkup + "</div>",
            "</article>"
        ].join("");
    }

    function getFilteredDevices() {
        var selectedFilters = app.state.selectedFilters;
        var devices = app.state.data.deviceFamilies || [];

        if (!selectedFilters.length) {
            return devices;
        }

        return devices.filter(function (device) {
            return selectedFilters.every(function (filterId) {
                return device.tags.indexOf(filterId) >= 0;
            });
        });
    }

    function renderFilters() {
        return app.state.data.filters.map(function (filter) {
            var isActive = app.state.selectedFilters.indexOf(filter.id) >= 0;

            return [
                '<button class="chip' + (isActive ? " is-active" : "") + '" type="button" data-filter-id="' + app.utils.escapeHtml(filter.id) + '">',
                app.utils.escapeHtml(filter.label),
                "</button>"
            ].join("");
        }).join("");
    }

    app.homeView = {
        render: function (root) {
            var devices = getFilteredDevices();
            var devicesMarkup = devices.length
                ? devices.map(renderDeviceCard).join("")
                : '<div class="empty-state">За вибраними фільтрами поки нічого не знайдено. Можна скинути фільтри й переглянути всі серії.</div>';

            root.innerHTML = [
                '<section class="home-screen">',
                '  <div class="hero-panel">',
                "      <h2>Оберіть серію пристрою</h2>",
                "      <p>Використовуйте фільтри для швидкого пошуку. Оберіть модель — і відкриється покроковий конфігуратор.</p>",
                "  </div>",
                '  <div class="filter-panel">',
                '      <div class="filter-header">',
                '          <div class="filter-label">Фільтри сценарію</div>',
                '          <div class="filter-actions">',
                '              <button class="action-button is-secondary" type="button" data-action="reset-filters">Скинути фільтри</button>',
                "          </div>",
                "      </div>",
                '      <div class="filter-list">' + renderFilters() + "</div>",
                "  </div>",
                '  <div class="device-grid">' + devicesMarkup + "</div>",
                "</section>"
            ].join("");
        },

        bind: function (root, rerender) {
            root.querySelectorAll("[data-filter-id]").forEach(function (button) {
                button.addEventListener("click", function () {
                    app.state.toggleFilter(button.getAttribute("data-filter-id"));
                    rerender();
                });
            });

            var resetButton = root.querySelector('[data-action="reset-filters"]');
            if (resetButton) {
                resetButton.addEventListener("click", function () {
                    app.state.resetFilters();
                    rerender();
                });
            }

            root.querySelectorAll("[data-device-id]").forEach(function (card) {
                card.addEventListener("click", function () {
                    app.state.openDevice(card.getAttribute("data-device-id"));
                    rerender();
                });
            });
        }
    };
})(window.AaroniaConfigurator);

            return result.concat(section.items || []);
        }, []);
    }

        return Boolean(device && (device.commandCenterMode || device.rodbMode));
    }

    function getCommandCenterCatalog(device) {
        return (device && device.slotCatalog) || [];
    }

    function getSlotVersionOptions(device) {
        return (device && device.slotVersions) || [];
    }

    function getSelectedSlotVersion(device, selections) {
        var versions = getSlotVersionOptions(device);
        if (!versions.length) {

        }

        return versions.find(function (version) {
            return version.id === selections.slotVersionId;
        }) || versions[0];
    }

    function getCommandCenterBaseUnit(device, selections) {
        if (!device) {
            return null;
        }

        var selectedVersion = getSelectedSlotVersion(device, selections);
        var versionBasePrice = Number((selectedVersion || {}).basePrice);
        var basePrice = !isNaN(versionBasePrice) && versionBasePrice > 0
            ? versionBasePrice
            : Number(device.summaryBasePrice || 0);

        if (!basePrice) {
            return null;
        }

        return {
            name: device.name,
            price: basePrice
        };
    }

                return renderSectionStep('Крок 3. Програмне забезпечення', 'Оберіть програмні модулі для розширення функціоналу аналізатора.\n\nПакет програмного забезпечення RTSA-Suite PRO вже входить до комплекту з усіма стандартними функціями для вимірювання та візуалізації.', device.software, selections.softwareIds, 'software');
            case 3:
                return renderAntennaStep(device, selections);
            case 4:
                return renderSectionStep('Крок 5. Аксесуари', 'Оберіть аксесуари для підключення та роботи системи.', device.accessories, selections.accessoryIds, 'accessory');
            default:
                return renderSummaryStep(device, summary);
        }
    }

    function isStepAllowed() {
        var device = app.state.getCurrentDevice();
        var selections = app.state.getSelections();

        if (isCommandCenterDevice(device)) {
            return (selections.slotSelections || []).some(function (slotSelection) {
                return Boolean(slotSelection.analyzerId);
            });
        }

        return Boolean(selections.analyzerId);
    }

    function syncAntennaRangeLabels(root, minValue, maxValue) {
        var minLabel = root.querySelector('[data-range-label="min"]');
        var maxLabel = root.querySelector('[data-range-label="max"]');

        if (minLabel) {
            minLabel.textContent = formatMinFrequencyLabel(minValue);
        }

        if (maxLabel) {
            maxLabel.textContent = formatMaxFrequencyLabel(maxValue);
        }
    }

    function applyAntennaFilterDom(root, minValue, maxValue) {
        var visibleCount = 0;
        var selectedMin = Number(minValue);
        var selectedMax = Number(maxValue);

        if (!isFinite(selectedMin)) {
            selectedMin = 0;
        }

        if (!isFinite(selectedMax)) {
            selectedMax = 70000;
        }

        root.querySelectorAll('[data-antenna-card]').forEach(function (card) {
            var itemMin = parseFloat(card.getAttribute('data-min-mhz') || '0');
            var itemMax = parseFloat(card.getAttribute('data-max-mhz') || '0');

            if (!isFinite(itemMin)) {
                itemMin = 0;
            }

            if (!isFinite(itemMax)) {
                itemMax = 0;
            }

            var isVisible = itemMin >= selectedMin && itemMax <= selectedMax;

            card.classList.toggle('is-hidden', !isVisible);

            if (isVisible) {
                visibleCount += 1;
            }
        });

        root.querySelectorAll('[data-antenna-section]').forEach(function (section) {
            var hasVisibleCard = Array.prototype.some.call(section.querySelectorAll('[data-antenna-card]'), function (card) {
                return !card.classList.contains('is-hidden');
            });

            section.classList.toggle('is-hidden', !hasVisibleCard);
        });

        var empty = root.querySelector('[data-antenna-empty]');
        if (empty) {
            empty.classList.toggle('is-hidden', visibleCount > 0);
        }
    }

    app.configuratorView = {
        render: function (root) {
            var device = app.state.getCurrentDevice();
            var selections = app.state.getSelections();
            var summary = getSummary(device, selections);

            root.innerHTML = [
                '<section class="configurator-screen">',
                '  <div class="configurator-intro">',
                '      <div class="device-tabs">' + renderTabs(app.state.data.deviceFamilies, device.id) + '</div>',
                '      <div class="configurator-title-row">',
                '          <div>',
                '              <h2>Конфігуратор ' + app.utils.escapeHtml(device.name) + '</h2>',
                '          </div>',
                '      </div>',
                '      <div class="step-indicator">' + renderStepIndicator(app.state.data.stepLabels, app.state.currentStepIndex) + '</div>',
                '  </div>',
                '  <div class="configurator-layout">',
                '      <div class="configurator-main">',
                renderActionBars(app.state.currentStepIndex, app.state.data.stepLabels.length),
                renderCurrentStep(device, selections, summary),
                renderActionBars(app.state.currentStepIndex, app.state.data.stepLabels.length),
                app.state.currentStepIndex === app.state.data.stepLabels.length - 1 ? '' : renderSummaryPanel(device, summary, 'mobile'),
                '      </div>',
                app.state.currentStepIndex === app.state.data.stepLabels.length - 1 ? '' : renderSummaryPanel(device, summary, 'desktop'),
                '  </div>',
                '</section>'
            ].join('');
        },

        bind: function (root, rerender) {
            function bindCardClick(card) {
                card.addEventListener('click', function (event) {
                    if (card.classList.contains('is-disabled') || card.classList.contains('is-locked')) {
                        return;
                    }

                    var target = event.target && event.target.nodeType === 1
                        ? event.target
                        : null;

                    if (target && (target.matches('input, select, button, textarea, a') || target.closest('input, select, button, textarea, a'))) {
                        return;
                    }

                    var interactive = card.querySelector('input:not([disabled]), select:not([disabled])');
                    if (!interactive) {
                        return;
                    }

                    if (interactive.tagName === 'INPUT') {
                        interactive.click();
                        return;
                    }

                    if (interactive.tagName === 'SELECT') {
                        interactive.focus();
                        interactive.click();
                    }
                });
            }

            root.querySelectorAll('[data-switch-device]').forEach(function (button) {
                button.addEventListener('click', function () {
                    app.state.openDevice(button.getAttribute('data-switch-device'));
                    rerender();
                });
            });

            root.querySelectorAll('[data-step-index]').forEach(function (button) {
                button.addEventListener('click', function () {
                    app.state.goToStep(Number(button.getAttribute('data-step-index')));
                    rerender();
                });
            });

            root.querySelectorAll('.selection-card').forEach(bindCardClick);
            root.querySelectorAll('.slot-panel').forEach(function (panel) {
                panel.addEventListener('click', function (event) {
                    var target = event.target && event.target.nodeType === 1 ? event.target : null;
                    if (target && (target.matches('input, select, button, textarea, a') || target.closest('input, select, button, textarea, a'))) {
                        return;
                    }

                    var select = panel.querySelector('[data-cc-slot-select]');
                    if (select) {
                        select.focus();
                    }
                });
            });

            root.querySelectorAll('input[name="analyzer"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.setAnalyzer(input.value);
                    rerender();
                });
            });

            root.querySelectorAll('[data-cc-slot-select]').forEach(function (select) {
                select.addEventListener('change', function () {
                    app.state.setSlotAnalyzer(Number(select.getAttribute('data-cc-slot-select')), select.value);
                    rerender();
                });
            });

            root.querySelectorAll('[data-slot-version]').forEach(function (select) {
                select.addEventListener('change', function () {
                    app.state.setSlotVersion(select.value);
                    rerender();
                });
            });

            root.querySelectorAll('[data-cc-slot-option]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.toggleSlotAnalyzerOption(Number(input.getAttribute('data-cc-slot-option')), input.value);
                    rerender();
                });
            });

            root.querySelectorAll('[data-cc-slot-certificate]').forEach(function (select) {
                select.addEventListener('change', function () {
                    app.state.setSlotAnalyzerCertificate(Number(select.getAttribute('data-cc-slot-certificate')), select.value);
                    rerender();
                });
            });

            root.querySelectorAll('input[name="analyzer-option"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.toggleSelection('analyzerOptionIds', input.value);
                    rerender();
                });
            });

            root.querySelectorAll('input[name="analyzer-certificate"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.setAnalyzerCertificate(input.value);
                    rerender();
                });
            });

            root.querySelectorAll('input[name="device-option"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.toggleSelection('deviceOptionIds', input.value);
                    rerender();
                });
            });

            root.querySelectorAll('[data-cc-device-group]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.setCcDeviceOption(input.getAttribute('data-cc-device-group'), input.value);
                    rerender();
                });
            });

            root.querySelectorAll('input[name="warranty"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.setWarranty(input.value);
                    rerender();
                });
            });

            root.querySelectorAll('input[name="software"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.toggleSelection('softwareIds', input.value);
                    rerender();
                });
            });

            root.querySelectorAll('input[name="antenna"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.toggleSelection('antennaIds', input.value);
                    rerender();
                });
            });

            root.querySelectorAll('input[name="accessory"]').forEach(function (input) {
                input.addEventListener('change', function () {
                    app.state.toggleSelection('accessoryIds', input.value);
                    rerender();
                });
            });

            root.querySelectorAll('[data-antenna-range]').forEach(function (input) {
                input.addEventListener('input', function () {
                    var minInput = root.querySelector('[data-antenna-range="min"]');
                    var maxInput = root.querySelector('[data-antenna-range="max"]');
                    var nextMinIndex = Number(minInput ? minInput.value : 0);
                    var nextMaxIndex = Number(maxInput ? maxInput.value : 0);
                    var nextMin = ANTENNA_MIN_VALUES[nextMinIndex] || ANTENNA_MIN_VALUES[0];
                    var nextMax = ANTENNA_MAX_VALUES[nextMaxIndex] || ANTENNA_MAX_VALUES[ANTENNA_MAX_VALUES.length - 1];

                    if (nextMin > nextMax) {
                        if (input.getAttribute('data-antenna-range') === 'min' && maxInput) {
                            nextMaxIndex = getMaxIndexForMin(nextMin);
                            maxInput.value = nextMaxIndex;
                            nextMax = ANTENNA_MAX_VALUES[nextMaxIndex] || nextMin;
                        }

                        if (input.getAttribute('data-antenna-range') === 'max' && minInput) {
                            nextMinIndex = getMinIndexForMax(nextMax);
                            minInput.value = nextMinIndex;
                            nextMin = ANTENNA_MIN_VALUES[nextMinIndex] || nextMax;
                        }
                    }

                    syncAntennaRangeLabels(root, nextMin, nextMax);
                    applyAntennaFilterDom(root, nextMin, nextMax);
                });

                input.addEventListener('change', function () {
                    var minInput = root.querySelector('[data-antenna-range="min"]');
                    var maxInput = root.querySelector('[data-antenna-range="max"]');
                    var nextMinIndex = Number(minInput ? minInput.value : 0);
                    var nextMaxIndex = Number(maxInput ? maxInput.value : 0);
                    var nextMin = ANTENNA_MIN_VALUES[nextMinIndex] || ANTENNA_MIN_VALUES[0];
                    var nextMax = ANTENNA_MAX_VALUES[nextMaxIndex] || ANTENNA_MAX_VALUES[ANTENNA_MAX_VALUES.length - 1];

                    if (nextMin > nextMax) {
                        if (input.getAttribute('data-antenna-range') === 'min' && maxInput) {
                            nextMaxIndex = getMaxIndexForMin(nextMin);
                            maxInput.value = nextMaxIndex;
                            nextMax = ANTENNA_MAX_VALUES[nextMaxIndex] || nextMin;
                        } else if (minInput) {
                            nextMinIndex = getMinIndexForMax(nextMax);
                            minInput.value = nextMinIndex;
                            nextMin = ANTENNA_MIN_VALUES[nextMinIndex] || nextMax;
                        }
                    }

                    app.state.setAntennaFilterRange(nextMin, nextMax);
                    rerender();
                });
            });

            applyAntennaFilterDom(root, Number(app.state.getSelections().antennaFilterMinMHz || 0), Number(app.state.getSelections().antennaFilterMaxMHz || 70000));

            root.querySelectorAll('[data-request-form]').forEach(function (requestForm) {
                requestForm.addEventListener('submit', function (event) {
                    var formData = new FormData(requestForm);
                    var device = app.state.getCurrentDevice();
                    var selections = app.state.getSelections();
                    var summary = getSummary(device, selections);
                    var submitButton = requestForm.querySelector('button[type="submit"]');
                    var phone = String(formData.get('phone') || '').trim();
                    var email = String(formData.get('email') || '').trim();
                    var fullName = String(formData.get('fullName') || '').trim();
                    var comment = String(formData.get('comment') || '').trim();
                    var feedback = requestForm.querySelector('[data-form-feedback]');
                    var payload = null;

                    event.preventDefault();

                    if (!phone && !email) {
                        feedback.textContent = 'Залиште контактні дані — менеджер AirUnit зв’яжеться з вами та підготує пропозицію.';
                        feedback.className = 'form-feedback is-error';
                        return;
                    }

                    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                        feedback.textContent = 'Перевірте, будь ласка, правильність E-mail.';
                        feedback.className = 'form-feedback is-error';
                        return;
                    }

                    payload = buildRequestPayload(device, selections, summary, {
                        fullName: fullName,
                        phone: phone,
                        email: email,
                        comment: comment
                    });

                    if (!payload) {
                        feedback.textContent = 'Не налаштовано ключ Web3Forms. Додайте access key у конфігураторі.';
                        feedback.className = 'form-feedback is-error';
                        return;
                    }

                    if (submitButton) {
                        submitButton.disabled = true;
                        submitButton.textContent = 'Надсилаємо...';
                    }

                    var web3FormData = new FormData();
                    web3FormData.append('access_key', payload.accessKey);
                    web3FormData.append('subject', payload.subject);
                    web3FormData.append('from_name', payload.fromName);
                    web3FormData.append('name', payload.name);
                    web3FormData.append('email', payload.email);
                    web3FormData.append('replyto', payload.replyTo);
                    web3FormData.append('phone', payload.phone);
                    web3FormData.append('message', payload.message);
                    web3FormData.append('botcheck', '');

                    fetch('https://api.web3forms.com/submit', {
                        method: 'POST',
                        body: web3FormData,
                        headers: {
                            'Accept': 'application/json'
                        }
                    }).then(function (response) {
                        return response.json();
                    }).then(function (result) {
                        if (!result || result.success !== true) {
                            throw new Error(result && (result.message || (result.body && result.body.message)) || 'Помилка відправки');
                        }

                        requestForm.reset();
                        feedback.textContent = 'Дякуємо, заявку отримано. Ми зв’яжемося з Вами найближчим часом.';
                        feedback.className = 'form-feedback is-success';
                    }).catch(function () {
                        feedback.textContent = 'Не вдалося надіслати заявку. Спробуйте ще раз трохи пізніше.';
                        feedback.className = 'form-feedback is-error';
                    }).finally(function () {
                        if (submitButton) {
                            submitButton.disabled = false;
                            submitButton.textContent = 'Надіслати заявку';
                        }
                    });

                });
            });

            root.querySelectorAll('[data-action="back-home"]').forEach(function (button) {
                button.addEventListener('click', function () {
                    app.state.goHome();
                    rerender();
                });
            });

            root.querySelectorAll('[data-action="prev-step"]').forEach(function (button) {
                button.addEventListener('click', function () {
                    app.state.previousStep();
                    rerender();
                });
            });

            root.querySelectorAll('[data-action="next-step"]').forEach(function (button) {
                button.addEventListener('click', function () {
                    if (app.state.currentStepIndex === 0 && !isStepAllowed()) {
                        return;
                    }

                    app.state.nextStep();
                    rerender();
                });
            });
        }
    };
})(window.AaroniaConfigurator);


(function (app) {

    function render() {
        if (app.state.currentScreen === "configurator") {

                "  <p>Результат: потрібно відкрити проект через локальний сервер або розмістити JSON поруч із файлами на сайті. Текст помилки: " + app.utils.escapeHtml(error.message) + "</p>",
                "</div>"
            ].join("");
        });
})(window.AaroniaConfigurator);

})();

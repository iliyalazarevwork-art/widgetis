<script>
    window.addEventListener("load", function () {
    // ===== 1. Елементи інтерфейсу =====
    var cookieBanner = document.getElementById("cookieBanner");
    var cookiePreferencesModal = document.getElementById(
    "cookiePreferencesModal"
    );
    var acceptAllBtn = document.getElementById("acceptAllBtn");
    var rejectAllBtn = document.getElementById("rejectAllBtn");
    var managePreferencesBtn = document.getElementById("managePreferencesBtn");
    var savePreferencesBtn = document.getElementById("savePreferencesBtn");
    var closePreferencesBtn = document.getElementById("closePreferencesBtn");
    var selectAllBtn = document.getElementById("selectAllBtn");
    var cookieSettingsBtn = document.getElementById("cookieSettingsBtn");

    var analyticsCheckbox = document.getElementById("analyticsCookies");
    var adsCheckbox = document.getElementById("adsCookies");

    // ===== 2. Запам’ятовування початкового стану тумблерів =====
    var oldAnalyticsState = null;
    var oldAdsState = null;

    // 3.2 Пушимо згоду в dataLayer (для GTM і Google Ads/Analytics)
    //    analytics: true/false, ads: true/false
    function pushConsentToDataLayer(analytics, ads) {
    // Якщо analytics = true -> 'granted', інакше 'denied'
    var analyticsStorage = analytics ? "granted" : "denied";
    var adStorage = ads ? "granted" : "denied";

    // Додаткові параметри для реклами:
    var adPersonalization = ads ? "granted" : "denied";
    var adMeasurement = ads ? "granted" : "denied";

    // Функціональні (необхідні) cookies завжди вмикаємо
    var functionalityStorage = "granted";

    gtag("consent", "update", {
    ad_storage: ads ? "granted" : "denied",
    ad_measurement: ads ? "granted" : "denied",
    ad_user_data: ads ? "granted" : "denied",
    ad_personalization: ads ? "granted" : "denied",
    analytics_storage: analytics ? "granted" : "denied",
});

    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
    event: "consent_update",
    functionality_storage: functionalityStorage,
    analytics_storage: analyticsStorage,
    ad_storage: adStorage,

    // Потрібні Google для коректної обробки реклами
    ad_personalization: adStorage,
    ad_measurement: adStorage,
    ad_user_data: adStorage,
});
}

    // 3.3 Збереження та завантаження налаштувань у Local Storage
    function savePreferences(preferences) {
    localStorage.setItem(
    "cookieConsentPreferences",
    JSON.stringify(preferences)
    );
}
    function loadPreferences() {
    var stored = localStorage.getItem("cookieConsentPreferences");
    return stored ? JSON.parse(stored) : null;
}

    // ===== 4. Показ/приховування кнопки налаштувань (⚙) =====
    function updateCookieSettingsBtnVisibility() {
    // Якщо банер або модалка відкриті, кнопка схована
    if (
    cookieBanner.style.display !== "none" ||
    cookiePreferencesModal.style.display !== "none"
    ) {
    cookieSettingsBtn.style.display = "none";
} else {
    cookieSettingsBtn.style.display = "block";
}
}

    // ===== 5. Показ/приховування банера і модалки =====
    function showCookieBanner() {
    cookieBanner.style.display = "block";
    updateCookieSettingsBtnVisibility();
}
    function hideCookieBanner() {
    cookieBanner.style.display = "none";
    updateCookieSettingsBtnVisibility();
}
    function showCookieModal() {
    cookiePreferencesModal.style.display = "block";
    updateCookieSettingsBtnVisibility();
}
    function hideCookieModal() {
    cookiePreferencesModal.style.display = "none";
    updateCookieSettingsBtnVisibility();
}
    function hideAll() {
    hideCookieBanner();
    hideCookieModal();
}

    // ===== 6. Перевірка мови та Local Storage, показ банера лише вперше =====
    // Банер показується тільки якщо атрибут lang містить "bg"
    if (
    document.documentElement.lang &&
    document.documentElement.lang.toLowerCase().indexOf("bg") !== -1
    ) {
    var storedPreferences = loadPreferences();
    if (storedPreferences === null) {
    // Якщо налаштувань немає, користувач бачить банер
    showCookieBanner();
} else {
    // Якщо налаштування вже є:

    // 1) Встановити стан чекбоксів
    analyticsCheckbox.checked = storedPreferences.analytics;
    adsCheckbox.checked = storedPreferences.ads;

    // 2) Приховати банер та модалку
    hideAll();

    // Пушимо згоду в dataLayer
    pushConsentToDataLayer(
    storedPreferences.analytics,
    storedPreferences.ads
    );
}
} else {
    // Якщо мова не "bg", приховуємо банер і модалку
    hideAll();
}

    // ===== 7. Обробники подій (кнопки) =====

    // (A) Приеми всички (Прийняти всі)
    acceptAllBtn.addEventListener("click", function () {
    analyticsCheckbox.checked = true;
    adsCheckbox.checked = true;

    var preferences = {analytics: true, ads: true};
    savePreferences(preferences);

    // Викликаємо лише pushConsentToDataLayer – централізовано оновлюємо згоду
    pushConsentToDataLayer(true, true);

    hideAll();
    updateCookieSettingsBtnVisibility();
});

    // (B) Откажи всички (Відхилити всі)
    rejectAllBtn.addEventListener("click", function () {
    analyticsCheckbox.checked = false;
    adsCheckbox.checked = false;

    var preferences = {analytics: false, ads: false};
    savePreferences(preferences);

    // Централізоване оновлення згоди
    pushConsentToDataLayer(false, false);

    hideAll();
    updateCookieSettingsBtnVisibility();
});

    // (C) Управлявай предпочитанията (Відкрити модалку)
    managePreferencesBtn.addEventListener("click", function () {
    // Запам’ятовуємо стан тумблерів перед відкриттям
    oldAnalyticsState = analyticsCheckbox.checked;
    oldAdsState = adsCheckbox.checked;

    hideCookieBanner();
    showCookieModal();
});

    // (D) Выбрать все (Обрати всі)
    selectAllBtn.addEventListener("click", function () {
    analyticsCheckbox.checked = true;
    adsCheckbox.checked = true;

    var preferences = {analytics: true, ads: true};
    savePreferences(preferences);

    // Централізований виклик оновлення згоди
    pushConsentToDataLayer(true, true);

    hideAll();
    updateCookieSettingsBtnVisibility();
});

    // (E) Запази (зберегти зміни)
    savePreferencesBtn.addEventListener("click", function () {
    var preferences = {
    analytics: analyticsCheckbox.checked,
    ads: adsCheckbox.checked,
};
    savePreferences(preferences);

    // Централізоване оновлення згоди відповідно до стану чекбоксів
    pushConsentToDataLayer(preferences.analytics, preferences.ads);

    hideAll();
    updateCookieSettingsBtnVisibility();
});

    // (F) Затвори (НЕ зберігати, просто закрити)
    closePreferencesBtn.addEventListener("click", function () {
    // Відновлюємо тумблери до попереднього стану
    analyticsCheckbox.checked = oldAnalyticsState;
    adsCheckbox.checked = oldAdsState;

    hideCookieModal();
    showCookieBanner();
    // За бажанням додаємо "secondary"-стиль банеру
    cookieBanner.classList.add("cookie-consent-banner--secondary");
});

    // (G) Кнопка налаштувань (⚙)
    cookieSettingsBtn.addEventListener("click", function () {
    // Знову показати банер (у secondary-стилі)
    cookieBanner.classList.add("cookie-consent-banner--secondary");
    cookieBanner.style.display = "block";
    hideCookieModal();
    updateCookieSettingsBtnVisibility();
});
});
</script>

<script>
    if (location.href.includes("checkout")) {
    (function () {
        // === НАЛАШТУВАННЯ ===
        const CONFIG = {
            targetText: "BOX NOW автомат",
            containerSelector: ".j-delivery-main-container",
            buttonId: "openBoxNowMap",
            buttonText: "Изберете локация",
            inputSelector:
                'input[name="Delivery[delivery_method][delivery_address]"]',
            selectCandidates: [
                ".selectboxit-text",
                ".selectboxit .selectboxit-text",
                ".delivery-option .selected",
                ".delivery-method .value",
                ".select__text",
            ],
        };

        // === СТИЛІ ===
        const styleId = "boxnow-styles-div-only";
        if (!document.getElementById(styleId)) {
            const css = `
                    #boxnowmap { z-index: 2147483647 !important; }
                    
                    /* Стилі для DIV-кнопки */
                    .boxnow-map-widget-button {
                        display: flex; align-items: center; justify-content: center;
                        width: 100%; padding: 12px 10px; margin-top: 15px;
                        background: #A2D200; color: #fff;
                        text-align: center; font-weight: 700;
                        border-radius: 4px; 
                        box-sizing: border-box; font-size: 15px; line-height: 1.2;
                        border: 1px solid #8bb600;
                        transition: all 0.2s ease;
                        position: relative; z-index: 1;
                        user-select: none; 
                        -webkit-tap-highlight-color: transparent;
                        cursor: pointer; /* Щоб виглядало клікабельним */
                    }
                    .boxnow-map-widget-button:hover { background: #8bb600; color: #fff; }
                    .boxnow-map-widget-button:active { opacity: 0.8; }
                    
                    input.boxnow-hidden-input {
                        position: absolute !important; opacity: 0 !important;
                        height: 1px !important; width: 1px !important;
                        padding: 0 !important; border: none !important;
                        pointer-events: none !important; z-index: -1 !important;
                    }

                    .boxnow-address-display {
                        display: flex !important; align-items: center !important;
                        min-height: 36px !important; width: 100%;
                        font-weight: 700; color: #000; font-size: 14px;
                        line-height: 1.3; margin-top: 10px;
                        white-space: normal !important; word-wrap: break-word !important;
                        overflow-wrap: break-word !important;
                    }
                `;
            const style = document.createElement("style");
            style.id = styleId;
            style.innerHTML = css;
            document.head.appendChild(style);
        }

        // === ФУНКЦІОНАЛ ===

        function getDeliveryText(container) {
            for (const selector of CONFIG.selectCandidates) {
                const el = container.querySelector(selector);
                if (el) {
                    const text = (
                        el.textContent ||
                        el.getAttribute("aria-label") ||
                        ""
                    ).trim();
                    if (text) return text;
                }
            }
            return "";
        }

        function openWidget() {
            console.log("BoxNow: Opening...");
            if (
                window.BoxNowMapWidget &&
                typeof window.BoxNowMapWidget.open === "function"
            ) {
                window.BoxNowMapWidget.open();
            } else {
                try {
                    const hiddenBtn = document.querySelector("#boxnowmap button");
                    if (hiddenBtn) hiddenBtn.click();
                } catch (e) {
                }
            }
        }

        function createButton() {
            // СТРОГО DIV
            const btn = document.createElement("div");
            btn.id = CONFIG.buttonId;
            btn.className = "boxnow-map-widget-button";
            btn.textContent = CONFIG.buttonText;

            // === БЛОКУВАННЯ СПЛИВАННЯ (Щоб кошик не перезавантажувався) ===
            const stopAll = (e) => {
                e.stopPropagation();
            };

            btn.addEventListener("mousedown", stopAll);
            btn.addEventListener("mouseup", stopAll);
            btn.addEventListener("touchstart", stopAll, {passive: true});
            btn.addEventListener("touchend", stopAll);

            // Єдина дія - відкрити віджет, no sense to make click event library dont know about dynamicalu added element
            /*btn.onclick = function (e) {
                e.preventDefault();
                e.stopPropagation();
                openWidget();
                return false;
            };*/

            return btn;
        }

        function updateUI() {
            const container = document.querySelector(CONFIG.containerSelector);
            if (!container) return; // Якщо кошика ще немає - виходимо

            // 1. Інпути (приховування і створення тексту)
            const inputs = document.querySelectorAll(CONFIG.inputSelector);
            inputs.forEach((input) => {
                if (!input.parentNode) return;

                // Перевіряємо, чи ми вже створили текст для цього інпуту
                let displayDiv = null;
                const children = input.parentNode.children;
                for (let i = 0; i < children.length; i++) {
                    if (children[i].classList.contains("boxnow-address-display")) {
                        displayDiv = children[i];
                        break;
                    }
                }

                if (!displayDiv) {
                    displayDiv = document.createElement("div");
                    displayDiv.className = "boxnow-address-display";
                    // Безпечна вставка
                    if (input.nextSibling) {
                        input.parentNode.insertBefore(displayDiv, input.nextSibling);
                    } else {
                        input.parentNode.appendChild(displayDiv);
                    }
                }

                if (!input.classList.contains("boxnow-hidden-input")) {
                    input.classList.add("boxnow-hidden-input");
                    input.readOnly = true;
                }

                const val = input.value || "";
                if (displayDiv.textContent !== val) {
                    displayDiv.textContent = val;
                }
            });

            // 2. Кнопка (показати/сховати)
            const currentText = getDeliveryText(container);
            const isBoxNowSelected = currentText.includes(CONFIG.targetText);
            const existingBtn = document.getElementById(CONFIG.buttonId);
            const allDisplays = document.querySelectorAll(
                ".boxnow-address-display"
            );

            if (isBoxNowSelected) {
                if (!existingBtn) {
                    const btn = createButton();
                    container.appendChild(btn);
                    // --- Перезавантаження бібліотеки після новоствореного елеменат кнопка ---
                    (function (d) {
                        var e = d.createElement("script");
                        e.src = "https://widget-cdn.boxnow.bg/map-widget/client/v5.js";
                        e.async = true;
                        e.defer = true;
                        d.getElementsByTagName("head")[0].appendChild(e);
                    })(document);
                }
                allDisplays.forEach((el) => (el.style.display = "flex"));
            } else {
                if (existingBtn) existingBtn.remove();
                allDisplays.forEach((el) => (el.style.display = "none"));
            }
        }

        // === ІНІЦІАЛІЗАЦІЯ (Щоб працювало завжди) ===

        function init() {
            updateUI();
            // Інтервал 1 сек - це стандарт для чекаутів, не вішає браузер
            setInterval(updateUI, 1000);
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
        // Додаткова страховка
        window.addEventListener("load", updateUI);
    })();
}
</script>

<script>
	//СТАЛА КУРСУ
	const BGN_RATE = 0.5112;

	function toEur(priceStr) {
		const num = Number(
			priceStr
				.trim()
				.replace(",", ".")
				.replace(/[^\d.]/g, "")
		);
		return isNaN(num) ? "" : (num / BGN_RATE).toFixed(2);
	}
	// ============= ВИЗНАЧЕННЯ СЕЛЕКТОРІВ (auto) ==================
	// Якщо у DOM є мобільні контейнери цін — працюємо в мобільному режимі.
	// Якщо їх немає — використовуємо десктопні селектори.
	function getCatalogSelectors() {
		const mobileDetected = !!document.querySelector(".catalog-card__prices");
		if (mobileDetected) {
			return {
				mode: "mobile",
				BOX_SEL: ".catalog-card__prices",
				NEW_SEL: ".catalog-card__price",
				NEW_MOD: "catalog-card__price--new",
				OLD_SEL: ".catalog-card__old-price",
			};
		}
		return {
			mode: "desktop",
			BOX_SEL: ".catalogCard-priceBox",
			NEW_SEL: ".catalogCard-price",
			NEW_MOD: null,
			OLD_SEL: ".catalogCard-oldPrice",
		};
	}
	// ===== КАТАЛОГ =====
	function addEuroToCatalog() {
		const { mode, BOX_SEL, NEW_SEL, NEW_MOD, OLD_SEL } = getCatalogSelectors();

		document.querySelectorAll(BOX_SEL).forEach((box) => {
			// Не чіпаємо вже сформовані нами євро-блоки
			if (box.classList.contains("euro-price")) return;

			// Ідемпотентність: локальна зачистка наших вставок біля цього боксу
			box.querySelectorAll(".euro-price").forEach((el) => el.remove());
			const sib = box.nextElementSibling;
			if (
				sib &&
				sib.nodeType === 1 &&
				sib.classList.contains("euro-price") &&
				sib.classList.contains(
					mode === "mobile" ? "catalog-card__prices" : "catalogCard-priceBox"
				)
			) {
				sib.remove();
			}

			// Вихідні (левові) ціни
			const newPriceEl =
				(NEW_MOD ? box.querySelector(`${NEW_SEL}.${NEW_MOD}`) : null) ||
				box.querySelector(NEW_SEL);
			if (!newPriceEl) return;

			const oldPriceEl = box.querySelector(OLD_SEL);
			const toEurText = (txt) => toEur(String(txt)) + "BGN";

			if (mode === "mobile") {
				// -------------------- МОБАЙЛ --------------------
				if (oldPriceEl) {
					// Зі знижкою: дублюємо "прайс-бокс" з євро після левового
					const euroBox = document.createElement("div");
					euroBox.className = "catalog-card__prices euro-price";

					const euroNew = document.createElement("div");
					euroNew.className = `catalog-card__price ${NEW_MOD} euro-price`;
					euroNew.textContent = toEurText(newPriceEl.textContent);

					const euroOld = document.createElement("div");
					euroOld.className = "catalog-card__old-price euro-price";
					euroOld.textContent = toEurText(oldPriceEl.textContent);

					euroBox.appendChild(euroNew);
					euroBox.appendChild(euroOld);
					box.insertAdjacentElement("afterend", euroBox);
				} else {
					// Без знижки: додаємо «|» і BGN у той самий контейнер
					const pipe = document.createElement("div");
					pipe.className = "catalog-card__price euro-price";
					pipe.textContent = " | ";

					const euroPrice = document.createElement("div");
					euroPrice.className = "catalog-card__price euro-price";
					euroPrice.textContent = toEurText(newPriceEl.textContent);

					box.appendChild(pipe);
					box.appendChild(euroPrice);
				}
			} else {
				// ------------------- ДЕСКТОП -------------------
				if (oldPriceEl) {
					const euroBox = document.createElement("div");
					euroBox.className = "catalogCard-priceBox euro-price";

					const euroOld = document.createElement("div");
					euroOld.className = "catalogCard-oldPrice euro-price";
					euroOld.textContent = toEurText(oldPriceEl.textContent);

					const euroNew = document.createElement("div");
					euroNew.className = "catalogCard-price euro-price";
					euroNew.textContent = toEurText(newPriceEl.textContent);

					euroBox.appendChild(euroOld);
					euroBox.appendChild(euroNew);
					box.insertAdjacentElement("afterend", euroBox);
				} else {
					const pipe = document.createElement("div");
					pipe.className = "catalogCard-price euro-price";
					pipe.textContent = " | ";

					const euroPrice = document.createElement("div");
					euroPrice.className = "catalogCard-price euro-price";
					euroPrice.textContent = toEurText(newPriceEl.textContent);

					box.appendChild(pipe);
					box.appendChild(euroPrice);
				}
			}
		});
	}

	// ===== СТОРІНКА ТОВАРУ =====
	function addEuroToProductPage() {
		const isMobile = !!document.querySelector(".product-card__price-box");

		const createPriceItem = (el, className, currency = "EUR") => {
			if (!el) return null;
			const priceStr = (el.textContent || "").trim(); // гарантуємо рядок
			const numeric = parseFloat(toEur(priceStr)) || 0; // toEur очікує рядок
			const priceText = numeric + "BGN";

			const item = document.createElement("div");
			item.className = "product-price__item";

			item.appendChild(document.createTextNode(priceText));

			if (className) item.className += " " + className;
			return item;
		};

		const buildEuroBox = (container, newPriceEl, oldPriceEl) => {
			if (!newPriceEl) return;

			const numeric = parseFloat(toEur(newPriceEl.textContent.trim())) || 0;
			if (container.dataset.eurBgn == numeric) return;
			container.dataset.eurBgn = numeric;

			const oldEuroBox = container.querySelector(
				".product-price__box.euro-price"
			);
			if (oldEuroBox) oldEuroBox.remove();

			const euroBox = document.createElement("div");
			euroBox.className =
				(isMobile ? "product-card__price-box" : "product-price__box") +
				" euro-price";

			const fragment = document.createDocumentFragment();

			// Нова ціна → з meta тегами
			const newItem = createPriceItem(newPriceEl, "euro-price");
			if (newItem) {
				newItem.style.marginRight = "15px"; // додаємо відступ справа
				fragment.appendChild(newItem);
			}

			// Стара ціна → тільки текст для десктопу
			if (oldPriceEl) {
				const oldWrap = document.createElement("div");
				oldWrap.className = "product-price__item";

				const oldDiv = document.createElement("div");
				oldDiv.className = "product-price__old-price";

				const oldNumeric =
					parseFloat(toEur(oldPriceEl.textContent.trim())) || 0;
				oldDiv.textContent = oldNumeric + "BGN"; // тільки текст, без <meta>

				oldWrap.appendChild(oldDiv);
				fragment.appendChild(oldWrap);
			}

			euroBox.appendChild(fragment);

			const insertAfter = isMobile
				? newPriceEl.parentElement
				: container.querySelector(".product-price__box");
			if (insertAfter) insertAfter.insertAdjacentElement("afterend", euroBox);
		};

		if (isMobile) {
			document.querySelectorAll(".product-card__price-box").forEach((box) => {
				const newPriceEl =
					box.querySelector(".product-card__price--new") ||
					box.querySelector(".product-card__price");
				const oldPriceEl = box.querySelector(".product-card__old-price");

				// очищаємо дублікати euro-box
				const sib = box.nextElementSibling;
				if (
					sib &&
					sib.classList.contains("product-card__price-box") &&
					sib.classList.contains("euro-price")
				) {
					sib.remove();
				}

				// якщо товар без знижки
				if (!oldPriceEl) {
					const priceItem = document.createElement("div");
					priceItem.className = "product-card__price-item";

					// клонуємо BGN ціну
					const bgnDiv = newPriceEl.cloneNode(true);
					priceItem.appendChild(bgnDiv);

					// роздільник
					const separator = document.createElement("div");
					separator.className = "product-card__price-separator";
					separator.textContent = "|";
					priceItem.appendChild(separator);

					// EUR ціна
					const eurDiv = createPriceItem(
						newPriceEl,
						"product-card__price euro-price"
					);
					if (eurDiv) priceItem.appendChild(eurDiv);

					// очищаємо box і вставляємо новий price-item
					box.innerHTML = "";
					box.appendChild(priceItem);
				}
				// якщо товар зі знижкою
				else {
					// залишаємо BGN коробку як є
					// створюємо окремий euro-box
					const euroBox = document.createElement("div");
					euroBox.className = "product-card__price-box euro-price";

					const fragment = document.createDocumentFragment();

					// нова ціна → з мета тегами
					const newItem = createPriceItem(
						newPriceEl,
						newPriceEl.className + " euro-price"
					);
					if (newItem) {
						const wrap = document.createElement("div");
						wrap.className = "product-card__price-item";
						wrap.appendChild(newItem);
						fragment.appendChild(wrap);
					}

					// стара ціна → тільки текст
					if (oldPriceEl) {
						const oldWrap = document.createElement("div");
						oldWrap.className = "product-card__price-item";

						const oldDiv = document.createElement("div");
						oldDiv.className = "product-card__old-price";
						oldDiv.textContent =
							(parseFloat(toEur(oldPriceEl.textContent || "").trim()) || 0) +
							"BGN";

						oldWrap.appendChild(oldDiv);
						fragment.appendChild(oldWrap);
					}

					euroBox.appendChild(fragment);
					box.insertAdjacentElement("afterend", euroBox);
				}
			});
		} else {
			// десктоп
			document.querySelectorAll(".product-price").forEach((container) => {
				const box = container.querySelector(".product-price__box");
				if (!box) return;

				const newPriceEl =
					box.querySelector(".product-price__item--new") ||
					box.querySelector(".product-price__item");
				const oldPriceEl = box.querySelector(".product-price__old-price");

				buildEuroBox(container, newPriceEl, oldPriceEl);
			});
		}
	}
	// ===== ДОДАВАННЯ ЄВРО-ЦІН У БЛОКИ "ПЕРЕГЛЯНУТИ БІЛЬШЕ ТОВАРІВ" ТА "ПЕРЕГЛЯНУТІ ТОВАРИ" =====
	function addEuroForList(cfg) {
		const { itemSelector, priceBaseClass, newPriceSelector, oldPriceSelector } =
			cfg;

		document.querySelectorAll(itemSelector).forEach((item) => {
			// Прибираємо попередні євро-елементи (і можливі старі пайпи) у межах картки
			item.querySelectorAll(".euro-price").forEach((el) => el.remove());

			// Визначаємо левові ціни
			const newBGN =
				item.querySelector(newPriceSelector) ||
				item.querySelector(`${priceBaseClass}:not(.euro-price)`); // ← тут бракує крапки перед класом
			if (!newBGN) return;

			const oldBGN = item.querySelector(oldPriceSelector);

			// Пайп
			const pipe = document.createElement("div");
			pipe.className = `${priceBaseClass} euro-price`;
			pipe.textContent = "|";
			pipe.style.margin = "0 4px";

			// Нова BGN
			const eurNew = document.createElement("div");
			eurNew.className = `${newBGN.className} euro-price`;
			eurNew.textContent = toEur(newBGN.textContent) + "BGN";

			// Стара BGN
			let eurOld = null;
			if (oldBGN) {
				eurOld = document.createElement("div");
				eurOld.className = `${oldBGN.className} euro-price`;
				eurOld.textContent = toEur(oldBGN.textContent) + "BGN";
			}

			// Вставляємо після останньої левової ціни
			const anchor = oldBGN || newBGN;
			anchor.insertAdjacentElement("afterend", pipe);
			pipe.insertAdjacentElement("afterend", eurNew);
			if (eurOld) eurNew.insertAdjacentElement("afterend", eurOld);
		});
	}

	// ДОДАВАННЯ ЄВРО-ЦІН У КОШИКУ
	function addEuroToCart() {
		// 1) Ціна товару у переліку позицій
		document
			.querySelectorAll(".cart-container.j-cart-container")
			.forEach((row) => {
				// прибрати попередні євро-вставки
				row.querySelectorAll(".euro-price").forEach((el) => el.remove());

				const oldBGN = row.querySelector(
					".cart-price.__old.j-cart-product-price-old"
				);
				const newBGN = row.querySelector(".cart-price.j-cart-product-price");
				if (!newBGN) return;

				if (oldBGN) {
					// зі знижкою: [old BGN][new BGN] | [old BGN][new BGN]
					const pipe = document.createElement("div");
					pipe.className = newBGN.className + " euro-price";
					pipe.textContent = "|";
					pipe.style.margin = "0 4px";

					const eurOld = document.createElement("div");
					eurOld.className = oldBGN.className + " euro-price";
					eurOld.textContent = toEur(oldBGN.textContent) + "BGN";

					const eurNew = document.createElement("div");
					eurNew.className = newBGN.className + " euro-price";
					if (newBGN.hasAttribute("data-measurement-unit")) {
						eurNew.setAttribute(
							"data-measurement-unit",
							newBGN.getAttribute("data-measurement-unit") || ""
						);
					}
					eurNew.textContent = toEur(newBGN.textContent) + "BGN";

					// вставка після NEW BGN
					newBGN.insertAdjacentElement("afterend", pipe);
					pipe.insertAdjacentElement("afterend", eurOld);
					eurOld.insertAdjacentElement("afterend", eurNew);
				} else {
					// без знижки: [BGN] | [EUR]
					const raw = newBGN.textContent.trim();
					const bgnPart = raw.split("|")[0].trim();

					// 2) рахуємо євро і формуємо рядок
					const eurText = toEur(bgnPart) + "BGN";
					newBGN.textContent = `${bgnPart} | ${eurText}`;
				}
			});

		// 2) Підсумкова ціна конкретної позиції (праворуч) — усе в одному div
		document
			.querySelectorAll(".cart-cell.__cost .cart-cost.j-cart-product-cost")
			.forEach((cost) => {
				// Беремо левову частину: до '|' або весь текст, та прибираємо можливі старі вставки з BGN
				const raw = cost.textContent.replace(/\u20AC.*$/, "").trim();
				const bgnPart = raw.split("|")[0].trim();
				if (!bgnPart) return;

				const eurPart = toEur(bgnPart) + "BGN"; // або з незламним пробілом: toEur(bgnPart) + "\u00A0BGN"
				cost.textContent = `${bgnPart} | ${eurPart}`;
			});

		// 3) Загальна сума кошика (footer)
		document
			.querySelectorAll(".cart-footer-b.cart-cost.j-total-sum")
			.forEach((sum) => {
				if (sum.textContent.includes("BGN")) return; // вже додано
				const bgnText = sum.textContent.trim();
				const eurText = toEur(bgnText) + "BGN";
				sum.textContent = `${bgnText} | ${eurText}`;
			});
	}

	// ===== ЗАПУСК =====
	addEuroToCatalog();
	addEuroToProductPage();
	addEuroForList({
		itemSelector: ".productsSlider-i",
		priceBaseClass: "productsSlider-price",
		newPriceSelector: ".productsSlider-price:not(.euro-price)", // поточна лв
		oldPriceSelector: ".productsSlider-price--old", // якщо з’явиться стара — теж обробиться
	});
	addEuroForList({
		itemSelector: ".recentProducts-i",
		priceBaseClass: "recentProducts-price",
		newPriceSelector:
			".recentProducts-price--new, .recentProducts-price:not(.recentProducts-price--old)",
		oldPriceSelector: ".recentProducts-price--old",
	});
	addEuroToCart();

	// --- вузький апдейтер РІВНО в межах однієї картки (scope) ---
	function updateEuroInCatalogScope(scope) {
		scope.querySelectorAll(".catalogCard-priceBox").forEach((box) => {
			if (box.classList.contains("euro-price")) return;

			// зачистка попередніх вставок тільки поруч із цим боксом
			box.querySelectorAll(".euro-price").forEach((el) => el.remove());
			const sib = box.nextElementSibling;
			if (
				sib &&
				sib.classList?.contains("catalogCard-priceBox") &&
				sib.classList?.contains("euro-price")
			)
				sib.remove();

			const oldPriceEl = box.querySelector(".catalogCard-oldPrice");
			const priceEl = box.querySelector(".catalogCard-price");
			if (!priceEl) return;

			if (oldPriceEl) {
				const euroBox = document.createElement("div");
				euroBox.className = "catalogCard-priceBox euro-price";

				const euroOld = document.createElement("div");
				euroOld.className = "catalogCard-oldPrice euro-price";
				euroOld.textContent = toEur(oldPriceEl.textContent) + "BGN";

				const euroNew = document.createElement("div");
				euroNew.className = "catalogCard-price euro-price";
				euroNew.textContent = toEur(priceEl.textContent) + "BGN";

				euroBox.appendChild(euroOld);
				euroBox.appendChild(euroNew);
				box.insertAdjacentElement("afterend", euroBox);
			} else {
				const pipe = document.createElement("div");
				pipe.className = "catalogCard-price euro-price";
				pipe.textContent = " | ";

				const euroPrice = document.createElement("div");
				euroPrice.className = "catalogCard-price euro-price";
				euroPrice.textContent = toEur(priceEl.textContent) + "BGN";

				box.appendChild(pipe);
				box.appendChild(euroPrice);
			}
		});
	}

	// --- універсальний планувальник: оновити лише ту картку, де сталася дія ---
	let euroPlanTimer = null;
	function scheduleCatalogCardRefresh(fromNode, delay = 80) {
		const card = fromNode.closest
			? fromNode.closest(".catalogCard, .product, .products-list__item") ||
			  document
			: document;
		clearTimeout(euroPlanTimer);
		euroPlanTimer = setTimeout(() => updateEuroInCatalogScope(card), delay);
	}

	// === 1) Делегований клік по кнопці варіанта (ваш селектор) ===
	document.addEventListener(
		"click",
		(e) => {
			const btn = e.target.closest(
				".modification__button, .j-button-modification-change"
			);
			if (!btn) return;

			// одразу + після AJAX-підстановки (час невеликий, не навантажує)
			scheduleCatalogCardRefresh(btn, 0);
			scheduleCatalogCardRefresh(btn, 160);
			scheduleCatalogCardRefresh(btn, 320);
		},
		true
	); // capture: перехопимо навіть якщо вузол замінять

	// === 2) Делегований 'change' по елементу, якому тригерять зміну з onclick ===
	// Приклад із вашого HTML: id="#68973b0f112ad". Якщо id динамічний, працюємо по атрибуту data-* або контейнеру.
	document.addEventListener(
		"change",
		(e) => {
			const changed = e.target;
			if (!changed) return;
			// Підтримка будь-яких прихованих інпутів/селектів, яким тригерять .trigger('change')
			if (
				changed.matches("select, input") &&
				changed.closest(".catalogCard, .product, .products-list__item")
			) {
				scheduleCatalogCardRefresh(changed, 80);
				scheduleCatalogCardRefresh(changed, 240);
			}
		},
		true
	);

	// === 3) Дуже вузький MutationObserver: реагує лише на появу/заміну блоків ціни в каталозі ===
	const PRICE_BOX_SEL = ".catalogCard-priceBox:not(.euro-price)";
	const catalogObserver = new MutationObserver((mutations) => {
		for (const m of mutations) {
			for (const n of m.addedNodes) {
				if (n.nodeType !== 1) continue;
				if (n.matches?.(PRICE_BOX_SEL)) {
					scheduleCatalogCardRefresh(n, 40);
					return;
				}
				const found = n.querySelector?.(PRICE_BOX_SEL);
				if (found) {
					scheduleCatalogCardRefresh(found, 40);
					return;
				}
			}
			const t = m.target;
			if (
				t &&
				t.nodeType === 1 &&
				(t.matches?.(PRICE_BOX_SEL) || t.querySelector?.(PRICE_BOX_SEL))
			) {
				scheduleCatalogCardRefresh(t, 40);
				return;
			}
		}
	});
	// Лише childList+subtree — без characterData/attributes, щоб не чіпати продуктивність
	catalogObserver.observe(document.body, {
		childList: true,
		subtree: true,
	});

	// === 4) Після будь-якого AJAX від jQuery — одноразовий легкий перерахунок у найближчій картці ===
	if (window.jQuery) {
		jQuery(document).ajaxComplete((_evt, _xhr, _opts) => {
			// глобально перевиставимо євро по всьому каталогу (швидко, бо функція ідемпотентна)
			document
				.querySelectorAll(".catalogCard")
				.forEach((card) => updateEuroInCatalogScope(card));
		});
	}

	// === 5) Початковий прогін для наявних карток
	document
		.querySelectorAll(".catalogCard, .product, .products-list__item")
		.forEach(updateEuroInCatalogScope);

	/* === PDP: оркестратор для сторінки товару =============================== */
	(function euroOrchestratorPDP() {
		// «рідний» блок ціни на PDP (до якого ми НЕ додаємо .euro-price)
		const PDP_PRICE_BOX_SEL = ".product-price__box:not(.euro-price)";

		// невеликий планувальник викликів addEuroToProductPage()
		let pdpTimer = null;
		function scheduleProductRefresh(delay = 80) {
			clearTimeout(pdpTimer);
			pdpTimer = setTimeout(() => {
				try {
					addEuroToProductPage();
				} catch (e) {}
			}, delay);
		}

		// 1) Делегований клік по варіантах (клас той самий: .modification__button)
		document.addEventListener(
			"click",
			(e) => {
				if (!e.target.closest(".modification__button")) return;
				// миттєво + після короткої затримки (AJAX/DOM-підміна)
				scheduleProductRefresh(0);
				scheduleProductRefresh(160);
				scheduleProductRefresh(320);
			},
			true
		);

		// 2) Делегований 'change' для select/input, які тригеряться з onclick()
		document.addEventListener(
			"change",
			(e) => {
				const el = e.target;
				if (!el.matches("select, input")) return;
				if (!el.closest(".product-price, .product")) return; // межі PDP
				scheduleProductRefresh(80);
				scheduleProductRefresh(240);
			},
			true
		);

		// 3) Дуже вузький MutationObserver: тільки поява/заміна «рідного» боксу ціни
		const pdpObserver = new MutationObserver((mutations) => {
			for (const m of mutations) {
				// нові вузли
				for (const n of m.addedNodes) {
					if (n.nodeType !== 1) continue;
					if (
						n.matches?.(PDP_PRICE_BOX_SEL) ||
						n.querySelector?.(PDP_PRICE_BOX_SEL)
					) {
						scheduleProductRefresh(40);
						return;
					}
				}
				// інколи міняють дітей, не додаючи вузол зовні
				const t = m.target;
				if (
					t &&
					t.nodeType === 1 &&
					(t.matches?.(PDP_PRICE_BOX_SEL) ||
						t.querySelector?.(PDP_PRICE_BOX_SEL))
				) {
					scheduleProductRefresh(40);
					return;
				}
			}
		});
		// мінімальна конфігурація — лише childList+subtree (без characterData/attributes)
		pdpObserver.observe(document.body, { childList: true, subtree: true });

		// 4) Підстраховка на завершення AJAX (якщо є jQuery)
		if (window.jQuery) {
			jQuery(document).ajaxComplete(() => scheduleProductRefresh(60));
		}

		// 5) Початковий прогін
		scheduleProductRefresh(0);
	})();

	/* ================== EUR: Оркестратор для МОДАЛЬНОГО КОШИКА ================== */
	(function euroOrchestratorCART() {
		// --- 0) Вимога: у коді вже має існувати функція addEuroToCart() ---
		if (typeof addEuroToCart !== "function") {
			console.warn("[EUR] addEuroToCart() is missing");
			return;
		}

		// --- 1) Уніфіковані селектори під вашу верстку ---
		const CART_MODAL_SEL = ".popup-block"; // контейнер модального кошика
		const CART_ROW_SEL = ".cart-item"; // рядок товару
		const CART_TOTAL_SEL = ".cart-footer"; // загальна сума
		const CART_OPEN_BTN_SEL = ".header-cart"; // кнопка відкриття кошика
		const ADD_TO_CART_BTN_SEL = ".j-add-to-cart"; // кнопка «Додати в кошик»
		const QTY_BTN_SEL = ".counter-btn"; // кнопки +/− (один клас)
		const QTY_INPUT_SEL = ".cart-qty input"; // поле кількості
		const REMOVE_BTN_SEL = ".j-cart-product-delete"; // кнопка видалення

		// --- 2) Уніфікований планувальник перерахунку євро ---
		let cartTimer = null;
		function scheduleCartRefresh(delay = 80) {
			clearTimeout(cartTimer);
			cartTimer = setTimeout(() => {
				try {
					addEuroToCart();
				} catch (e) {
					/* no-op */
				}
			}, delay);
		}
		function burstCartRefresh() {
			scheduleCartRefresh(0);
			scheduleCartRefresh(120);
			scheduleCartRefresh(300);
		}

		// --- 3) Події користувача ---
		// Відкривання кошика
		document.addEventListener(
			"click",
			(e) => {
				if (e.target.closest(CART_OPEN_BTN_SEL)) burstCartRefresh();
			},
			true
		);

		// Додавання товару
		document.addEventListener(
			"click",
			(e) => {
				if (e.target.closest(ADD_TO_CART_BTN_SEL)) burstCartRefresh();
			},
			true
		);

		// Зміна кількості: кнопки +/−
		document.addEventListener(
			"click",
			(e) => {
				if (e.target.closest(QTY_BTN_SEL)) burstCartRefresh();
			},
			true
		);

		// Зміна кількості: ручне введення
		document.addEventListener(
			"change",
			(e) => {
				const el = e.target;
				if (el && el.matches(QTY_INPUT_SEL)) {
					scheduleCartRefresh(100);
					scheduleCartRefresh(260);
				}
			},
			true
		);

		// Видалення позиції
		document.addEventListener(
			"click",
			(e) => {
				if (e.target.closest(REMOVE_BTN_SEL)) burstCartRefresh();
			},
			true
		);

		// --- 4) Спостерігач за DOM у межах модального кошика ---
		const cartObserver = new MutationObserver((mutations) => {
			for (const m of mutations) {
				// Нові вузли
				for (const n of m.addedNodes) {
					if (n.nodeType !== 1) continue;

			".order-i-cost.j-cart-product-cost", // вартість позиції
			".order-summary-b.j-total-sum", // загальна сума
			".j-delivery-commission-sum", // доставка (може з’являтись/зникати)
			".j-payment-commission-sum", // комісія
		].join(", ");

		const mo = new MutationObserver((muts) => {
			for (const m of muts) {
				if (m.type === "characterData") {
					schedule(40);
					return;
				}
				for (const n of m.addedNodes) {
					if (n.nodeType !== 1) continue;
					if (n.matches?.(PROBES) || n.querySelector?.(PROBES)) {
						burst();
						return;
					}
				}
				const t = m.target;
				if (
					t &&
					t.nodeType === 1 &&
					(t.matches?.(PROBES) || t.querySelector?.(PROBES))
				) {
					burst();
					return;
				}
			}
		});
		mo.observe(root, {
			childList: true,
			subtree: true,
			characterData: true,
			attributes: true,
			attributeFilter: ["class", "style", "data-price", "data-eur-bgn"], // ← додано
		});

		// 4) Після будь-якого Ajax
		if (window.jQuery) {
			jQuery(document).ajaxComplete(() => schedule(80));
		}
	})();

	/* ==================== CHECKOUT (mobile): вставка EUR ==================== */
	(function initCheckoutMobileEuro() {
		const ROW_CONTAINER_SEL = ".cart-item__price-container.j-cart-container";
		const NEW_BGN_SEL = ".cart-item__price.j-cart-product-price";
		const OLD_BGN_SEL =
			".cart-item__price--old.j-cart-product-price-old, .cart-item__price.__old.j-cart-product-price-old";
		const ROW_COST_SEL = ".cart-item__cost.j-cart-product-cost";
		const TOTAL_SEL = ".order-details__total.j-total-sum";
		const DELIVERY_SEL = ".j-delivery-commission-sum";
		const PAYMENT_SEL = ".j-payment-commission-sum";

		function extractBGN(raw) {
			return String(raw || "")
				.replace(/\|.*$/, "")
				.replace(/\u20AC.*$/, "")
				.trim();
		}
		const hasNumber = (s) => /[0-9]/.test(s || "");

		// 1) Рядок позиції: [BGN old?][BGN new] | [EUR new][EUR old?]
		function updateRow(container) {
			if (!container || container.nodeType !== 1) return;
			container.querySelectorAll(".euro-price").forEach((n) => n.remove());

			const newBGN = container.querySelector(NEW_BGN_SEL);
			if (!newBGN) return;
			const oldBGN = container.querySelector(OLD_BGN_SEL);

			const pipe = document.createElement("div");
			pipe.className = "cart-item__price euro-price";
			pipe.style.margin = "0 4px";
			pipe.textContent = " | ";

			let eurOld = null;
			if (oldBGN) {
				eurOld = document.createElement("div");
				eurOld.className = "cart-item__price cart-item__price--old euro-price";
				eurOld.textContent = toEur(oldBGN.textContent) + "BGN";
			}

			const eurNew = document.createElement("div");
			eurNew.className = "cart-item__price euro-price";
			eurNew.textContent = toEur(newBGN.textContent) + "BGN";

			const anchor = oldBGN || newBGN;
			anchor.insertAdjacentElement("afterend", pipe);
			pipe.insertAdjacentElement("afterend", eurNew);
			if (eurOld) eurNew.insertAdjacentElement("afterend", eurOld);
		} // <-- ОЦЯ дужка була відсутня

		// 2) Текстові суми: «BGN | EUR»
		function updateTextSum(el) {
			if (!el) return;

			const raw = String(el.textContent || "").trim();
			const bgn = extractBGN(raw);
			const hasNum = /[0-9]/.test(bgn);

			if (!hasNum) {
				if (raw.includes("|") || raw.includes("BGN")) el.textContent = bgn;
				delete el.dataset.eurBgn; // <-- правильно
				return;
			}

			if (el.dataset.eurBgn === bgn && /[|BGN]/.test(el.textContent)) return;

			el.textContent = `${bgn} | ${toEur(bgn)}BGN`;
			el.dataset.eurBgn = bgn;
		}
		function updateAll() {
			document.querySelectorAll(ROW_CONTAINER_SEL).forEach(updateRow);
			document.querySelectorAll(ROW_COST_SEL).forEach(updateTextSum);
			document.querySelectorAll(DELIVERY_SEL).forEach(updateTextSum);
			document.querySelectorAll(PAYMENT_SEL).forEach(updateTextSum);
			document.querySelectorAll(TOTAL_SEL).forEach(updateTextSum);
		}

		let timer = null;
		function schedule(d = 80) {
			clearTimeout(timer);
			timer = setTimeout(updateAll, d);
		}
		function burst() {
			schedule(0);
			schedule(140);
			schedule(320);
		}

		burst();

		document.addEventListener(
			"click",
			(e) => {
				if (
					e.target.closest(
						".j-increase-p, .j-decrease-p, .j-remove-p, .j-coupon-submit, .j-coupon-cancel, .j-option-item"
					)
				)
					burst();
			},
			true
		);
		document.addEventListener(
			"input",
			(e) => {
				if (e.target.matches(".j-quantity-p")) schedule(60);
			},
			true
		);
		document.addEventListener(
			"change",
			(e) => {
				if (
					e.target.matches(
						".j-quantity-p, .j-coupon-input, .j-delivery-type, .j-payment-type"
					)
				) {
					schedule(100);
					schedule(260);
				}
			},
			true
		);

		const PROBES = [
			".order-details__list",
			".order-details__cost",
			".order-details__total",
			ROW_CONTAINER_SEL,
			ROW_COST_SEL,
			DELIVERY_SEL,
			PAYMENT_SEL,
		].join(", ");
		const root =
			document.querySelector(".order-details__body") || document.body;

		const mo = new MutationObserver((muts) => {
			for (const m of muts) {
				if (m.type === "characterData") {
					let el = m.target && m.target.parentNode;
					while (el && el.nodeType === 3) el = el.parentNode;
					if (!el) continue;
					if (el.classList?.contains?.("euro-price")) continue;
					if (el.matches?.(PROBES) || el.closest?.(PROBES)) {
						schedule(40);
						return;
					}
					continue;
				}
				for (const n of m.addedNodes) {
					if (n.nodeType !== 1) continue;
					if (n.classList?.contains?.("euro-price")) continue;
					if (n.matches?.(PROBES) || n.querySelector?.(PROBES)) {
						burst();
						return;
					}
				}
				const t = m.target;
				if (t && t.nodeType === 1) {
					if (t.classList?.contains?.("euro-price")) continue;
					if (t.matches?.(PROBES) || t.querySelector?.(PROBES)) {
						burst();
						return;
					}
				}
			}
		});
		mo.observe(root, {
			childList: true,
			subtree: true,
			characterData: true,
			attributes: true,
			attributeFilter: ["class", "style", "data-price", "data-eur-bgn"], // ← додано
		});

		if (window.jQuery) {
			jQuery(document).ajaxComplete(() => schedule(80));
		}
	})();
</script>

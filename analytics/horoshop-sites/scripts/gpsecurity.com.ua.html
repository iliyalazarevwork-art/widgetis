<script>
function setPromoPlaceholder() {
    const input = document.querySelector('.j-coupon-input');
    if (input) {
        input.placeholder = "Промокод";
    }
}

/* при загрузке страницы */
document.addEventListener("DOMContentLoaded", setPromoPlaceholder);

/* при открытии корзины (она грузится динамически) */
document.body.addEventListener("click", function () {
    setTimeout(setPromoPlaceholder, 300);
});
</script>

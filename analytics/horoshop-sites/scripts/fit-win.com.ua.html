        <style>
  /* Напівпрозорий фон */
  #popupOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 9999;
  }

  /* Вікно повідомлення */
  #popup {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ffffff;
    color: #333;
    padding: 25px 30px;
    width: 340px;
    border-radius: 12px;
    text-align: center;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    animation: fadeIn 0.4s ease;
  }

  #popup h2 {
    margin-top: 0;
    color: #0078d7;
    font-size: 20px;
  }

  #popup p {
    margin: 10px 0;
    line-height: 1.5;
    font-size: 15px;
  }

  #confirmBtn {
    margin-top: 15px;
    padding: 10px 20px;
    background: #0078d7;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    transition: background 0.2s ease;
  }

  #confirmBtn:hover {
    background: #005fa3;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -55%); }
    to { opacity: 1; transform: translate(-50%, -50%); }
  }
</style>

<div id="popupOverlay">
  <div id="popup">
    <h2>Графік роботи магазину</h2>
    <p>🛒 Замовлення на сайті приймаються он-лайн <strong>24/7</strong>.</p>
    <p>📦 Обробка та відправка замовлень: <br><strong>Пн–Пт з 09:00 до 17:00</strong>.</p>
    <p>🚚 Термін відправки: <strong>2–4 робочих дні</strong>.</p>
    <button id="confirmBtn">Ознайомлений</button>
  </div>
</div>

<script>
  // --- Функція для роботи з кукі ---
  function setCookie(name, value, hours) {
    const d = new Date();
    d.setTime(d.getTime() + (hours * 60 * 60 * 1000));
    document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
  }

  function getCookie(name) {
    const cname = name + "=";
    const decoded = decodeURIComponent(document.cookie);
    const ca = decoded.split(';');
    for(let i = 0; i < ca.length; i++) {
      let c = ca[i].trim();
      if (c.indexOf(cname) == 0) {
        return c.substring(cname.length, c.length);
      }
    }
    return "";
  }

  // --- Головна логіка ---
  window.addEventListener('load', function() {
    // Перевіряємо, чи є кукі "popupSeen"
    if (!getCookie("popupSeen")) {
      setTimeout(function() {
        document.getElementById('popupOverlay').style.display = 'block';
      }, 1500); // показ через 1.5 сек
    }

    // Кнопка "Ознайомлений" — закриває вікно і ставить кукі на 24 год
    document.getElementById('confirmBtn').addEventListener('click', function() {
      document.getElementById('popupOverlay').style.display = 'none';
      setCookie("popupSeen", "yes", 24); // 24 години
    });
  });
</script>

        <!-- ПОП-АП ДО БЕЗКОШТОВНОЇ ДОСТАВКИ (компактний, кнопка активна) -->
<div id="freeShippingPopup" style="
  display:none; 
  position:fixed;
  top:50%; 
  left:50%; 
  transform:translate(-50%, -50%);
  width:260px;
  padding:20px; 
  background: rgba(200,200,200,0.85);
  border:2px solid #999;
  font-size:16px; 
  font-weight:normal; 
  text-align:center; 
  color:#000; 
  z-index:9999; 
  box-shadow:0 4px 8px rgba(0,0,0,0.3);
  border-radius:10px;
">
  <div style="font-weight:bold; margin-bottom:8px;">Безкоштовна доставка по Україні</div>
  <div style="margin-bottom:16px;">для замовлень від 1500 грн</div>
  <button id="closePopup" style="
      cursor:pointer;
      font-weight:bold;
      color:#000;
      background:#fff;
      border:1px solid #999;
      border-radius:6px;
      padding:8px 16px;
      font-size:14px;
      display:inline-block;
  ">Продовжити покупки</button>
</div>

<script>
(function() {
  if (!window.location.href.includes('/checkout/')) return;

  const popup = document.getElementById('freeShippingPopup');
  const closeBtn = document.getElementById('closePopup');
  if (!popup || !closeBtn) return;

  // Показуємо попап через 1 секунду
  setTimeout(() => {
    popup.style.display = 'block';
  }, 1000);

  // Закриття по кнопці
  closeBtn.addEventListener('click', () => {
    popup.style.display = 'none';
  });
})();
</script>

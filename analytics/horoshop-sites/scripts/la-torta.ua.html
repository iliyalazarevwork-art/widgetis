        <script>
      // Styles
      const styles = `
            #language-popup {
                max-width: calc(100% - 25px);
                width: 500px;
                height: auto;
                z-index: 1000;
                background: #fff;
                margin: 0 auto;
                text-align: center;
                box-sizing: border-box;
                margin-top: 20px;
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotateY(0deg) rotateX(0deg) rotateZ(0deg);
                border: solid 3px;
                border-radius: 8px;
                border-color: #87CEFA;
            }
    
            #language-popup h3 {
                margin: 20px 0 0 0;
                padding: 0;
            }
    
            #language-popup p {
                margin: 15px;
                padding: 0;
            }
    
            .language-popup-close {
                display: block;
                position: absolute;
                top: 0;
                right: 0;
                width: 2em;
                line-height: 2em;
                text-align: center;
                border-radius: 0 0 0 8px;
                border-left: 2px solid #ADD8E6;
                border-bottom: 2px solid #ADD8E6;
                color: #87CEFA;
            }
    
            .language-pop-up-button-holder-buttons {
                display: block;
                width: 50%;
                padding: 1.5em 1em;
                float: left;
                background: #fff;
                border: none;
                border-top: 1px solid #eee;
                color: #888;
                outline: none;
            }
    
            #ukrainianButtonRedirect {
                border-right: 1px solid #eee;
                border-radius: 0 0 0 6px;
            }
    
            #russianButtonRedirect {
                border-radius: 0 0 6px 0;
            }
    
            .language-pop-up-button-holder-buttons:active,
            .language-popup-close:active {
                transform: scale(0.99);
                box-shadow: 3px 2px 22px 1px rgba(0, 0, 0, 0.24);
            }
    
            .language-pop-up-button-holder-buttons:hover {
                font-weight: bold;
                background: #e6f2ff;
                cursor: pointer;
            }
    
            .language-popup-close:hover {
                background: #e6f2ff;
                border-radius: 0 6px 0 6px;
                cursor: pointer;
            }
    
            .language-pop-up-wrapper {
                display: none;
            }
    
            .language-pop-up-wrapper.active {
                display: block;
            }
    
            .language-pop-up-overlay {
                position: fixed;
                background-color: black;
                background-color: rgba(0, 0, 0, 0.6);
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                height: 100%;
                width: 100%;
                z-index: 999;
            }
        `;

      // Markup
      const markup = `
            <div class="language-pop-up-wrapper">
                <div class="language-pop-up-overlay" style="display: block;">&nbsp;</div>
                <div id="language-popup">
                    <h3>Вітаємо!</h3>
                    <p>Ви можете обрати мову перегляду сайту. Для зручності, ми запам'ятаємо ваш вибір на майбутнє.</p>
                    <div class="language-pop-up-button-holder" id="language-pop-up-button-holder">
                        <button class="language-pop-up-button-holder-buttons" id="ukrainianButtonRedirect">Українська</button>
                        <button class="language-pop-up-button-holder-buttons" id="russianButtonRedirect">Русский</button>
                    </div>
                </div>
            </div>
        `;

      // Inject styles into head
      const styleElement = document.createElement("style");
      styleElement.innerHTML = styles;
      document.head.appendChild(styleElement);

      // Inject markup into body
      const bodyElement = document.body;
      //bodyElement.innerHTML += markup;
      bodyElement.insertAdjacentHTML('beforeend', markup);

      // JavaScript Logic
      const popUpWrapper = document.querySelector(".language-pop-up-wrapper");
      const popUpOverlay = document.querySelector(".language-pop-up-overlay");
      const ukrainianButtonRedirect = document.getElementById(
        "ukrainianButtonRedirect"
      );
      const russianButtonRedirect = document.getElementById(
        "russianButtonRedirect"
      );
      // const closeModal = document.querySelector(".language-popup-close");

      function langRedirect(currentLanguage) {
        const isUkrainian = currentLanguage === "ukrainian";
        const isRussian = currentLanguage === "russian";
       
        if (isUkrainian) {
          // If Ukrainian language is set and '/ua/' is not in the URL after the domain, add it
          if (location.pathname.indexOf("/ua") === -1) {
            window.location.href = "/ua" + location.pathname;
          }
        } else if (isRussian) {
            
          // If Russian language is set and '/ua/' is in the URL after the domain, remove it
          if (location.pathname.indexOf("/ua") !== -1) {
            window.location.href = window.location.href.replace("/ua", "");
          }
        }
      }

      // Function to handle language redirection
      function handleLanguageRedirection(language) {
        localStorage.setItem("languagePreference", language);

        langRedirect(language);

        popUpWrapper.classList.remove("active");
        popUpOverlay.style.display = "none";
        document.body.style.overflow = "auto";
      }

      // Event listeners
      ukrainianButtonRedirect.addEventListener("click", () =>
        handleLanguageRedirection("ukrainian")
      );
      russianButtonRedirect.addEventListener("click", () =>
        handleLanguageRedirection("russian")
      );
      // closeModal.addEventListener("click", () => {
      //   popUpWrapper.classList.remove("active");
      //   popUpOverlay.style.display = "none";
      //   document.body.style.overflow = "auto";
      // });

      document.addEventListener("DOMContentLoaded", () => {
        if (!localStorage.getItem("languagePreference")) {
          popUpWrapper.classList.add("active");
          popUpOverlay.style.display = "block";
          document.body.style.overflow = "hidden";
          
        } else {
          const currentLanguage = localStorage.getItem("languagePreference");
          langRedirect(currentLanguage);
        //   
        }
      });

      // Language selection logic based on existing page elements
      const langMenuItems = [".localization-menu__item", ".lang-menu__item", ".lang-switcher__link"]
      
      langMenuItems?.forEach((lItem) => {
        let menuItems = document.querySelectorAll(lItem);

        if (menuItems.length) {
          menuItems?.forEach((item) => {
          item?.addEventListener("click", () => {
          if (
            localStorage.getItem("languagePreference") === "russian"
          ) {
            localStorage.setItem("languagePreference", "ukrainian");
          } else {
          
            localStorage.setItem("languagePreference", "russian");
          }
        });
        })
      }
      });
    </script>

  if (mainPageCheck) {

      $("div.productsMenu-tabs-content").addClass("hide");
      $("div.productsMenu-submenu.__fluidGrid.__hasTabs.__pos_left").addClass(

      $("div.productsMenu-tabs-content").removeClass("hide");
    });
  }
})();

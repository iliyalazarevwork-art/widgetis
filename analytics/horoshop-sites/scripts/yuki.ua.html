<script>
class DeliveryProgress {
  FINAL_PRICE = 1500;
  DELIVERY_PRICE = 500;

  constructor() {
    this.progressBarWrapperId = 'delivery-progress-block-wrapper';
    this.primarySelector = '.cart-footer-b.cart-cost.j-total-sum';
    this.fallbackSelector = '.cart__total-price.j-total-sum';
    this.rootNode = document.body;
    this.containerObserver = null;
    this.contentObserver = null;
    this.targetSelector = null;
  }

  init() {
    document.addEventListener('DOMContentLoaded', () => {
      this.targetSelector = document.querySelector(this.primarySelector)
        ? this.primarySelector
        : this.fallbackSelector;

      console.log(`[DeliveryProgress] Using selector: ${this.targetSelector}`);
      this.observeTargetElement();
    });
  }

  observeTargetElement() {
    this.containerObserver?.disconnect();

    this.containerObserver = new MutationObserver(() => {
      const target = document.querySelector(this.targetSelector);

      if (target && !target.dataset._observed) {
        target.dataset._observed = 'true';
        console.log('[DeliveryProgress] Target found, setting observers and updating progress bar...');
        this.updateDeliveryProgressBar();
        this.attachContentObserver(target);
      }
    });

    this.containerObserver.observe(this.rootNode, {
      childList: true,
      subtree: true
    });
  }

  attachContentObserver(target) {
    this.contentObserver?.disconnect();

    this.contentObserver = new MutationObserver(() => {
      this.handleContentChange(target.textContent.trim());
    });

    this.contentObserver.observe(target, {
      characterData: true,
      childList: true,
      subtree: true
    });

    console.log('[DeliveryProgress] Content observer attached to:', target);
  }

  handleContentChange() {
    this.updateDeliveryProgressBar();
  }

  parseTotal(text) {
    let s = String(text || '').replace(/\s/g, '').replace(/[^\d.,]/g, '');

    if (s.includes(',') && s.includes('.')) {
      s = s.replace(/\./g, '').replace(',', '.');
    } else if (s.includes(',') && !s.includes('.')) {
      s = s.replace(',', '.');
    }

    return parseFloat(s) || 0;
  }

  updateDeliveryProgressBar() {
    const totalSumElement = document.querySelector(this.targetSelector);

    if (!totalSumElement) {
      console.log('[DeliveryProgress] Total sum element not found.');
      return;
    }

    const total = this.parseTotal(totalSumElement.textContent);

    if (isNaN(total)) {
      console.log('[DeliveryProgress] Unable to parse total.');
      return;
    }

    const percent = Math.min((total / this.FINAL_PRICE) * 100, 100);
    const remainingForFinal = Math.max(0, this.FINAL_PRICE - total);

    console.log(`[DeliveryProgress] Cart total: ${total}, Progress: ${percent.toFixed(2)}%`);

    let wrapper = document.querySelector(`#${this.progressBarWrapperId}`);

    if (!wrapper) {
      wrapper = document.createElement('div');
      wrapper.id = this.progressBarWrapperId;

      const cartContent = document.querySelector('.cart__summary');

      if (cartContent) {
        cartContent.appendChild(wrapper);
        console.log('[DeliveryProgress] Progress bar inserted at the end of .cart__summary');
      } else {
        const cartTable = document.querySelector('table.cart-items');

        if (cartTable?.parentNode) {
          cartTable.parentNode.insertBefore(wrapper, cartTable.nextSibling);
          console.log('[DeliveryProgress] Progress bar inserted after cart table');
        }
      }
    }

    wrapper.innerHTML = this.createProgressBarHtml(remainingForFinal, percent);
  }

  createProgressBarHtml(remainingForFinal, percent) {
    const deliveryMessage = remainingForFinal <= 0
      ? '🎉 Ви отримали безкоштовну доставку!'
      : 'До безкоштовної доставки залишилося покласти до кошика на суму:';

    return `
      <div class="blockStrip" id="delivery-progress-block">
        <div class="blockStripTop">
          <div class="blockStripTopLeft">
            <img src="/content/uploads/images/shop1.png" class="blockStripTopLeftLogo" alt="">
            <p class="blockStripTopLeftText">${deliveryMessage}</p>
          </div>
        </div>
        <div>
          <div class="blockStripBottomStrip" aria-label="Прогрес до безкоштовної доставки">
            <span class="blockStripBottomStripSpan" style="width: ${percent}%;"></span>
          </div>
          <div class="blockStripBottomPrice">
            <span class="blockStripBottomPriceOne">
              <span style="white-space: nowrap;"><br>Ви тільки на початку</span>
            </span>
            <span class="blockStripBottomPriceTwo">
              <span style="white-space: nowrap;"><span class="line_blue">|</span></span><br>Ви на середині
            </span>
            <span class="blockStripBottomPriceThree">
              <span style="white-space: nowrap;"><br>Залишилось: ${Math.ceil(remainingForFinal)} грн</span>
            </span>
          </div>
        </div>
      </div>
    `;
  }
}

const deliveryProgress = new DeliveryProgress();
deliveryProgress.init();
</script>

<script>
(() => {
  const normalize = value => String(value || '')
    .replace(/\s+/g, ' ')
    .trim()
    .toLowerCase();

  const ABOUT_TEXTS = [
    'про нас',
    'про компанію',
    'про компанiю',
    'о нас',
    'о компании',
    'about',
    'about us'
  ];

  const ABOUT_HREF_RE = /(info\.yuki\.ua|(^|\/)(ru\/o-nas|ua\/pro-nas|pro-nas|o-nas|about|about-us)(\/|$))/i;

  const PROTECTED_TEXTS = [
    'new',
    'блог',
    'blog',
    'outlet',
    'outlett',
    'sale'
  ];

  const PROTECTED_HREF_RE = /\/(nova-kolektsiia|blog|outlet|outlett|tovary-zi-znyzhkoiu|tovary-zi-znyzhkamy)(\/|$)/i;

  const SERVICE_TEXT_PARTS = [
    'про нас',
    'про компан',
    'о нас',
    'о компан',
    'about',
    'оплат',
    'достав',
    'обмін',
    'обмен',
    'повернен',
    'возврат',
    'магазин',
    'співпрац',
    'сотруднич',
    'відгук',
    'відгуки',
    'відгуків',
    'видгук',
    'отзыв',
    'отзывы',
    'ваканс',
    'угод',
    'уход',
    'користувач',
    'пользователь',
    'умов',
    'услов',
    'faq',
    'контакт',
    'написати',
    'акції та активності',
    'акции и активности',
    'лояльн',
    'loyal',
    'loial'
  ];

  const SERVICE_HREF_RE = /(info\.yuki\.ua|\/(pro-nas|o-nas|about|about-us|oplata|dostav|delivery|payment|obmin|obmen|povern|return|magaz|spivpr|sotrud|vidh|vidg|otzyv|review|vakans|ugoda|uhoda|agreement|umovy|terms|faq|kontak|contact|napysaty|aktsii|aktyvnosti|loial|loyal|programa-loialnosti|programa-loyalnosti|prohrama-loialnosti)(\/|$))/i;

  function getDirectMainLink(item) {
    if (!item) return null;

    const children = Array.from(item.children || []);

    for (const child of children) {
      if (child.matches && child.matches('a[href], .menu__link[href], .site-menu__link[href]')) {
        return child;
      }
    }

    for (const child of children) {
      if (
        child.matches &&
        child.matches('ul, ol, .menu__list, .site-menu, [class*="submenu"], [class*="drop"], [class*="dropdown"]')
      ) {
        continue;
      }

      const inner = Array.from(child.children || []).find(el => {
        return el.matches && el.matches('a[href], .menu__link[href], .site-menu__link[href]');
      });

      if (inner) return inner;
    }

    return null;
  }

  function getMenuItems(list) {
    return Array.from(list.children || []).filter(item => {
      return item.matches('li, .menu__item, .site-menu__item, .nav__item') || getDirectMainLink(item);
    });
  }

  function isTopLevelMenuList(list) {
    if (!list) return false;

    if (list.closest('li, .menu__item, .site-menu__item, .nav__item')) {
      return false;
    }

    return getMenuItems(list).length > 0;
  }

  function isCatalogArea(el) {
    if (!el) return false;

    return Boolean(el.closest(
      '.products-menu, .products-menu__container, .products-menu__list, .catalog, .catalog-menu, .catalog-menu__list, .header-catalog, .j-catalog, [class*="products-menu"], [class*="catalog"]'
    ));
  }

  function getDirectTexts(list) {
    return getMenuItems(list)
      .map(item => getDirectMainLink(item))
      .filter(Boolean)
      .map(link => normalize(link.textContent || link.innerText));
  }

  function isMainHeaderMenuList(list) {
    if (!isTopLevelMenuList(list)) return false;
    if (isCatalogArea(list)) return false;

    const texts = getDirectTexts(list);

    const hasWomen = texts.includes('вона');
    const hasMen = texts.includes('він');
    const hasTeen = texts.includes('тінейджери');
    const hasBlogOrNew = texts.includes('блог') || texts.includes('blog') || texts.includes('new');

    return (hasWomen && hasMen) || (hasTeen && hasBlogOrNew) || (hasWomen && hasBlogOrNew);
  }

  function getHeaderLists() {
    const header = document.querySelector('.header');
    if (!header) return [];

    return Array.from(header.querySelectorAll('.site-menu, .menu__list, nav ul, ul, ol'))
      .filter(isMainHeaderMenuList);
  }

  function cleanupForcedOutletOutsideMainMenu() {
    const header = document.querySelector('.header');
    if (!header) return;

    const mainLists = new Set(getHeaderLists());

    header.querySelectorAll('[data-forced-outlet="true"]').forEach(item => {
      if (!mainLists.has(item.parentElement)) {
        item.remove();
      }
    });
  }

  function isAboutItem(item) {
    const link = getDirectMainLink(item);
    if (!link) return false;

    const text = normalize(link.textContent || link.innerText);
    const href = (link.getAttribute('href') || '').trim();

    return ABOUT_TEXTS.includes(text) || ABOUT_HREF_RE.test(href);
  }

  function isProtectedItem(item) {
    const link = getDirectMainLink(item);
    if (!link) return false;

    const text = normalize(link.textContent || link.innerText);
    const href = (link.getAttribute('href') || '').trim();

    return PROTECTED_TEXTS.includes(text) || PROTECTED_HREF_RE.test(href);
  }

  function isOutletItem(item) {
    const link = getDirectMainLink(item);
    if (!link) return false;

    const text = normalize(link.textContent || link.innerText);
    const href = (link.getAttribute('href') || '').trim();

    return text === 'outlet' || text === 'outlett' || /\/outlett?(\/|$)/i.test(href);
  }

  function isBlogItem(item) {
    const link = getDirectMainLink(item);
    if (!link) return false;

    const text = normalize(link.textContent || link.innerText);
    const href = (link.getAttribute('href') || '').trim();

    return text === 'блог' || text === 'blog' || /\/blog(\/|$)/i.test(href);
  }

  function isServiceItem(item) {
    if (!item || isProtectedItem(item)) return false;

    const link = getDirectMainLink(item);
    if (!link) return false;

    const text = normalize(link.textContent || link.innerText);
    const href = (link.getAttribute('href') || '').trim();

    return SERVICE_TEXT_PARTS.some(part => text.includes(part)) || SERVICE_HREF_RE.test(href);
  }

  function clearHiddenState(el) {
    if (!el) return;

    el.style.removeProperty('display');
    el.style.removeProperty('visibility');
    el.style.removeProperty('opacity');
    el.style.removeProperty('height');
    el.style.removeProperty('width');
    el.style.removeProperty('max-height');
    el.style.removeProperty('max-width');
    el.style.removeProperty('overflow');
    el.removeAttribute('hidden');

    el.classList.remove('hidden', 'is-hidden', 'd-none', 'j-hidden');
  }

  function showItem(item) {
    if (!item) return;

    clearHiddenState(item);
    item.style.setProperty('display', 'inline-flex', 'important');
    item.style.setProperty('visibility', 'visible', 'important');
    item.style.setProperty('opacity', '1', 'important');
    item.style.setProperty('overflow', 'visible', 'important');

    const link = getDirectMainLink(item);

    if (link) {
      clearHiddenState(link);
      link.style.setProperty('display', 'inline-flex', 'important');
      link.style.setProperty('visibility', 'visible', 'important');
      link.style.setProperty('opacity', '1', 'important');

      if (isOutletItem(item) || /\/nova-kolektsiia(\/|$)/i.test(link.getAttribute('href') || '')) {
        link.style.setProperty('font-weight', '700', 'important');
      }
    }
  }

  function hideItem(item) {
    if (!item) return;
    if (isProtectedItem(item)) return;

    item.style.setProperty('display', 'none', 'important');
  }

  function createForcedOutlet(referenceItem) {
    const item = document.createElement('li');
    item.setAttribute('data-forced-outlet', 'true');

    if (referenceItem && referenceItem.className) {
      item.className = referenceItem.className;
    } else {
      item.className = 'site-menu__item';
    }

    const link = document.createElement('a');
    link.href = '/outlet/';
    link.textContent = 'OUTLET';

    const referenceLink = referenceItem ? getDirectMainLink(referenceItem) : null;

    if (referenceLink && referenceLink.className) {
      link.className = referenceLink.className;
    } else {
      link.className = 'site-menu__link';
    }

    link.style.setProperty('font-weight', '700', 'important');

    item.appendChild(link);
    return item;
  }

  function ensureOutletBeforeAbout(list) {
    if (!isMainHeaderMenuList(list)) return;

    let items = getMenuItems(list);

    const aboutItem = items.find(isAboutItem);
    const blogItem = items.find(isBlogItem);
    let outletItem = items.find(isOutletItem);

    const forcedOutlets = Array.from(list.children || []).filter(el => {
      return el.getAttribute && el.getAttribute('data-forced-outlet') === 'true';
    });

    let forcedOutlet = forcedOutlets[0] || null;

    if (!outletItem && forcedOutlet) {
      outletItem = forcedOutlet;
    }

    if (!outletItem) {
      outletItem = createForcedOutlet(aboutItem || blogItem || items[0]);
    }

    if (aboutItem && aboutItem.parentElement === list) {
      if (outletItem.parentElement !== list || outletItem.nextElementSibling !== aboutItem) {
        list.insertBefore(outletItem, aboutItem);
      }
    } else if (blogItem && blogItem.parentElement === list) {
      if (outletItem.parentElement !== list || blogItem.nextElementSibling !== outletItem) {
        list.insertBefore(outletItem, blogItem.nextElementSibling);
      }
    } else if (outletItem.parentElement !== list) {
      list.appendChild(outletItem);
    }

    Array.from(list.children || []).forEach(el => {
      if (el.getAttribute && el.getAttribute('data-forced-outlet') === 'true' && el !== outletItem) {
        el.remove();
      }
    });

    showItem(outletItem);
  }

  function pruneHeaderList(list) {
    if (!isMainHeaderMenuList(list)) return;

    ensureOutletBeforeAbout(list);

    let items = getMenuItems(list);

    items.forEach(item => {
      if (isProtectedItem(item)) {
        showItem(item);
      }
    });

    const aboutIndex = items.findIndex(isAboutItem);
    const outletIndex = items.findIndex(isOutletItem);

    let startHideIndex = -1;

    if (aboutIndex !== -1) {
      startHideIndex = aboutIndex;
    } else if (outletIndex !== -1) {
      startHideIndex = outletIndex + 1;
    }

    if (startHideIndex !== -1) {
      for (let i = startHideIndex; i < items.length; i++) {
        if (!isProtectedItem(items[i])) {
          hideItem(items[i]);
        }
      }
    }

    items = getMenuItems(list);

    items.forEach(item => {
      if (isServiceItem(item)) {
        hideItem(item);
      }
    });

    items.forEach(item => {
      if (isProtectedItem(item)) {
        showItem(item);
      }
    });

    ensureOutletBeforeAbout(list);
  }

  function hideServiceLinksOutsideMainLists() {
    const header = document.querySelector('.header');
    if (!header) return;

    const mainLists = new Set(getHeaderLists());
    const links = Array.from(header.querySelectorAll('a[href], .menu__link[href], .site-menu__link[href]'));

    links.forEach(link => {
      const href = (link.getAttribute('href') || '').trim();
      const text = normalize(link.textContent || link.innerText);

      const isProtected =
        PROTECTED_TEXTS.includes(text) ||
        PROTECTED_HREF_RE.test(href);

      if (isProtected) return;

      const isService =
        SERVICE_TEXT_PARTS.some(part => text.includes(part)) ||
        SERVICE_HREF_RE.test(href);

      if (!isService) return;

      const item = link.closest('li, .menu__item, .site-menu__item, .nav__item');

      if (!item) {
        link.style.setProperty('display', 'none', 'important');
        return;
      }

      /*
        Не ховаємо службові посилання всередині каталогу/мегаменю.
      */
      if (!mainLists.has(item.parentElement)) return;

      item.style.setProperty('display', 'none', 'important');
    });
  }

  function pruneHeader() {
    cleanupForcedOutletOutsideMainMenu();

    const lists = getHeaderLists();

    lists.forEach(pruneHeaderList);
    hideServiceLinksOutsideMainLists();

    lists.forEach(list => {
      getMenuItems(list).forEach(item => {
        if (isProtectedItem(item)) {
          showItem(item);
        }
      });

      ensureOutletBeforeAbout(list);
    });

    cleanupForcedOutletOutsideMainMenu();
  }

  function isFooterAboutLink(el) {
    if (!el) return false;

    const href = (el.getAttribute('href') || '').trim();
    const text = normalize(el.textContent || el.innerText);

    return ABOUT_HREF_RE.test(href) || ABOUT_TEXTS.some(t => text.includes(t));
  }

  const findAboutInFooter = root =>
    Array.from(root.querySelectorAll('a, .menu__link')).find(isFooterAboutLink);

  function pruneFooter() {
    const footer = document.querySelector('.footer') || document.querySelector('footer');
    if (!footer) return;

    const lists = footer.querySelectorAll('ul, ol, .menu__list');

    lists.forEach(list => {
      const a = findAboutInFooter(list);
      if (!a) return;

      let item = a.closest('li, .menu__item') || a;

      while (item && item.parentElement !== list) {
        item = item.parentElement;
      }

      if (!item || item.parentElement !== list) return;

      for (let prev = item.previousElementSibling; prev; prev = prev.previousElementSibling) {
        prev.style.setProperty('display', 'none', 'important');
      }
    });
  }

  function run() {
    pruneHeader();
    pruneFooter();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run, { once: true });
  } else {
    run();
  }

  window.addEventListener('load', run);

  setTimeout(run, 100);
  setTimeout(run, 500);
  setTimeout(run, 1000);
  setTimeout(run, 2000);
  setTimeout(run, 4000);

  let headerRunScheduled = false;

  const header = document.querySelector('.header');

  if (header) {
    new MutationObserver(() => {
      if (headerRunScheduled) return;

      headerRunScheduled = true;

      requestAnimationFrame(() => {
        headerRunScheduled = false;
        pruneHeader();
      });
    }).observe(header, {
      childList: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['style', 'class', 'hidden']
    });
  }

  const footer = document.querySelector('.footer') || document.querySelector('footer');

  if (footer) {
    new MutationObserver(pruneFooter).observe(footer, {
      childList: true,
      subtree: true
    });
  }
})();

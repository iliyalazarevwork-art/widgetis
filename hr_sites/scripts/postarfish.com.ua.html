        <script>
(function () {
    var MIN_ORDER_THRESHOLD = 300;

    var lang = (window.GLOBAL && GLOBAL.SYSTEM_LANGUAGE === 1) ? 'ru' : 'uk';
    var messages = {
        ru: {
            pending: 'До минимальной суммы заказа осталось: ',
            complete: 'Минимальная сумма заказа достигнута!',
            tip: 'Для скидки не забудьте зарегистрироваться.'
        },
        uk: {
            pending: 'До мінімальної суми замовлення залишилося: ',
            complete: 'Мінімальну суму замовлення досягнуто!',
            tip: 'Для знижки не забудьте зареєструватися.'
        }
    };

    function getCartTotal() {
        var cart = (typeof AjaxCart !== "undefined" && AjaxCart.getInstance)
            ? AjaxCart.getInstance()
            : null;

        if (cart && cart.Cart && cart.Cart.total && cart.Cart.total.sum) {
            return parseFloat(cart.Cart.total.sum) || 0;
        }

        var totalEl = document.querySelector(".j-total-sum");
        if (!totalEl) return 0;

        var totalText = totalEl.textContent.trim().replace(/[^\d.]/g, "");
        return parseFloat(totalText) || 0;
    }

    function addMinOrderProgress() {
        var totalElement = document.querySelector(".j-total-sum");
        if (!totalElement) {
            setTimeout(addMinOrderProgress, 300);
            return;
        }

        var old = document.getElementById("min-order-progress");
        if (old) old.remove();

        var cartTotal = getCartTotal();
        var remainder = MIN_ORDER_THRESHOLD - cartTotal;

        var container = document.createElement("div");
        container.id = "min-order-progress";
        container.style.marginTop = "15px";
        container.style.padding = "15px";
        container.style.border = "1px solid #ddd";
        container.style.borderRadius = "5px";
        container.style.background = "#f9f9f9";
        container.style.fontFamily = "inherit";
        container.style.fontSize = "15px";

        var infoText = document.createElement("div");
        infoText.style.marginBottom = "10px";

        if (remainder > 0) {
            infoText.textContent = messages[lang].pending + parseInt(remainder) + " грн";
        } else {
            infoText.textContent = messages[lang].complete;
        }

        container.appendChild(infoText);

        var barContainer = document.createElement("div");
        barContainer.style.background = "#ddd";
        barContainer.style.height = "14px";
        barContainer.style.borderRadius = "7px";
        barContainer.style.overflow = "hidden";
        container.appendChild(barContainer);

        var bar = document.createElement("div");
        bar.style.background = "#4caf50";
        bar.style.height = "14px";
        bar.style.borderRadius = "7px";
        bar.style.width = "0%";

        var pct = (cartTotal / MIN_ORDER_THRESHOLD) * 100;
        if (pct > 100) pct = 100;
        bar.style.width = pct + "%";

        barContainer.appendChild(bar);

        var tip = document.createElement("div");
        tip.textContent = messages[lang].tip;
        tip.style.marginTop = "10px";
        tip.style.color = "#555";
        container.appendChild(tip);

        totalElement.parentNode.insertBefore(container, totalElement.nextSibling);
    }

    var debounceTimer = null;
    function debounceUpdate(delay) {
        if (debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(addMinOrderProgress, delay || 500);
    }

    function initMinOrderBar() {
        addMinOrderProgress();

        if (typeof AjaxCart !== "undefined" && AjaxCart.getInstance) {
            try {
                var cart = AjaxCart.getInstance();
                if (cart && cart.attachEventHandlers) {
                    cart.attachEventHandlers({
                        afterRender: function () {
                            debounceUpdate(500);
                        },
                        cart_product_add: function () {
                            debounceUpdate(500);
                        },
                        cart_product_remove: function () {
                            debounceUpdate(500);
                        },
                        onChange: function () {
                            debounceUpdate(500);
                        }
                    });
                }
            } catch (e) {
                console.error("Ошибка при привязке к AjaxCart:", e);
            }
        }

        var observer = new MutationObserver(function () {
            debounceUpdate(500);
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
    }

    document.addEventListener("DOMContentLoaded", initMinOrderBar);
})();
</script>

            </script><script>document.addEventListener('DOMContentLoaded', function () {
    let previousContent = {};
    let observers = [];
    let previousCountry = "";

    // Функція для отримання мови з <meta property="og:locale">
    function getLanguage() {
        const localeMeta = document.querySelector('meta[property="og:locale"]');
        if (localeMeta) {
            const locale = localeMeta.getAttribute('content') || 'ua_UA';
            return locale.split('_')[0];
        }
        return 'ua';
    }

    // Функція для отримання валюти на основі тексту ціни
    function getCurrency(priceText) {
        if (priceText.includes('₴') || priceText.toLowerCase().includes('грн')) {
            return 'UAH';
        } else if (priceText.includes('$')) {
            return 'USD';
        }
        return 'UAH'; // За замовчуванням гривня
    }

    // Функція для перевірки, чи ми на сторінці чекауту
    function isCheckoutPage() {
        return document.querySelector('.checkout-aside') !== null || 
               document.querySelector('.order-details__body') !== null ||
               document.querySelector('input[name="Recipient[delivery_country]"]') !== null ||
               document.querySelector('select[name="Recipient[delivery_country]"]') !== null;
    }

    // Функція для отримання обраної країни
    function getSelectedCountry() {
        let input = document.querySelector('input[name="Recipient[delivery_country]"]');
        let select = document.querySelector('select[name="Recipient[delivery_country]"]');
        
        if (input && input.value) {
            return input.value.trim();
        } else if (select && select.value) {
            return select.value.trim();
        } else {
            console.log("Не вдалося знайти елемент з країною");
            return 'Україна'; // За замовчуванням Україна
        }
    }

    // Функція для отримання обраного міста
    function getSelectedCity() {
        let input = document.querySelector('input[name="Recipient[delivery_city]"]');
        let select = document.querySelector('select[name="Recipient[delivery_city]"]');
        
        if (input && input.value) {
            return input.value.trim();
        } else if (select && select.value) {
            return select.value.trim();
        } else {
            console.log("Не вдалося знайти елемент з містом");
            return ''; // За замовчуванням порожнє значення
        }
    }

    // Функція для перевірки вибору країни та міста
    function isDeliveryInfoSelected() {
        if (!isCheckoutPage()) {
            return true; // Якщо не на чекауті, вважаємо що все вибрано
        }
        
        const country = getSelectedCountry();
        const city = getSelectedCity();
        return country && country.trim() !== '' && city && city.trim() !== '';
    }

    // Нова функція для отримання вартості доставки
    function getShippingCost() {
        let shippingElementDesktop = document.querySelector('.order-details-b');
        let shippingElementMobile = document.querySelector('.order-details__cost-value');
        
        if (shippingElementDesktop) {
            return parseNumber(shippingElementDesktop.textContent.trim());
        } else if (shippingElementMobile) {
            return parseNumber(shippingElementMobile.textContent.trim());
        } else {
            console.log("Не вдалося знайти елемент з вартістю доставки");
            return 0; // За замовчуванням 0, якщо доставка не вказана
        }
    }

    // Функція для отримання порогу безкоштовної доставки
    function getFreeShippingThreshold(currency, country) {
        if (country !== 'Україна' && currency === 'UAH') {
            return 10000;
        }
        
        switch (currency) {
            case 'UAH':
                return 1500;
            case 'USD':
                return 119;
            default:
                return 1500;
        }
    }

    // Функція для отримання перекладу тексту
    function getTranslation(language, remaining, currency) {
        const translations = {
            ua: {
                freeShipping: `До безкоштовної доставки залишилось: ${remaining.toFixed(2)} грн`,
                freeShippingAchieved: 'Безкоштовна доставка'
            },
            en: {
                freeShipping: `Amount left for free shipping: ${remaining.toFixed(2)} $`,
                freeShippingAchieved: 'Free shipping'
            },
            ru: {
                freeShipping: `До бесплатной доставки осталось: ${remaining.toFixed(2)} грн`,
                freeShippingAchieved: 'Бесплатная доставка'
            }
        };
        return translations[language] || translations.ua;
    }

    function parseNumber(text) {
        return parseFloat(text.replace(/[^0-9.]/g, '')) || 0;
    }

    function debounce(func, wait) {
        let timeout;
        return function (...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    function createBlockStrip(priceCurrent, container, priceText) {
        let existingBlockStrip = container.querySelector('.blockStrip');
        if (existingBlockStrip) {
            existingBlockStrip.remove();
        }

        if (isCheckoutPage() && !isDeliveryInfoSelected()) {
            console.log('Checkout page, but country or city not selected yet. Skipping block strip creation.');
            return;
        }

        const language = getLanguage();
        const currency = getCurrency(priceText);
        const country = getSelectedCountry();

        // Отримуємо вартість доставки та віднімаємо її від загальної суми
        const shippingCost = isCheckoutPage() ? getShippingCost() : 0;
        const adjustedPrice = Math.max(priceCurrent - shippingCost, 0); // Не дозволяємо від'ємну суму

        const freeShippingThreshold = getFreeShippingThreshold(currency, country);
        const remaining = freeShippingThreshold - adjustedPrice;
        const translation = getTranslation(language, remaining, currency);

        console.log(`Загальна сума: $, Вартість доставки: $, Сума товарів: $`);

        const blockStrip = document.createElement('div');
        blockStrip.classList.add('blockStrip');

        const blockStripTop = document.createElement('div');
        blockStripTop.classList.add('blockStripTop');
        blockStrip.appendChild(blockStripTop);

        const blockStripTopLeft = document.createElement('div');
        blockStripTopLeft.classList.add('blockStripTopLeft');
        const blockStripTopLeftLogo = document.createElement('img');
        blockStripTopLeftLogo.src = '/content/uploads/images/shop1.png';
        blockStripTopLeftLogo.classList.add('lockStripTopLeftLogo');
        blockStripTopLeft.appendChild(blockStripTopLeftLogo);
        const blockStripTopLeftText = document.createElement('p');
        blockStripTopLeftText.classList.add('blockStripTopLeftText');
        if (remaining > 0) {
            blockStripTopLeftText.textContent = translation.freeShipping;
        } else {
            blockStripTopLeftText.textContent = translation.freeShippingAchieved;
        }
        blockStripTopLeft.appendChild(blockStripTopLeftText);
        blockStripTop.appendChild(blockStripTopLeft);

        const blockStripBottom = document.createElement('div');
        blockStrip.appendChild(blockStripBottom);
        const blockStripBottomStrip = document.createElement('div');
        blockStripBottomStrip.classList.add('blockStripBottomStrip');
        blockStripBottom.appendChild(blockStripBottomStrip);
        const blockStripBottomStripSpan = document.createElement('span');
        blockStripBottomStripSpan.classList.add('blockStripBottomStripSpan');
        let percentage = Math.min((adjustedPrice / freeShippingThreshold) * 100, 100); // Використовуємо adjustedPrice
        blockStripBottomStripSpan.style.width = percentage + "%";
        blockStripBottomStrip.appendChild(blockStripBottomStripSpan);

        container.appendChild(blockStrip);
    }

    function logContent(targetElement, selector) {
        if (targetElement) {
            const currentContent = targetElement.textContent.trim();
            if (currentContent !== previousContent[selector] || getSelectedCountry() !== previousCountry) {
                previousContent[selector] = currentContent;
                previousCountry = getSelectedCountry();
                let priceCurrent = parseNumber(currentContent);
                console.log(`Selector: $, Price: $, Country: $, City: ${getSelectedCity()}`);

                let container = null;
                
                if (selector === '.cart-footer-b' && document.querySelector('.cart-footer-b')) {
                    const cartBlockPc = targetElement.closest('#cart');
                    if (cartBlockPc) container = cartBlockPc.querySelector('.cart-content');
                } else if (selector === '.cart__total-price' && document.querySelector('.cart__total-price')) {
                    const cartBlock = targetElement.closest('.cart__container');
                    if (cartBlock) container = cartBlock.querySelector('.cart__order');
                } else if (selector === '.order-summary-b' && document.querySelector('.order-summary-b')) {
                    container = document.querySelector('.checkout-aside');
                } else if (selector.includes('order-details__total') && document.querySelector(selector)) {
                    container = document.querySelector('.order-details__body');
                }

                if (container && priceCurrent >= 0) {
                    createBlockStrip(priceCurrent, container, currentContent);
                }
            }
        } else {
            console.log(`Element not found: $`);
        }
    }

    const debouncedLogContent = debounce((targetElement, selector) => {
        logContent(targetElement, selector);
    }, 1000);

    function observeChanges() {
        observers.forEach(observer => observer.disconnect());
        observers = [];

        const elements = [
            { selector: '.cart-footer-b' },
            { selector: '.cart__total-price' },
            { selector: '.order-summary-b' },
            { selector: '.order-details__total' }
        ];

        elements.forEach(({ selector }) => {
            const targetElement = document.querySelector(selector);
            if (targetElement) {
                const observer = new MutationObserver(() => debouncedLogContent(targetElement, selector));
                observers.push(observer);
                observer.observe(targetElement, { characterData: true, subtree: true, childList: true });
                debouncedLogContent(targetElement, selector);
            } else {
                console.log(`Element not found on initial load: $`);
            }
        });
    }

    function observeCountryAndCityChange() {
        const countryInput = document.querySelector('input[name="Recipient[delivery_country]"]');
        const countrySelect = document.querySelector('select[name="Recipient[delivery_country]"]');
        const cityInput = document.querySelector('input[name="Recipient[delivery_city]"]');
        const citySelect = document.querySelector('select[name="Recipient[delivery_city]"]');
        
        if (countryInput) {
            const observer = new MutationObserver(() => updateAllPriceElements());
            observer.observe(countryInput, { attributes: true, attributeFilter: ['value'] });
            ['input', 'change'].forEach(event => countryInput.addEventListener(event, updateAllPriceElements));
        }
        
        if (countrySelect) {
            const observer = new MutationObserver(() => updateAllPriceElements());
            observer.observe(countrySelect, { attributes: true, attributeFilter: ['value'] });
            ['change'].forEach(event => countrySelect.addEventListener(event, updateAllPriceElements));
        }

        if (cityInput) {
            const observer = new MutationObserver(() => updateAllPriceElements());
            observer.observe(cityInput, { attributes: true, attributeFilter: ['value'] });
            ['input', 'change'].forEach(event => cityInput.addEventListener(event, updateAllPriceElements));
        }
        
        if (citySelect) {
            const observer = new MutationObserver(() => updateAllPriceElements());
            observer.observe(citySelect, { attributes: true, attributeFilter: ['value'] });
            ['change'].forEach(event => citySelect.addEventListener(event, updateAllPriceElements));
        }

        // Спостерігаємо за вартістю доставки
        const shippingDesktop = document.querySelector('.order-details-b');
        const shippingMobile = document.querySelector('.order-details__cost-value');
        
        if (shippingDesktop) {
            const observer = new MutationObserver(() => updateAllPriceElements());
            observer.observe(shippingDesktop, { characterData: true, subtree: true, childList: true });
        }
        
        if (shippingMobile) {
            const observer = new MutationObserver(() => updateAllPriceElements());
            observer.observe(shippingMobile, { characterData: true, subtree: true, childList: true });
        }
    }

    function updateAllPriceElements() {
        const elements = ['.cart-footer-b', '.cart__total-price', '.order-summary-b', '.order-details__total'];
        elements.forEach(selector => {
            const targetElement = document.querySelector(selector);
            if (targetElement) {
                previousCountry = ""; // Примусове оновлення
                debouncedLogContent(targetElement, selector);
            }
        });
    }

    function observeDOMChanges() {
        const bodyObserver = new MutationObserver(() => {
            observeCountryAndCityChange();
            observeChanges();
        });
        bodyObserver.observe(document.body, { childList: true, subtree: true });
    }

    observeChanges();
    observeCountryAndCityChange();
    observeDOMChanges();

    setTimeout(() => {
        observeCountryAndCityChange();
        updateAllPriceElements();
    }, 1000);

(function () {
  const DEBUG = false;
  function log() {
    if (DEBUG) console.log('[GIFT_AUTO]', ...arguments);
  }

  /* ---------- Настройка подарков ---------- */
  const GIFT_RULES = [
    { min: 1000, max: 1999.99, productId: 5125 }, // твой подарок 1
    { min: 2000, max: 2999.99, productId: 5126 }, // твой подарок 2
    { min: 3000, max: 3999.99, productId: 5136 }, // и т.д.
    { min: 4000, max: 4999.99, productId: 5137 },
    { min: 5000, max: Infinity, productId: 5138 }
  ];

  const GIFT_IDS = GIFT_RULES.map(r => String(r.productId));

  /* ---------- CSRF ---------- */
  function getCsrfToken() {
    if (window.GLOBAL && window.GLOBAL.GLOBAL_CSRF_TOKEN) {
      return window.GLOBAL.GLOBAL_CSRF_TOKEN;
    }
    const meta = document.querySelector('meta[name="csrf-token"], meta[name="X-CSRF-Token"]');
    return meta ? meta.getAttribute('content') : null;
  }

  const CSRF = getCsrfToken();
  if (!CSRF) {
    log('CSRF токен не найден – скрипт подарков не будет работать');
  }

  /* ---------- Получение корзины через /init/ ---------- */
  function fetchCart() {
    return fetch('/_widget/ajax_cart/init/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
        'X-Requested-With': 'XMLHttpRequest',
        'X-CSRF-Token': CSRF
      },
      body: 'adapter=checkout' // так же, как в твоём HAR
    })
      .then(r => r.json())
      .then(data => {
        if (data && data.status === 'OK' && data.response && data.response.total) {
          return data.response; // { total, errors, ... }
        }
        log('Непредвиденный ответ init:', data);
        return null;
      })
      .catch(err => {
        console.error('[GIFT_AUTO] Ошибка fetchCart', err);
        return null;
      });
  }

  /* ---------- Добавление подарка ---------- */
  function addGift(productId, quantity) {
    if (!CSRF) return Promise.resolve();

    const body = new URLSearchParams();
    // ВНИМАНИЕ: adapter НЕ отправляем – у упаковки его тоже нет
    body.set('product[type]', 'product');
    body.set('product[quantity]', String(quantity || 1));
    body.set('product[id]', String(productId));

    log('addGift →', productId, 'qty=', quantity || 1);

    return fetch('/_widget/ajax_cart/appendProduct/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
        'X-Requested-With': 'XMLHttpRequest',
        'X-CSRF-Token': CSRF
      },
      body: body.toString()
    })
      .then(r => r.json())
      .then(data => {
        log('appendProduct ответ:', data);
        if (data && data.status === 'OK') {
          // Точно так же, как в скрипте упаковки:
          if (typeof AjaxCart !== 'undefined' && AjaxCart.getInstance) {
            setTimeout(() => {
              try {
                AjaxCart.getInstance().Cart.reload();
              } catch (e) {
                console.error('[GIFT_AUTO] Ошибка Cart.reload после addGift', e);
              }
            }, 300);
          }
        }
        return data;
      })
      .catch(err => {
        console.error('[GIFT_AUTO] Ошибка addGift', err);
      });
  }

  /* ---------- Удаление подарка ---------- */
  function removeGiftByHash(hash) {
    if (!CSRF || !hash) return Promise.resolve();

    const body = new URLSearchParams();
    body.set('hash', hash);
    body.set('marker', 'DEFAULT'); // как в скрипте упаковки

    log('removeGiftByHash →', hash);

    return fetch('/_widget/ajax_cart/removeProductByHash/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
        'X-Requested-With': 'XMLHttpRequest',
        'X-CSRF-Token': CSRF
      },
      body: body.toString()
    })
      .then(r => {
        // ответ тут обычно не важен, упаковка его не разбирает
        if (typeof AjaxCart !== 'undefined' && AjaxCart.getInstance) {
          setTimeout(() => {
            try {
              AjaxCart.getInstance().Cart.reload();
            } catch (e) {
              console.error('[GIFT_AUTO] Ошибка Cart.reload после removeGift', e);
            }
          }, 300);
        }
        return r;
      })
      .catch(err => {
        console.error('[GIFT_AUTO] Ошибка removeGiftByHash', err);
      });
  }

  /* ---------- Определяем, какой подарок должен быть при такой сумме ---------- */
  function getGiftRuleForTotal(totalSum) {
    if (!totalSum || !GIFT_RULES.length) return null;
    return GIFT_RULES.find(rule => {
      const min = rule.min ?? 0;
      const max = rule.max ?? Infinity;
      return totalSum >= min && totalSum < max;
    }) || null;
  }

  /* ---------- Основная синхронизация подарков ---------- */
  let syncing = false;

  function syncGifts() {
    if (syncing) {
      log('syncGifts уже идёт – пропускаю');
      return;
    }
    syncing = true;

    fetchCart().then(cart => {
      if (!cart || !cart.total) {
        syncing = false;
        return;
      }

      const totalBlock = cart.total.total || cart.total; // на всякий случай
      const totalSum = Number(totalBlock.sum || totalBlock.default || 0);

      const itemsObj = cart.total.items || {};
      const itemsArr = Object.values(itemsObj);

      // Все подарки, которые уже в корзине
      const giftItems = itemsArr.filter(it =>
        it && GIFT_IDS.includes(String(it.id))
      );

      // Обычные товары (не подарки), чтобы на всякий случай не считать только подарочные суммы
      const normalItems = itemsArr.filter(it =>
        !GIFT_IDS.includes(String(it.id))
      );

      log('totalSum=', totalSum, 'giftItems=', giftItems, 'normalItems=', normalItems);

      const rule = getGiftRuleForTotal(totalSum);
      const targetGiftId = rule ? String(rule.productId) : null;

      log('Подходящее правило:', rule);

      const ops = [];

      if (!targetGiftId) {
        // Подарок по сумме не положен — убираем все имеющиеся
        giftItems.forEach(g => {
          if (g.hash) {
            ops.push(removeGiftByHash(g.hash));
          }
        });
      } else {
        // Подарок должен быть ровно один – тот, что по правилу
        const correctGifts = giftItems.filter(g => String(g.id) === targetGiftId);
        const extraGifts = giftItems.filter(g => String(g.id) !== targetGiftId);

        // Лишние подарки удаляем
        extraGifts.forEach(g => {
          if (g.hash) {
            ops.push(removeGiftByHash(g.hash));
          }
        });

        // Если нужного подарка нет – добавляем
        if (correctGifts.length === 0) {
          ops.push(addGift(targetGiftId, 1));
        }
        // Если их несколько, оставляем один, остальные удаляем
        if (correctGifts.length > 1) {
          correctGifts.slice(1).forEach(g => {
            if (g.hash) ops.push(removeGiftByHash(g.hash));
          });
        }
      }

      Promise.all(ops).finally(() => {
        syncing = false;
      });
    });
  }

  /* ---------- Подписка на AjaxCart и мутации DOM ---------- */
  function initWatcher() {
    if (!CSRF) return;

    // Первый расчёт
    syncGifts();

    // 1) Подписываемся на события AjaxCart (как делает скрипт упаковки)
    if (typeof AjaxCart !== 'undefined' && AjaxCart.getInstance) {
      try {
        const cart = AjaxCart.getInstance();
        if (cart && cart.attachEventHandlers) {
          cart.attachEventHandlers({
            afterRender: () => setTimeout(syncGifts, 300),
            cart_product_add: () => setTimeout(syncGifts, 300),
            cart_product_remove: () => setTimeout(syncGifts, 300),
            onChange: () => setTimeout(syncGifts, 300)
          });
          log('Подписался на AjaxCart события');
        }
      } catch (e) {
        console.error('[GIFT_AUTO] Ошибка подписки на AjaxCart', e);
      }
    }

    // 2) Резервный MutationObserver – если что-то меняется в корзине без событий
    if (window.MutationObserver) {
      const observer = new MutationObserver(() => {
        setTimeout(syncGifts, 600);
      });
      observer.observe(document.body, { childList: true, subtree: true });
      log('MutationObserver для подарков запущен');
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initWatcher);
  } else {
    initWatcher();
  }
})();
</script>

<script>
(function () {
  // те же ID, что в GIFT_RULES в основном скрипте
const GIFT_IDS =
  (window.WC_GIFTS &&
   Array.isArray(window.WC_GIFTS.IDS) &&
   window.WC_GIFTS.IDS.length)
    ? window.WC_GIFTS.IDS.map(Number)
    : [];

  function markGiftItems() {
    const blocks = document.querySelectorAll('.cart-product, .order-product');
    if (!blocks.length) return;

    blocks.forEach(block => {
      const idAttr =
        block.dataset.productId ||
        block.getAttribute('data-product-id') ||
        (block.querySelector('[data-product-id]') && block.querySelector('[data-product-id]').dataset.productId);

      const idNum = idAttr ? Number(idAttr) : null;
      if (idNum && GIFT_IDS.includes(idNum)) {
        block.classList.add('gift-item');
      }
    });
  }

  function initMarking() {
    // первый проход
    markGiftItems();

    // подписка на AjaxCart, если есть
    try {
      if (window.AjaxCart && typeof AjaxCart.getInstance === 'function') {
        const inst = AjaxCart.getInstance();
        if (inst && typeof inst.attachEventHandlers === 'function') {
          inst.attachEventHandlers({
            afterRender: () => setTimeout(markGiftItems, 100),
            cart_product_add: () => setTimeout(markGiftItems, 100),
            cart_product_remove: () => setTimeout(markGiftItems, 100),
            onChange: () => setTimeout(markGiftItems, 100)
          });
        }
      }
    } catch (e) {
      console.error('[GIFT_MARK] Ошибка подписки на AjaxCart', e);
    }

    // MutationObserver — только если есть body и сам Observer
    if (window.MutationObserver && document.body) {
      const obs = new MutationObserver(() => {
        markGiftItems();
      });
      obs.observe(document.body, { childList: true, subtree: true });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMarking);
  } else {
    initMarking();
  }
})();

(function () {
  const DEBUG = false;
  const log = (...a) => { if (DEBUG) console.log('[GIFT_LOCK]', ...a); };

  /* ========= SOURCE OF TRUTH: config ========= */
  function getGiftIds() {
    const ids = window.WC_GIFTS?.IDS;
    if (!Array.isArray(ids)) return [];
    return ids.map(x => parseInt(x, 10)).filter(Number.isFinite);
  }

  function isGiftId(id) {

  }

    if (!href) return null;
    const m = href.match(/\/(\d+)\/?$/);
    return m ? parseInt(m[1], 10) : null;
  }

  function disableClick(el) {
    if (!el) return;
    el.style.pointerEvents = 'none';
    el.style.cursor = 'default';
    if (el.tagName === 'A') el.removeAttribute('href');
  }

  function lockQty(container) {
    if (!container) return;

    // plus/minus buttons (desktop + mobile)
    container.querySelectorAll('.j-decrease-p, .j-increase-p, .j-buy-button-counter-remove, .j-buy-button-counter-add')
      .forEach(btn => {
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.4';
        // если хочешь именно скрывать — раскомментируй:
        // btn.style.display = 'none';
      });

    // qty input
    container.querySelectorAll('.j-quantity-p, .j-buy-button-counter-input')
      .forEach(inp => {
        try {
          inp.value = 1;
          inp.readOnly = true;
          inp.setAttribute('min', '1');
          inp.setAttribute('max', '1');
          inp.setAttribute('data-min', '1');
          inp.setAttribute('data-max', '1');
        } catch (e) {}
      });
  }

  function lockRemove(container) {
    if (!container) return;
    container.querySelectorAll('.j-remove-p, .order-i-remove.j-remove-p')
      .forEach(btn => {
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.4';
        // если хочешь именно скрывать — раскомментируй:
        // btn.style.display = 'none';
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false });
      });
  }

  function lockLinksToSameProduct(container, pid) {
    if (!container || !pid) return;
    container.querySelectorAll('a[href]').forEach(a => {
      const id = getIdFromHref(a.getAttribute('href'));
      if (id === pid) disableClick(a);
    });
  }

  /* ========= 1) PRODUCT PAGE ========= */
  function lockOnProductPage() {
    const m = location.pathname.match(/(\d+)\/?$/);
    if (!m) return;

    const pid = parseInt(m[1], 10);
    if (!isGiftId(pid)) return;

    log('Product page gift lock', pid);

    // counter on product page
    const counter = document.querySelector('.j-buy-button-counter[data-id="' + pid + '"]') ||
                    document.querySelector('.j-buy-button-counter');
    if (counter) {
      lockQty(counter);
      // если нужно полностью скрыть счётчик — раскомментируй:
      // counter.style.display = 'none';
    }

    // buy button widget
    const btn = document.getElementById('j-buy-button-widget-' + pid);
    if (btn) {
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.6';
      btn.setAttribute('aria-disabled', 'true');
      btn.classList.add('is-disabled');
      // если нужно именно скрыть — раскомментируй:
      // btn.style.display = 'none';
    }
  }

  /* ========= 2) CART (desktop + mobile) ========= */
  function lockInCart() {
    // covers разные разметки (в т.ч. mobile)
    const rows = document.querySelectorAll(
      '.cart-section .cart-item, .cart__item.j-cart-product, .cart__item .cart-item'
    );
    if (!rows.length) return;

    rows.forEach(row => {
      const link = row.querySelector(
        '.cart-image a, .cart-title a, .cart-item__image a, .cart-item__title a, .cart-item__link'
      );
      if (!link) return;

      const pid = getIdFromHref(link.getAttribute('href'));
      if (!isGiftId(pid)) return;

      log('Cart gift lock', pid, row);

      lockLinksToSameProduct(row, pid);
      lockQty(row);
      lockRemove(row);
    });
  }

  /* ========= 3) CHECKOUT ========= */
  function lockInCheckout() {
    const items = document.querySelectorAll(
      '.order-i.j-cart-product, .j-cart-product.order-i, .j-cart-product'
    );
    if (!items.length) return;

    items.forEach(item => {
      const link = item.querySelector('.order-i-image a, .order-i-title a, a[href*="/checkout/"], a[href*="/podarunky/"], a[href*="/gifts/"]');
      if (!link) return;

      const pid = getIdFromHref(link.getAttribute('href'));
      if (!isGiftId(pid)) return;

      log('Checkout gift lock', pid, item);

      lockLinksToSameProduct(item, pid);
      lockQty(item);
      lockRemove(item);
    });
  }

  /* ========= RUNNER ========= */
  function runAll() {
    // если конфиг ещё не подгрузился — просто выходим, observer/таймер догонит
    if (!getGiftIds().length) return;

    lockOnProductPage();
    lockInCart();
    lockInCheckout();
  }

  // старт после загрузки DOM
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runAll);
  } else {
    runAll();
  }

  // ждём появления конфига (WC_GIFTS может прийти позже)
  let tries = 0;
  const waitConfig = setInterval(() => {
    if (getGiftIds().length || tries++ > 40) { // ~12 сек
      clearInterval(waitConfig);
      runAll();
    }
  }, 300);

  // Horoshop/Cartum часто перерисовывает DOM
  let raf = 0;
  const observer = new MutationObserver(() => {
    if (raf) return;
    raf = requestAnimationFrame(() => {
      raf = 0;
      runAll();
    });
  });

  observer.observe(document.body, { childList: true, subtree: true, attributes: false });

})();

(function () {
  const DEBUG = false;
  function log() { if (DEBUG) console.log('[GIFT_LOCK]', ...arguments); }

  // 🧩 ID товаров-подарков берём из общего конфига WC_GIFTS
  const GIFT_IDS = (window.WC_GIFTS && Array.isArray(window.WC_GIFTS.IDS) && window.WC_GIFTS.IDS.length)
    ? window.WC_GIFTS.IDS.map(Number)
    : [5125, 5126, 5136, 5137, 5138]; // запасной вариант

  /* ---------- ХЕЛПЕРЫ ---------- */

  // Достаём ID товара из href: "/test/5125/" → 5125
  function getIdFromHref(href) {
    if (!href) return null;
    const m = href.match(/\/(\d+)\/?$/);
    return m ? parseInt(m[1], 10) : null;
  }

  // Проверка: является ли ID подарком
  function isGiftId(id) {
    const n = Number(id);
    return !!n && GIFT_IDS.includes(n);
  }

  // Полностью глушим ссылку
  function disableLink(link) {
    if (!link) return;
    if (link.dataset.giftLockLink === '1') return;

    link.dataset.giftLockLink = '1';
    link.removeAttribute('href');
    link.style.pointerEvents = 'none';
    link.style.cursor = 'default';
    link.style.textDecoration = 'none';

    link.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
    }, { passive: false });
  }

  // Глушим все ссылки внутри элемента (и картинку, и название)
  function disableAllLinksWithin(root) {
    if (!root) return;
    const links = root.querySelectorAll('a');
    links.forEach(disableLink);
  }

  /* ---------- 1. СТРАНИЦА ТОВАРА ---------- */

  function lockOnProductPage() {
    const m = location.pathname.match(/(\d+)\/?$/);
    if (!m) return;
    const pid = parseInt(m[1], 10);
    if (!isGiftId(pid)) return;

    log('Product page lock (hide elements)', pid);

    // Скрываем счётчик количества
    const counter = document.querySelector('.j-buy-button-counter[data-id="' + pid + '"]');
    if (counter) {
      counter.style.display = 'none';
    }

    // Скрываем кнопку "В корзину" / "Купить"
    const btn = document.getElementById('j-buy-button-widget-' + pid);
    if (btn) {
      btn.style.display = 'none';
    }
  }

  /* ---------- 2. КОРЗИНА (десктоп + мобилка) ---------- */

  function lockInCart() {
    // десктоп: .cart-section .cart-item
    // мобилка: <li class="order-details__block j-cart-product">…</li>
    const rows = document.querySelectorAll(
      '.cart-section .cart-item, li.order-details__block.j-cart-product'
    );
    if (!rows.length) return;

    rows.forEach(row => {
      // пытаемся найти любую ссылку на товар внутри строки
      const anyLink = row.querySelector(
        '.cart-image a, .cart-title a, .cart-item__image a, .cart-item__title a'
      ) || row.querySelector('a[href*="/test/"], a[href*="/content/"], a[href*="/"]');
      if (!anyLink) return;

      const pid = getIdFromHref(anyLink.getAttribute('href'));
      if (!isGiftId(pid)) return;

      log('Cart lock', pid, row);

      // 🚫 Глушим все ссылки в строке подарка (и картинку, и название)
      disableAllLinksWithin(row);

      // Удаление
      const remove = row.querySelector('.j-remove-p');
      if (remove && !remove.dataset.giftLockRemove) {
        remove.dataset.giftLockRemove = '1';
        remove.style.pointerEvents = 'none';
        remove.style.opacity = '0.4';
        remove.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false });
      }

      // Плюс/минус
      const minus = row.querySelector('.j-decrease-p');
      const plus  = row.querySelector('.j-increase-p');
      if (minus) minus.style.pointerEvents = 'none';
      if (plus)  plus.style.pointerEvents  = 'none';

      // Поле количества
      const input = row.querySelector('.j-quantity-p');
      if (input) {
        input.value = 1;
        input.readOnly = true;
        input.setAttribute('data-min', '1');
        input.setAttribute('data-max', '1');
      }
    });
  }

  /* ---------- 3. CHECKOUT (десктоп) ---------- */

  function lockInCheckout() {
    const items = document.querySelectorAll('.order-i.j-cart-product');
    if (!items.length) return;

    items.forEach(item => {
      const anyLink = item.querySelector('.order-i-image a, .order-i-title a');
      if (!anyLink) return;

      const pid = getIdFromHref(anyLink.getAttribute('href'));
      if (!isGiftId(pid)) return;

      log('Checkout lock', pid, item);

      // 🚫 Глушим все ссылки в блоке подарка (и картинку, и название)
      disableAllLinksWithin(item);

      // Удаление
      const remove = item.querySelector('.order-i-remove.j-remove-p');
      if (remove && !remove.dataset.giftLockRemove) {
        remove.dataset.giftLockRemove = '1';
        remove.style.pointerEvents = 'none';
        remove.style.opacity = '0.4';
        remove.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
        }, { passive: false });
      }

      // Плюс/минус
      const minus = item.querySelector('.j-decrease-p');
      const plus  = item.querySelector('.j-increase-p');
      if (minus) minus.style.pointerEvents = 'none';
      if (plus)  plus.style.pointerEvents  = 'none';

      // Поле количества
      const input = item.querySelector('.j-quantity-p');
      if (input) {
        input.value = 1;
        input.readOnly = true;
        input.setAttribute('data-min', '1');
        input.setAttribute('data-max', '1');
      }
    });
  }

  /* ---------- ЗАПУСК + ПРОСЛУШКА ИЗМЕНЕНИЙ DOM ---------- */

  function runAll() {
    lockOnProductPage();
    lockInCart();
    lockInCheckout();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', runAll);
  } else {
    runAll();
  }

  const observer = new MutationObserver(function () {
    runAll();
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true,
    attributes: false
  });

})();

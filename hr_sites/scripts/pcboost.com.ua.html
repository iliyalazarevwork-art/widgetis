        <style>
.floating-buttons {
  position: fixed;
  bottom: 25px;
  right: 25px;
  display: flex;
  flex-direction: column; /* головна кнопка внизу */
  align-items: center;
  z-index: 9999;
}

/* Кнопки */
.floating-buttons a,
.floating-buttons button {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  margin-bottom: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
}

.floating-buttons img {
  object-fit: contain;
}

/* Telegram, Viber, Instagram — 100% */
.telegram img,
.viber img,
.instagram img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

/* Дзвінок і головна кнопка */
.call img,
#mainButton img {
  width: 55%;
  height: 55%;
}

/* Початково приховані */
.floating-buttons a {
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
  transition: all 0.3s ease;
}

/* При активності — з’являються вгору */
.floating-buttons.active a {
  opacity: 1;
  visibility: visible;
  transform: translateY(-10px);
}

/* Головна кнопка */
#mainButton {
  background-color: rgba(37, 211, 102, 0.7);
  transition: all 0.4s ease;
  position: relative;
}

#mainButton img.close-icon {
  display: none;
}

#mainButton.active img.phone-icon {
  display: none;
}

#mainButton.active img.close-icon {
  display: block;
  opacity: 0.7;
}

/* Кольори */
.instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
.telegram { background-color: #0088cc; }
.viber { background-color: #7360f2; }
.call { background-color: #25d366; }

.white-icon {
  filter: brightness(0) invert(1);
}
</style>

<div class="floating-buttons" id="floatBtns">

  <!-- Instagram (найвище) -->
  <a href="https://www.instagram.com/pcboost.com.ua/" class="instagram" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
  </a>

  <!-- Telegram -->
  <a href="https://t.me/PC_BOOST_manager" class="telegram" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" alt="Telegram">
  </a>

  <!-- Viber -->
  <a href="viber://chat?number=%2B380978639897" class="viber">
    <img src="https://cdn-icons-png.flaticon.com/512/3670/3670059.png" alt="Viber">
  </a>

  <!-- Дзвінок -->
  <a href="tel:+380978639897" class="call">
    <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" class="white-icon" alt="Call">
  </a>

  <!-- Головна кнопка (знизу) -->
  <button id="mainButton">
    <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" class="phone-icon white-icon" alt="Phone">
    <img src="https://cdn-icons-png.flaticon.com/512/463/463292.png" class="close-icon white-icon" alt="Close">
  </button>
</div>

<script>
const mainBtn = document.getElementById('mainButton');
const floatBtns = document.getElementById('floatBtns');

mainBtn.addEventListener('click', () => {
  mainBtn.classList.toggle('active');
  floatBtns.classList.toggle('active');
});
</script>

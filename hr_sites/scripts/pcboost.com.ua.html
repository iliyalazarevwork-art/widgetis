.floating-buttons {
  position: fixed;
  bottom: 25px;
  right: 25px;
  display: flex;
  flex-direction: column; /* головна кнопка внизу */
  align-items: center;
  z-index: 9999;
}

/* Кнопки */
.floating-buttons a,
.floating-buttons button {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  margin-bottom: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
}

.floating-buttons img {
  object-fit: contain;
}

/* Telegram, Viber, Instagram — 100% */
.telegram img,
.viber img,
.instagram img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

/* Дзвінок і головна кнопка */
.call img,
#mainButton img {
  width: 55%;
  height: 55%;
}

/* Початково приховані */
.floating-buttons a {
  opacity: 0;
  visibility: hidden;
  transform: translateY(20px);
  transition: all 0.3s ease;
}

/* При активності — з’являються вгору */
.floating-buttons.active a {
  opacity: 1;
  visibility: visible;
  transform: translateY(-10px);
}

/* Головна кнопка */
#mainButton {
  background-color: rgba(37, 211, 102, 0.7);
  transition: all 0.4s ease;
  position: relative;
}

#mainButton img.close-icon {
  display: none;
}

#mainButton.active img.phone-icon {
  display: none;
}

#mainButton.active img.close-icon {
  display: block;
  opacity: 0.7;
}

/* Кольори */
.instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
.telegram { background-color: #0088cc; }
.viber { background-color: #7360f2; }
.call { background-color: #25d366; }

.white-icon {
  filter: brightness(0) invert(1);
}
</style>

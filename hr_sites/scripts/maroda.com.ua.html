<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (window.innerWidth > 768) return;
    const productTitleEl = document.querySelector('h1');
    const productPriceEl = document.querySelector('.product-card__price');
    const footer = document.querySelector('footer');

    function getCurrentBuyButton() {
      return document.querySelector('.j-buy-button-add, .j-buy-button-remove');
    }

    let mainBuyBtn = getCurrentBuyButton();
    if (!productTitleEl || !productPriceEl || !mainBuyBtn) return;

    function getButtonText(btn) {
      const span = btn.querySelector('span');
      if (span && span.textContent.trim() !== '') {
        return span.textContent.trim();
      }
      return btn.textContent.trim();
    }

    const sticky = document.createElement('div');
    sticky.className = 'hs-sticky-buy';
    sticky.innerHTML = `
        <div class="hs-sticky-info">
            <div class="hs-sticky-title">${productTitleEl.textContent.trim()}</div>
            <div class="hs-sticky-price">${productPriceEl.textContent.trim()}</div>
        </div>
        <div class="hs-sticky-btn"></div>
    `;
    document.body.appendChild(sticky);
    const stickyBtn = sticky.querySelector('.hs-sticky-btn');

    function syncStickyButton() {
      mainBuyBtn = getCurrentBuyButton();
      if (!mainBuyBtn) return;
      stickyBtn.textContent = getButtonText(mainBuyBtn);

      if (mainBuyBtn.classList.contains('j-buy-button-remove')) {
        stickyBtn.classList.add('in-cart');
      } else {
        stickyBtn.classList.remove('in-cart');
      }
    }

    stickyBtn.addEventListener('click', function () {
      const btn = getCurrentBuyButton();
      if (btn) btn.click();
    });

    syncStickyButton();

    const btnContainer = mainBuyBtn.closest('form')
      || mainBuyBtn.closest('[class*="buy"]')
      || mainBuyBtn.parentElement;

    const observer = new MutationObserver(function () {
      syncStickyButton();
    });

    observer.observe(btnContainer, {
      subtree: true,
      childList: true,
      attributes: true,
      attributeFilter: ['class'],
      characterData: true
    });

    const firstScreenHeight = window.innerHeight;

    function toggleSticky() {
      const scrollY = window.scrollY;
      let hideByFooter = false;
      if (footer) {
        const footerTop = footer.getBoundingClientRect().top;
        hideByFooter = footerTop < window.innerHeight;
      }
      if (scrollY > firstScreenHeight * 0.7 && !hideByFooter) {
        sticky.classList.add('active');
      } else {
        sticky.classList.remove('active');
      }
    }

    window.addEventListener('scroll', toggleSticky);
  });
</script>


<script>
  $(function () {
    /* ========== НАЛАШТУВАННЯ ========== */
    var BANNER_TYPE = 'text';
    var BANNER_TEXT = 'LAMARSY тепер MARODA';
    var BANNER_IMAGE = '/path/to/your-banner.jpg';
    var BANNER_HIDE_HOURS = 24;
    /* ================================== */

    /* --- Перевірка localStorage --- */
    var closedAt = localStorage.getItem('top_banner_closed');

    if (closedAt) {
      var diff = Date.now() - parseInt(closedAt, 10);
      var hoursLeft = ((BANNER_HIDE_HOURS * 60 * 60 * 1000) - diff) / 1000 / 60 / 60;
      if (diff < BANNER_HIDE_HOURS * 60 * 60 * 1000) {
        return;
      }
    }

    /* --- Перевірка чи вже є банер --- */
    if ($('#top-banner').length) {
      return;
    }

    /* --- Вставка банера --- */
    var html = '';

    if (BANNER_TYPE === 'image') {
      html =
        '<div id="top-banner" class="banner--image">' +
        '<img class="banner__image" src="' + BANNER_IMAGE + '" alt="Banner">' +
        '<button class="banner__close" aria-label="Закрити">&times;</button>' +
        '</div>';
    } else {
      html =
        '<div id="top-banner" class="banner--text">' +
        '<span class="banner__text">' + BANNER_TEXT + '</span>' +
        '<button class="banner__close" aria-label="Закрити">&times;</button>' +
        '</div>';
    }

    $('body').prepend(html).addClass('has-top-banner');

    /* --- Закриття --- */
    $(document).on('click', '#top-banner .banner__close', function () {
      localStorage.setItem('top_banner_closed', Date.now().toString());
      $('#top-banner').slideUp(200, function () {
        $(this).remove();
        $('body').removeClass('has-top-banner');
      });
    });
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {

    // ============================================================
    // Налаштування банерів для категорій
    // category  — URL категорії (перевіряється як частина поточного шляху)
    // image     — шлях до зображення банера
    // link      — посилання для банера або null якщо посилання не потрібне
    // ============================================================
    const categoryBanners = [
      {
        category: '/komplekty/',
        image: '/content/uploads/images/category_baner1.jpg',
        link: '/oplata-i-dostavka/',
      },
      {
        category: '/kollektsiya/lunnytsia/',
        image: '/content/uploads/images/category_baner2.jpg',
        link: null,
      },
      {
        category: '/braslety/',
        image: '/content/uploads/images/category_baner3.jpg',
        link: null,
      },
      {
        category: '/serezhky/',
        image: '/content/uploads/images/category_baner4.jpg',
        link: '/aktsent-na-detaliakh.-yak-prykrasy-dopovniuiut-obraz/',
      },
    ];
    // ============================================================

    function getCurrentBannerConfig() {
      var path = window.location.pathname;
      for (var i = 0; i < categoryBanners.length; i++) {
        var categoryPath = categoryBanners[i].category;
        // якщо вказано повний URL — витягуємо тільки pathname
        try {
          if (categoryPath.indexOf('http') === 0) {
            categoryPath = new URL(categoryPath).pathname;
          }
        } catch (e) {}
        if (path.indexOf(categoryPath) !== -1) {
          return categoryBanners[i];
        }
      }
      return null;
    }

    function getCatalogConfig() {
      var desktopGrid = document.querySelector('.catalog ul.catalogGrid');
      if (desktopGrid) {
        return {
          grid: desktopGrid,
          itemSelector: 'li.catalog-grid__item',
          type: 'desktop'
        };
      }
      var mobileGrid = document.querySelector('.catalog ul.goods.goods--grid');
      if (mobileGrid) {
        return {
          grid: mobileGrid,
          itemSelector: 'li.goods__item',
          type: 'mobile'
        };
      }
      return null;
    }

    function getColumnsCount(type) {
      var w = window.innerWidth;
      if (type === 'desktop') {
        if (w >= 1440) return 4;
        if (w >= 1280) return 3;
        return 4;
      }
      if (type === 'mobile') {
        if (w >= 1200) return 5;
        if (w >= 900) return 4;
        if (w >= 600) return 3;
        return 2;
      }
      return 4;
    }

    function createBannerElement(itemClass, bannerConfig) {
      var inner = (bannerConfig.link && bannerConfig.link.trim() !== '')
        ? '<a href="' + bannerConfig.link + '" class="hs-cat-banner">' +
            '<img src="' + bannerConfig.image + '" alt="" loading="lazy">' +
          '</a>'
        : '<div class="hs-cat-banner">' +
            '<img src="' + bannerConfig.image + '" alt="" loading="lazy">' +
          '</div>';

      var li = document.createElement('li');
      li.className = itemClass + ' hs-cat-banner-item';
      li.innerHTML = inner;
      return li;
    }

    function insertBanners() {
      var bannerConfig = getCurrentBannerConfig();
      if (!bannerConfig) return;

      var config = getCatalogConfig();
      if (!config) return;

      var grid = config.grid;

      // Видаляємо попередньо вставлені банери
      grid.querySelectorAll('.hs-cat-banner-item').forEach(function (el) {
        el.remove();
      });

      var items = grid.querySelectorAll(config.itemSelector);
      var total = items.length;

      var cols = getColumnsCount(config.type);

      // Якщо всі картки поміщаються в один ряд — банер не вставляємо
      if (total <= cols) return;

      // Вставляємо банер після першої картки другого ряду
      // Перший елемент другого ряду має індекс cols (0-based)
      // Після нього — індекс cols + 1, але вставляємо insertBefore на cols+1
      var insertAfterIndex = cols; // перша картка другого ряду (0-based)

      // Перевіряємо що такий елемент існує
      if (insertAfterIndex >= total) return;

      var itemClass = config.itemSelector.replace('li.', '');
      var banner = createBannerElement(itemClass, bannerConfig);

      var refItem = items[insertAfterIndex];
      refItem.parentNode.insertBefore(banner, refItem.nextSibling);
    }

    function handlePageChange() {
      if (!document.querySelector('.catalog')) return;

      var attempts = 0;

      function tryInsert() {
        var config = getCatalogConfig();
        var items = config ? config.grid.querySelectorAll(config.itemSelector) : null;

        if (items && items.length > 0) {
          insertBanners();
        } else if (attempts < 10) {
          attempts++;
          setTimeout(tryInsert, 100);
        }
      }

      tryInsert();
    }

    handlePageChange();

    var pushState = history.pushState;
    history.pushState = function () {
      pushState.apply(history, arguments);
      handlePageChange();
    };

    var replaceState = history.replaceState;
    history.replaceState = function () {
      replaceState.apply(history, arguments);
      handlePageChange();
    };

    window.addEventListener('popstate', handlePageChange);

  });

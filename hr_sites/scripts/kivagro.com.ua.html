        <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Стили для модального окна */
    #popup {
      display: none; /* Скрыто по умолчанию */
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #ffffff;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      z-index: 9999;
      box-sizing: border-box;
      text-align: center;
    }

    #popup p {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    #popup button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    #popup button:hover {
      background-color: #0056b3;
    }

    /* Мобильные устройства (до 768px) */
    @media (max-width: 768px) {
      #popup {
        width: 90vw !important; /* Занимает почти весь экран */
        padding: 20px;
        border-radius: 12px;
      }

      #popup p {
        font-size: 14px;
      }

      #popup button {
        font-size: 15px;
        padding: 10px 16px;
      }
    }

    /* Очень маленькие экраны (например, смартфоны в портретной ориентации) */
    @media (max-width: 480px) {
      #popup p {
        font-size: 13px;
      }

      #popup button {
        font-size: 14px;
        padding: 8px 14px;
      }
    }
  </style>
</head>
<body>

  <!-- Модальное окно -->
  <div id="popup">
    <p>
      На жаль інтернет-магазин тимчасово не працює. Усі співробітники перебувають у лавах ЗСУ.
    </p>
    <button onclick="closePopup()">OK</button>
  </div>

  <script>
    function setPopupSize() {
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      // Базовые размеры при 1600x900
      const baseWidth = 1600;
      const baseHeight = 900;
      const popupBaseWidth = 500;
      const popupBaseHeight = 200;

      // Рассчитываем коэффициент масштабирования
      const scale = Math.min(screenWidth / baseWidth, screenHeight / baseHeight);

      const newWidth = popupBaseWidth * scale;
      const newHeight = popupBaseHeight * scale;

      const popup = document.getElementById('popup');

      // Для мобильных устройств медиа-запросы уже сработают, поэтому здесь только для десктопа
      if (screenWidth > 768) {
        popup.style.width = newWidth + 'px';
        popup.style.height = 'auto';
      } else {
        popup.style.width = 'auto'; // Отдадим контроль медиа-запросам
      }
    }

    function showPopup() {
      if (!sessionStorage.getItem('popupShown')) {
        setPopupSize();
        document.getElementById('popup').style.display = 'block';
        sessionStorage.setItem('popupShown', 'true');
      }
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }

    window.addEventListener('load', showPopup);
    window.addEventListener('resize', setPopupSize);
  </script>        <script src="https://apis.google.com/js/platform.js?onload=renderOptIn" async defer>
            </script>

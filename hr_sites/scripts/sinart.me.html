        <script>
document.addEventListener('DOMContentLoaded', function () {
  var threshold = 2000;
  var widgetClosed = false;
  var lastKnownTotal = 0;

  function formatUAH(n) {
    return Math.round(n).toLocaleString('uk-UA') + ' грн';
  }

  function parsePrice(text) {
    if (!text) return 0;
    var cleaned = String(text)
      .replace(/\u00A0/g, ' ')
      .replace(/\s+/g, '')
      .replace(/грн/gi, '')
      .replace(/,/g, '.')
      .replace(/[^\d.]/g, '');

    var value = parseFloat(cleaned);
    return isNaN(value) ? 0 : value;
  }

  function isElementVisible(el) {
    if (!el) return false;
    var style = window.getComputedStyle(el);
    if (style.display === 'none' || style.visibility === 'hidden') return false;
    return true;
  }

  function hasLineThrough(el) {
    if (!el || !window.getComputedStyle) return false;
    var style = window.getComputedStyle(el);
    var td = style.textDecoration || '';
    var tdl = style.textDecorationLine || '';
    return /line-through/i.test(td) || /line-through/i.test(tdl);
  }

  function isPriceOnlyText(text) {
    if (!text) return false;
    return /^\s*\d[\d\s.,]*\s*грн\s*$/i.test(text.trim());
  }

  function getCartCount() {
    var selectors = [
      '.header-icon__badge',
      '.cart-count',
      '.header-cart-count',
      '.basket-count',
      '.shopping-cart-count',
      '[data-cart-count]'
    ];

    for (var i = 0; i < selectors.length; i++) {
      var el = document.querySelector(selectors[i]);
      if (!el) continue;
      var raw = el.getAttribute('data-cart-count') || el.textContent || '';
      var count = parseInt(String(raw).replace(/[^\d]/g, ''), 10);
      if (!isNaN(count)) return count;
    }

    return 0;
  }

  function textContains(el, re) {
    if (!el) return false;
    return re.test(el.textContent || '');
  }

  function findCheckoutButtons() {
    var all = document.querySelectorAll('button, a, div, span');
    var result = [];

    for (var i = 0; i < all.length; i++) {
      var txt = (all[i].textContent || '').trim();
      if (/Оформити замовлення/i.test(txt)) {
        result.push(all[i]);
      }
    }

    return result;
  }

  function findCartContainerFromCheckout(btn) {
    if (!btn) return null;

    var node = btn;
    while (node && node !== document.body) {
      var txt = node.textContent || '';
      if (/Кошик/i.test(txt) || /Повернутись до покупок/i.test(txt) || /Продовжити покупки/i.test(txt)) {
        return node;
      }
      node = node.parentElement;
    }

    node = btn.closest('div, section, aside, form');
    return node || document.body;
  }

  function getRecommendationStart(container) {
    if (!container) return null;
    var all = container.querySelectorAll('*');

    for (var i = 0; i < all.length; i++) {
      var txt = (all[i].textContent || '').trim();
      if (/Рекомендуємо придбати/i.test(txt)) return all[i];
    }

    return null;
  }

  function isNodeBefore(a, b) {
    if (!a || !b || a === b) return false;
    var pos = a.compareDocumentPosition(b);
    return !!(pos & Node.DOCUMENT_POSITION_FOLLOWING);
  }

  function isInside(node, ancestor) {
    if (!node || !ancestor) return false;
    return ancestor === node || ancestor.contains(node);
  }

  function getExactTotalFromText(container) {
    if (!container) return null;

    var txt = container.textContent || '';
    var match = txt.match(/Всього[\s\S]{0,80}?(\d[\d\s.,]*)\s*грн/i);
    if (match) {
      var value = parsePrice(match[1]);
      if (value >= 0) return value;
    }

    return null;
  }

  function getLastPriceBeforeCheckout(container, checkoutBtn) {
    if (!container || !checkoutBtn) return null;

    var recommendationStart = getRecommendationStart(container);
    var all = container.querySelectorAll('*');
    var candidates = [];

    for (var i = 0; i < all.length; i++) {
      var el = all[i];
      var txt = (el.textContent || '').trim();

      if (!txt) continue;
      if (!isPriceOnlyText(txt)) continue;
      if (hasLineThrough(el)) continue;
      if (!isNodeBefore(el, checkoutBtn)) continue;
      if (recommendationStart && !isNodeBefore(el, recommendationStart)) continue;

      var value = parsePrice(txt);
      if (value < 0) continue;

      candidates.push({
        el: el,
        value: value
      });
    }

    if (!candidates.length) return null;

    return candidates[candidates.length - 1].value;
  }

  function getOpenCartTotal() {
    var buttons = findCheckoutButtons();

    if (!buttons.length) {
      var maybeEmptyCart = document.body.textContent || '';
      if (/Кошик/i.test(maybeEmptyCart) && /Немає товарів/i.test(maybeEmptyCart)) return 0;
      return null;
    }

    for (var i = 0; i < buttons.length; i++) {
      var btn = buttons[i];
      var container = findCartContainerFromCheckout(btn);
      if (!container) continue;

      var txt = container.textContent || '';

      if (/Немає товарів/i.test(txt)) return 0;

      var exactTotal = getExactTotalFromText(container);
      if (exactTotal !== null && exactTotal >= 0) return exactTotal;

      var lastPrice = getLastPriceBeforeCheckout(container, btn);
      if (lastPrice !== null && lastPrice >= 0) return lastPrice;
    }

    return null;
  }

  function getGeneralHiddenOrVisibleTotal() {
    var selectors = [
      '.cart-total',
      '.basket-total',
      '.shopping-cart__total',
      '.order-total',
      '.cart-summary__total',
      '.header-cart-total',
      '[data-cart-total]'
    ];

    for (var i = 0; i < selectors.length; i++) {
      var el = document.querySelector(selectors[i]);
      if (!el) continue;

      var raw = el.getAttribute('data-cart-total') || el.textContent || '';
      var val = parsePrice(raw);
      if (val > 0) return val;
    }

    return null;
  }

  function getReliableCartTotal() {
    var openCartTotal = getOpenCartTotal();
    if (openCartTotal !== null) {
      lastKnownTotal = openCartTotal;
      return openCartTotal;
    }

    var generalTotal = getGeneralHiddenOrVisibleTotal();
    if (generalTotal !== null) {
      lastKnownTotal = generalTotal;
      return generalTotal;
    }

    var count = getCartCount();

    if (count === 0) {
      lastKnownTotal = 0;
      return 0;
    }

    return lastKnownTotal;
  }

  function ensureStyle() {
    if (document.getElementById('sinart-fs-mini-style')) return;

    var style = document.createElement('style');
    style.id = 'sinart-fs-mini-style';
    style.innerHTML = `
      .sinart-fs-mini-wrap{
        position: fixed;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 50px;
        height: 126px;
        z-index: 999999;
        font-family: Arial, sans-serif;
      }

      .sinart-fs-mini-panel{
        position: absolute;
        top: 0;
        right: 0;
        width: 310px;
        min-height: 126px;
        display: flex;
        background: #fff;
        border: 1px solid #e8e8e8;
        box-shadow: 0 10px 24px rgba(0,0,0,.08);
        transform: translateX(262px);
        transition: transform .26s ease, box-shadow .26s ease;
      }

      .sinart-fs-mini-wrap.is-open .sinart-fs-mini-panel{
        transform: translateX(0);
        box-shadow: 0 14px 32px rgba(0,0,0,.12);
      }

      .sinart-fs-mini-tab{
        width: 48px;
        min-width: 48px;
        background: #111;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-size: 11px;
        letter-spacing: .14em;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
        user-select: none;
      }

      .sinart-fs-mini-body{
        flex: 1;
        padding: 16px 16px 14px;
        position: relative;
        box-sizing: border-box;
        background: #fff;
      }

      .sinart-fs-mini-close{
        position: absolute;
        top: 8px;
        right: 10px;
        border: none;
        background: transparent;
        color: #111;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
      }

      .sinart-fs-mini-title{
        font-size: 13px;
        line-height: 1.2;
        color: #111;
        font-weight: 600;
        margin-bottom: 12px;
        padding-right: 18px;
      }

      .sinart-fs-mini-progress{
        width: 100%;
        height: 6px;
        background: #efefef;
        border-radius: 999px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .sinart-fs-mini-fill{
        height: 100%;
        width: 0%;
        background: #111;
        border-radius: 999px;
        transition: width .35s ease;
      }

      .sinart-fs-mini-row{
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
      }

      .sinart-fs-mini-left{
        color: #111;
        line-height: 1;
      }

      .sinart-fs-mini-left strong{
        display: block;
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .sinart-fs-mini-left span{
        display: block;
        font-size: 11px;
        color: #666;
        line-height: 1.2;
      }

      .sinart-fs-mini-right{
        text-align: right;
        font-size: 11px;
        line-height: 1.2;
        color: #111;
        font-weight: 600;
        white-space: nowrap;
      }

      @media (max-width: 768px){
        .sinart-fs-mini-wrap{
          width: 270px;
          height: 112px;
        }

        .sinart-fs-mini-panel{
          width: 270px;
          min-height: 112px;
          transform: translateX(228px);
        }

        .sinart-fs-mini-tab{
          width: 42px;
          min-width: 42px;
          font-size: 10px;
        }

        .sinart-fs-mini-body{
          padding: 14px 14px 12px;
        }

        .sinart-fs-mini-title{
          font-size: 12px;
          margin-bottom: 10px;
        }

        .sinart-fs-mini-left strong{
          font-size: 18px;
        }

        .sinart-fs-mini-left span,
        .sinart-fs-mini-right{
          font-size: 10px;
        }
      }
    `;
    document.head.appendChild(style);
  }

  function createWidget() {
    if (document.querySelector('.sinart-fs-mini-wrap')) return;

    ensureStyle();

    var wrap = document.createElement('div');
    wrap.className = 'sinart-fs-mini-wrap';
    wrap.innerHTML = `
      <div class="sinart-fs-mini-panel">
        <div class="sinart-fs-mini-tab">Доставка</div>
        <div class="sinart-fs-mini-body">
          <button class="sinart-fs-mini-close" aria-label="Закрити">×</button>
          <div class="sinart-fs-mini-title">До безкоштовної доставки залишилося</div>
          <div class="sinart-fs-mini-progress">
            <div class="sinart-fs-mini-fill"></div>
          </div>
          <div class="sinart-fs-mini-row">
            <div class="sinart-fs-mini-left">
              <strong>0 грн</strong>
              <span>ще додати</span>
            </div>
            <div class="sinart-fs-mini-right">
              Free shipping<br>від 2 000 грн
            </div>
          </div>
        </div>
      </div>
    `;

    document.body.appendChild(wrap);

    wrap.addEventListener('mouseenter', function() {
      if (!widgetClosed) wrap.classList.add('is-open');
    });

    wrap.addEventListener('mouseleave', function() {
      wrap.classList.remove('is-open');
    });

    var closeBtn = wrap.querySelector('.sinart-fs-mini-close');
    closeBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      widgetClosed = true;
      wrap.remove();
    });
  }

  function updateWidget() {
    if (widgetClosed) return;

    createWidget();

    var wrap = document.querySelector('.sinart-fs-mini-wrap');
    if (!wrap) return;

    var title = wrap.querySelector('.sinart-fs-mini-title');
    var fill = wrap.querySelector('.sinart-fs-mini-fill');
    var leftStrong = wrap.querySelector('.sinart-fs-mini-left strong');
    var leftSpan = wrap.querySelector('.sinart-fs-mini-left span');
    var right = wrap.querySelector('.sinart-fs-mini-right');

    var cartTotal = getReliableCartTotal();
    var remaining = Math.max(threshold - cartTotal, 0);
    var percent = Math.max(0, Math.min((cartTotal / threshold) * 100, 100));

    if (cartTotal >= threshold) {
      title.textContent = 'У вас безкоштовна доставка';
      leftStrong.textContent = '0 грн';
      leftSpan.textContent = 'поріг досягнуто';
    } else {
      title.textContent = 'До безкоштовної доставки залишилося';
      leftStrong.textContent = formatUAH(remaining);
      leftSpan.textContent = 'ще додати';
    }

    fill.style.width = percent + '%';
    right.innerHTML = 'Free shipping<br>від ' + formatUAH(threshold);
  }

  function scheduleUpdate() {
    clearTimeout(scheduleUpdate._t);
    scheduleUpdate._t = setTimeout(updateWidget, 220);
  }

  createWidget();
  updateWidget();

  var observer = new MutationObserver(function() {
    scheduleUpdate();
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true,
    characterData: true
  });

  setInterval(scheduleUpdate, 1200);

  document.addEventListener('click', function() {
    setTimeout(scheduleUpdate, 150);
    setTimeout(scheduleUpdate, 500);
    setTimeout(scheduleUpdate, 1000);
  });

  if (window.fetch) {
    var originalFetch = window.fetch;
    window.fetch = function() {
      return originalFetch.apply(this, arguments).then(function(response) {
        setTimeout(scheduleUpdate, 150);
        setTimeout(scheduleUpdate, 500);
        setTimeout(scheduleUpdate, 1000);
        return response;
      });
    };
  }

  if (window.XMLHttpRequest) {
    var originalOpen = XMLHttpRequest.prototype.open;
    var originalSend = XMLHttpRequest.prototype.send;

    XMLHttpRequest.prototype.open = function() {
      this._sinartTracked = true;
      return originalOpen.apply(this, arguments);
    };

    XMLHttpRequest.prototype.send = function() {
      if (this._sinartTracked) {
        this.addEventListener('loadend', function() {
          setTimeout(scheduleUpdate, 150);
          setTimeout(scheduleUpdate, 500);
          setTimeout(scheduleUpdate, 1000);
        });
      }
      return originalSend.apply(this, arguments);
    };
  }
});
</script>

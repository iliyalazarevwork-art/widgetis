<script>
(function() {
  var AW_ID = 'AW-11348773766';
  var LABEL_PURCHASE      = 'REPLACE_WITH_PURCHASE_LABEL';
  var LABEL_ADD_TO_CART   = 'REPLACE_WITH_ADD_TO_CART_LABEL';
  var LABEL_BEGIN_CHECKOUT= 'REPLACE_WITH_BEGIN_CHECKOUT_LABEL';

  function num(x){ x = (typeof x==='string') ? x.replace(',', '.') : x; return +x || 0; }

  function forward(evt){
    if(!evt || !evt.event || !evt.ecommerce) return;
    var ec = evt.ecommerce || {};
    var currency = ec.currency || 'UAH';
    var items = ec.items || ec.products || [];
    var value =
      (ec.value != null ? num(ec.value) :
      (ec.purchase && ec.purchase.value != null ? num(ec.purchase.value) :
      (ec.purchase && ec.purchase.actionField && ec.purchase.actionField.revenue ? num(ec.purchase.actionField.revenue) : 0)));

    if(evt.event === 'purchase'){
      var tx = ec.transaction_id || ec.transactionId || (ec.purchase && ec.purchase.transaction_id) || '';
      gtag('event','purchase', {
        send_to: AW_ID + '/' + LABEL_PURCHASE,
        value: value,
        currency: currency,
        transaction_id: tx,
        items: items
      });
    }

    if(evt.event === 'add_to_cart'){
      var v = (ec.value != null) ? num(ec.value) : 0;
      gtag('event','add_to_cart', {
        send_to: AW_ID + '/' + LABEL_ADD_TO_CART,
        value: v,
        currency: currency,
        items: items
      });
    }

    if(evt.event === 'begin_checkout'){
      var v2 = (ec.value != null) ? num(ec.value) : 0;
      gtag('event','begin_checkout', {
        send_to: AW_ID + '/' + LABEL_BEGIN_CHECKOUT,
        value: v2,
        currency: currency,
        items: items
      });
    }
  }

  // прогнати вже надіслані події
  (window.dataLayer || []).forEach(forward);
  // підписатись на майбутні події GA4
  var origPush = window.dataLayer.push;
  window.dataLayer.push = function(){
    var r = origPush.apply(this, arguments);
    try { forward(arguments[0]); } catch(e){}
    return r;
  };
})();

        <script>document.addEventListener("DOMContentLoaded", function () {
    const modalInterval = setInterval(function() {
        const group = document.querySelectorAll(".j-product-right-column .product__column-item .product__group .j-product-block");
        const card__body = document.querySelector(".product-card__body");
        const openModalBtn = document.querySelector(".open-calc-btn");
        const messageText = document.createElement("div");
        messageText.innerHTML = '<div class="modification"><div class="modification__head"><div class="modification__title">1 одиния товара = 50см</div></div></div>';

        console.log(group);
        if (group || card__body && !openModalBtn) {
            clearInterval(modalInterval);
            const items = group ? group : [];
            if (items.length > 0 || card__body) {
                // Создание кнопки для открытия модального окна
                const openCalcButton = document.createElement("button");
                openCalcButton.textContent = "Відкрити калькулятор";
                openCalcButton.classList.add("open-calc-btn");

                // Вставка кнопки перед последним дочерним элементом 
                if(items.length > 0) {
                    const lastItem = items[items.length - 2]; 
                    lastItem.prepend(openCalcButton);
                    // lastItem.appendChild(messageText);
                } else {
                    card__body.prepend(openCalcButton);
                    // card__body.prepend(messageText);
                }

                // Создание модального окна
                const calculatorContainer = document.createElement("div");
                calculatorContainer.classList.add("modal-calc");
                calculatorContainer.innerHTML = `
                       <div class="modal-calc-wrapper">
                        <div class="close-modal" id="close-modal">Закрити</div>
                        <h2>Розрахунок розмірів</h2>
                        <label for="width">Ширина карнизу, метри</label>
                        <input type="number" id="width" value="3" min="1" step="1" max="2000" />
                        <label for="width">Висота карнизу, метри</label>
                        <input type="number" id="height" value="2.45" min="1" step="1" max="20" />
                        <div class="result" id="result">
                            <strong>Штори:</strong><br>
                            <span>Мінімальна збірка:</span> <b>4.5</b> м<br>
                            <span>Середня збірка:</span> <b>6</b> м<br>
                            <span>Лише для декору:</span> <b>3</b> м<br><br>
                            <strong>Тюль:</strong><br>
                            <span>Мінімальна збірка:</span> <b>6</b> м<br>
                            <span>Середня збірка:</span> <b>7.5</b> м<br>
                            <span>Густа збірка:</span> <b>9</b> м<br>
                        </div>
                        <button id="calculate">Порахувати</button>
                    </div>
                `;

                // Вставка модального окна перед </body>
                document.body.appendChild(calculatorContainer);

                // Логика модального окна
                const widthInput = calculatorContainer.querySelector("#width");
                const resultDiv = calculatorContainer.querySelector("#result");
                const calculateButton = calculatorContainer.querySelector("#calculate");
                const closeModalButton = calculatorContainer.querySelector("#close-modal");

                // Открытие модального окна
                openCalcButton.addEventListener("click", function () {
                    calculatorContainer.classList.add("active");
                });

                // Закрытие модального окна
                closeModalButton.addEventListener("click", function () {
                    calculatorContainer.classList.remove("active");
                });

                // Логика калькулятора
                function calculate() {
                    const width = parseFloat(widthInput.value) || 0;
                    const curtains = {
                        light: width * 1.5,
                        medium: width * 2,
                        dense: width * 1
                    };
                    const tulle = {
                        light: width * 2,
                        medium: width * 2.5,
                        dense: width * 3
                    };

                    resultDiv.innerHTML = `
                        <strong>Штори:</strong><br>
                        <span>Мінімальна збірка:</span> <b>2шт. по ${curtains.light.toFixed(2) / 2 }</b> м кожна<br>
                        <span>Середня збірка:</span> <b>2шт. по ${curtains.medium.toFixed(2) / 2 }</b> м кожна<br>
                        <span>Лише для декору:</span> <b>2шт. по ${curtains.dense.toFixed(2) / 2 }</b> м кожна<br><br>
                        <strong>Тюль:</strong><br>
                        <span>Мінімальна збірка:</span> <b>${tulle.light.toFixed(2)}</b> м<br>
                        <span>Середня збірка:</span> <b>${tulle.medium.toFixed(2)}</b> м<br>
                        <span>Густа збірка:</span> <b>${tulle.dense.toFixed(2)}</b> м<br>
                    `;
                }

                // События
                calculateButton.addEventListener("click", calculate);
                widthInput.addEventListener("input", calculate);

                // Первоначальный расчет
                calculate();
            }
        }
    }, 300);
});

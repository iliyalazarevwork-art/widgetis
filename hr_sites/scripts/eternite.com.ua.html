        <!-- Плаваюча кнопка Індивідуальне замовлення (з урахуванням мови) -->
<a href="https://eternite.com.ua/indyvidualni-zamovlennia/" 
   class="float-individual-btn" 
   target="_blank">
   <span id="btn-text">🛠 Індивідуальне замовлення</span>
</a>

<style>
.float-individual-btn {
  position: fixed;
  bottom: 30px;
  right: 25px;
  background: #1a1a1a;
  color: #ffffff;
  padding: 18px 26px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 700;
  font-size: 16px;
  box-shadow: 0 6px 25px rgba(0, 0, 0, 0.5);
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.3s ease;
  animation: strong-pulse 1.6s infinite;
  white-space: nowrap;
  border: 1px solid rgba(255,255,255,0.12);
}

.float-individual-btn:hover {
  transform: translateY(-5px) scale(1.08);
  box-shadow: 0 12px 35px rgba(0, 0, 0, 0.6);
  background: #252525;
  animation: none;
}

@keyframes strong-pulse {
  0%   { transform: scale(1); box-shadow: 0 6px 25px rgba(0, 0, 0, 0.5); }
  50%  { transform: scale(1.12); box-shadow: 0 12px 40px rgba(255, 255, 255, 0.25); }
  100% { transform: scale(1); box-shadow: 0 6px 25px rgba(0, 0, 0, 0.5); }
}

@media (max-width: 768px) {
  .float-individual-btn {
    bottom: 20px;
    right: 15px;
    padding: 15px 22px;
    font-size: 15px;
  }
}
</style>

<script>
// Автоматична зміна тексту кнопки залежно від мови сайту
document.addEventListener('DOMContentLoaded', function() {
    const btnText = document.getElementById('btn-text');
    
    // Перевіряємо поточну мову (Хорошоп зазвичай додає class або data-атрибут, або змінює URL)
    const currentLang = document.documentElement.lang || 
                       (document.querySelector('html') ? document.querySelector('html').getAttribute('lang') : '') ||
                       window.location.pathname;

    if (currentLang.includes('ru') || currentLang === 'ru' || document.body.classList.contains('lang-ru')) {
        btnText.innerHTML = '🛠 Индивидуальный заказ';
    } else {
        // За замовчуванням — українська
        btnText.innerHTML = '🛠 Індивідуальне замовлення';
    }
});
</script>

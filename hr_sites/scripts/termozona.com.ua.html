<style>
  #custom-chat-notice {
    position: fixed;
    right: 24px;
    bottom: 95px;
    max-width: 260px;
    background: #ffffff;
    color: #1f2933;
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    font-family: Arial, sans-serif;
    font-size: 14px;
    line-height: 1.4;
    z-index: 999999;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  #custom-chat-notice.show {
    opacity: 1;
    transform: translateY(0);
  }

  #custom-chat-notice strong {
    display: block;
    margin-bottom: 4px;
    font-size: 15px;
  }

  #custom-chat-notice .close-chat-notice {
    position: absolute;
    top: 6px;
    right: 10px;
    border: none;
    background: transparent;
    font-size: 18px;
    cursor: pointer;
    color: #777;
  }

  @media (max-width: 600px) {
    #custom-chat-notice {

      max-width: 230px;

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (sessionStorage.getItem('customChatNoticeShown')) return;

  setTimeout(function () {
    var notice = document.createElement('div');
    notice.id = 'custom-chat-notice';
    notice.innerHTML = `
      <button class="close-chat-notice" type="button">×</button>
      <strong>Потрібна допомога?</strong>
      Якщо маєте питання — пишіть нам у чат 💬
    `;

    document.body.appendChild(notice);

    setTimeout(function () {
      notice.classList.add('show');
    }, 100);

    sessionStorage.setItem('customChatNoticeShown', '1');

    notice.querySelector('.close-chat-notice').addEventListener('click', function (e) {
      e.stopPropagation();
      notice.remove();
    });

    setTimeout(function () {
      notice.classList.remove('show');
      setTimeout(function () {
        notice.remove();
      }, 300);
    }, 10000);
  }, 2000);
});
</script>

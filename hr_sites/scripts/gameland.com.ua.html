<script>
(function () {

function onReady(fn) {
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", fn);
  } else {
    fn();
  }
}

// URL без UTM и трекинга
function getCleanUrl() {
  try {
    let u = new URL(location.href.split("#")[0]);
    ["utm_source","utm_medium","utm_campaign","utm_term","utm_content","gclid","fbclid"]
      .forEach(p => u.searchParams.delete(p));
    return u.toString();
  } catch(e) { 
    return location.href; 
  }
}

// Язык по URL
function getLang() {
  return location.pathname.includes("/ru/") ? "ru" : "ua";
}

// Стили для блока
function injectStyles() {
  if (document.getElementById("ai-sharing-style")) return;

  const css = `
  .ai-share-wrapper {
    margin: 40px 0;
    padding: 10px 16px;
    text-align: left;
  }

  .ai-share-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 22px;
    color: #333;
  }

  .ai-share-row {
    display: flex;
    gap: 14px;
    flex-wrap: nowrap;
  }

  .ai-share-btn {
    padding: 12px 28px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    background: #f4f4f4 !important;
    color: #555 !important;
    text-decoration: none;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: .2s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }

  .ai-share-btn:hover {
    background: #e9e9e9 !important;
    color: #333 !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(0,0,0,0.18);
  }

  @media(max-width:700px){
    .ai-share-row{
      overflow-x:auto;
      padding-bottom:4px;
      -webkit-overflow-scrolling: touch;
    }
    .ai-share-btn{
      flex: 0 0 auto;
    }
  }
  `;

  const style = document.createElement("style");
  style.id = "ai-sharing-style";
  style.textContent = css;
  document.head.appendChild(style);
}

// Генерация ссылок под язык
function buildLinks(lang) {
  const url = getCleanUrl();

  const ru = {
    chatgpt: "Сделай подробный анализ этого товара: плюсы и ключевые характеристики - на основе страницы:+",
    perplexity: "Проанализируй товар на этой странице, выдели плюсы и ключевые особенности:+",
    google: "Кратко опиши основные плюсы товара и его ключевые особенности:+",
    grok: "Проанализируй товар на этой странице и перечисли его преимущества и недостатки:+"
  };

  const ua = {
    chatgpt: "Зроби детальний аналіз цього товару: плюси і ключові характеристики - на основі сторінки:+",
    perplexity: "Проаналізуй товар на цій сторінці, виділи плюси та ключові особливості:+",
    google: "Коротко опиши основні плюси і його ключові особливості:+",
    grok: "Проаналізуй товар на цій сторінці та переліч його переваги:+"
  };

  const d = lang === "ru" ? ru : ua;

  return [
    { id:"chatgpt", label:"ChatGPT", href:"https://chatgpt.com/?q=" + encodeURIComponent(d.chatgpt + url) },
    { id:"google", label:"Google AI", href:"https://www.google.com/search?udm=50&aep=11&q=" + encodeURIComponent(d.google + url) },
    { id:"perplexity", label:"Perplexity", href:"https://www.perplexity.ai/search/new?q=" + encodeURIComponent(d.perplexity + url) },
    { id:"grok", label:"Grok", href:"https://grok.com/?q=" + encodeURIComponent(d.grok + url) }
  ];
}

// Вставка перед футером
function insertBeforeFooter() {
  injectStyles();

  const lang = getLang();
  const links = buildLinks(lang);

  const wrap = document.createElement("div");
  wrap.className = "ai-share-wrapper";

  const title = document.createElement("div");
  title.className = "ai-share-title";
  title.textContent = lang === "ru" ? "Поделиться в:" : "Поширити в:";
  wrap.appendChild(title);

  const row = document.createElement("div");
  row.className = "ai-share-row";

  links.forEach(item => {
    const a = document.createElement("a");
    a.className = "ai-share-btn ai-" + item.id;
    a.href = item.href;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.textContent = item.label;
    row.appendChild(a);
  });

  wrap.appendChild(row);

  const footer =
    document.querySelector("footer") ||
    document.querySelector(".footer") ||
    document.querySelector("footer.footer-wrapper");

  if (footer && footer.parentNode) {
    footer.parentNode.insertBefore(wrap, footer);
  } else {
    document.body.appendChild(wrap);
  }
}

onReady(() => {
  // БЕЗ проверки isProductPage — выполняем везде
  insertBeforeFooter();
});

})();
</script>

<script id="askchatgpt-script-js-after">
(function () {
  "use strict";

  // ====== CONFIG ======
  var CFG = {
    minSelectionLength: 8,
    maxSelectionLength: 1200,
    hideDelayMs: 120,
    openUrlBase: "https://chatgpt.com/?q=",
    zIndex: 999999,
    iconSrc: "/content/uploads/images/logo_gpt.jpg"
  };

  var I18N = {
    uk: {
      button: "Запитати в ChatGPT",
      promptPrefix: 'Поясни детальніше, зроби аналіз і дай додаткові інсайти щодо цього фрагменту: "',
      promptSuffix: '". Цей текст узято зі сторінки: '
    },
    ru: {
      button: "Спросить у ChatGPT",
      promptPrefix: 'Объясни подробнее, сделай анализ и дай дополнительные инсайты по этому фрагменту: "',
      promptSuffix: '". Этот текст взят со страницы: '
    },
    en: {
      button: "Ask ChatGPT",
      promptPrefix: 'Explain in detail, analyze, and add extra insights about this fragment: "',
      promptSuffix: '". This text is taken from the page: '
    }
  };

  // ====== ВИЗНАЧАЄМО: це сторінка блогу? ======
  function isBlogPage() {
    var meta = document.querySelector('meta[property="article:section"]');
    if (!meta) return false;

    var val = (meta.getAttribute("content") || "").toLowerCase().trim();
    // якщо в майбутньому зміниться назва секції, тут легко підправити
    return val === "блог и новости" || val.indexOf("блог") !== -1;
  }

  // ====== HELPERS ======
  function getPageUrl() {
    try { return window.location.href; } catch (e) { return ""; }
  }

  function detectLang() {
    var htmlLang = (document.documentElement.getAttribute("lang") || "").toLowerCase().trim();
    if (htmlLang) {
      if (htmlLang.indexOf("uk") === 0) return "uk";
      if (htmlLang.indexOf("ru") === 0) return "ru";
      if (htmlLang.indexOf("en") === 0) return "en";
    }

    var alt = document.querySelector('link[rel="alternate"][hreflang]');
    if (alt) {
      var hl = (alt.getAttribute("hreflang") || "").toLowerCase();
      if (hl === "uk" || hl === "uk-ua") return "uk";
      if (hl === "ru" || hl === "ru-ru") return "ru";
      if (hl === "en" || hl === "en-us" || hl === "en-gb") return "en";
    }

    var path = (window.location.pathname || "").toLowerCase();
    if (path.indexOf("/uk") !== -1) return "uk";
    if (path.indexOf("/ru") !== -1) return "ru";

    return "en";
  }

  function getStrings(lang) {
    return I18N[lang] || I18N.en;
  }

  function normalizeText(s) {
    return (s || "")
      .replace(/\s+/g, " ")
      .replace(/\u00A0/g, " ")
      .trim();
  }

  function buildPrompt(lang, selectedText) {
    var t = getStrings(lang);
    var pageUrl = getPageUrl();
    return t.promptPrefix + selectedText + t.promptSuffix + pageUrl + ".";
  }

  // ====== UI ======
  var bubble = null;
  var hideTimer = null;

  function ensureBubble() {
    if (bubble) return bubble;

    bubble = document.createElement("button");
    bubble.type = "button";
    bubble.className = "askchatgpt-bubble";
    bubble.setAttribute("aria-label", "Ask ChatGPT");
    bubble.style.position = "absolute";
    bubble.style.display = "none";
    bubble.style.padding = "8px 12px";
    bubble.style.borderRadius = "999px";
    bubble.style.border = "1px solid rgba(0,0,0,.15)";
    bubble.style.background = "#111";
    bubble.style.color = "#fff";
    bubble.style.fontSize = "14px";
    bubble.style.lineHeight = "1";
    bubble.style.cursor = "pointer";
    bubble.style.boxShadow = "0 10px 25px rgba(0,0,0,.18)";
    bubble.style.zIndex = String(CFG.zIndex);
    bubble.style.userSelect = "none";
    bubble.style.webkitUserSelect = "none";
    bubble.style.whiteSpace = "nowrap";
    bubble.style.display = "none";
    bubble.style.alignItems = "center";
    bubble.style.gap = "8px";

    var icon = document.createElement("img");
    icon.className = "askchatgpt-icon";
    icon.src = CFG.iconSrc;
    icon.alt = "ChatGPT";
    icon.style.width = "18px";
    icon.style.height = "18px";
    icon.style.borderRadius = "50%";
    icon.style.flexShrink = "0";

    var label = document.createElement("span");
    label.className = "askchatgpt-label";
    label.style.display = "inline-block";
    label.style.transform = "translateY(0.5px)";

    bubble.appendChild(icon);
    bubble.appendChild(label);

    bubble.addEventListener("mousedown", function (e) {
      e.preventDefault();
      e.stopPropagation();
    });

    bubble.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();

      var lang = detectLang();
      var selection = window.getSelection();
      var text = normalizeText(selection ? selection.toString() : "");

      if (!text) {
        hideBubble();
        return;
      }

      if (text.length > CFG.maxSelectionLength) {
        text = text.slice(0, CFG.maxSelectionLength) + "…";
      }

      var prompt = buildPrompt(lang, text);
      var url = CFG.openUrlBase + encodeURIComponent(prompt);

      window.open(url, "_blank", "noopener,noreferrer");
      hideBubble();
    });

    document.body.appendChild(bubble);
    return bubble;
  }

  function setBubbleText() {
    var lang = detectLang();
    var t = getStrings(lang);
    var label = bubble.querySelector(".askchatgpt-label");
    if (label) label.textContent = t.button;
  }

  function showBubbleAtRect(rect) {
    ensureBubble();
    setBubbleText();

    bubble.style.display = "flex";

    var top = rect.bottom + window.scrollY + 8;
    var left = rect.left + window.scrollX;

    bubble.style.top = top + "px";
    bubble.style.left = left + "px";

    var b = bubble.getBoundingClientRect();
    var maxLeft = window.scrollX + document.documentElement.clientWidth - b.width - 10;
    if (left > maxLeft) bubble.style.left = Math.max(window.scrollX + 10, maxLeft) + "px";

    var maxTop = window.scrollY + document.documentElement.clientHeight - b.height - 10;
    if (top > maxTop) {
      bubble.style.top = Math.max(
        window.scrollY + 10,
        rect.top + window.scrollY - b.height - 8
      ) + "px";
    }
  }

  function hideBubble() {
    if (!bubble) return;
    bubble.style.display = "none";
  }

  function scheduleHide() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(hideBubble, CFG.hideDelayMs);
  }

  function getSelectionRect() {
    var sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return null;

    var range = sel.getRangeAt(0);
    if (!range || range.collapsed) return null;

    var rect = range.getBoundingClientRect();
    if (!rect || (rect.width === 0 && rect.height === 0)) {
      var rects = range.getClientRects();
      if (rects && rects.length) rect = rects[rects.length - 1];
    }
    return rect || null;
  }

  function handleSelection() {
    var text = normalizeText(window.getSelection ? window.getSelection().toString() : "");
    if (!text || text.length < CFG.minSelectionLength) {
      scheduleHide();
      return;
    }

    var rect = getSelectionRect();
    if (!rect) {
      scheduleHide();
      return;
    }

    showBubbleAtRect(rect);
  }

  // ====== INIT ======
  function initAskChatGPT() {
    ensureBubble();

    document.addEventListener("mouseup", function () {
      setTimeout(handleSelection, 0);
    });

    document.addEventListener("keyup", function (e) {
      if (e.key === "Shift" || (e.key && e.key.indexOf("Arrow") === 0)) {
        setTimeout(handleSelection, 0);
      }
    });

    document.addEventListener("mousedown", function (e) {
      if (!bubble) return;
      if (bubble.style.display === "none") return;
      if (e.target === bubble || bubble.contains(e.target)) return;
      scheduleHide();
    }, true);

    window.addEventListener("scroll", scheduleHide, { passive: true });
    window.addEventListener("resize", scheduleHide);
  }

  function initAskChatGPTWrapper() {
    if (!isBlogPage()) return;  // не блог – не ініціалізуємо
    initAskChatGPT();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initAskChatGPTWrapper);
  } else {
    initAskChatGPTWrapper();
  }
})();

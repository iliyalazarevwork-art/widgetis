        <style>
/* ===== HERO ===== */
.yz-hero {
  max-width: 1200px;
  margin: 20px auto;
  padding: 10px;
}
.yz-hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  background: #fff;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}
.yz-left h2 { font-size: 28px; margin-bottom: 10px; }
.yz-actions { margin-top: 20px; display: flex; gap: 10px; }
.yz-btn {
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
  cursor: pointer;
  border: none;
  font-size: 15px;
}
.yz-main { background: #0088cc; color: #fff; }
.yz-light { background: #eee; color: #333; }
.yz-btn:hover { transform: translateY(-3px); }
.yz-right { display: flex; flex-direction: column; gap: 10px; }
.yz-box { padding: 15px; background: #f5f5f5; border-radius: 12px; }
@media (max-width: 768px) {
  .yz-hero-inner { grid-template-columns: 1fr; }
}

/* ===== МОДАЛЬНЕ ВІКНО КОНСУЛЬТАЦІЇ ===== */
.yz-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999999;
  align-items: center;
  justify-content: center;
}
.yz-modal-overlay.active {
  display: flex;
}
.yz-modal {
  background: #fff;
  border-radius: 20px;
  padding: 32px 28px 28px;
  max-width: 420px;
  width: 90%;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: yzModalIn 0.3s ease;
}
@keyframes yzModalIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}
.yz-modal-close {
  position: absolute;
  top: 14px; right: 18px;
  font-size: 22px;
  cursor: pointer;
  color: #888;
  background: none;
  border: none;
  line-height: 1;
}
.yz-modal-close:hover { color: #333; }
.yz-modal h3 {
  margin: 0 0 6px;
  font-size: 20px;
  color: #111;
}
.yz-modal p {
  margin: 0 0 24px;
  color: #555;
  font-size: 14px;
}
.yz-modal-channels {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 24px;
}
.yz-modal-channel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: #111;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.2s ease;
}
.yz-modal-channel:hover { transform: translateY(-3px); }
.yz-modal-channel-icon {
  width: 60px;
  height: 60px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.yz-modal-channel-icon svg {
  width: 32px;
  height: 32px;
  fill: #fff;
}
.yz-icon-tg  { background: #2AABEE; }
.yz-icon-vb  { background: #7360F2; }
.yz-icon-wa  { background: #25D366; }
.yz-modal-phones {
  border-top: 1px solid #eee;
  padding-top: 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.yz-modal-phone {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 600;
  color: #111;
  text-decoration: none;
}
.yz-modal-phone:hover { color: #0088cc; }
.yz-modal-phone-op {
  font-size: 11px;
  color: #888;
  font-weight: 400;
  margin-left: 2px;
}

/* ===== КАРТКИ ТОВАРІВ ===== */
.slideCarousel-screen,
.catalog-carousel,
.catalog-carousel__container,
.catalog-carousel__wrap,
.promo-slider-list {
  overflow: visible !important;
}
.catalog-carousel__item,
.promo-slider-i {
  overflow: visible !important;
  padding-top: 6px;
  margin-top: -6px;
}
.catalogCard {
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  overflow: visible !important;
  position: relative;
}
.catalogCard:hover {
  transform: translateY(-6px) !important;
  box-shadow: 0 14px 28px rgba(0,0,0,0.14) !important;
  z-index: 20;
}
.catalogCard-box, .catalogCard-extra { overflow: visible !important; }

/* ===== КАТЕГОРІЇ — підменю ===== */
.products-menu__title {
  transition: transform 0.22s ease, box-shadow 0.22s ease;
  border-radius: 8px;
  padding: 2px 4px;
}
.products-menu__item:hover .products-menu__title {
  transform: translateY(-2px) scale(1.04);
  box-shadow: 0 6px 18px rgba(218,165,32,0.45);
  z-index: 10;
  position: relative;
}
.productsMenu-submenu {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.22s ease, transform 0.22s ease;
  pointer-events: none;
}
.products-menu__item:hover .productsMenu-submenu,
.products-menu__item.is-hover .productsMenu-submenu {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* підменю що вилізає за правий край — відкривати вліво */
.productsMenu-submenu.yz-flip-left {
  left: auto !important;
  right: 0 !important;
}

/* ===== ПЛАВНЕ ПОЯВА ===== */
.yz-animate {
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s ease;
}
.yz-animate.show { opacity: 1; transform: translateY(0); }

/* ===== FLOATING BUTTON ===== */
.yz-contact-btn {
  position: fixed;
  right: 22px; bottom: 22px;
  width: 68px; height: 68px;
  border-radius: 50%;
  background: #0088cc;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 12px 28px rgba(0,0,0,.22);
  z-index: 99999;
  transition: transform .25s ease, box-shadow .25s ease;
  border: none;
}
.yz-contact-btn:hover { transform: translateY(-3px); box-shadow: 0 16px 34px rgba(0,0,0,.26); }
.yz-contact-btn::before {
  content: "";
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 2px solid rgba(0,136,204,.35);
  animation: yzPulse 2s infinite;
}
@keyframes yzPulse {
  0%   { transform: scale(1);    opacity: .9; }
  70%  { transform: scale(1.55); opacity: 0; }
  100% { transform: scale(1.55); opacity: 0; }
}
.yz-contact-btn svg { width: 30px; height: 30px; fill: #fff; position: relative; z-index: 1; }
@media (max-width: 768px) {
  .yz-contact-btn { right: 16px; bottom: 16px; }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

  /* ===== HERO — вставка між банером і хітами ===== */
  const isHome =
    window.location.pathname === "/" ||
    window.location.pathname === "";

  if (isHome && !document.querySelector('.yz-hero')) {
    const hero = document.createElement('div');
    hero.className = 'yz-hero';
    hero.innerHTML = `
      <div class="yz-hero-inner">
        <div class="yz-left">
          <h2>Підбір акумуляторів та інверторів</h2>
          <p>Допоможемо підібрати рішення під вашу задачу швидко і без переплат</p>
          <div class="yz-actions">
            <button class="yz-btn yz-main" id="yzHeroConsult">Консультація</button>
            <a href="/hotovi-akumuliatorni-zbirky/" class="yz-btn yz-light">Каталог</a>
          </div>
        </div>
        <div class="yz-right">
          <div class="yz-box">⚡ Готові рішення</div>
          <div class="yz-box">🔋 Підбір під задачу</div>
          <div class="yz-box">💬 Швидка відповідь</div>
        </div>
      </div>`;

    /* Знаходимо секцію "Хіти продажу" і вставляємо hero ПЕРЕД нею */
    const promo = document.querySelector('section.promo, .promo-container, .catalogTabs');
    const main  = document.querySelector('main');
    if (promo && promo.closest('section')) {
      promo.closest('section').before(hero);
    } else if (main) {
      /* якщо не знайшли — просто prepend */
      main.prepend(hero);
    }
  }

  /* ===== МОДАЛЬНЕ ВІКНО ===== */
  const modal      = document.getElementById('yzModal');
  const modalClose = document.getElementById('yzModalClose');
  const floatBtn   = document.getElementById('yzContactBtn');
  const heroConsult = document.getElementById('yzHeroConsult');

  function openModal()  { modal && modal.classList.add('active'); }
  function closeModal() { modal && modal.classList.remove('active'); }

  if (floatBtn)    floatBtn.addEventListener('click', openModal);
  if (modalClose)  modalClose.addEventListener('click', closeModal);

  /* кнопка "Консультація" в hero — делегуємо, бо hero може ще не існувати */
  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'yzHeroConsult') openModal();
    if (e.target === modal) closeModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  /* ===== ПІДМЕНЮ — виправлення виходу за правий край ===== */
  function fixSubmenus() {
    document.querySelectorAll('.productsMenu-submenu').forEach(function(sub) {
      const rect = sub.getBoundingClientRect();
      if (rect.right > window.innerWidth - 10) {
        sub.classList.add('yz-flip-left');
      }
    });
  }

  /* Запускаємо при hover на кожен пункт меню */
  document.querySelectorAll('.products-menu__item').forEach(function(item) {
    item.addEventListener('mouseenter', function() {
      setTimeout(fixSubmenus, 50);
    });
  });

  /* ===== ПЛАВНА ПОЯВА ===== */
  const animEls = document.querySelectorAll('section, .yz-hero');
  animEls.forEach(el => el.classList.add('yz-animate'));
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('show'); });
  }, { threshold: 0.12 });
  animEls.forEach(el => observer.observe(el));

});

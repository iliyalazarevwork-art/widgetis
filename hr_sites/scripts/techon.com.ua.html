        <script>
/* PAYLATE safe integration: увеличенный отступ и расширение ширины кнопки */
(function () {
  const PAYLATE_SHOP_EMAIL = "fop.puchok.vlada@gmail.com";
  const DEBUG = false;

  function log(...args){ if (DEBUG) console.info('PAYLATE:', ...args); }

  function parsePriceString(str) {
    if (!str) return 0;
    const numMatch = str.match(/(\d+[ \u00A0']*(?:[.,]\d+)?)/);
    if (!numMatch) return 0;
    let s = numMatch[1].replace(/[\u00A0' ]+/g, '').replace(',', '.');
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  function getArticle() {
    const metaSku = document.querySelector('meta[itemprop="sku"], meta[name="sku"]');
    if (metaSku && metaSku.content) return metaSku.content.trim();
    const dataSku = document.querySelector('[data-sku], [data-product-id]');
    if (dataSku) return (dataSku.getAttribute('data-sku') || dataSku.getAttribute('data-product-id') || '').trim();
    const textSkuEl = Array.from(document.querySelectorAll('body *')).find(el => /артикул|sku/i.test(el.textContent || ''));
    if (textSkuEl) {
      const m = (textSkuEl.textContent || '').match(/Артикул[:\s]*([^\s,]+)/i);
      if (m) return m[1].trim();
    }
    return '';
  }

  function getName() {
    return (document.querySelector('h1')?.textContent || '').trim() || 'Без назви';
  }

  function getPrice(productContainer) {
    let price = 0;
    const metaPrice = document.querySelector('meta[itemprop="price"], meta[name="price"]');
    if (metaPrice && metaPrice.content) price = parsePriceString(metaPrice.content);
    if (!price && productContainer) {
      const elDataPrice = productContainer.querySelector('[data-price]');
      if (elDataPrice) price = parsePriceString(elDataPrice.getAttribute('data-price') || elDataPrice.textContent);
    }
    if (!price && productContainer) {
      const priceCandidates = Array.from(productContainer.querySelectorAll('[class],[id]'))
        .filter(el => /price|грн|uah|product-price|product_price/i.test((el.className || '') + ' ' + (el.id || '')) || /грн/i.test(el.textContent || ''));
      for (const el of priceCandidates) {
        const p = parsePriceString(el.textContent || el.getAttribute('data-price') || '');
        if (p) { price = p; break; }
      }
    }
    if (!price) {
      const anyWithHrn = Array.from(document.querySelectorAll('body *')).find(el => /грн/i.test(el.textContent || ''));
      if (anyWithHrn) price = parsePriceString(anyWithHrn.textContent);
    }
    return (price && !isNaN(price)) ? price : 0;
  }

  function buildIframeSrc(article, name, price) {
    const productUrl = window.location.href;
    const params = new URLSearchParams({
      product_id: article || '',
      product_name: name || '',
      product_price: String(price || 0),
      shop_email: PAYLATE_SHOP_EMAIL,
      product_url: productUrl
    });
    return 'https://paylate.com.ua/02/BuyInCredit.html?' + params.toString();
  }

  function findProductContainer() {
    return document.querySelector('.product-page, .product-single, .product, [itemtype*="Product"], .product-detail') || null;
  }

  function normalizeText(s) {
    if (!s) return '';
    return s.replace(/\s+/g, ' ').replace(/[.,;:!?\u200B\u200C\u200D]+$/g, '').trim().toLowerCase();
  }
  function isExactVCredit(text) {
    if (!text) return false;
    const n = normalizeText(text);
    return /^(в\s*кредит(і|и)?)$/i.test(n);
  }

  function findCreditButtonStrict() {
    const container = findProductContainer() || document.body;
    const candidates = Array.from(container.querySelectorAll('a, button, input[type="button"], input[type="submit"], [role="button"]'));
    for (const el of candidates) {
      const rawText = (el.textContent || el.value || '').replace(/\u00A0/g, ' ');
      if (isExactVCredit(rawText)) { log('Found exact by text', rawText, el); return el; }
      const aria = el.getAttribute('aria-label') || '';
      const title = el.getAttribute('title') || '';
      if (isExactVCredit(aria) || isExactVCredit(title)) { log('Found exact by aria/title', aria || title, el); return el; }
    }
    return null;
  }

  // Копируем классы, margin и увеличиваем промежуток в 2.5 раза; расширяем padding по ширине
  function applyButtonLookWithSpacingAndPadding(sourceEl, targetEl, extraSpacingPx = 8, extraPaddingPx = 8, spacingMultiplier = 2.5) {
    if (!sourceEl || !targetEl) return;
    // Копируем классы источника, фильтруя явные layout-классы
    const classes = Array.from(sourceEl.classList).filter(c => !/^(col|row|grid|hidden|container|layout|clearfix|d-|flex|w-)/i.test(c));
    if (classes.length) targetEl.classList.add(...classes);
    targetEl.classList.add('paylate-button');

    try {
      const cs = window.getComputedStyle(sourceEl);

      // 1) Рассчитываем новый margin-left: (margin-right_of_source + extraSpacingPx) * spacingMultiplier
      const mrRaw = cs.getPropertyValue('margin-right') || '';
      const m = mrRaw.trim().match(/^(-?\d+(\.\d+)?)([a-z%]*)$/i);
      let mrValue = 0, mrUnit = 'px';
      if (m) {
        mrValue = parseFloat(m[1]);
        mrUnit = m[3] || 'px';
      }
      const baseSpacing = mrValue + Number(extraSpacingPx);
      const newLeftValue = baseSpacing * Number(spacingMultiplier);
      targetEl.style.marginLeft = newLeftValue + mrUnit;

      // 2) Сохраняем вертикальные отступы, если есть
      const mt = cs.getPropertyValue('margin-top'); if (mt) targetEl.style.marginTop = mt;
      const mb = cs.getPropertyValue('margin-bottom'); if (mb) targetEl.style.marginBottom = mb;

      // 3) Расширяем горизонтальные padding'ы (ширина), не трогаем высоту
      // Берём padding-left/right исходной кнопки и добавляем extraPaddingPx
      const plRaw = cs.getPropertyValue('padding-left') || '';
      const prRaw = cs.getPropertyValue('padding-right') || '';
      function parseDim(raw, fallbackUnit='px') {
        const mm = raw.trim().match(/^(-?\d+(\.\d+)?)([a-z%]*)$/i);
        if (mm) return { value: parseFloat(mm[1]), unit: mm[3] || fallbackUnit };
        return { value: 0, unit: fallbackUnit };
      }
      const pl = parseDim(plRaw);
      const pr = parseDim(prRaw);
      // Увеличиваем только по ширине: добавляем extraPaddingPx (в px)
      // Если исходная единица не px, оставляем исходную и добавляем px через calc
      if (pl.unit === 'px' && pr.unit === 'px') {
        targetEl.style.paddingLeft = (pl.value + Number(extraPaddingPx)) + 'px';
        targetEl.style.paddingRight = (pr.value + Number(extraPaddingPx)) + 'px';
      } else {
        // fallback: используем calc для смешанных единиц
        targetEl.style.paddingLeft = `calc(${plRaw || '0px'} + ${Number(extraPaddingPx)}px)`;
        targetEl.style.paddingRight = `calc(${prRaw || '0px'} + ${Number(extraPaddingPx)}px)`;
      }

      // Защита от изменения layout
      targetEl.style.boxSizing = 'border-box';
      targetEl.style.display = 'inline-flex';
      targetEl.style.alignItems = 'center';
      targetEl.style.justifyContent = 'center';
    } catch (e) {
      log('apply look error', e);
    }
  }

  function ensurePaylateCSS() {
    if (document.getElementById('paylate-style')) return;
    const css = `
.paylate-button { display: inline-flex; align-items: center; justify-content: center; gap: .5rem; text-decoration: none; }
.paylate-button:hover, .paylate-button:focus { outline: none; box-shadow: 0 0 0 3px rgba(23,140,248,0.18); }
.paylate-button:active { transform: translateY(0); }
#credit-paylater { user-select: none; }
`;
    const s = document.createElement('style');
    s.id = 'paylate-style';
    s.textContent = css;
    document.head.appendChild(s);
  }

  function insertPaylaterButton(nextToEl, iframeSrc) {
    if (document.getElementById('credit-paylater')) { log('Paylater exists, skip'); return; }

    const btn = document.createElement('div');
    btn.id = 'credit-paylater';
    btn.setAttribute('role', 'button');
    btn.setAttribute('tabindex', '0');
    btn.textContent = 'Плати пізніше';

    try {
      if (nextToEl && nextToEl.parentNode) {
        nextToEl.parentNode.insertBefore(btn, nextToEl.nextSibling);
      } else {
        const container = findProductContainer() || document.body;
        container.appendChild(btn);
      }
    } catch (e) {
      (findProductContainer() || document.body).appendChild(btn);
    }

    if (!document.getElementById('paylate-iframe')) {
      const wrapper = document.createElement('div');
      wrapper.style.display = 'none';
      wrapper.innerHTML = `
        <div id="paylate-iframe" style="padding:0; margin:0;">
          <iframe style="width: 1200px; height: 620px; max-width: 100%; border: none;" src="${iframeSrc}"></iframe>
        </div>
      `;
      document.body.appendChild(wrapper);
    } else {
      const existingIframe = document.querySelector('#paylate-iframe iframe');
      if (existingIframe) existingIframe.src = iframeSrc;
    }

    ensurePaylateCSS();
    // Увеличиваем промежуток в ~2.5 раза и расширяем ширину кнопки (padding)
    // extraSpacingPx — запас, который раньше использовался (оставляем 8), spacingMultiplier = 2.5
    // extraPaddingPx — сколько добавить к каждому горизонтальному padding (px)
    applyButtonLookWithSpacingAndPadding(nextToEl, btn, 8, 8, 2.5);

    btn.addEventListener('click', function (e) {
      e.preventDefault();
      try {
        if (window.Fancybox && typeof window.Fancybox.show === 'function') {
          window.Fancybox.show([{ src: "#paylate-iframe", type: "inline" }]); return;
        }
        if (window.Fancybox && typeof window.Fancybox.open === 'function') {
          window.Fancybox.open([{ src: "#paylate-iframe", type: "inline" }]); return;
        }
      } catch (err) { console.warn('Fancybox open error:', err); }
      window.open(iframeSrc, '_blank', 'noopener,noreferrer,width=1200,height=720');
    });

    btn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); btn.click(); }
    });

    log('Inserted paylater button next to', nextToEl);
  }

  function initOnce() {
    const creditBtn = findCreditButtonStrict();
    if (!creditBtn) { log('Exact credit button not found'); return false; }

    const productContainer = findProductContainer() || document.body;
    const article = getArticle();
    const name = getName();
    const price = getPrice(productContainer);
    const iframeSrc = buildIframeSrc(article, name, price);

    insertPaylaterButton(creditBtn, iframeSrc);
    log('initOnce done', { article, name, price });
    return true;
  }

  // findCreditButtonStrict reused
  function findCreditButtonStrict() {
    const container = findProductContainer() || document.body;
    const candidates = Array.from(container.querySelectorAll('a, button, input[type="button"], input[type="submit"], [role="button"]'));
    for (const el of candidates) {
      const rawText = (el.textContent || el.value || '').replace(/\u00A0/g, ' ');
      if (isExactVCredit(rawText)) { log('Found exact by text', rawText, el); return el; }
      const aria = el.getAttribute('aria-label') || '';
      const title = el.getAttribute('title') || '';
      if (isExactVCredit(aria) || isExactVCredit(title)) { log('Found exact by aria/title', aria || title, el); return el; }
    }
    return null;
  }
  function normalizeText(s) { if (!s) return ''; return s.replace(/\s+/g, ' ').replace(/[.,;:!?\u200B\u200C\u200D]+$/g, '').trim().toLowerCase(); }
  function isExactVCredit(text) { if (!text) return false; const n = normalizeText(text); return /^(в\s*кредит(і|и)?)$/i.test(n); }

  document.addEventListener('DOMContentLoaded', function () {
    if (initOnce()) return;
    const observer = new MutationObserver((mutations, obs) => {
      if (initOnce()) obs.disconnect();
    });
    observer.observe(document.body, { childList: true, subtree: true });
    setTimeout(() => { try { observer.disconnect(); } catch (e) {} }, 20000);
  });

})();

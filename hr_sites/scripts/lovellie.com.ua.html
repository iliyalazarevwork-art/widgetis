                <script>
(function(){
  const url = '/catalog/';
  function h(e){
    e.preventDefault();
    e.stopImmediatePropagation();
    location.href = url;
  }
  document.addEventListener('DOMContentLoaded', function(){
    const btn = document.querySelector('.btn--catalog-nav');
    if(btn){ btn.addEventListener('click', h, true); }
  });
})();
</script>

<script src="https://paylate.com.ua/js/start.js" async charset="UTF-8"></script>
<script src="https://paylate.com.ua/js/jquery.maskedinput.min.js" charset="UTF-8"></script>
<link rel="stylesheet" href="https://paylate.com.ua/js/credit.css">
<script>
  // === Installment parameters configuration ===
  var pl_options = {
    pl_type: 2, // Installment type
    pl_n1: "Три платежі", // Option 1
    pl_n2: "Шість платежів", // Option 2
    pl_n3: "Десять платежів", // Option 3
    pl_bc: "#4e6bb2", // Main styling color (blue)
    lang: "ukr" // Language: ukr or ru
  };

  // === Function to check PayLate loading ===
  function waitForPayLate(callback) {
    let attempts = 0;
    const maxAttempts = 50; // maximum 5 seconds (50 * 100ms)

    function checkPayLate() {
      attempts++;

      // Check if buyInCredit function is loaded
      if (typeof buyInCredit === 'function') {
        console.log('PayLate scripts loaded successfully');
        callback();
      } else if (attempts < maxAttempts) {
        setTimeout(checkPayLate, 100); // check every 100ms
      } else {
        console.warn('PayLate scripts failed to load within timeout');
        callback(); // execute callback even if scripts didn't load
      }
    }

    checkPayLate();
  }

  // === GA4 tracking function ===
  function trackCreditButtonClick(article, name, price) {
    if (typeof gtag !== 'undefined') {
      gtag('event', 'credit_button_click', {
        'event_category': 'Кредит',
        'event_label': 'Клик на кнопку розстрочка',
        'product_id': article,
        'product_name': name,
        'value': parseFloat(price),
        'currency': 'UAH'
      });
      console.log('GA4 event sent: credit_button_click');
    } else {
      console.warn('gtag not found - Google Analytics tracking unavailable');
    }
  }

  $(function () {

    // === Wait for PayLate loading, then replace handlers ===
    waitForPayLate(function() {
      // === Replace default button handler ===
      $('.order-box__credit-button .j-installment-button').each(function() {
        $(this)
          .removeAttr('onclick')
          .removeAttr('data-panel')
          .attr('href', '#');
      });
    });

    // === Button click handler ===
    $(document).on("click", ".order-box__credit-button .btn.j-installment-button", function(event) {
      // Block default behavior
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();

      // --- Get product article from DOM ---
      let rawText = $('.product-header__code').text() || '';
      let article = rawText
        .replace(/Артикул/g, '') // Remove "Article" word
        .replace(/["\s]/g, '') // Remove quotes and spaces
        .trim(); // Remove extra spaces

      // --- Get product name ---
      let name = $('.product-title').text().trim() || 'Без назви';

      // --- Get price from schema.org meta tag ---
      let price = parseFloat(($('meta[itemprop="price"]').attr('content') || '0').replace(',', '.')).toFixed(2);

      // --- Track GA4 event ---
      trackCreditButtonClick(article, name, price);

      // --- Call PayLate function ---
      if (typeof buyInCredit === 'function') {
        let customerEmail = 'rusikbistrov@gmail.com';
        buyInCredit(price, article, name, customerEmail, event);
      } else {
        console.warn("Функція buyInCredit не знайдена. Перевірте, чи підключено start.js");
      }

      // Return false for additional default behavior blocking
      return false;
    });
  });
</script>

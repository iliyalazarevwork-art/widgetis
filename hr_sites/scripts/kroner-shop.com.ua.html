        <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget with Telegram</title>
    <style>
        #main-widget {
       
            position: fixed;
            bottom: 50px;
            right: 20px;
            background-color: #665CAC;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            z-index: 9999;
        }

        #main-widget:hover {
            transform: scale(1.1);
        }

        @keyframes attention {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        #main-widget img {
            width: 35px;
            height: 35px;
            animation: attention 3.0s ease-in-out infinite;
        }

        .action-buttons {
            position: fixed;
            bottom: 50px;
            right: 36px;
            display: flex; /* Показываем изначально */
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 9999;
        }

        .action-buttons a {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .action-buttons a:hover {
            transform: scale(1.1);
        }

        .action-buttons img {
            width: 30px;
            height: 30px;
        }

        #viber-link {
            background-color: #645ca7;
        }

        #call-link {
            background-color: #f6961f;
        }

        #telegram-link {
            background-color: #0088cc;
        }
    </style>
</head>
<body>

    <div id="main-widget">
        <img src="https://kroner-shop.com.ua/content/uploads/images/icons8-chat-bubble-50.png" alt="Open Menu">
    </div>

    <div class="action-buttons" id="action-buttons">
        <a href="https://t.me/manager_faucet" id="telegram-link">
            <img src="https://kroner-shop.com.ua/content/uploads/images/icons8-telegram-48.png" alt="Chat on Telegram">
        </a>
        <a href="viber://chat?number=+380987805411" id="viber-link">
            <img src="https://kroner-shop.com.ua/content/uploads/images/icons8-viber-50-1.png" alt="Chat on Viber">
        </a>
      <!--  <a href="tel:+380970242124" id="call-link">
            <img src="https://kroner-shop.com.ua/content/uploads/images/icons8-telephone-50.png" alt="Call Us">
        </a> -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mainWidget = document.getElementById('main-widget');
            const actionButtons = document.getElementById('action-buttons');

            mainWidget.addEventListener('click', function() {
                if (actionButtons.style.display === 'none') {
                    actionButtons.style.display = 'flex';
                } else {
                    actionButtons.style.display = 'none';
                }
            });
        });
    </script>

</body>
</html>

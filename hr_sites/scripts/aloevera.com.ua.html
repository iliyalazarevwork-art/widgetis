<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script>
document.addEventListener("DOMContentLoaded", function () {
  // Контейнер
  var container = document.createElement("div");
  container.style.position = "fixed";
  container.style.bottom = "20px";
  container.style.right = "20px";
  container.style.zIndex = "9999";
  container.style.display = "flex";
  container.style.flexDirection = "row-reverse"; // соц. іконки вліво
  container.style.alignItems = "center";
  container.style.gap = "15px";

  // Кнопка
  var coin = document.createElement("div");
  coin.className = "coin";
  coin.innerHTML = `
    <div class="coin-inner">
      <!-- Передня сторона -->
      <div class="coin-face coin-front">
        <svg xmlns="http://www.w3.org/2000/svg" 
             viewBox="0 0 512 512" 
             class="chat-icon">
          <!-- Хмаринка -->
          <path d="M256 32C132.3 32 32 118.6 32 224c0 53.9 28.5 102.6 74.8 136.1L96 480l122.5-68.8c12.4 2.3 25.4 3.6 37.5 3.6 123.7 0 224-86.6 224-192S379.7 32 256 32z" 
                fill="white"/>
          <!-- Внутрішні лінії -->
          <path d="M160 224h192M160 288h128" 
                stroke="#d81b60" 
                stroke-width="32" 
                stroke-linecap="round" 
                stroke-linejoin="round"/>
        </svg>
      </div>
      <!-- Задня сторона -->
      <div class="coin-face coin-back">
        <div class="back-text">
          Безкоштовна<br/>Консультація
        </div>
      </div>
    </div>
  `;

  // Іконки соцмереж
  var iconsContainer = document.createElement("div");
  iconsContainer.style.display = "none";
  iconsContainer.style.flexDirection = "row";
  iconsContainer.style.gap = "10px";

  function createIcon(link, imgSrc) {
    var icon = document.createElement("a");
    icon.href = link;
    icon.target = "_blank";
    icon.style.width = "50px";
    icon.style.height = "50px";
    icon.style.borderRadius = "50%";
    icon.style.overflow = "hidden";
    icon.style.display = "flex";
    icon.style.alignItems = "center";
    icon.style.justifyContent = "center";
    icon.style.background = "white";
    icon.style.boxShadow = "0 2px 6px rgba(0,0,0,0.2)";
    icon.innerHTML = `<img src="${imgSrc}" style="width:70%;height:70%;object-fit:contain;"/>`;
    return icon;
  }

  var instaIcon = createIcon("https://ig.me/m/aloevera.com.ua", "https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png");
  var tgIcon = createIcon("https://t.me/aloevera_expert", "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg");

  iconsContainer.appendChild(instaIcon);
  iconsContainer.appendChild(tgIcon);

  // Клік
  coin.addEventListener("click", function () {
    iconsContainer.style.display = iconsContainer.style.display === "flex" ? "none" : "flex";
  });

  // Автопереворот
  setInterval(() => {
    coin.classList.add("flip");
    setTimeout(() => coin.classList.remove("flip"), 3000);
  }, 8000);

  container.appendChild(coin);
  container.appendChild(iconsContainer);
  document.body.appendChild(container);

  // CSS
  var style = document.createElement("style");
  style.innerHTML = `
    .coin {
      width: 70px;  /* зменшений розмір */
      height: 70px;
      perspective: 1000px;
      cursor: pointer;
    }
    .coin-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.5s ease;
      border-radius: 20px;
    }
    .coin.flip .coin-inner {
      transform: rotateY(180deg);
    }
    .coin-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      backface-visibility: hidden;
      background: #3b3b3b;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 6px rgba(0,0,0,0.4);
    }
    .coin-front {
      transform: rotateY(0deg);
    }
    .coin-back {
      transform: rotateY(180deg);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      text-align: center;
      line-height: 1.6;
      font-size: clamp(10px, 2.5vw, 13px); /* трохи менший */
      padding: 16px; /* більше повітря */
    }
    .back-text {
      display: block;
      word-wrap: break-word;
    }
    .chat-icon {
      width: 65%; /* збільшили іконку */
      height: 65%;
      object-fit: contain;
    }
  `;
  document.head.appendChild(style);
});
</script>

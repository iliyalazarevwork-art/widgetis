    <form id="popup-form" action="" onsubmit="event.preventDefault();">

<script>

    function sendemail(){

        let popup = document.getElementById('popup-form');

        let username = document.getElementById("username").value;
        let useremail = document.getElementById("useremail").value;
        let userphone = document.getElementById("userphone").value;

        let error = true;

        if(username==""){
            document.getElementById("username").classList.add('error');
            error = false;
        }else{
            document.getElementById("username").classList.remove('error');
        }
        if(useremail==""){
            document.getElementById("useremail").classList.add('error');
            error = false;
        }else{
            document.getElementById("useremail").classList.remove('error');
        }
        if(userphone==""){
            document.getElementById("userphone").classList.add('error');
            error = false;
        }else{
            document.getElementById("userphone").classList.remove('error');
        }

        if(!error){
            return false;
        }

        const data = {
            "from" : "email@svit-chaju.com.ua",
            "emails" : ["vzhgut@svit-chaju.ua", "mlypko@svit-chaju.ua"],
            "subject" : "Заявка на закупку оптом от "+username,
            "htmlText" : "<p>Имя: "+username+"</p><p>Email: "+useremail+"</p><p>Телефон: "+userphone+"</p>"
        }

        console.log(data);

        fetch(
            'https://esputnik.com/api/v1/message/email',
            {
                method: 'POST',
                mode: 'cors',
                headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Basic ' + btoa('username:BBD005A8A163BEA61EF1AD00B1D43ACC')
                    },
                body: JSON.stringify(data)
            }
        );

        showMessage();

        dataLayer.push({
            'event': 'GAevent',
            'eventCategory': 'b2b',
            'eventAction': 'send_wholesale_price_request'
        })

        setTimeout(function (){
            closepopup();
        },2000);

    }

    function closepopup() {
        let popup = document.getElementById('popup-wrap');
        popup.style.display = "none";
        document.location.hash = "#";
        resetMessage();
    }

    function openpopup(){
        let popup = document.getElementById('popup-wrap');
        popup.style.display = "block";
    }

    function showMessage(){
        let popup = document.getElementById('message-status');
        popup.style.display = "flex";
    }

    function resetMessage(){
        let popup = document.getElementById('message-status');
        popup.style.display = "none";
        document.getElementById("username").value = "";
        document.getElementById("useremail").value = "";
        document.getElementById("userphone").value = "";

        document.getElementById("username").classList.remove('error');
        document.getElementById("useremail").classList.remove('error');
        document.getElementById("userphone").classList.remove('error');
    }

    function locationHashChanged() {
        if (location.hash === '#popup:myform') {
            openpopup();
        }
    }

    window.onhashchange = locationHashChanged;

document.querySelectorAll('.card.orange .btn, .sc_col-12.popup-caller .btn').forEach((ob)=>{
ob.addEventListener('click', function(event) {
  openpopup();
})});

</script>

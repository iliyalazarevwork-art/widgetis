        <script>
(function() {
    async function injectBrandCatalogs() {
        // 1. Визначаємо бренд з URL
        const path = window.location.pathname;
        const segments = path.split('/').filter(s => s.length > 0);
        const brandSlug = segments[segments.length - 1];

        if (!brandSlug) return;

        // 2. Шукаємо цільовий контейнер (найвищий рівень)
        const parentContainer = document.querySelector('.brand-info__txt');
        if (!parentContainer || document.getElementById('brand-catalog-section')) return;

        try {
            // 3. Запит до вашого API
            const response = await fetch(`https://berivse.net/e.php?ix=api_get_catalogs&vendor_name=${encodeURIComponent(brandSlug)}`);
            const result = await response.json();

            if (result.status === 'success' && result.data && result.data.length > 0) {
                // 4. Додаємо стилі один раз
                if (!document.getElementById('catalog-dynamic-styles')) {
                    const style = document.createElement('style');
                    style.id = 'catalog-dynamic-styles';
                    style.innerHTML = `
                        #brand-catalog-section { margin-bottom: 30px; width: 100%; max-width: 600px; }
                        .catalog-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #000; display: block; }
                        .catalog-card-link {
                            display: flex; align-items: center;
                            background: #fff; border: 1px solid #eee;
                            border-radius: 12px; padding: 14px 18px;
                            margin-bottom: 12px; cursor: pointer;
                            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
                            text-decoration: none !important; color: #333 !important;
                        }
                        .catalog-card-link:hover {
                            border-color: #000;
                            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
                            transform: translateY(-3px);
                        }
                        .catalog-card-icon { margin-right: 16px; flex-shrink: 0; display: flex; align-items: center; }
                        .catalog-card-body { flex-grow: 1; }
                        .catalog-card-title { 
                            font-weight: 800; font-size: 13px; 
                            text-transform: uppercase; letter-spacing: 0.5px;
                            margin-bottom: 4px; color: #111; 
                        }
                        .catalog-card-meta { font-size: 12px; color: #999; display: flex; align-items: center; }
                        .badge-pdf { 
                            background: #000; color: #fff; padding: 2px 5px; 
                            border-radius: 3px; font-size: 9px; font-weight: bold; margin-right: 8px; 
                        }
                        .catalog-card-arrow { opacity: 0.2; transition: 0.3s; }
                        .catalog-card-link:hover .catalog-card-arrow { opacity: 1; transform: translateX(5px); }
                    `;
                    document.head.appendChild(style);
                }

                // 5. Формуємо HTML блок
                const catalogSection = document.createElement('div');
                catalogSection.id = 'brand-catalog-section';
                
                let html = '<span class="catalog-header">Офіційні каталоги</span>';

                result.data.forEach(item => {
                    html += `
                    <a href="${item.file_url}" target="_blank" class="catalog-card-link">
                        <div class="catalog-card-icon">
                            <img src="https://top-posuda.com/content/uploads/images/pdf_file_icon.svg.png" width="34" height="42" alt="PDF">
                        </div>
                        <div class="catalog-card-body">
                            <div class="catalog-card-title">${item.title}</div>
                            <div class="catalog-card-meta">
                                <span class="badge-pdf">PDF</span>
                                Дивитись онлайн або завантажити
                            </div>
                        </div>
                        <div class="catalog-card-arrow">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 18l6-6-6-6"></path>
                            </svg>
                        </div>
                    </a>`;
                });

                catalogSection.innerHTML = html;

                // 6. Вставка в самий початок .brand-info__txt
                parentContainer.prepend(catalogSection);
            }
        } catch (error) {
            console.error('Помилка завантаження каталогів:', error);
        }
    }

    // Запуск скрипта
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', injectBrandCatalogs);
    } else {
        injectBrandCatalogs();
    }
})();
</script>

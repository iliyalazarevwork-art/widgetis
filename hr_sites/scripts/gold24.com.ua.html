        <script>
document.addEventListener("DOMContentLoaded", function () {
  // 👉 Автопрокрутка банера
  const swiperInstance = document.querySelector("#banners__slider")?.swiper;
  if (swiperInstance) {
    swiperInstance.params.autoplay = {
      delay: 3000,
      disableOnInteraction: false,
    };
    swiperInstance.autoplay.start();
  }

  // 👉 FAQ аккордеон
  const questions = document.querySelectorAll(".faq-question");
  questions.forEach((btn) => {
    btn.addEventListener("click", function () {
      const answer = this.nextElementSibling;
      const isOpen = answer.classList.contains("open");

      document.querySelectorAll(".faq-answer").forEach((a) => a.classList.remove("open"));
      document.querySelectorAll(".faq-question").forEach((q) => q.classList.remove("active"));

      if (!isOpen) {
        answer.classList.add("open");
        this.classList.add("active");
      }
    });
  });

  // 👉 Видалення "Хорошоп"
  function removeHoroshopElements() {
    const targets = [
      '.footer__development-link',
      '.footer__development',
      '.footer-powered',
      '.footer-powered-logo',
      'img[src*="horoshop"]',
      'img[alt*="Хорошоп"]',
      'a[href*="horoshop.ua"]',
    ];

    targets.forEach((selector) => {
      const elements = document.querySelectorAll(selector);
      elements.forEach((el) => {
        el.closest("div")?.remove();
      });
    });
  }
  removeHoroshopElements();

  // ✅ Автопрокрутка "Хіти"
  const hitsSlider = document.querySelector('.promo-slider');
  if (hitsSlider) {
    new Swiper(hitsSlider, {
      loop: true,
      slidesPerView: 5,
      spaceBetween: 20,
      autoplay: {
        delay: 4000,
        disableOnInteraction: false,
      },
      navigation: {
        nextEl: '.slideCarousel-nav-btn.__slideRight',
        prevEl: '.slideCarousel-nav-btn.__slideLeft',
      },
      breakpoints: {
        320: {
          slidesPerView: 1.2,
          spaceBetween: 10,
        },
        480: {
          slidesPerView: 2.2,
        },
        768: {
          slidesPerView: 3,
        },
        1024: {
          slidesPerView: 4,
        },
        1280: {
          slidesPerView: 5,
        }
      }
    });
  }
});
</script>

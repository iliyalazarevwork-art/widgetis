        <script>
(() => {
  "use strict";

  // Переклади для обох мов
  const TRANSLATIONS = {
    uk: [
      { href: "/pro-kompaniiu/",            label: "Про компанію" },
      { href: "/dostavka/",                 label: "Доставка" },
      { href: "/oplata/",                   label: "Оплата" },
      { href: "/harantiia/1099/",           label: "Гарантія" },
      { href: "/obmin-ta-povernennia/",     label: "Обмін та повернення" },
      { href: "/spivpratsia/",     label: "Співпраця" },
      { href: "/privacypolicy/",  label: "Угода користувача" },
      { href: "/publichna-oferta/",  label: "Публічна Оферта" },
      { href: "/kontakty/1171/",     label: "Контакти" }
    ],
    ru: [
      { href: "/ru/pro-kompaniiu/",         label: "О компании" },
      { href: "/ru/dostavka/",              label: "Доставка" },
      { href: "/ru/oplata/",                label: "Оплата" },
      { href: "/ru/harantiia/1099/",        label: "Гарантия" },
      { href: "/ru/obmin-ta-povernennia/",  label: "Обмен и возврат" },
      { href: "/ru/privacypolicy/",  label: "Пользовательское соглашение" },
      { href: "/ru/publichna-oferta/",  label: "Публичная Оферта" },
      { href: "/ru/spivpratsia/",  label: "Сотрудничество" },
      { href: "/ru/kontakty/1171/",     label: "Контакты" }
    ]
  };

  const qs  = (sel, root = document) => root.querySelector(sel);
  const qsa = (sel, root = document) => [...root.querySelectorAll(sel)];
  const norm = s => s?.trim().toLowerCase() ?? "";

  // Визначення поточної мови
  const getCurrentLanguage = () => {
    const html = document.documentElement;
    const lang = html.getAttribute('lang') || html.getAttribute('xml:lang') || 'uk';
    return lang.toLowerCase().startsWith('ru') ? 'ru' : 'uk';
  };

  const findCustomersLink = () =>
    qsa("a[href], nav a, .site-menu__link, .site-menu_link")
      .find(a => /покупцям|покупателям/.test(norm(a.textContent))) ?? null;

  const ensureCaret = link => {
    if (link.querySelector(".hs-caret")) return;
    const NS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(NS, "svg");
    svg.setAttribute("class", "hs-caret");
    svg.setAttribute("aria-hidden", "true");
    svg.setAttribute("focusable", "false");
    svg.setAttribute("width", "12");
    svg.setAttribute("height", "12");
    const use = document.createElementNS(NS, "use");
    use.setAttribute("href", "#icon-arrow-down-light");
    svg.appendChild(use);
    link.append(svg);
  };

  const buildSubmenu = () => {
    const link = findCustomersLink();
    if (!link) return false;

    const parent = link.closest("li, span, .site-menu__item, .menu__item") ?? link.parentElement;
    if (!parent || parent.querySelector(":scope > .hs-submenu")) return false;

    parent.classList.add("hs-has-sub");
    if (getComputedStyle(parent).position === "static") parent.style.position = "relative";

    // Визначаємо мову та беремо відповідні переклади
    const lang = getCurrentLanguage();
    const items = TRANSLATIONS[lang];

    const box = document.createElement("div");
    box.className = "hs-submenu";
    box.role = "menu";
    box.setAttribute("data-lang", lang); // Зберігаємо мову
    box.innerHTML = items
      .map(({ href, label }) => `<a class="hs-submenu__link" role="menuitem" href="${href}">${label}</a>`)
      .join("");
    parent.append(box);

    ensureCaret(link);

    link.setAttribute("aria-haspopup", "true");
    link.setAttribute("aria-expanded", "false");

    const isTouchOnly     = () => window.matchMedia("(hover: none)").matches;
    const isHoverCapable  = () => window.matchMedia("(hover: hover)").matches;

    const positionDesktop = () => {
      if (!isHoverCapable()) return;
      const { left, bottom } = link.getBoundingClientRect();
      Object.assign(box.style, {
        position: "fixed",
        left: `${Math.round(left)}px`,
        top:  `${Math.round(bottom)}px`,
        width: "max-content",
        maxWidth: "calc(100vw - 24px)"
      });
    };

    parent.addEventListener("mouseenter", () => {
      positionDesktop();
      parent.classList.add("is-open");
      link.setAttribute("aria-expanded", "true");
    }, { passive: true });

    parent.addEventListener("mouseleave", () => {
      parent.classList.remove("is-open");
      link.setAttribute("aria-expanded", "false");
    }, { passive: true });

    link.addEventListener("click", e => {
      if (!isTouchOnly()) return;
      if (!parent.classList.contains("is-open")) e.preventDefault();
      parent.classList.toggle("is-open");
      link.setAttribute("aria-expanded", parent.classList.contains("is-open") ? "true" : "false");
    });

    const reposition = () => parent.classList.contains("is-open") && positionDesktop();
    window.addEventListener("resize", reposition, { passive: true });
    window.addEventListener("scroll", reposition, { capture: true, passive: true });

    document.addEventListener("click", e => {
      if (!parent.contains(e.target)) {
        parent.classList.remove("is-open");
        link.setAttribute("aria-expanded", "false");
      }
    }, { passive: true });

    return true;
  };

  // Оновлення підменю при зміні мови
  const updateSubmenuLanguage = () => {
    const submenu = qs(".hs-submenu");
    if (!submenu) return;

    const currentLang = getCurrentLanguage();
    const savedLang = submenu.getAttribute("data-lang");

    // Якщо мова змінилась, оновлюємо підменю
    if (currentLang !== savedLang) {
      const items = TRANSLATIONS[currentLang];
      const links = qsa(".hs-submenu__link", submenu);
      
      links.forEach((link, index) => {
        if (items[index]) {
          link.textContent = items[index].label;
          link.href = items[index].href;
        }
      });

      submenu.setAttribute("data-lang", currentLang);
    }
  };

  // Спостереження за змінами мови
  const observeLanguageChanges = () => {
    const mo = new MutationObserver(() => updateSubmenuLanguage());
    mo.observe(document.documentElement, { 
      attributes: true, 
      attributeFilter: ['lang', 'xml:lang'] 
    });
  };

  const init = () => {
    if (buildSubmenu()) {
      observeLanguageChanges();
      return;
    }

    let tries = 0;
    const iv = setInterval(() => {
      if (buildSubmenu() || ++tries >= 20) {
        clearInterval(iv);
        if (tries < 20) observeLanguageChanges();
      }
    }, 300);

    const mo = new MutationObserver(() => {
      if (buildSubmenu()) {
        observeLanguageChanges();
      }
    });
    mo.observe(document.documentElement, { childList: true, subtree: true });
  };

  document.readyState === "loading"
    ? document.addEventListener("DOMContentLoaded", init, { once: true })
    : init();
})();
</script>


<script>
(function() {
  'use strict';

  // Словник перекладів
  var translations = {
    uk: {
      telegram: 'Telegram',
      viber: 'Viber',
      callback: 'Передзвоніть'
    },
    ru: {
      telegram: 'Telegram',
      viber: 'Viber',
      callback: 'Перезвоните'
    }
  };

  // Ваші контакти
  var TELEGRAM_URL = 'https://t.me/Cyber_store_ua';
  var VIBER_URL = 'https://connect.viber.com/business/d3b6879a-0736-11f1-8589-aa49d1a7a8c8';

  // Визначити поточну мову
  function getCurrentLang() {
    var htmlLang = document.documentElement.lang;
    if (htmlLang) {
      return htmlLang.toLowerCase().split('-')[0];
    }

    var activeLang = document.querySelector('.lang-menu__item.is-active .lang-menu__link, .lang-menu__item.is-active span');
    if (activeLang) {
      var text = activeLang.textContent.trim().toLowerCase();
      if (text.includes('укр') || text === 'ua' || text === 'укр') return 'uk';
      if (text.includes('рус') || text === 'ru' || text === 'рус') return 'ru';
    }

    var path = window.location.pathname;
    if (path.includes('/ru/')) return 'ru';
    if (path.includes('/uk/')) return 'uk';

    return 'uk';
  }

  function t(key) {
    var lang = getCurrentLang();
    return (translations[lang] && translations[lang][key]) || translations.uk[key] || key;
  }

  function updateTexts() {
    var contactsBlock = document.querySelector('.top-contacts');
    if (!contactsBlock) return;

    var telegramBtn = contactsBlock.querySelector('.pill[data-service="telegram"]');
    var viberBtn = contactsBlock.querySelector('.pill[data-service="viber"]');
    var callbackBtn = contactsBlock.querySelector('.callback');

    if (telegramBtn) telegramBtn.textContent = t('telegram');
    if (viberBtn) viberBtn.textContent = t('viber');
    if (callbackBtn) callbackBtn.textContent = t('callback');
  }

  function restructureTopBar() {
    var topLayout = document.querySelector('.header__layout--top');
    if (!topLayout) {
      console.log('Top layout not found');
      return false;
    }

    if (topLayout.hasAttribute('data-restructured')) {
      updateTexts();
      return true;
    }

    // Знайти праву колонку
    var rightCol = topLayout.querySelector('.header__column--right');
    if (!rightCol) {
      console.log('Right column not found');
      return false;
    }

    // Перевірити чи контакти вже створені
    if (rightCol.querySelector('.top-contacts')) {
      topLayout.setAttribute('data-restructured', 'true');
      updateTexts();
      return true;
    }

    // Створити блок контактів
    var contactsDiv = document.createElement('div');
    contactsDiv.className = 'top-contacts';

    // Telegram
    var telegram = document.createElement('a');
    telegram.className = 'pill';
    telegram.href = TELEGRAM_URL;
    telegram.target = '_blank';
    telegram.rel = 'noopener noreferrer';
    telegram.setAttribute('role', 'button');
    telegram.setAttribute('aria-label', 'Telegram');
    telegram.setAttribute('data-service', 'telegram');
    telegram.textContent = t('telegram');

    // Viber
    var viber = document.createElement('a');
    viber.className = 'pill';
    viber.href = VIBER_URL;
    viber.target = '_blank';
    viber.rel = 'noopener noreferrer';
    viber.setAttribute('role', 'button');
    viber.setAttribute('aria-label', 'Viber');
    viber.setAttribute('data-service', 'viber');
    viber.textContent = t('viber');

    // Телефони
    var phone1 = document.createElement('span');
    phone1.className = 'phone';
    phone1.textContent = '+380 (73) 520 60 60';

    var sep = document.createElement('span');
    sep.className = 'sep';
    sep.textContent = '  ';

    var phone2 = document.createElement('span');
    phone2.className = 'phone';
    phone2.textContent = '';

    // Кнопка "Передзвоніть"
    var callback = document.createElement('a');
    callback.className = 'callback';
    callback.href = '#';
    callback.setAttribute('role', 'button');
    callback.setAttribute('data-modal', '#call-me');
    callback.textContent = t('callback');

    // Зібрати блок
    contactsDiv.appendChild(telegram);
    contactsDiv.appendChild(viber);
    contactsDiv.appendChild(phone1);
    contactsDiv.appendChild(sep);
    contactsDiv.appendChild(phone2);
    contactsDiv.appendChild(callback);

    // Вставити контакти В ПОЧАТОК правої колонки
    rightCol.insertBefore(contactsDiv, rightCol.firstChild);

    // Приховати соц.іконки
    var socials = rightCol.querySelector('.social-icons');
    if (socials) {
      socials.style.setProperty('display', 'none', 'important');
    }

    topLayout.setAttribute('data-restructured', 'true');
    console.log('Top bar restructured successfully');
    return true;
  }

  function watchLanguageChange() {
    var langMenu = document.querySelector('.lang-menu');
    if (langMenu) {
      var observer = new MutationObserver(function() {
        updateTexts();
      });
      observer.observe(langMenu, {
        attributes: true,
        subtree: true,
        attributeFilter: ['class']
      });
    }

    var htmlObserver = new MutationObserver(function() {
      updateTexts();
    });
    htmlObserver.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['lang']
    });

    var lastPath = window.location.pathname;
    setInterval(function() {
      if (window.location.pathname !== lastPath) {
        lastPath = window.location.pathname;
        updateTexts();
      }
    }, 500);
  }

  function init() {
    console.log('Initializing top bar script...');
    
    if (restructureTopBar()) {
      watchLanguageChange();
      return;
    }

    var attempts = 0;
    var maxAttempts = 50;
    var interval = setInterval(function() {
      attempts++;
      console.log('Attempt', attempts);
      if (restructureTopBar()) {
        watchLanguageChange();
        clearInterval(interval);
      } else if (attempts >= maxAttempts) {
        console.error('Failed to restructure top bar after', maxAttempts, 'attempts');
        clearInterval(interval);
      }
    }, 250);

    var observer = new MutationObserver(function() {
      if (restructureTopBar()) {
        watchLanguageChange();
      }
    });
    
    var target = document.querySelector('.header__top') || document.documentElement;
    observer.observe(target, { childList: true, subtree: true });
  }

  if (window.INIT && typeof window.INIT.add === 'function') {
    window.INIT.add(function() {
      init();
    }, window.$);
  } else {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  }
})();
</script>

function parseSlidesFromHoroshop() {
    const slides = [];
    const originalSlides = document.querySelectorAll('.banners__item');

    if (!originalSlides.length) {
        console.warn('Слайди не знайдено в розмітці Хорошоп');
        return slides;
    }

    originalSlides.forEach(slideElement => {
        const banner = slideElement.querySelector('.banner');
        const img = slideElement.querySelector('.banner-img');
        const link = banner?.querySelector('a')?.getAttribute('href') ||
            banner?.closest('a')?.getAttribute('href') || '#';
        const title = slideElement.querySelector('.banner__content')?.textContent?.trim() || '';

        if (img) {
            slides.push({
                image: img.src,
                title: title,
                link: link,
                alt: img.alt || title
            });
        }
    });

    console.log(`Знайдено ${slides.length} слайдів з Хорошоп`);
    return slides;
}

// === ПАРСИНГ КАТЕГОРІЙ З ХОРОШОП МЕНЮ ===
function parseCategoriesFromMenu() {
    const categories = [];

    let tabsList = document.querySelector('.products-menu .productsMenu-tabs-list');

    if (!tabsList) {
        tabsList = document.querySelector('.productsMenu-tabs-list');
    }

    if (!tabsList) {
        console.warn('Категорії не знайдено');
        return categories;
    }

    const tabs = tabsList.querySelectorAll('.productsMenu-tabs-list__tab');

    tabs.forEach(tab => {
        const link = tab.querySelector('.productsMenu-tabs-list__link');
        if (!link) return;

        const categoryName = link.textContent.trim();
        const categoryUrl = link.getAttribute('href');
        const targetId = link.getAttribute('data-target');

        // Парсимо іконку головної категорії з Хорошопу
        const categoryIconImg = tab.querySelector('.productsMenu-tabs-list__icon img');
        const categoryIconSrc = categoryIconImg ? categoryIconImg.getAttribute('src') : null;

        const submenuContainer = document.querySelector(`#${targetId}`);
        const submenu = [];

        if (submenuContainer) {
            const submenuItems = submenuContainer.querySelectorAll('.productsMenu-submenu-i');
            submenuItems.forEach(item => {
                const subLink = item.querySelector('.productsMenu-submenu-a');
                if (subLink) {
                    const subText = subLink.querySelector('.productsMenu-submenu-t');
                    if (subText) {
                        // Парсимо іконку підкатегорії з Хорошопу
                        const iconImage = item.querySelector('.productsMenu-submenu-image img');
                        const iconSrc = iconImage ? iconImage.getAttribute('src') : null;
                        
                        const nestedList = item.querySelector('.productsMenu-list');
                        const nestedSubmenu = [];

                        if (nestedList) {
                            const nestedItems = nestedList.querySelectorAll('.productsMenu-list-i a');
                            nestedItems.forEach(nestedLink => {
                                nestedSubmenu.push({
                                    text: nestedLink.textContent.trim(),
                                    link: nestedLink.getAttribute('href')
                                });
                            });
                        }

                        submenu.push({
                            text: subText.textContent.trim(),
                            link: subLink.getAttribute('href'),
                            icon: iconSrc, // Іконка підкатегорії
                            nested: nestedSubmenu.length > 0 ? nestedSubmenu : null
                        });
                    }
                }
            });
        }

        // Пріоритет: іконка з Хорошопу → CATEGORY_ICONS → дефолтна
        const categoryKey = categoryName.toLowerCase();
        const icon = categoryIconSrc || CATEGORY_ICONS[categoryKey] || '/images/icons/default.png';

        categories.push({
            text: categoryName,
            link: categoryUrl,
            icon: icon, // Іконка головної категорії
            submenu: submenu.length > 0 ? submenu : null
        });
    });

    console.log('Спарсені категорії:', categories);

// === ПОЗИЦІОНУВАННЯ ПІДМЕНЮ ===

    const catalogItems = document.querySelectorAll('.catalog-item.has-submenu');

    catalogItems.forEach(item => {
        const submenu = item.querySelector('.catalog-submenu');
        if (!submenu) return;

        item.addEventListener('mouseenter', () => {
            positionSubmenu(submenu);
        });
    });

    // Оновлюємо позицію при скролі та ресайзі
    window.addEventListener('scroll', updateAllSubmenuPositions);
    window.addEventListener('resize', updateAllSubmenuPositions);
}

function positionSubmenu(submenu) {
    const bannersWrapper = document.querySelector('.banners-wrapper');
    if (!bannersWrapper) return;

    const rect = bannersWrapper.getBoundingClientRect();

submenu.style.top = `${rect.top}px`;
submenu.style.left = `${rect.left}px`;
submenu.style.minHeight = '630px';
submenu.style.height = 'auto';
submenu.style.width = `${rect.width}px`;

    if (submenu.querySelector('.submenu-column')) return;

    const groups = Array.from(submenu.querySelectorAll('.submenu-group'));
    const colSize = Math.ceil(groups.length / 3);

const columns = [0, 1, 2].map(() => {
    const col = document.createElement('div');
    col.className = 'submenu-column';
    return col;
});
    groups.forEach((group, i) => {
        const colIndex = Math.floor(i / colSize);
        columns[Math.min(colIndex, 2)].appendChild(group);

    columns.forEach(col => submenu.appendChild(col));

function updateAllSubmenuPositions() {

// === ОНОВЛЕННЯ МОВИ ІНФОРМАЦІЙНОГО БЛОКУ ===
function updateInfoBlockLanguage(lang) {
    currentLanguage = lang;

    const infoBlock = document.querySelector('.info-block');
    if (!infoBlock) return;

    const titles = infoBlock.querySelectorAll('.info-card__title');
    const descriptions = infoBlock.querySelectorAll('.info-card__description');
    const arrows = infoBlock.querySelectorAll('.info-card__arrow span');

    titles.forEach(title => {
        const text = title.getAttribute(`data-${lang}`);
        if (text) title.textContent = text;
    });

    descriptions.forEach(desc => {
        const text = desc.getAttribute(`data-${lang}`);
        if (text) desc.textContent = text;
    });

    arrows.forEach(arrow => {
        const text = arrow.getAttribute(`data-${lang}`);
        if (text) arrow.textContent = text;
    });
}

// === ВІДСТЕЖЕННЯ ЗМІНИ МОВИ ===
function setupLanguageObserver() {
    function detectCurrentLanguage() {
        const activeLangButton = document.querySelector('.header__language .is-active, .language-switcher .is-active, .header__language .active, .language-switcher .active');
        if (activeLangButton) {
            const langText = activeLangButton.textContent.trim().toLowerCase();
            return (langText === 'рус' || langText === 'ru') ? 'ru' : 'uk';
        }

        const savedLang = localStorage.getItem('language') || localStorage.getItem('lang') || localStorage.getItem('horoshop_language');
        if (savedLang) {
            return savedLang.toLowerCase().includes('ru') ? 'ru' : 'uk';
        }

        if (window.location.href.includes('/ru/') || window.location.pathname.startsWith('/ru')) {
            return 'ru';
        }

        const htmlLang = document.documentElement.lang;
        if (htmlLang && htmlLang.toLowerCase().includes('ru')) {
            return 'ru';
        }

        return 'uk';
    }

    const initialLang = detectCurrentLanguage();
    if (initialLang !== currentLanguage) {
        updateInfoBlockLanguage(initialLang);
    }

    function handleLanguageClick(button) {
        const langText = button.textContent.trim().toLowerCase();
        const href = button.getAttribute('href') || '';

        let targetLang = 'uk';

        if (langText === 'рус' || langText === 'ru' || langText.includes('рус')) {
            targetLang = 'ru';
        } else if (langText === 'укр' || langText === 'uk' || langText === 'ua' || langText.includes('укр')) {
            targetLang = 'uk';
        } else if (href.includes('/ru') || href.includes('lang=ru')) {
            targetLang = 'ru';
        }

        setTimeout(() => {
            updateInfoBlockLanguage(targetLang);
        }, 150);
    }

    const langSelectors = [
        '.header__language a',
        '.language-switcher a',
        '.lang-switcher a',
        '[data-lang]',
        'a[href*="/ru"]',
        'a[href*="lang=ru"]',
        'a[href*="lang=uk"]'
    ];

    langSelectors.forEach(selector => {
        const buttons = document.querySelectorAll(selector);
        buttons.forEach(button => {
            button.addEventListener('click', () => handleLanguageClick(button));
        });
    });

    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                const target = mutation.target;
                if (target.matches('.header__language a, .language-switcher a')) {
                    setTimeout(() => {
                        const newLang = detectCurrentLanguage();
                        if (newLang !== currentLanguage) {
                            updateInfoBlockLanguage(newLang);
                        }
                    }, 100);
                }
            }

            if (mutation.type === 'childList') {
                mutation.addedNodes.forEach(node => {
                    if (node.nodeType === 1) {
                        langSelectors.forEach(selector => {
                            if (node.matches && node.matches(selector)) {
                                node.addEventListener('click', () => handleLanguageClick(node));
                            }
                            const buttons = node.querySelectorAll && node.querySelectorAll(selector);
                            if (buttons) {
                                buttons.forEach(button => {
                                    button.addEventListener('click', () => handleLanguageClick(button));
                                });
                            }
                        });
                    }
                });
            }
        });
    });

    const header = document.querySelector('.header, .header__section, header');
    if (header) {
        observer.observe(header, {
            attributes: true,
            attributeFilter: ['class', 'lang'],
            childList: true,
            subtree: true
        });
    }

    observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['lang']
    });

    let lastUrl = location.href;
    new MutationObserver(() => {
        const url = location.href;
        if (url !== lastUrl) {
            lastUrl = url;
            setTimeout(() => {
                const newLang = detectCurrentLanguage();
                if (newLang !== currentLanguage) {
                    updateInfoBlockLanguage(newLang);
                }
            }, 200);
        }
    }).observe(document, { subtree: true, childList: true });

    window.addEventListener('popstate', () => {
        setTimeout(() => {
            const newLang = detectCurrentLanguage();
            if (newLang !== currentLanguage) {
                updateInfoBlockLanguage(newLang);
            }
        }, 200);
    });
}

// === СЛАЙДЕР ===
const DOM = {
    track: null,
    arrows: {
        prev: null,
        next: null
    }
};

let state = {
    currentIndex: 0,
    isTransitioning: false,
    autoplayInterval: null,
    progressAnimationFrame: null,
    isAutoplayPaused: false,
    progressStartTime: null,
    progressDuration: CONFIG.slideTime,
    currentProgressBar: null,
    slides: [],
    totalSlides: 0
};

let lastWindowWidth = window.innerWidth;
let resizeTimeout = null;

function createSlides() {
    // Парсимо слайди з Хорошоп
    state.slides = parseSlidesFromHoroshop();
    state.totalSlides = state.slides.length;

    if (state.totalSlides === 0) {
        console.error('Немає слайдів для відображення');
        return;
    }

    DOM.track.innerHTML = '';

    // Створюємо трикратне повторення для безшовної прокрутки
    const allSlides = [...state.slides, ...state.slides, ...state.slides];

    allSlides.forEach((slideData, index) => {
        const slide = document.createElement('div');
        slide.className = 'swiper-slide';

        const item = document.createElement('div');
        item.className = 'banners__item';

        const banner = document.createElement('div');
        banner.className = 'banner';

        if (slideData.image) {
            const bannerImage = document.createElement('div');
            bannerImage.className = 'banner-image';

            const img = document.createElement('img');
            img.className = 'banner-img';
            img.src = slideData.image;
            img.alt = slideData.alt || slideData.title || '';

            bannerImage.appendChild(img);
            banner.appendChild(bannerImage);

            if (slideData.title) {
                const content = document.createElement('div');
                content.className = 'banner__content';
                content.textContent = slideData.title;
                banner.appendChild(content);
            }
        }

        if (slideData.link && slideData.link !== '#') {
            banner.style.cursor = 'pointer';
            banner.addEventListener('click', () => {
                window.location.href = slideData.link;
            });
        }

        item.appendChild(banner);
        slide.appendChild(item);
        DOM.track.appendChild(slide);
    });
}

function getSlideWidth() {
    const slide = DOM.track.querySelector('.swiper-slide');
    return slide ? slide.offsetWidth + 20 : 0;
}

function updatePosition(instant = false) {
    const slideWidth = getSlideWidth();
    const offset = -(state.currentIndex + state.totalSlides) * slideWidth;
    DOM.track.style.transition = instant ? 'none' : 'transform 0.5s ease-in-out';
    DOM.track.style.transform = `translateX(${offset}px)`;
    if (instant) {
        void DOM.track.offsetWidth;
    }
}

function animateProgressBar(progressBar) {
    if (!progressBar) return;

    if (state.progressAnimationFrame) {
        cancelAnimationFrame(state.progressAnimationFrame);
    }

    state.progressStartTime = performance.now();
    state.currentProgressBar = progressBar;

    progressBar.style.setProperty('--progress', '0%');
    progressBar.style.setProperty('--progress-opacity', '0');

    function animate(currentTime) {
        if (!state.currentProgressBar || state.isAutoplayPaused) return;

        const elapsed = currentTime - state.progressStartTime;
        const progress = Math.min(elapsed / state.progressDuration, 1);

        progressBar.style.setProperty('--progress', `${progress * 100}%`);

        if (progress > 0) {
            progressBar.style.setProperty('--progress-opacity', '1');
        }

        if (progress < 1) {
            state.progressAnimationFrame = requestAnimationFrame(animate);
        }
    }

    state.progressAnimationFrame = requestAnimationFrame(animate);
}

function updateProgressBars(forceRestart = false) {
    const progressBars = document.querySelectorAll('.banners-pagination__bullet');
    if (!progressBars.length) return;

    const normalizedIndex = ((state.currentIndex % state.totalSlides) + state.totalSlides) % state.totalSlides;

    if (state.progressAnimationFrame) {
        cancelAnimationFrame(state.progressAnimationFrame);
        state.progressAnimationFrame = null;
    }

    progressBars.forEach(bar => {
        bar.classList.remove('is-active');
        bar.style.setProperty('--progress', '0%');
    });

    const activeBar = progressBars[normalizedIndex];
    if (activeBar) {
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                activeBar.classList.add('is-active');
                if (!state.isAutoplayPaused) {
                    animateProgressBar(activeBar);
                }
            });
        });
    }
}

function pauseProgressAnimation() {
    if (state.progressAnimationFrame) {
        cancelAnimationFrame(state.progressAnimationFrame);
        state.progressAnimationFrame = null;
    }
}

function resumeProgressAnimation() {
    const progressBars = document.querySelectorAll('.banners-pagination__bullet');
    const normalizedIndex = ((state.currentIndex % state.totalSlides) + state.totalSlides) % state.totalSlides;
    const activeBar = progressBars[normalizedIndex];

    if (activeBar && !state.isAutoplayPaused) {
        animateProgressBar(activeBar);
    }
}

function goToSlide(direction) {
    if (state.isTransitioning) return;

    state.isTransitioning = true;
    state.currentIndex += direction;
    updatePosition();
    updateProgressBars(true);

    setTimeout(() => {
        if (state.currentIndex >= state.totalSlides) {
            state.currentIndex = state.currentIndex - state.totalSlides;
            updatePosition(true);
        } else if (state.currentIndex < 0) {
            state.currentIndex = state.currentIndex + state.totalSlides;
            updatePosition(true);
        }

        state.isTransitioning = false;
    }, 500);

    if (!state.isAutoplayPaused) {
        restartAutoplay();
    }
}

function goToSlideByIndex(targetIndex) {
    if (state.isTransitioning) return;

    state.isTransitioning = true;

    const currentNormalized = ((state.currentIndex % state.totalSlides) + state.totalSlides) % state.totalSlides;
    let diff = targetIndex - currentNormalized;

    if (diff > state.totalSlides / 2) {
        diff -= state.totalSlides;
    } else if (diff < -state.totalSlides / 2) {
        diff += state.totalSlides;
    }

    state.currentIndex += diff;
    updatePosition();
    updateProgressBars(true);

    setTimeout(() => {
        state.isTransitioning = false;
    }, 500);

    if (!state.isAutoplayPaused) {
        restartAutoplay();
    }
}

function pauseAutoplay() {
    state.isAutoplayPaused = true;
    pauseProgressAnimation();
    if (state.autoplayInterval) {
        clearInterval(state.autoplayInterval);
        state.autoplayInterval = null;
    }
}

function resumeAutoplay() {
    state.isAutoplayPaused = false;
    resumeProgressAnimation();
    restartAutoplay();
}

function restartAutoplay() {
    if (state.autoplayInterval) {
        clearInterval(state.autoplayInterval);
        state.autoplayInterval = null;
    }

    if (!state.isAutoplayPaused) {
        state.autoplayInterval = setInterval(() => {
            goToSlide(1);
        }, CONFIG.slideTime);
    }
}

function handleResize() {
    const currentWidth = window.innerWidth;

    if (Math.abs(currentWidth - lastWindowWidth) > 50) {
        lastWindowWidth = currentWidth;

        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            const normalizedIndex = ((state.currentIndex % state.totalSlides) + state.totalSlides) % state.totalSlides;
            createSlides();

            requestAnimationFrame(() => {
                state.currentIndex = normalizedIndex;
                updatePosition(true);
                updateProgressBars(true);
            });
        }, 150);
    } else {
        updatePosition(true);
    }
}

function setupCatalogHoverHandlers() {
    const catalogItems = document.querySelectorAll('.catalog-item.has-submenu');
    const catalogSidebar = document.querySelector('.catalog-sidebar');

    if (!catalogSidebar) return;

    catalogSidebar.addEventListener('mouseenter', () => {
        pauseAutoplay();
    });

    catalogSidebar.addEventListener('mouseleave', () => {
        resumeAutoplay();
    });

    catalogItems.forEach(item => {
        const submenu = item.querySelector('.catalog-submenu');

        if (submenu) {
            item.addEventListener('mouseenter', () => {
                pauseAutoplay();
            });

            submenu.addEventListener('mouseenter', () => {
                pauseAutoplay();
            });

            submenu.addEventListener('mouseleave', (e) => {
                const sidebarRect = catalogSidebar.getBoundingClientRect();
                if (e.clientX < sidebarRect.left || e.clientX > sidebarRect.right ||
                    e.clientY < sidebarRect.top || e.clientY > sidebarRect.bottom) {
                    resumeAutoplay();
                }
            });
        }
    });
}

// === СПОСТЕРІГАЧ ЗА ЗМІНАМИ МЕНЮ ===
function observeMenuChanges() {
    const menuContainer = document.querySelector('.products-menu') ||
        document.querySelector('.productsMenu-tabs-list')?.closest('.header__section');

    if (!menuContainer) return;

    const observer = new MutationObserver((mutations) => {
        let shouldUpdate = false;

        mutations.forEach((mutation) => {
            if (mutation.type === 'childList' &&
                (mutation.target.classList.contains('productsMenu-tabs-list') ||
                    mutation.target.closest('.productsMenu-tabs-list'))) {
                shouldUpdate = true;
            }
        });

        if (shouldUpdate) {
            console.log('Виявлено зміни в меню, оновлюємо сайдбар...');
            updateCatalogSidebar();
        }
    });

    observer.observe(menuContainer, {
        childList: true,
        subtree: true
    });
}

// === ОНОВЛЕННЯ САЙДБАРУ ===
function updateCatalogSidebar() {
    const existingSidebar = document.querySelector('.catalog-sidebar');
    if (existingSidebar) {
        existingSidebar.remove();
    }

    createCatalogSidebar();

    setTimeout(() => {
        setupCatalogHoverHandlers();
        setupSubmenuPositioning();
    }, 100);
}

// === СПОСТЕРІГАЧ ЗА ЗМІНАМИ СЛАЙДІВ ===
function observeSlideChanges() {
    const bannersSection = document.querySelector('.banners');
    if (!bannersSection) return;

    const observer = new MutationObserver((mutations) => {
        let shouldUpdate = false;

        mutations.forEach((mutation) => {
            // Перевіряємо зміни в оригінальних слайдах Хорошоп
            if (mutation.type === 'childList' &&
                (mutation.target.classList.contains('banners') ||
                    mutation.target.classList.contains('banners__slider'))) {
                shouldUpdate = true;
            }
        });

        if (shouldUpdate) {
            console.log('Виявлено зміни в слайдах, оновлюємо слайдер...');
            const normalizedIndex = ((state.currentIndex % state.totalSlides) + state.totalSlides) % state.totalSlides;

            createSlides();

            requestAnimationFrame(() => {
                state.currentIndex = normalizedIndex;
                updatePosition(true);
                updateProgressBars(true);
            });
        }
    });

    observer.observe(bannersSection, {
        childList: true,
        subtree: true
    });
}

function init() {
    const checkMenuLoaded = setInterval(() => {
        const menuLoaded = document.querySelector('.productsMenu-tabs-list') ||
            document.querySelector('.products-menu');

        if (menuLoaded) {
            clearInterval(checkMenuLoaded);

            console.log('Меню Хорошоп завантажено, парсимо категорії...');

            // Ініціалізуємо DOM елементи
            DOM.track = document.querySelector('.banners__slider-wrapper');
            DOM.arrows.prev = document.querySelector('.j-banners-arrow-prev');
            DOM.arrows.next = document.querySelector('.j-banners-arrow-next');

            if (!DOM.track) {
                console.error('Не знайдено .banners__slider-wrapper');
                return;
            }

            createCatalogSidebar();
            createSlides();
            createInfoBlock();

            setTimeout(() => {
                updatePosition(true);
                updateProgressBars(true);
                restartAutoplay();
            }, 100);

            if (DOM.arrows.prev) {
                DOM.arrows.prev.addEventListener('click', () => goToSlide(-1));
            }

            if (DOM.arrows.next) {
                DOM.arrows.next.addEventListener('click', () => goToSlide(1));
            }

            window.addEventListener('resize', handleResize);

            document.querySelectorAll('.banners-pagination__bullet').forEach((bar, index) => {
                bar.addEventListener('click', () => goToSlideByIndex(index));
            });

            const bannersContainer = document.querySelector('.banners__container');
            if (bannersContainer) {
                bannersContainer.addEventListener('mouseenter', () => {
                    pauseAutoplay();
                });

                bannersContainer.addEventListener('mouseleave', () => {
                    resumeAutoplay();
                });
            }

            setTimeout(() => {
                setupCatalogHoverHandlers();
            }, 200);

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    pauseProgressAnimation();
                } else if (!state.isAutoplayPaused) {
                    resumeProgressAnimation();
                }
            });

            // Спостерігачі
            observeMenuChanges();
            observeSlideChanges();
            setupLanguageObserver();
        }
    }, 100);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>

<script>
(function() {
  function manageSidebar() {

            { name: 'Обзоры', url: '/ohliady/' },

<script>
// Рішення 1: Примусове активування дропдауна на сторінках підкатегорій
$(document).ready(function() {
    // Знаходимо елемент меню з класом is-active та hs-has-sub
    $('.site-menu__item.is-active.hs-has-sub').each(function() {
        var $menuItem = $(this);
        var $link = $menuItem.find('.site-menu__link');
        var $submenu = $menuItem.find('.hs-submenu');
        
        // Додаємо обробники подій для наведення миші
        $menuItem.on('mouseenter', function() {
            $link.attr('aria-expanded', 'true');
            $submenu.addClass('is-open').css('display', 'block');
        });
        
        $menuItem.on('mouseleave', function() {
            $link.attr('aria-expanded', 'false');
            $submenu.removeClass('is-open').css('display', 'none');
        });
        
        // Додаємо обробник для кліку на посилання (для мобільних)
        $link.on('click', function(e) {
            if ($submenu.is(':visible')) {
                // Якщо підменю вже відкрите, дозволяємо перехід
                return true;
            } else {
                // Якщо підменю закрите, відкриваємо його
                e.preventDefault();
                $link.attr('aria-expanded', 'true');
                $submenu.addClass('is-open').css('display', 'block');
            }
        });
    });
});
</script>
<script>
// Відслідковуємо зміни стилів і одразу виправляємо їх
const observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
        if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
            const $submenu = $(mutation.target);
            if ($submenu.hasClass('hs-submenu') && $submenu.closest('.is-active').length) {
                $submenu.css({
                    'position': 'absolute',
                    'left': '0',
                    'top': '100%',
                    'width': 'auto',
                    'max-width': 'none'
                });
            }
        }
    });
});

$('.hs-submenu').each(function() {
    observer.observe(this, { attributes: true });
});
</script>

<script>
/* ============================================
   MOBILE INFO-BLOCK INJECTION

   ============================================ */

(function() {
  'use strict';

  // Визначення поточної мови
  function getCurrentLanguage() {
    const html = document.documentElement;
    const lang = html.getAttribute('lang') || html.getAttribute('xml:lang') || 'uk';
    return lang.toLowerCase().startsWith('ru') ? 'ru' : 'uk';
  }

  // Дані для карток інфо-блоку
  const INFO_CARDS = [

      icon: `<img src="/content/uploads/images/frame-2699592.png" alt="Trade-in" style="width: 48px; height: 48px; object-fit: contain;">`,

    },
    {
      icon: `<img src="/content/uploads/images/frame-2699589(1).png" alt="Уцінені товари" style="width: 48px; height: 48px; object-fit: contain;">`,
      title: { uk: 'Уцінені', ru: 'Уцененные' },
      description: { uk: 'Товари', ru: 'Товары' },
      action: { uk: 'Вперед', ru: 'Вперед' },
      link: 'https://cyberstore.com.ua/utsinka/',
      bgColor: '#E3F2FD'
    },
    {
      icon: `<img src="/content/uploads/images/frame-2699591.png" alt="Реєстрація" style="width: 48px; height: 48px; object-fit: contain;">`,
      title: { uk: 'Реєструйся та', ru: 'Регистрируйся и' },
      description: { uk: 'накопичуй бонуси', ru: 'накапливай бонусы' },
      action: { uk: 'Вперед', ru: 'Вперед' },
      link: '#',
      bgColor: '#F3E5F5',
      isSignup: true  // ДОДАНО МІТКУ
    }
  ];

  // Створення інфо-блоку
  function createInfoBlock() {
    if (document.querySelector('.info-block') || document.querySelector('.mobile-info-block')) {
      console.log('Info-block вже існує');
      return;
    }

    const bannerSection = document.querySelector('.banners.banners--block.banners--gaps-l');
    if (!bannerSection) {
      console.log('Банер не знайдено');
      return;
    }

    const currentLang = getCurrentLanguage();
    const infoBlock = document.createElement('div');
    infoBlock.className = 'info-block';

    INFO_CARDS.forEach(card => {
      const cardElement = document.createElement('a');
      cardElement.href = card.link;
      cardElement.className = 'info-card';
      
      // ДОДАНО: Встановлення CSS змінної для фону
      if (card.bgColor) {
        cardElement.style.setProperty('--card-bg', card.bgColor);
      }
      
      // ДОДАНО: Мітка для картки реєстрації
      if (card.isSignup) {
        cardElement.setAttribute('data-signup', 'true');
      }

      cardElement.innerHTML = `
        <div class="info-card__icon">${card.icon}</div>
        <div class="info-card__content">
          <div class="info-card__title" data-uk="${card.title.uk}" data-ru="${card.title.ru}">
            ${card.title[currentLang]}
          </div>
          <div class="info-card__description" data-uk="${card.description.uk}" data-ru="${card.description.ru}">
            ${card.description[currentLang]}
          </div>
        </div>
        <div class="info-card__arrow" data-uk="${card.action.uk}" data-ru="${card.action.ru}">
          ${card.action[currentLang]}
        </div>
      `;

      infoBlock.appendChild(cardElement);
    });

    bannerSection.parentNode.insertBefore(infoBlock, bannerSection.nextSibling);
    console.log('✓ Info-block успішно створено на мобільній версії');
  }

  // Оновлення мови інфо-блоку
  function updateInfoBlockLanguage(lang) {
    const infoBlock = document.querySelector('.info-block') || document.querySelector('.mobile-info-block');
    if (!infoBlock) return;

    const titles = infoBlock.querySelectorAll('.info-card__title');
    const descriptions = infoBlock.querySelectorAll('.info-card__description');
    const arrows = infoBlock.querySelectorAll('.info-card__arrow');

    titles.forEach(title => {
      const text = title.getAttribute(`data-${lang}`);
      if (text) title.textContent = text;
    });

    descriptions.forEach(desc => {
      const text = desc.getAttribute(`data-${lang}`);
      if (text) desc.textContent = text;
    });

    arrows.forEach(arrow => {
      const text = arrow.getAttribute(`data-${lang}`);
      if (text) arrow.textContent = text;
    });

    console.log(`✓ Мова інфо-блоку оновлена на: ${lang}`);
  }

  // Відстеження зміни мови
  function setupLanguageObserver() {
    const observer = new MutationObserver(() => {
      const newLang = getCurrentLanguage();
      updateInfoBlockLanguage(newLang);
    });

    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['lang']
    });

    let lastUrl = location.href;
    new MutationObserver(() => {
      const url = location.href;
      if (url !== lastUrl) {
        lastUrl = url;
        setTimeout(() => {
          const newLang = getCurrentLanguage();
          updateInfoBlockLanguage(newLang);
        }, 200);
      }
    }).observe(document, { subtree: true, childList: true });
  }

  // Ініціалізація
  function init() {
    const isMobileOrTablet = window.innerWidth <= 1024;
    
    if (!isMobileOrTablet) {
      console.log('Це десктоп версія');
      return;
    }

    console.log('=== MOBILE/TABLET INFO-BLOCK INITIALIZATION ===');

    let attempts = 0;
    const maxAttempts = 20;

    const checkBanner = setInterval(() => {
      attempts++;
      const banner = document.querySelector('.banners.banners--block.banners--gaps-l');

      if (banner) {
        clearInterval(checkBanner);
        createInfoBlock();
        setupLanguageObserver();
        console.log('✓ Mobile/Tablet info-block успішно ініціалізовано');
      } else if (attempts >= maxAttempts) {
        clearInterval(checkBanner);
        console.error('Не вдалося знайти банер після', maxAttempts, 'спроб');
      }
    }, 300);

    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        const isMobileOrTabletNow = window.innerWidth <= 1024;
        if (isMobileOrTabletNow && !document.querySelector('.info-block')) {
          createInfoBlock();
        } else if (!isMobileOrTabletNow && document.querySelector('.info-block')) {
          const infoBlock = document.querySelector('.info-block');
          if (infoBlock) infoBlock.remove();
        }
      }, 250);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  if (window.INIT && typeof window.INIT.add === 'function') {
    window.INIT.add(init, window.$);
  }
})();
</script>

<script>
// ОКРЕМИЙ СКРИПТ ДЛЯ ВІДКРИТТЯ POPUP РЕЄСТРАЦІЇ
(function() {
  'use strict';

  function initSignupCardClick() {
    // Знайти всі info-card з фіолетовим фоном (це картка реєстрації)
    var cards = document.querySelectorAll('.info-card');
    var signupCard = null;
    
    // Знайти картку з bgColor #F3E5F5
    for (var i = 0; i < cards.length; i++) {
      var bg = cards[i].style.getPropertyValue('--card-bg');
      if (bg && bg.trim().toLowerCase() === '#f3e5f5') {
        signupCard = cards[i];
        break;
      }
    }
    
    if (!signupCard) {
      console.log('Signup card not found');
      return;
    }
    
    console.log('Signup card found, adding click handler');
    
    // Додати обробник кліку
    signupCard.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      
      console.log('Signup card clicked');
      
      // Спосіб 1: Знайти існуючу кнопку входу і клікнути на неї
      var userbarButton = document.querySelector('[data-modal="#sign-in"]');
      if (userbarButton) {
        console.log('Found userbar button, clicking it');
        userbarButton.click();
        
        // Почекати і переключити на таб реєстрації
        setTimeout(function() {
          var signupTab = document.querySelector('[href="#j-popup-tab-signup"]');
          if (signupTab) {
            console.log('Switching to signup tab');
            signupTab.click();
          }
        }, 200);
        return;
      }
      
      // Спосіб 2: Якщо Modal доступний
      if (typeof Modal !== 'undefined' && typeof Modal.open === 'function') {
        console.log('Using Modal.open');
        Modal.open('#sign-in');
        setTimeout(function() {
          var signupTab = document.querySelector('[href="#j-popup-tab-signup"]');
          if (signupTab) {
            signupTab.click();
          }
        }, 200);
        return;
      }
      
      // Спосіб 3: Показати popup напряму
      var popup = document.querySelector('#sign-in');
      if (popup) {
        console.log('Showing popup directly');
        popup.style.display = 'block';
        setTimeout(function() {
          var signupTab = document.querySelector('[href="#j-popup-tab-signup"]');
          if (signupTab) {
            signupTab.click();
          }
        }, 200);
      }
    });
  }

  // Ініціалізація з затримкою, щоб картки встигли створитися

    var attempts = 0;
    var maxAttempts = 20;

        clearInterval(interval);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

 * Додаємо: "В бажання" та "Порівняти"
 */

(function() {
  'use strict';

  function getProductIdFromUrl(url) {
    const match = url.match(/\/(\d+)($|\/)/);
    return match ? match[1] : null;
  }

  function createToolbar(productId) {
    const toolbar = document.createElement('div');
    toolbar.className = 'catalogCard-toolbar j-catalog-card-toolbar products-toolbar';
    toolbar.setAttribute('data-product-id', productId);

    // Кнопка "В бажання"
    const favButton = document.createElement('div');
    favButton.className = 'catalogCard-toolbar-item';
    favButton.innerHTML = `
      <button class="favorites-button j-widget-favorites-add" 
              data-skin="catalog" 
              data-button-size="m" 
              data-show-button-text="1" 
              id="favorites-${productId}" 
              title="Додати товар в список бажань">
        <span class="favorites-button__icon favorites-button__icon--m">
          <svg class="icon icon--heart"><use xlink:href="#icon-heart-stroke"></use></svg>
        </span>
        <div class="favorites-button__text">В бажання</div>
      </button>
    `;

    // Кнопка "Порівняти"
    const compareButton = document.createElement('div');
    compareButton.className = 'catalogCard-toolbar-item';
    compareButton.innerHTML = `
      <a class="comparison-button j-widget-comparison-add" 
         id="comparison-product-${productId}" 
         data-skin="modern" 
         data-button-size="m" 
         data-show-button-text="1" 
         title="Додати товар в список порівнянь">
        <span class="comparison-button__icon j-button">
          <svg class="icon icon--comparison-m">
            <use xlink:href="#icon-comparison-m"></use>
          </svg>
        </span>
        <span class="comparison-button__text">Порівняти</span>
      </a>
    `;

    toolbar.appendChild(favButton);
    toolbar.appendChild(compareButton);

    return toolbar;
  }

  function addToolbarToCards() {
    // Селектор для обох блоків
    const cards = document.querySelectorAll('.recentProducts-i, .productsSlider-i');
    
    if (!cards.length) {
      console.log('❌ Картки не знайдено');
      return false;
    }

    let addedCount = 0;

    cards.forEach(card => {
      // Перевіряємо чи вже є toolbar
      if (card.querySelector('.products-toolbar')) {
        return;
      }

      // Знаходимо title в картці
      const titleDiv = card.querySelector('.recentProducts-title, .productsSlider-title');
      if (!titleDiv) {
        console.warn('⚠️ Title не знайдено в картці');
        return;
      }

      // Знаходимо посилання на товар
      const productLink = card.querySelector('.recentProducts-link, a[property="url"]');
      if (!productLink) {
        console.warn('⚠️ Посилання не знайдено');
        return;
      }

      const productUrl = productLink.getAttribute('href');
      const productId = getProductIdFromUrl(productUrl);

      if (!productId) {
        console.warn('⚠️ ID товару не знайдено в URL:', productUrl);
        return;
      }

      // Створюємо та додаємо toolbar
      const toolbar = createToolbar(productId);
      titleDiv.appendChild(toolbar);
      addedCount++;
      
      console.log(`✅ Toolbar додана для товару ${productId}`);
    });

    if (addedCount > 0) {
      console.log(`✅ Успішно додано ${addedCount} toolbar!`);
    }

    return addedCount > 0;
  }

  function observeNewCards() {
    const observer = new MutationObserver(() => {
      addToolbarToCards();
    });

    const container = document.querySelector('.recentProducts-wrapper, .productsSlider-wrapper') || document.body;
    observer.observe(container, {
      childList: true,
      subtree: true
    });
  }

  // Тригер обновлення Horoshop компонентів
  function reinitHoroshopComponents() {
    if (window.INIT && typeof window.INIT.add === 'function') {
      window.INIT.add(function() {
        console.log('✅ Horoshop компоненти переініціалізовані');
      }, window.$);
    }
  }

  function init() {
    console.log('=== ЗАПУСК СКРИПТА TOOLBAR ===');
    
    let attempts = 0;
    const interval = setInterval(() => {
      attempts++;
      
      if (addToolbarToCards()) {
        clearInterval(interval);
        observeNewCards();
        reinitHoroshopComponents();
        console.log('✅ Toolbar запущено успішно!');
      } else if (attempts >= 20) {
        clearInterval(interval);
        console.warn('⚠️ Не вдалося знайти картки');
      }
    }, 300);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  if (window.INIT && typeof window.INIT.add === 'function') {
    window.INIT.add(init, window.$);
  }
})();
</script>

(function() {

  function reorganizeCardContent() {

    const recentCards = document.querySelectorAll('.recentProducts-i');
    recentCards.forEach(card => {
      const titleDiv = card.querySelector('.recentProducts-title');
      if (!titleDiv) return;

      const priceNew = card.querySelector('.recentProducts-price--new');
      const priceOld = card.querySelector('.recentProducts-price--old');

      if (!priceNew) return;
      if (titleDiv.contains(priceNew)) return;

      let pricesWrapper = titleDiv.querySelector('.recentProducts-prices-wrapper');
      if (!pricesWrapper) {
        pricesWrapper = document.createElement('div');
        pricesWrapper.className = 'recentProducts-prices-wrapper';
        
        const productLink = titleDiv.querySelector('a');
        if (productLink) {
          productLink.parentNode.insertBefore(pricesWrapper, productLink.nextSibling);
        } else {
          titleDiv.appendChild(pricesWrapper);
        }
      }

      pricesWrapper.appendChild(priceNew);
      if (priceOld) {
        pricesWrapper.appendChild(priceOld);
      }

      reorganizeCardContent();

      if (document.querySelectorAll('.recentProducts-title .recentProducts-price--new, .productsSlider-title .productsSlider-price').length > 0) {
        clearInterval(interval);
        observeChanges();
        console.log('✅ Ціни успішно переміщені!');
      } else if (attempts >= 20) {
        clearInterval(interval);
        console.warn('⚠️ Не вдалося переміщити ціни');
      }
    }, 300);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  if (window.INIT && typeof window.INIT.add === 'function') {
    window.INIT.add(init, window.$);
  }
})();

(function() {

      });

  }

  function observeNewCards() {
    const observer = new MutationObserver(() => {
      makeCardClickable();

      childList: true,

(function() {

  function syncCartBadge() {
    const originalBadge = document.querySelector('.j-mini-cart-quantity');
    const bottomBadge = document.getElementById('bottom-cart-badge');
    
    if (!originalBadge || !bottomBadge) {
      return;
    }
    
    const countText = originalBadge.textContent.trim();
    const numCount = parseInt(countText) || 0;
    const isVisible = originalBadge.style.display !== 'none';
    
    console.log('Syncing cart - Count:', numCount, 'Visible:', isVisible);
    
    bottomBadge.textContent = numCount;
    
    if (numCount > 0 && isVisible) {
      bottomBadge.style.display = 'flex';
    } else {
      bottomBadge.style.display = 'none';
    }
  }
  
  function initCartSync() {
    const originalBadge = document.querySelector('.j-mini-cart-quantity');
    
    if (!originalBadge) {
      setTimeout(initCartSync, 300);
      return;
    }
    
    console.log('Cart badge found!');
    
    const observer = new MutationObserver(function(mutations) {
      console.log('Cart changed!');
      syncCartBadge();
    });
    
    observer.observe(originalBadge, {
      childList: true,
      characterData: true,
      subtree: true,
      attributes: true,
      attributeFilter: ['style', 'class']
    });
    
    const cartContainer = document.querySelector('.header__button--cart');
    if (cartContainer) {

        syncCartBadge();

      containerObserver.observe(cartContainer, {

        subtree: true,
        attributes: true
      });
    }
    
    setInterval(syncCartBadge, 2000);

})();

<script>
// СКРИПТ: Відстеження останньої клікнутої категорії (SIDEBAR + TOP MENU)
(function() {
  console.log('=== PROPER CLICK TRACKING (Extended) ===');
  
  let lastClickedItem = null; // Зберігаємо останній клікнутий елемент
  let touchStartY = 0; // Початкова позиція touch
  
  // ========== ФУНКЦІЯ ДЛЯ SIDEBAR ==========
  function makeCatalogTouchFriendly() {
    const catalogItems = document.querySelectorAll('.catalog-sidebar .catalog-item.has-submenu');
    
    console.log(`Found ${catalogItems.length} catalog items with submenu`);
    
    catalogItems.forEach((item, index) => {
      const submenu = item.querySelector('.catalog-submenu');
      
      if (submenu) {
        // HOVER - автоматичне перемикання
 item.addEventListener('mouseenter', function() {
  document.querySelectorAll('.catalog-sidebar .touch-hover').forEach(el => {
    el.classList.remove('touch-hover');
  });
  
  this.classList.add('touch-hover');
  
  if (typeof positionSubmenu === 'function') {
    positionSubmenu(submenu);
  }
  
  console.log('Switched to item', index, 'on hover');
});
        
        // CLICK
        item.addEventListener('click', function(e) {
          // Перевіряємо, чи клік був по підкатегорії
          const clickedSubmenuItem = e.target.closest('.submenu-item, .nested-submenu-item');
          
          if (clickedSubmenuItem) {
            console.log('Click on submenu item, allowing navigation');
            return;
          }
          
          // Перевіряємо, чи це ТОЙ САМИЙ елемент, на який був останній клік
          const isSecondClickOnSameItem = (this === lastClickedItem);
          
          if (!isSecondClickOnSameItem) {
            // Перший клік на ЦЮ категорію - відкриваємо підменю
            e.preventDefault();
            e.stopPropagation();
            
            document.querySelectorAll('.catalog-sidebar .touch-hover').forEach(el => {
              el.classList.remove('touch-hover');
            });
            
            this.classList.add('touch-hover');
            
            if (typeof positionSubmenu === 'function') {
              positionSubmenu(submenu);
            }
            
            // Зберігаємо що на ЦЕЙ елемент був клік
            lastClickedItem = this;
            
            console.log('First click on item', index, '- opened submenu');
          } else {
            // Другий клік на ТУ САМУ категорію - дозволяємо перехід
            console.log('Second click on item', index, '- allowing navigation');
            lastClickedItem = null; // Скидаємо
          }
        }, true);
      }
    });
    
    // Закриття при кліку поза меню
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.catalog-sidebar')) {
        document.querySelectorAll('.catalog-sidebar .touch-hover').forEach(el => {
          el.classList.remove('touch-hover');
        });
        lastClickedItem = null; // Скидаємо
      }
    });
    
    // Закриття при виході миші з сайдбару
    const sidebar = document.querySelector('.catalog-sidebar');
    if (sidebar) {
      sidebar.addEventListener('mouseleave', function() {
        document.querySelectorAll('.catalog-sidebar .touch-hover').forEach(el => {
          el.classList.remove('touch-hover');
        });
        lastClickedItem = null; // Скидаємо
      });
    }
    
    console.log('=== Sidebar click tracking initialized ===');
  }
  
  // ========== ФУНКЦІЯ ДЛЯ TOP MENU ==========
  function makeTopMenuTouchFriendly() {
    const menuTabs = document.querySelectorAll('.productsMenu-tabs-list__tab');
    
    console.log(`Found ${menuTabs.length} top menu tabs`);
    
    menuTabs.forEach((tab, index) => {
      const link = tab.querySelector('.productsMenu-tabs-list__link');
      const dataTarget = link ? link.getAttribute('data-target') : null;
      
      // Якщо є data-target, значить є підменю
      if (dataTarget) {
        // HOVER - автоматичне перемикання
        tab.addEventListener('mouseenter', function() {
          const anyOpen = document.querySelector('.productsMenu-tabs-list__tab.__hover');
          
          if (anyOpen) {
            document.querySelectorAll('.productsMenu-tabs-list__tab.__hover').forEach(el => {
              el.classList.remove('__hover');
            });
            
            this.classList.add('__hover');
            
            console.log('Switched to top menu tab', index, 'on hover');
          }
        });
        
        // CLICK
        link.addEventListener('click', function(e) {
          // Перевіряємо, чи це ТОЙ САМИЙ елемент, на який був останній клік
          const isSecondClickOnSameItem = (tab === lastClickedItem);
          
          if (!isSecondClickOnSameItem) {
            // Перший клік на ЦЮ категорію - відкриваємо підменю
            e.preventDefault();
            e.stopPropagation();
            
            document.querySelectorAll('.productsMenu-tabs-list__tab.__hover').forEach(el => {
              el.classList.remove('__hover');
            });
            
            tab.classList.add('__hover');
            
            // Зберігаємо що на ЦЕЙ елемент був клік
            lastClickedItem = tab;
            
            console.log('First click on top menu tab', index, '- opened submenu');
          } else {
            // Другий клік на ТУ САМУ категорію - дозволяємо перехід
            console.log('Second click on top menu tab', index, '- allowing navigation');
            lastClickedItem = null; // Скидаємо
          }
        }, true);
      }
    });
    
    // Закриття при кліку поза меню
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.productsMenu-tabs-list')) {
        document.querySelectorAll('.productsMenu-tabs-list__tab.__hover').forEach(el => {
          el.classList.remove('__hover');
        });
        lastClickedItem = null; // Скидаємо
      }
    });
    
    // Закриття при виході миші з меню
    const menuList = document.querySelector('.productsMenu-tabs-list');
    if (menuList) {
      menuList.addEventListener('mouseleave', function() {
        document.querySelectorAll('.productsMenu-tabs-list__tab.__hover').forEach(el => {
          el.classList.remove('__hover');
        });
        lastClickedItem = null; // Скидаємо
      });
    }
    
    console.log('=== Top menu click tracking initialized ===');
  }
  
  // ========== ЗАКРИТТЯ ПРИ СКРОЛІ НА ПЛАНШЕТАХ ==========
  function handleTouchScroll() {
    // Запам'ятовуємо початкову позицію
    document.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    
    // Відслідковуємо скрол
    document.addEventListener('touchmove', function(e) {
      const touchCurrentY = e.touches[0].clientY;
      const delta = Math.abs(touchCurrentY - touchStartY);
      
      // Якщо проскролили більше 30px - закриваємо меню
      if (delta > 30) {
        // Закриваємо sidebar меню
        document.querySelectorAll('.catalog-sidebar .touch-hover').forEach(el => {
          el.classList.remove('touch-hover');
        });
        
        // Закриваємо top меню
        document.querySelectorAll('.productsMenu-tabs-list__tab.__hover').forEach(el => {
          el.classList.remove('__hover');
        });
        
        lastClickedItem = null;
        console.log('Touch scroll detected - menus closed');
      }
    }, { passive: true });
    
    console.log('=== Touch scroll handler initialized ===');
  }
  
  // ========== ІНІЦІАЛІЗАЦІЯ ==========
  function init() {
    // Ініціалізація sidebar
    const checkSidebar = setInterval(() => {
      const sidebar = document.querySelector('.catalog-sidebar');
      if (sidebar) {
        clearInterval(checkSidebar);
        makeCatalogTouchFriendly();
      }
    }, 100);
    
    // Ініціалізація top menu
    const checkTopMenu = setInterval(() => {
      const topMenu = document.querySelector('.productsMenu-tabs-list');
      if (topMenu) {
        clearInterval(checkTopMenu);
        makeTopMenuTouchFriendly();
      }
    }, 100);
    
    // Ініціалізація touch scroll
    handleTouchScroll();
    
    setTimeout(() => {
      clearInterval(checkSidebar);
      clearInterval(checkTopMenu);
    }, 5000);
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
(function() {
    // Функція для заміни іконок
    function replaceComparisonIcons() {
        var comparisonButtons = document.querySelectorAll('.comparison-button');
        
        comparisonButtons.forEach(function(button) {
            var iconContainer = button.querySelector('.comparison-button__icon');
            if (!iconContainer) return;
            
            var oldSvg = iconContainer.querySelector('svg.icon--comparison-m');
            if (!oldSvg || oldSvg.tagName.toLowerCase() !== 'svg') return;
            
            // Створюємо img елемент
            var img = document.createElement('img');
            img.alt = 'comparison icon';
            
            // Визначаємо, яку іконку використовувати
            if (button.classList.contains('is-active')) {
                // Активна кнопка
                img.src = '/content/uploads/images/traced-image1.svg';
            } else {
                // Неактивна кнопка
                img.src = '/content/uploads/images/traced-image(4).svg';
            }
            
            // Копіюємо всі класи
            var classes = oldSvg.getAttribute('class');
            if (classes) {
                img.setAttribute('class', classes);
            }
            
            // Копіюємо стилі
            if (oldSvg.style.cssText) {
                img.style.cssText = oldSvg.style.cssText;
            }
            
            // Копіюємо розміри
            if (oldSvg.getAttribute('width')) {
                img.setAttribute('width', oldSvg.getAttribute('width'));
            }
            if (oldSvg.getAttribute('height')) {
                img.setAttribute('height', oldSvg.getAttribute('height'));
            }
            
            // Замінюємо
            oldSvg.parentNode.replaceChild(img, oldSvg);
        });
    }
    
    // Виконуємо одразу при завантаженні
    replaceComparisonIcons();
    
    // Відстежуємо зміни в DOM
    var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            if (mutation.addedNodes.length > 0 || mutation.type === 'attributes') {
                replaceComparisonIcons();
            }
        });
    });
    
    observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['class']
    });
    
    // Додатково: перевіряємо при кліках
    document.addEventListener('click', function(e) {
        if (e.target.closest('.comparison-button')) {
            setTimeout(replaceComparisonIcons, 100);
        }
    });
})();
</script>

      var el = hint.querySelector('strong, b, .name, .title, h3, h4, h5');
      return el ? el.textContent.trim() : (hint.textContent || '').trim().split('\n')[0].trim();
    } catch (e) {
      return '';
    }
  }

  function ensurePopup() {
    if (d.getElementById('cpi-popup-overlay')) return;

    var overlay = d.createElement('div');
    overlay.id = 'cpi-popup-overlay';
    overlay.innerHTML =
      '<div class="cpi-popup-box">' +
        '<button class="cpi-popup-close">&#10005;</button>' +
        '<div class="cpi-popup-content"></div>' +
      '</div>';

    d.body.appendChild(overlay);

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay || e.target.classList.contains('cpi-popup-close')) hidePopup();
    });

    d.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' || e.keyCode === 27) hidePopup();
    });
  }

  function showPopup(html) {
    ensurePopup();
    var content = d.querySelector('.cpi-popup-content');
    if (!content) return;
    content.innerHTML = html;
    d.getElementById('cpi-popup-overlay').classList.add('cpi-popup--visible');
    d.body.style.overflow = 'hidden';
  }

  function hidePopup() {
    var o = d.getElementById('cpi-popup-overlay');
    if (o) o.classList.remove('cpi-popup--visible');
    d.body.style.overflow = '';
  }

  function unlockOverflow(startEl, levels) {
    var el = startEl;
    var i = 0;

    while (el && i < levels) {
      if (el.style) {
        el.style.overflow = 'visible';
      }
      el = el.parentElement;
      i++;
    }
  }

  function addDelivery(card) {
    if (card.querySelector('.catalogCard-delivery')) return;

    var purchaseEl = findPurchase(card);
    if (!purchaseEl) return;

    var delivery = d.createElement('div');
    delivery.className = 'catalogCard-delivery';
    delivery.innerHTML =
      '<img src="' + DELIVERY_IMG + '" alt="Безкоштовна доставка" class="catalogCard-delivery-icon">' +
      '<div class="catalogCard-delivery-tooltip">' +
        '<div class="catalogCard-delivery-tooltip-title">Безкоштовна доставка</div>' +
        '<div class="catalogCard-delivery-tooltip-text">Безкоштовна доставка Нова Пошта від 3000 грн</div>' +
      '</div>';

    var icon = delivery.querySelector('.catalogCard-delivery-icon');

    var deliveryPopupHTML =
      '<div class="cpi-popup-header">' +
        '<img class="cpi-popup-icon cpi-popup-icon--delivery" src="' + DELIVERY_IMG + '" alt="">' +
        '<span class="cpi-popup-title">Безкоштовна доставка</span>' +
      '</div>' +
      '<p class="cpi-popup-sub">Безкоштовна доставка Нова Пошта від 3000 грн</p>';

    delivery.addEventListener('mouseenter', function () {
      if (isMobile()) return;
      var tip = delivery.querySelector('.catalogCard-delivery-tooltip');
      if (tip) tip.style.display = 'block';
    });

    delivery.addEventListener('mouseleave', function () {
      if (isMobile()) return;
      var tip = delivery.querySelector('.catalogCard-delivery-tooltip');
      if (tip) tip.style.display = 'none';
    });

    icon.addEventListener('click', function (e) {
      if (!isMobile()) return;
      e.preventDefault();
      e.stopPropagation();
      showPopup(deliveryPopupHTML);
    }, true);

    purchaseEl.insertAdjacentElement('beforebegin', delivery);
  }

  function positionBadgeTip(wrap, tip, card) {
    if (!wrap || !tip || !card) return;

    tip.style.visibility = 'hidden';
    tip.style.display = 'block';
    tip.style.left = '0';
    tip.style.right = 'auto';

    var cardRect = card.getBoundingClientRect();
    var tipRect = tip.getBoundingClientRect();

    if (tipRect.right > cardRect.right - 8) {
      tip.style.left = 'auto';
      tip.style.right = '0';
      tipRect = tip.getBoundingClientRect();
    }

    if (tipRect.left < cardRect.left + 8) {
      tip.style.left = '0';
      tip.style.right = 'auto';
    }

    tip.style.visibility = 'visible';
  }

  function initCard(card) {
    if (card.dataset.cpiV8) return;
    card.dataset.cpiV8 = '1';

    injectFixStyles();

    card.style.position = 'relative';
    card.style.overflow = 'visible';

    unlockOverflow(card, 4);
    addDelivery(card);

    var stickerItem = findSticker(card);
    if (!stickerItem) return;

    var contentEl = stickerItem.querySelector('.productSticker-content, .product-sticker__content');
    if (!contentEl) return;

    var months = parseInt((contentEl.textContent || '').trim(), 10);
    if (!months || months < 1) return;

    var priceEl = findPrice(card);
    if (!priceEl) return;

    var price = parsePrice(priceEl);
    if (!price || price < 1) return;

    var monthly = Math.ceil(price / months);
    var t = I18N[getLang()];
    var bankName = getBankName(stickerItem);

    var tipHTML =
      '<div class="cpi-tip__row">' +
        '<img class="cpi-tip__icon" src="' + PRIVAT_ICON + '" alt="">' +
        '<span class="cpi-tip__bank">' + (bankName || 'Privat24') + '</span>' +
        '<span class="cpi-tip__pay">' + t.fromLow + '\u00a0' + fmtNum(monthly) + '\u00a0грн\u00a0/\u00a0' + months + '\u00a0' + t.months + '</span>' +
      '</div>';

    var installmentPopupHTML =
      '<div class="cpi-popup-header">' +
        '<img class="cpi-popup-icon" src="' + PRIVAT_ICON + '" alt="">' +
        '<span class="cpi-popup-title">' + t.popupTitle + '</span>' +
      '</div>' +
      '<p class="cpi-popup-sub">' + t.popupSub + '</p>' +
      '<div class="cpi-popup-row">' +
        '<img class="cpi-popup-row__icon" src="' + PRIVAT_ICON + '" alt="">' +
        '<span class="cpi-popup-row__name">' + (bankName || 'Privat24') + '</span>' +
        '<span class="cpi-popup-row__pay">' + t.fromLow + '\u00a0' + fmtNum(monthly) + '\u00a0₴\u00a0/\u00a0' + months + '\u00a0' + t.months + '</span>' +
      '</div>';

    var wrap = d.createElement('div');
    wrap.className = 'cpi-wrap';
    wrap.innerHTML =
      '<div class="cpi-badge">' +
        '<img class="cpi-badge__img" src="' + PRIVAT_ICON + '" alt="">' +
        '<span class="cpi-badge__text">' + t.from + '\u00a0' + fmtNum(monthly) + '\u00a0грн\u00a0/\u00a0' + t.months + '</span>' +
        '<span class="cpi-badge__icon">&#9432;</span>' +
      '</div>' +
      '<div class="cpi-tip cpi-badge-tooltip">' + tipHTML + '</div>';

    var badge = wrap.querySelector('.cpi-badge');
    var localTip = wrap.querySelector('.cpi-badge-tooltip');
    var hideTimer = null;

    function showLocalTip() {
      if (isMobile()) return;

      clearTimeout(hideTimer);
      card.classList.add('cpi-card--hover');
      unlockOverflow(wrap, 6);
      positionBadgeTip(wrap, localTip, card);
    }

    function hideLocalTip() {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () {
        if (localTip) localTip.style.display = 'none';
        card.classList.remove('cpi-card--hover');
      }, 120);
    }

    wrap.addEventListener('mouseenter', showLocalTip);
    wrap.addEventListener('mouseleave', hideLocalTip);

    badge.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      if (!isMobile()) return;
      showPopup(installmentPopupHTML);
    }, true);

    window.addEventListener('resize', function () {
      if (!localTip || localTip.style.display === 'none') return;
      positionBadgeTip(wrap, localTip, card);
    });

    var deliveryEl = card.querySelector('.catalogCard-delivery');
    var purchaseEl = findPurchase(card);

    if (!isMobile() && deliveryEl) {
      deliveryEl.insertAdjacentElement('afterend', wrap);
    } else if (purchaseEl && purchaseEl.parentNode) {
      purchaseEl.insertAdjacentElement('afterend', wrap);
    } else {
      priceEl.insertAdjacentElement('afterend', wrap);
    }
  }

  function scanAll(root) {
    (root || d).querySelectorAll('.j-catalog-card').forEach(initCard);
  }

  new MutationObserver(function (ms) {
    ms.forEach(function (m) {
      m.addedNodes.forEach(function (n) {
        if (n.nodeType !== 1) return;
        if (n.classList.contains('j-catalog-card')) {
          initCard(n);
        } else if (n.querySelectorAll) {
          scanAll(n);
        }
      });
    });
  }).observe(d.documentElement, { childList: true, subtree: true });

  d.readyState === 'loading'
    ? d.addEventListener('DOMContentLoaded', function () { scanAll(); })
    : scanAll();

  setTimeout(scanAll, 800);

}(document));</script>

<script>
(function () {
  function createOrUpdateBadge(oldPrice, text) {
    if (!oldPrice || !text) return;

    var existingBadge = oldPrice.querySelector('.discount-badge-inline');
    if (existingBadge) {
      existingBadge.textContent = text;
      return;
    }

    var badge = document.createElement('span');
    badge.className = 'discount-badge-inline';
    badge.textContent = text;
    badge.style.cssText = [
      'background:#ffffff',
      'color:#000000',
      'font-size:12px',
      'font-weight:700',
      'padding:2px 6px',
      'border-radius:4px',
      'margin-left:6px',
      'display:inline-block',
      'vertical-align:middle',
      'border:1px solid #ddd',
      'line-height:1.2'
    ].join(';');

    oldPrice.appendChild(badge);
  }

  function processDesktopCards(root) {
    (root || document).querySelectorAll('.catalogCard').forEach(function(card) {
      var discountSticker = card.querySelector('.productSticker-item.__discount');
      var oldPrice = card.querySelector('.catalogCard-oldPrice');

      if (!discountSticker || !oldPrice) return;

      var discountText = discountSticker.querySelector('.productSticker-content');
      if (!discountText) return;

      var text = discountText.textContent.trim();
      if (!text) return;

      discountSticker.style.display = 'none';
      createOrUpdateBadge(oldPrice, text);
    });
  }

  function processMobileCards(root) {
    (root || document).querySelectorAll('.catalog-card').forEach(function(card) {
      var discountSticker = card.querySelector('.product-sticker__item--discount');
      var oldPrice = card.querySelector('.catalog-card__old-price');

      if (!discountSticker || !oldPrice) return;

      var discountText = discountSticker.querySelector('.product-sticker__content');
      if (!discountText) return;

      var text = discountText.textContent.trim();
      if (!text) return;

      discountSticker.style.display = 'none';

      var separator = discountSticker.previousElementSibling;
      if (separator && separator.classList.contains('product-sticker__separator')) {
        separator.style.display = 'none';
      }

      createOrUpdateBadge(oldPrice, text);
    });
  }

  function processAll(root) {
    processDesktopCards(root);
    processMobileCards(root);
  }

  var debounceTimer = null;
  function scheduleProcess(root) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      processAll(root || document);
    }, 100);
  }

  function initObserver() {
    if (!document.body) return;

    var observer = new MutationObserver(function(mutations) {
      var shouldProcess = false;

      for (var i = 0; i < mutations.length; i++) {
        var mutation = mutations[i];

        if (mutation.type === 'childList') {
          if (mutation.addedNodes && mutation.addedNodes.length) {
            shouldProcess = true;
            break;
          }
        }
      }

      if (shouldProcess) {
        scheduleProcess(document);
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  }

  function init() {
    processAll(document);

    setTimeout(function() {
      processAll(document);
    }, 300);

    setTimeout(function() {
      processAll(document);
    }, 800);

    initObserver();

    document.addEventListener('click', function() {
      setTimeout(function() {
        processAll(document);
      }, 150);

      setTimeout(function() {
        processAll(document);
      }, 500);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
<script>
$(document).ready(function() {
    var icon = '<svg class="instock-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="9" cy="9" r="9" fill="#17b260"/><path d="M4.5 9L7.5 12L13.5 6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    // Тільки точні фрази наявності (UA + RU)
    var inStockWords = ['в наявності', 'в наличии'];
    
    // Фрази відсутності — додатковий захист
    var outOfStockWords = ['немає в наявності', 'нет в наличии', 'не в наявності', 'не в наличии'];

    var selectors = [
        { selector: '.catalogCard-availability',    styles: { 'margin-top': '10px' } },
        { selector: '.catalog-card__presence',      styles: { 'margin-top': '4px' } },
        { selector: '.presence-status',             styles: { 'margin-top': '4px' } },
        { selector: '.product-price__availability', styles: {} }
    ];

    function applyIcon(el, styles) {
        if ($(el).find('.instock-icon').length) return;

        var text = $(el).text().trim().toLowerCase();

        // Спочатку виключаємо "не в наявності"
        var isOutOfStock = outOfStockWords.some(function(word) {
            return text.includes(word);
        });
        if (isOutOfStock) return;

        // Потім перевіряємо наявність
        var isInStock = inStockWords.some(function(word) {
            return text.includes(word);
        });
        if (!isInStock) return;

        $(el).css(Object.assign({
            'display': 'flex',
            'align-items': 'center',
            'gap': '6px'
        }, styles));
        $(el).prepend(icon);
    }

    function applyAll(root) {
        selectors.forEach(function(item) {
            $(root).find(item.selector).addBack(item.selector).each(function() {
                applyIcon(this, item.styles);
            });
        });
    }

    applyAll(document);

    var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
                if (node.nodeType === 1) {
                    applyAll(node);
                }
            });
        });
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
});
</script>

<script>
(function() {
  'use strict';

  // ============================================
  // ВИЗНАЧЕННЯ МОВИ СТОРІНКИ
  // ============================================
  function detectLanguage() {
    // 1. Перевіряємо атрибут lang у <html>
    var htmlLang = document.documentElement.lang || '';
    if (htmlLang.toLowerCase().indexOf('ru') === 0) return 'ru';
    if (htmlLang.toLowerCase().indexOf('uk') === 0) return 'uk';

    // 2. Перевіряємо URL (наприклад /ru/, /ua/, ?lang=ru)
    var url = window.location.href.toLowerCase();
    if (/\/ru(\/|$|\?)/.test(url) || /[?&]lang=ru/.test(url)) return 'ru';
    if (/\/ua(\/|$|\?)/.test(url) || /\/uk(\/|$|\?)/.test(url) || /[?&]lang=uk/.test(url) || /[?&]lang=ua/.test(url)) return 'uk';

    // 3. Перевіряємо cookie
    var cookies = document.cookie.toLowerCase();
    if (/lang(uage)?=ru/.test(cookies)) return 'ru';
    if (/lang(uage)?=(uk|ua)/.test(cookies)) return 'uk';

    return 'uk';

  // ============================================
  // СТВОРЕННЯ І ВСТАВКА БЛОКУ
  // ============================================
  function createNoticeBlock(lang) {
    var t = translations[lang] || translations.uk;

    var notice = document.createElement('div');
    notice.className = 'free-delivery-notice';
    notice.setAttribute('data-free-delivery-notice', 'true');

    notice.innerHTML = '' +
      '<div class="free-delivery-notice__main">' +
        '<div class="free-delivery-notice__badge">' + t.badge + '</div>' +
        '<p class="free-delivery-notice__text">' + t.mainText + '</p>' +
      '</div>' +
      '<p class="free-delivery-notice__warning">' + t.warning + '</p>';

    return notice;
  }

  function insertNotice() {
    var orderDetails = document.querySelector('.order-details');
    if (!orderDetails) return false;

    // Перевіряємо, чи блок вже вставлено, щоб не дублювати
    if (orderDetails.querySelector('[data-free-delivery-notice]')) return true;

    var lang = detectLanguage();
    var notice = createNoticeBlock(lang);

    orderDetails.appendChild(notice);
    return true;
  }

  // ============================================
  // ІНІЦІАЛІЗАЦІЯ
  // ============================================
  function init() {
    injectStyles();

    // Спроба №1: вставити одразу
    if (insertNotice()) return;

    // Спроба №2: спостерігаємо за змінами DOM (на випадок, якщо .order-details з'являється динамічно)
    var observer = new MutationObserver(function(mutations) {
      if (insertNotice()) {
        observer.disconnect();
      }
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    // Підстраховка: якщо за 10 секунд блок не з'явився — припиняємо спостереження
    setTimeout(function() {
      observer.disconnect();
    }, 10000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

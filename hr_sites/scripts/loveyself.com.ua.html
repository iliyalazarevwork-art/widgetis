        <style>
/* --- Віджет чату LoveYourself --- */
.ls-chat-widget {
  position: fixed;
  bottom: 25px;
  right: 25px;
  z-index: 9999;
  font-family: "Montserrat", sans-serif;
}

.ls-chat-button {
  background-color: #ffe100; /* фірмовий жовтий */
  width: 62px;
  height: 62px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 8px rgba(0,0,0,0.25);
  transition: all 0.25s ease;
}
.ls-chat-button:hover { transform: scale(1.1); }

.ls-chat-button img {
  width: 34px;
  height: 34px;
}

.ls-chat-popup {
  display: none;
  position: absolute;
  bottom: 75px;
  right: 0;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  width: 270px;
  padding: 16px;
  animation: fadeIn 0.3s ease;
}

.ls-chat-popup.active { display: block; }

.ls-chat-popup h3 {
  margin: 0 0 8px;
  font-size: 18px;
  font-weight: 700;
  color: #000;
}
.ls-chat-popup p {
  margin: 0 0 14px;
  color: #555;
  font-size: 14px;
}

.ls-chat-popup a {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: #000;
  font-weight: 600;
  margin-bottom: 10px;
  padding: 6px 0;
  transition: all 0.2s;
}
.ls-chat-popup a:hover { opacity: 0.8; }

.ls-chat-popup img {
  width: 22px;
  height: 22px;
}

/* --- Анімація появи --- */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>

<script>
document.getElementById("lsChatButton").addEventListener("click", function() {
  document.getElementById("lsChatPopup").classList.toggle("active");
});

// --- Автоматичне визначення мови за URL ---
const url = window.location.href;
const chatTitle = document.getElementById("chatTitle");
const chatText = document.getElementById("chatText");

if (url.includes("/ru/") || url.includes("?lang=ru")) {
  chatTitle.textContent = "Привет 👋";
  chatText.textContent = "Есть вопросы? Наша команда готова помочь!";
} else {
  chatTitle.textContent = "Привіт 👋";
  chatText.textContent = "Маєте питання? Наша команда готова допомогти!";
}
</script>

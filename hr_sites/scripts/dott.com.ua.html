              <script>
      document.addEventListener("DOMContentLoaded", function () {
        let observers = [];
        const previousContent = {
          ".cart-footer-b": "",
          ".cart__total-price": "",
        };

        // ===== Определяем язык =====
        function getLang() {
          const lang = document.documentElement.lang?.toLowerCase();
          if (lang.includes("ru")) return "ru";
          if (lang.includes("en")) return "en";
          return "ua";
        }

        const lang = getLang();
        const GIFT_START_DATE = new Date("2026-03-01T00:00:00+02:00"); // Дата відкриття подарунку

        // ===== ТЕКСТЫ =====
        const i18n = {
          ua: {
            toFree: "До безкоштовної доставки залишилось ще трошки:",
            free: "Безкоштовна доставка",
            note: "* лише за умови онлайн-оплати",
            giftNote: "* Подарунок в чеку від 1000 грн",
            currency: "грн",
            toGift: "До подарунку залишилось ще трошки:",
            gift: "Крем для рук SOFT у ПОДАРУНОК",
            giftMessage:
              "Подарунок не видно у замовленні, але він точно буде у твоїй коробці 🎁",
          },
          ru: {
            toFree: "До бесплатной доставки осталось совсем немного:",
            free: "Бесплатная доставка",
            note: "* только при условии онлайн-оплаты",
            giftNote: "* Подарок в чеке от 1000 грн",
            currency: "грн",
            toGift: "До подарка осталось совсем немного:",
            gift: "Крем для рук SOFT в ПОДАРОК",
            giftMessage:
              "Подарок не отображается в заказе, но он точно будет в твоей коробке 🎁",
          },
          en: {
            toFree: "You're close to free delivery:",
            free: "Free delivery",
            note: "* only with online payment",
            giftNote: "* Gift with orders from 1000 UAH",
            currency: "UAH",
            toGift: "You're close to gift:",
            gift: "Hand cream SOFT as a GIFT",
            giftMessage:
              "The gift is not shown in the order, but it will definitely be in your box 🎁",
          },
        };

        const T = i18n[lang];

        function parseNumber(str) {
          return parseFloat(str.replace(/\s+/g, "").replace(",", "."));
        }

        function logContent(targetElement, selector) {
          if (!targetElement) return;

          const currentContent = targetElement.textContent.trim();
          if (currentContent === previousContent[selector]) return;
          previousContent[selector] = currentContent;

          let priceCurrent = parseNumber(currentContent);

          const GIFT_SUM = 1000;

          let blockBascket = document.querySelector("#cart .cart-content");
          let blockBascketMob = document.querySelector(".cart__order");

          document.querySelectorAll(".blockStrip").forEach((el) => el.remove());

          // ================= GIFT BLOCK =================

          document
            .querySelectorAll(".blockStripGift")
            .forEach((el) => el.remove());
          const giftBlock = document.createElement("div");
          giftBlock.classList.add("blockStrip", "blockStripGift");
          giftBlock.style.borderColor = "#4E0000";

          // top
          const giftTop = document.createElement("div");
          giftTop.classList.add("blockStripTop");
          giftBlock.appendChild(giftTop);

          const giftTopLeft = document.createElement("div");
          giftTopLeft.classList.add("blockStripTopLeft");

          const giftLogo = document.createElement("img");
          giftLogo.src = "/content/uploads/images/gift.png";
          giftLogo.classList.add("lockStripTopLeftLogo");
          giftLogo.style.width = "40px";
          giftTopLeft.appendChild(giftLogo);

          const giftText = document.createElement("p");
          giftText.classList.add("blockStripTopLeftText");
          giftText.textContent = priceCurrent >= GIFT_SUM ? T.gift : T.toGift;
          giftTopLeft.appendChild(giftText);

          giftTop.appendChild(giftTopLeft);

          // bottom
          const giftBottom = document.createElement("div");
          giftBlock.appendChild(giftBottom);

          const giftStripWrap = document.createElement("div");
          giftStripWrap.classList.add("blockStripBottomStrip");
          giftBottom.appendChild(giftStripWrap);

          const giftProgress = document.createElement("span");
          giftProgress.classList.add("blockStripBottomStripSpan");

          let giftPercent = (priceCurrent / GIFT_SUM) * 100;
          giftProgress.style.width = Math.min(giftPercent, 100) + "%";
          giftProgress.style.backgroundColor = "#4E0000";

          giftStripWrap.appendChild(giftProgress);

          // prices
          const giftPriceBlock = document.createElement("div");
          giftPriceBlock.classList.add("blockStripBottomPrice");
          giftBottom.appendChild(giftPriceBlock);

          const giftDiff = GIFT_SUM - priceCurrent;

          const giftLeft = document.createElement("span");
          giftLeft.classList.add("blockStripBottomPriceOne");

          if (giftDiff >= 0) {
            giftLeft.innerHTML = `<span style="white-space: nowrap;">0 ${T.currency}</span> 
             <span id="text-note-5fk17g14" class="text-note" style="white-space: nowrap; margin-left: 4px;">${T.giftNote}</span>`;
          } else {
            giftLeft.style.display = "none";
          }

          giftPriceBlock.appendChild(giftLeft);

          const giftRight = document.createElement("span");
          giftRight.classList.add("blockStripBottomPriceTwo");

          if (giftDiff > 0) {
            giftRight.innerHTML = `<span style="white-space: nowrap;">${giftDiff.toFixed(
              2,
            )} ${T.currency}</span>`;
          } else {
            giftRight.style.width = "100%";
            giftRight.innerHTML = `<span style="text-align: center;">${T.giftMessage}</span>`;
          }

          giftPriceBlock.appendChild(giftRight);

          // === БЛОК ===
          const blockStrip = document.createElement("div");
          blockStrip.classList.add("blockStrip");

          // Верхняя часть
          const top = document.createElement("div");
          top.classList.add("blockStripTop");
          blockStrip.appendChild(top);

          const topLeft = document.createElement("div");
          topLeft.classList.add("blockStripTopLeft");

          const logo = document.createElement("img");
          logo.src = "/content/uploads/images/shop1.png";
          logo.classList.add("lockStripTopLeftLogo");
          topLeft.appendChild(logo);

          const topText = document.createElement("p");
          topText.classList.add("blockStripTopLeftText");
          topText.textContent = priceCurrent >= 1500 ? T.free : T.toFree;
          topLeft.appendChild(topText);

          top.appendChild(topLeft);

          // Нижняя часть
          const bottom = document.createElement("div");
          blockStrip.appendChild(bottom);

          const stripWrap = document.createElement("div");
          stripWrap.classList.add("blockStripBottomStrip");
          bottom.appendChild(stripWrap);

          const progress = document.createElement("span");
          progress.classList.add("blockStripBottomStripSpan");
          let baseValue = 1500;
          let percentage = (priceCurrent / baseValue) * 100;
          progress.style.width = percentage + "%";
          stripWrap.appendChild(progress);

          // Блок с ценами
          const priceBlock = document.createElement("div");
          priceBlock.classList.add("blockStripBottomPrice");
          bottom.appendChild(priceBlock);

          // 0 грн + примечание (в одну строку, без переноса)

          const priceDelivery = 1500;
          const diff = priceDelivery - priceCurrent;

          const pickup = document.createElement("span");
          pickup.classList.add("blockStripBottomPriceOne");
          if (diff >= 0) {
            pickup.innerHTML = `<span style="white-space: nowrap;">0 ${T.currency}</span> 
             <span id="text-note-5fk17g14" class="text-note" style="white-space: nowrap; margin-left: 4px;">${T.note}</span>`;
          } else {
            pickup.innerHTML = `<span style="white-space: nowrap;">0 ${T.currency}</span>`;
          }

          priceBlock.appendChild(pickup);

          // Цена отделения (только цифры)
          const branch = document.createElement("span");
          branch.classList.add("blockStripBottomPriceTwo");

          if (diff >= 0) {
            branch.innerHTML = `<span style="white-space: nowrap;">${diff.toFixed(
              2,
            )} ${T.currency}</span>`;
          } else {
            branch.innerHTML = `<span style="white-space: nowrap;">${T.note}</span>`;
          }

          priceBlock.appendChild(branch);

          // DESKTOP
          if (blockBascket) {
            if (isGiftActive()) {
              const giftNode = giftBlock.cloneNode(true);
              const deliveryNode = blockStrip.cloneNode(true);

              blockBascket.appendChild(giftNode);
              giftNode.after(deliveryNode);
            } else {
              const deliveryNode = blockStrip.cloneNode(true);
              blockBascket.appendChild(deliveryNode);
            }
          }

          // MOBILE
          if (blockBascketMob) {
            if (isGiftActive()) {
              const giftNode = giftBlock.cloneNode(true);
              const deliveryNode = blockStrip.cloneNode(true);

              blockBascketMob.insertAdjacentElement("afterbegin", giftNode);
              giftNode.after(deliveryNode);
            } else {
              const deliveryNode = blockStrip.cloneNode(true);
              blockBascketMob.insertAdjacentElement("afterbegin", deliveryNode);
            }
          }
        }

        function isGiftActive() {
          const now = new Date();
          const kyivNow = new Date(
            now.toLocaleString("en-US", { timeZone: "Europe/Kyiv" }),
          );
          return kyivNow >= GIFT_START_DATE;
        }

        function debounce(func, wait) {
          let timeout;
          return function (...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
          };
        }

        const debouncedLog = debounce(logContent, 50);

        function observeChanges() {
          observers.forEach((o) => o.disconnect());
          observers = [];

          const selectors = [".cart-footer-b", ".cart__total-price"];
          selectors.forEach((selector) => {
            const el = document.querySelector(selector);
            if (el) {
              const obs = new MutationObserver(() =>
                debouncedLog(el, selector),
              );
              observers.push(obs);
              obs.observe(el, {
                characterData: true,
                childList: true,
                subtree: true,
              });
              debouncedLog(el, selector);
            }
          });
        }

        const documentObserver = new MutationObserver(() => observeChanges());
        documentObserver.observe(document.body, {
          childList: true,
          subtree: true,
        });
      });

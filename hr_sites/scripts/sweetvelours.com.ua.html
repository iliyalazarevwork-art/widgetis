        <script>
let packagingObserver;
let checkTimeout;

function checkPackaging() {
  clearTimeout(checkTimeout);
  // Даємо мобільним скриптам 600мс, щоб назва доставки з'явилася в коді
  checkTimeout = setTimeout(() => {
    executeCheck();
  }, 600);
}

function executeCheck() {
  if (packagingObserver) packagingObserver.disconnect();

  // 1. ШУКАЄМО ЕЛЕМЕНТИ (ПК + Моб)
  const orderList = document.querySelector('.order-list, .order-details__list');
  const checkoutBtn = document.querySelector('button[type="submit"], .btn.__large, .checkout__submit, .btn--primary');

  if (!orderList || !checkoutBtn) {
    if (packagingObserver) startPackagingObserver();
    return;
  }

  // 2. ПОСИЛЕНА ПЕРЕВІРКА НА ОПТ
  // Шукаємо в селекторах, які ми знаємо, + перевіряємо всі "select" тексти
  const deliveryElements = document.querySelectorAll('.selectboxit-text, .select__text, .checkout-delivery__name, .shipping-method__title');
  let isWholesale = false;
  
  deliveryElements.forEach(el => {
    if (el.textContent.toUpperCase().includes('ОПТ')) {
      isWholesale = true;
    }
  });

  // Додаткова перевірка: якщо слово ОПТ є взагалі в блоці доставки (на всяк випадок)
  const deliveryBlock = document.querySelector('.checkout-delivery, #shipping_method');
  if (deliveryBlock && deliveryBlock.textContent.toUpperCase().includes('ОПТ')) {
    isWholesale = true;
  }

  // 3. ОТРИМУЄМО НАЗВИ ТОВАРІВ
  const productElements = document.querySelectorAll('.order-i-title a, .cart-item__title');
  const productNames = Array.from(productElements).map(el => el.textContent.toLowerCase().trim());

  // Видаляємо старе повідомлення
  const existingWarning = document.getElementById('packaging-warning');
  if (existingWarning) existingWarning.parentNode.remove();

  // 4. ПЕРЕВІРКА НАЯВНОСТІ КОРОбКИ
  const hasPackaging = productNames.some(name => name.includes('короб') || name.includes('пакет'));

  // 5. ПРИЙНЯТТЯ РІШЕННЯ
  if (isWholesale) {
    // ЯКЩО ОПТ — РОЗБЛОКОВУЄМО І ВИХОДИМО (це пріоритет №1)
    unlockCheckout(checkoutBtn);
  } 
  else if (productNames.length > 0) {
    if (!hasPackaging) {
      // ТОВАРИ Є, КОРОбКИ НЕМАЄ — БЛОКУЄМО
      lockCheckout(checkoutBtn, orderList);
    } else {
      // ВСЕ Є — РОЗБЛОКОВУЄМО
      unlockCheckout(checkoutBtn);
    }
  }

  if (packagingObserver) startPackagingObserver();
}

function lockCheckout(btn, list) {
  const warning = document.createElement('div');
  warning.innerHTML = `
    <div id="packaging-warning" style="background:#fff3cd; color:#856404; border:1px solid #ffeeba; padding:15px; margin-bottom:20px; border-radius:8px; font-size:16px; line-height:1.4;">
      ⚠ <strong>Увага!</strong> Для оформлення замовлення потрібно додати <b>пакувальну коробку або пакет</b>.<br>
      <a href="/pakuvannia/" style="color:#ff0000; text-decoration:underline; font-weight:bolder;">Перейти до пакування →</a>
    </div>
  `;
  list.parentNode.insertBefore(warning, list);

  btn.disabled = true;
  btn.style.opacity = '0.5';
  btn.style.cursor = 'not-allowed';
  btn.style.pointerEvents = 'none';
}

function unlockCheckout(btn) {
  btn.disabled = false;
  btn.style.opacity = '1';
  btn.style.cursor = 'pointer';
  btn.style.pointerEvents = 'auto';
}

function startPackagingObserver() {
  const targetNode = document.body;
  const config = { childList: true, subtree: true };
  if (packagingObserver && targetNode) {
    packagingObserver.observe(targetNode, config);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  packagingObserver = new MutationObserver(checkPackaging);
  executeCheck();
  startPackagingObserver();
});

// Додатковий запуск при повному завантаженні (фікс для повільних мобілок)
window.addEventListener('load', () => {
  setTimeout(executeCheck, 1000);
});

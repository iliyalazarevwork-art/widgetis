        <script>
  (() => {
    const isPidkladka = window.location.href
      .toLowerCase()
      .includes("pidkladka");
    const UNIT_TEXT = isPidkladka ? "уп." : "м²";

    const PRICE_SELECTORS = [
      ".product-price__item",
      ".catalogCard-price",
      ".catalog-card__price",
      ".product-card__price"
    ];

    const patchPrice = (priceEl) => {
      if (!priceEl) return;

      // если уже обработано — не трогаем
      if (priceEl.querySelector(".price-currency")) return;

      let html = priceEl.innerHTML;

      if (!html.includes("₴")) return;

      // убираем старые /м² или /уп.
      html = html
        .replace(/\/м²/g, "")
        .replace(/\/уп\./g, "");

      const parts = html.split("₴");
      if (parts.length < 2) return;

      // 💡 чистая цена (БЕЗ валюты)
      const priceValue = parts[0].trim();

      priceEl.innerHTML = `
        <span class="price-value">${priceValue}</span>
        <span class="price-currency">₴/${UNIT_TEXT}</span>
      `;
    };

    const updatePrices = () => {
      PRICE_SELECTORS.forEach((selector) => {
        document.querySelectorAll(selector).forEach(patchPrice);
      });
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", updatePrices);
    } else {
      updatePrices();
    }

    const observer = new MutationObserver(updatePrices);
    observer.observe(document.body, {
      childList: true,
      subtree: true,
    });
  })();

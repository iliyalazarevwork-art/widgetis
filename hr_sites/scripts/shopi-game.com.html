        <script>
document.addEventListener("DOMContentLoaded", () => {
    const btn = document.getElementById("c7b2-btn");

    // показ кнопки через 5 секунд
    setTimeout(() => {
        btn.classList.add("c7b2-show");
    }, 10000);

    // кнопка закриття (працює завжди)
    btn.addEventListener("click", (e) => {
        if (e.target.closest(".c7b2-btn-close")) {
            e.preventDefault();
            e.stopPropagation();
            btn.remove();
        }
    });
});
</script>

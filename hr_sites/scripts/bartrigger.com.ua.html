        <!-- КОРЗИНА Скрипт в попап корзины на ПК и МОБ - сколько осталось до бесплатной доставки НП -->
<script>
(function () {
  var FREE_SHIPPING = 10000;
  var CURRENCY = 'грн';
  var BLOCK_CLASS = 'js-free-shipping-block-universal';

  // ===== ДОПОМІЖНІ ФУНКЦІЇ =====
  function parsePrice(text) {
    if (!text) return null;

    var num = parseFloat(
      String(text)
        .replace(/\s+/g, '')
        .replace(/[^\d.,]/g, '')
        .replace(',', '.')
    );

    return isNaN(num) ? null : num;
  }

  function formatMoney(value) {
    return Math.ceil(value) + ' ' + CURRENCY;
  }

  function isVisible(el) {
    return !!(el && (el.offsetWidth || el.offsetHeight || el.getClientRects().length));
  }

  // ===== ПОШУК КОНТЕЙНЕРА КОРЗИНИ =====
  function getCartContainer() {
    var selectors = [
      '#cart-drawer #cart.cart__container', // моб попап
      '.cart-content',                      // ПК попап / стара структура
      '#cart.cart__container',
      '.cart-page',
      '.layout-cart',
      '.page-cart',
      '.checkout-cart',
      '.j-cart-page',
      '.cart'
    ];

    for (var i = 0; i < selectors.length; i++) {
      var nodes = document.querySelectorAll(selectors[i]);
      for (var j = 0; j < nodes.length; j++) {
        if (isVisible(nodes[j])) return nodes[j];
      }
    }

    for (var k = 0; k < selectors.length; k++) {
      var fallback = document.querySelector(selectors[k]);
      if (fallback) return fallback;
    }

    return null;
  }

  // ===== ПОШУК СУМИ =====
  function getTotalElement(container) {
    if (!container) return null;

    var selectors = [
      '.cart__total-price.j-total-sum',                 // моб попап
      '.cart-summary .cart-footer-b.cart-cost.j-total-sum', // стара ПК структура
      '.cart-summary .j-total-sum',
      '.j-total-sum'
    ];

    for (var i = 0; i < selectors.length; i++) {
      var el = container.querySelector(selectors[i]);
      if (el) return el;
    }

    for (var j = 0; j < selectors.length; j++) {
      var globalEl = document.querySelector(selectors[j]);
      if (globalEl) return globalEl;
    }

    return null;
  }

  // ===== ПОШУК КНОПКИ/БЛОКА ОФОРМЛЕННЯ =====
  function getOrderBlock(container) {
    if (!container) return null;

    var selectors = [
      '.cart__order',                         // моб попап
      '[data-checkout-link]',                 // посилання на checkout
      '.cart-order',
      '.checkout-button',
      '.cart-summary .btn.btn--primary'
    ];

    for (var i = 0; i < selectors.length; i++) {
      var el = container.querySelector(selectors[i]);
      if (el) {
        if (el.matches && el.matches('[data-checkout-link]')) {
          return el.parentNode || el;
        }
        return el;
      }
    }

    return null;
  }

  // ===== СТВОРЕННЯ БЛОКУ =====
  function createBlock() {
    var block = document.createElement('div');
    block.className = BLOCK_CLASS;

    block.style.margin = '14px 0';
    block.style.padding = '12px 14px';
    block.style.borderRadius = '10px';
    block.style.background = '#f2f2f2';
    block.style.border = '1px solid #F4950D';
    block.style.fontSize = '13px';
    block.style.lineHeight = '1.5';
    block.style.boxShadow = '0 2px 6px rgba(0,0,0,0.03)';
    block.style.boxSizing = 'border-box';
    block.style.width = '100%';

    var title = document.createElement('div');
    title.className = 'fs-title';
    title.style.fontWeight = '600';
    title.style.marginBottom = '10px';
    title.style.fontSize = '13px';
    title.style.color = '#333333';
    block.appendChild(title);

    var barWrapper = document.createElement('div');
    barWrapper.className = 'fs-bar-wrapper';
    barWrapper.style.width = '100%';
    barWrapper.style.height = '14px';
    barWrapper.style.borderRadius = '999px';
    barWrapper.style.background = '#dddddd';
    barWrapper.style.overflow = 'hidden';
    block.appendChild(barWrapper);

    var barFill = document.createElement('div');
    barFill.className = 'fs-bar-fill';
    barFill.style.height = '100%';
    barFill.style.width = '0%';
    barFill.style.borderRadius = '999px';
    barFill.style.background = '#F4950D';
    barFill.style.transition = 'width 0.3s ease';
    barWrapper.appendChild(barFill);

    var note = document.createElement('div');
    note.className = 'fs-note';
    note.style.marginTop = '8px';
    note.style.fontSize = '11px';
    note.style.color = '#555555';
    note.innerHTML =
      'Безкоштовна доставка по Україні до відділення чи поштомату Нової Пошти при замовленні від <strong>' +
      formatMoney(FREE_SHIPPING) +
      '</strong>.';
    block.appendChild(note);

    return block;
  }

  // ===== ВСТАВКА БЛОКУ =====
  function insertBlock(container, block) {
    if (!container || !block) return;

    // 1. Найкращий варіант: перед блоком оформлення
    var orderBlock = getOrderBlock(container);
    if (orderBlock && orderBlock.parentNode) {
      orderBlock.parentNode.insertBefore(block, orderBlock);
      return;
    }

    // 2. Старий ПК варіант: після таблиці/списку товарів
    var cartItems = container.querySelector('.cart-items');
    if (cartItems && cartItems.parentNode) {
      cartItems.parentNode.appendChild(block);
      return;
    }

    // 3. Для моб структури: після summary
    var summaryNew = container.querySelector('.cart__summary');
    if (summaryNew && summaryNew.parentNode) {
      if (summaryNew.nextSibling) {
        summaryNew.parentNode.insertBefore(block, summaryNew.nextSibling);
      } else {
        summaryNew.parentNode.appendChild(block);
      }
      return;
    }

    // 4. Для старої структури
    var summaryOld = container.querySelector('.cart-summary');
    if (summaryOld && summaryOld.parentNode) {
      if (summaryOld.nextSibling) {
        summaryOld.parentNode.insertBefore(block, summaryOld.nextSibling);
      } else {
        summaryOld.parentNode.appendChild(block);
      }
      return;
    }

    // 5. Фолбек
    container.appendChild(block);
  }

  function ensureBlock(container) {
    if (!container) return null;

    var block = container.querySelector('.' + BLOCK_CLASS);
    if (!block) {
      block = createBlock();
      insertBlock(container, block);
    }

    return block;
  }

  // ===== ОНОВЛЕННЯ БЛОКУ =====
  function updateBlock(container, total) {
    var block = ensureBlock(container);
    if (!block) return;

    var title = block.querySelector('.fs-title');
    var barFill = block.querySelector('.fs-bar-fill');

    if (!title || !barFill) return;

    if (total < FREE_SHIPPING) {
      var need = FREE_SHIPPING - total;
      title.innerHTML =
        'До безкоштовної доставки Новою Поштою залишилось: <strong>' +
        formatMoney(need) +
        '</strong>';
    } else {
      title.innerHTML =
        '<strong>Вітаємо!</strong> Ви отримуєте безкоштовну доставку до відділення чи поштомату Нової Пошти 🎉';
    }

    var percent = Math.max(0, Math.min(100, Math.round((total / FREE_SHIPPING) * 100)));
    barFill.style.width = percent + '%';
  }

  function updateCartUI() {
    var container = getCartContainer();
    if (!container) return;

    var totalEl = getTotalElement(container);
    if (!totalEl) return;

    var total = parsePrice(totalEl.textContent || totalEl.innerText);
    if (total === null) return;

    updateBlock(container, total);
  }

  function safeUpdate() {
    try {
      updateCartUI();
    } catch (e) {}
  }

  // ===== СТАРТ =====
  document.addEventListener('DOMContentLoaded', function () {
    safeUpdate();
    setTimeout(safeUpdate, 300);
    setTimeout(safeUpdate, 900);
    setTimeout(safeUpdate, 1800);
    setInterval(safeUpdate, 1000);
  });

  document.addEventListener('click', function () {
    setTimeout(safeUpdate, 250);
    setTimeout(safeUpdate, 700);
    setTimeout(safeUpdate, 1200);
  });

  window.addEventListener('resize', function () {
    safeUpdate();
  });
})();
</script>



<!-- ОРАНЖ ЦВЕТ ТЕКСТА ПК ПРИ ОПЛАТЕ ФОП/ТОВ -->
<script>
(function () {
  var PAYMENT_VALUE = '12';
  var TARGET_COLOR = '#F4950D';

  function syncPaymentTextColor() {
    var paymentBlock = document.querySelector('.checkout-step[data-component="Payment"]');
    if (!paymentBlock) return;

    var select = paymentBlock.querySelector('select.j-payment-type');
    var infoText = paymentBlock.querySelector('.form-item-txt');
    if (!select || !infoText) return;

    if (String(select.value) === PAYMENT_VALUE) {
      infoText.style.color = TARGET_COLOR;
    } else {
      infoText.style.color = '';
    }
  }

  document.addEventListener('change', function (e) {
    if (e.target && e.target.matches('.checkout-step[data-component="Payment"] select.j-payment-type')) {
      syncPaymentTextColor();
    }
  });

  var observer = new MutationObserver(syncPaymentTextColor);
  observer.observe(document.body, { childList: true, subtree: true });

  syncPaymentTextColor();
  setTimeout(syncPaymentTextColor, 300);
  setTimeout(syncPaymentTextColor, 1000);
})();
</script>

<script>
(function () {
  var ALLOWED_VALUES = ['27', '28'];
  var NOTE_CLASS = 'custom-payment-bag-note';
  var NOTE_HTML =
    '<div class="' + NOTE_CLASS + '" style="margin-top:4px;">' +
      '<p style="margin:0 0 4px 0;">' +
        '<span style="color:#959595;">Якщо ви зробили попереднє замовлення на самовивіз, то ми з радістю зробимо вам знижку 3% при розрахунку в шоу-румі.</span>' +
      '</p>' +
      '<p style="margin:0;">' +
        '<span style="color:#F4950D;">Увага! Звертаємо вашу увагу, при виборі доставки "Самовивіз" та оплаті замовлення в шоурумі, товар бронюється на 5 робочих днів.</span>' +
      '</p>' +
    '</div>';

  function syncPaymentNote() {
    var paymentBlock = document.querySelector('.checkout-step[data-component="Payment"]');
    if (!paymentBlock) return;

    var infoText = paymentBlock.querySelector('.form-item-txt');
    var select = paymentBlock.querySelector('select.j-payment-type');
    if (!infoText || !select) return;

    var oldNote = paymentBlock.querySelector('.' + NOTE_CLASS);
    var currentValue = String(select.value);

    if (ALLOWED_VALUES.indexOf(currentValue) !== -1) {
      if (!oldNote) {
        infoText.insertAdjacentHTML('afterend', NOTE_HTML);
      }
    } else {
      if (oldNote) {
        oldNote.remove();
      }
    }
  }

  function init() {
    syncPaymentNote();

    document.addEventListener('change', function (e) {
      if (e.target && e.target.matches('select.j-payment-type')) {
        syncPaymentNote();
      }
    });

    var observer = new MutationObserver(function () {
      syncPaymentNote();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true,
      attributes: true
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<script>
(function () {
  var TARGET_VALUE = '12';
  var TARGET_COLOR = '#F4950D';

  function syncPaymentTextColor() {
    var paymentBlock = document.querySelector('.select.select--block.j-payment-select');
    var select = paymentBlock ? paymentBlock.querySelector('select.j-payment-type') : null;
    var infoText = document.querySelector('.form-item__text');

    if (!select || !infoText) return;

    if (String(select.value) === TARGET_VALUE) {
      infoText.style.color = TARGET_COLOR;
    } else {
      infoText.style.color = '';
    }
  }

  document.addEventListener('change', function (e) {
    if (e.target && e.target.matches('select.j-payment-type')) {
      syncPaymentTextColor();
    }
  });

  var observer = new MutationObserver(syncPaymentTextColor);
  observer.observe(document.body, { childList: true, subtree: true });

  syncPaymentTextColor();
})();
</script>

<script>
  (function () {

    + '</div>';

  function syncPaymentNote() {
    var select = document.querySelector('select.j-payment-type');
  if (!select) return;

  var formItem = select.closest('.form-item');

  var infoText = formItem.querySelector('.form-item__text');

    }

  function init() {

    syncPaymentNote();
      }
    });

  document.addEventListener('click', function () {

    syncPaymentNote();
    });

  observer.observe(document.body, {
    childList: true,
  subtree: true

  if (document.readyState === 'loading') {

})();

<script>
(function () {
  var DELIVERY_NOTES = {
    '11': 'Доставка замовлень з 15:00 до 18:30 за умови оформлення замовлення до 14:00 та наявності товару! Або наступного дня, якщо замовлення було зроблено після 14:00.<br>Безкоштовна доставка — від 3900 грн.<br>Для замовлень від 1000 до 3900 грн — 300 грн.',
    '3': 'Від 10 000 грн - безкоштовна доставка до відділення Нової Пошти',
    '17': 'Від 10 000 грн - безкоштовна доставка до поштомату Нової Пошти',
    '36': 'Доставляємо по м. Київ, з понеділка по п\'ятницю, з 10:00 до 17:30.<br>Відправка здійснюється протягом 2 годин після підтвердження менеджером товару в шоурумі, та отримання оплати.<br>Доставка проводиться після повної оплати замовлення.<br>Вартість доставки розраховується перевізником.<br>Вага доставки не має перевищувати вагу в 20 кг, та габарити 50х50х150 см.'
  };

  var NOTE_CLASS = 'createTextCheck';
  var syncScheduled = false;

  function syncNote() {
    syncScheduled = false;

    var container = document.querySelector('.j-delivery-main-container');
    var select = document.querySelector('.j-delivery-main-container select.j-delivery-type');

    if (!container || !select) return;

    var currentValue = String(select.value);
    var currentNote = DELIVERY_NOTES[currentValue];
    var oldNote = container.querySelector('.' + NOTE_CLASS);

    if (currentNote) {
      if (!oldNote) {
        oldNote = document.createElement('p');
        oldNote.className = NOTE_CLASS;
        oldNote.style.marginTop = '10px';
        oldNote.style.fontSize = '15px';
        oldNote.style.lineHeight = '1.20';
        oldNote.style.color = '#959595';
        container.appendChild(oldNote);
      }

      if (oldNote.innerHTML !== currentNote) {
        oldNote.innerHTML = currentNote;
      }
    } else {
      if (oldNote) oldNote.remove();
    }
  }

  function scheduleSync() {
    if (syncScheduled) return;
    syncScheduled = true;
    setTimeout(syncNote, 100);
  }

  document.addEventListener('change', function (e) {
    if (e.target && e.target.matches('.j-delivery-main-container select.j-delivery-type')) {
      scheduleSync();
    }
  });

  document.addEventListener('click', function (e) {
    if (e.target && e.target.closest('.j-delivery-main-container')) {
      scheduleSync();
    }
  });

  document.addEventListener('DOMContentLoaded', function () {
    syncNote();

    var observer = new MutationObserver(function () {
      scheduleSync();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  });

  window.addEventListener('load', syncNote);
})();
</script>

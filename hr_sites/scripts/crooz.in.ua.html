<script>
document.addEventListener('DOMContentLoaded', () => {
    // --- 1. СТВОРЕННЯ ТА ВСТАВКА ЕЛЕМЕНТІВ ГАЛЕРЕЇ В DOM ---

    const footerElement = document.querySelector('footer');
    if (!footerElement) {
        console.error('Елемент <footer> не знайдено. Галерею неможливо вставити.');
        return;
    }

    // Створюємо головний контейнер для всього віджету
    const solReviewsContainer = document.createElement('div');
    solReviewsContainer.classList.add('sol-reviews-gallery');

    // Створюємо заголовок
    const heading = document.createElement('h3');
    heading.textContent = 'Відгуки клієнтів';

    // Створюємо елементи галереї та кнопок (як і раніше)
    const gallery = document.createElement('div');
    gallery.id = 'reviews-gallery';
    gallery.classList.add('gallery-container');

    const controlsContainer = document.createElement('div');
    controlsContainer.classList.add('gallery-controls');

    const showMoreBtn = document.createElement('button');
    showMoreBtn.id = 'show-more-btn';
    showMoreBtn.classList.add('show-more-btn', 'sol-hidden'); // Одразу додаємо клас sol-hidden
    showMoreBtn.textContent = 'Показати ще';

    const hideBtn = document.createElement('button');
    hideBtn.id = 'hide-btn';
    hideBtn.classList.add('hide-btn', 'sol-hidden'); // Одразу додаємо клас sol-hidden
    hideBtn.textContent = 'Приховати';

    // Збираємо всі частини разом у правильному порядку
    controlsContainer.appendChild(showMoreBtn);
    controlsContainer.appendChild(hideBtn);

    solReviewsContainer.appendChild(heading);
    solReviewsContainer.appendChild(gallery);
    solReviewsContainer.appendChild(controlsContainer);

    // Вставляємо весь зібраний блок на сторінку перед футером
    footerElement.before(solReviewsContainer);

    //-------------------------------------------------------------

    // --- НАЛАШТУВАННЯ ---
    const basePath = '/content/uploads/images/comments/';
    const fileExtension = '.jpg';
    const initialLimit = 13;
    
    let allImageUrls = [];

    function renderImages(urls, isExtra = false) {
        urls.forEach(url => {
            const imgElement = document.createElement('img');
            imgElement.src = url;
            imgElement.alt = `Відгук`;
            if (isExtra) {
                imgElement.classList.add('extra-review');
            }
            gallery.appendChild(imgElement);
        });
    }

    async function findAndDisplayImages() {
        gallery.innerHTML = '';

        let imageIndex = 1;
        while (true) {
            const imageUrl = `${basePath}${imageIndex}${fileExtension}`;
            try {
                await checkImageExists(imageUrl);
                allImageUrls.push(imageUrl);
                imageIndex++;
            } catch (error) {
                console.log(`Пошук завершено. Всього знайдено ${allImageUrls.length} зображень.`);
                break;
            }
        }

        const initialImages = allImageUrls.slice(0, initialLimit);
        renderImages(initialImages);

        if (allImageUrls.length > initialLimit) {
            showMoreBtn.classList.remove('sol-hidden');

            showMoreBtn.addEventListener('click', () => {
                const remainingImages = allImageUrls.slice(initialLimit);
                renderImages(remainingImages, true);
                showMoreBtn.classList.add('sol-hidden');
                hideBtn.classList.remove('sol-hidden');
            });

            hideBtn.addEventListener('click', () => {
                const extraImages = gallery.querySelectorAll('.extra-review');
                extraImages.forEach(img => img.remove());
                hideBtn.classList.add('sol-hidden');
                showMoreBtn.classList.remove('sol-hidden');
                // Прокручуємо до заголовка віджету, а не до самої галереї
                solReviewsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        }
    }

    function checkImageExists(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve();
            img.onerror = () => reject();
            img.src = url;
        });
    }

    findAndDisplayImages();
});
</script>

<script>
const toggles = document.querySelectorAll('.faq-toggle');

toggles.forEach(toggle => {
  toggle.addEventListener('click', () => {
  toggle.parentNode.classList.toggle('active');
  });
});

var details = document.querySelectorAll("details");
for(i=0;i<details.length;i++) {
  details[i].addEventListener("toggle", accordion);
}
function accordion(event) {
  if (!event.target.open) return;
    var details = event.target.parentNode.children;
    for(i=0;i<details.length;i++) {
      if (details[i].tagName != "DETAILS" || 
         !details[i].hasAttribute('open') || 
         event.target == details[i]) {
         continue;
      }
      details[i].removeAttribute("open");
    }
}

<script>
    // Виправлення відображення фото (прибираємо конфлікти)
    function fixProductImage() {
        const badImages = document.querySelectorAll('img[src*="flower"], .zoomImg, .cloud-zoom-lens');
        badImages.forEach(img => { img.style.display = 'none'; img.style.opacity = '0'; });
        const mainImg = document.querySelector('.product-gallery__main-img, .main-image img');
        if (mainImg) { mainImg.style.visibility = 'visible'; mainImg.style.opacity = '1'; mainImg.style.display = 'block'; }
    }
    setTimeout(fixProductImage, 500);
    setTimeout(fixProductImage, 2000);

    // Логіка появи блоку відгуків при скролі
    let isReviewShown = false;
    window.addEventListener('scroll', function() {
        if (isReviewShown) return;
        const box = document.getElementById('review-request-box');
        if (box && (window.innerHeight + window.scrollY) >= document.body.offsetHeight * 0.7) {
            box.style.display = 'block';
            isReviewShown = true;
        }
    });

    function goToReviews() {
        const tab = document.querySelector('.product-tabs__link_reviews') || document.querySelector('[data-tab="reviews"]');
        if (tab) { tab.scrollIntoView({ behavior: 'smooth' }); tab.click(); }
        else { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }
    }

<style>
  /* wrapper */
  #floating-messengers{
    position: fixed;
    right: 20px;
    bottom: 40px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* make the clickable area round & clean */
  #floating-messengers a.messenger{
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: transparent;      /* important */
    overflow: visible;            /* keep png edges */
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* image itself */
  #floating-messengers a.messenger img{
    width: 52px;
    height: 52px;
    display: block;               /* remove inline gaps */
    background: transparent;      /* important */
    transition: transform 0.25s ease, filter 0.25s ease;
    /* no box-shadow here */
  }

  /* hover without "square": drop-shadow respects PNG transparency */
  #floating-messengers a.messenger:hover img{
    transform: scale(1.08);
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.28));
  }

  /* Mobile */
  @media (max-width: 768px){
    #floating-messengers{
      right: 12px;
      bottom: 24px;
      gap: 10px;
    }
    #floating-messengers a.messenger{
      width: 42px;
      height: 42px;
    }
    #floating-messengers a.messenger img{
      width: 42px;
      height: 42px;
    }
  }

  /* Small mobile */
  @media (max-width: 480px){
    #floating-messengers a.messenger{
      width: 38px;
      height: 38px;
    }
    #floating-messengers a.messenger img{
      width: 38px;
      height: 38px;
    }
  }
</style>
